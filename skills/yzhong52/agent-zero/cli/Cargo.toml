[package]
name = "cli"
version = "0.1.0"
edition = "2021"

[dependencies]
agent_zero_backend = { path = "../backend" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
