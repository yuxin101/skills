# ClawHub 同步白名单配置文件
# 只同步这里列出的 skill，未列出的不会被同步
# 格式：skill 目录名（与 skills/ 下的目录名一致）
# 如需启用某个 skill，删除其所在行开头的 #
#
# ⚠️ 重要提示：ClawHub 许可证政策
# ClawHub 平台强制所有 skills 使用 MIT-0 许可证（无需署名，允许商业使用）。
# 只有 MIT 许可证的 skill 才能同步到 ClawHub。
# CC-BY-NC-SA-4.0 等有限制条款的许可证与 MIT-0 冲突，不应同步。
# 详见：https://github.com/openclaw/clawhub/blob/main/docs/skill-format.md

# ===== 法律相关（CC-BY-NC-SA-4.0，不可同步）=====
