<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="width:100%;max-width:800px;height:auto;margin:20px 0;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);border-radius:12px;">
  <defs>
    <linearGradient id="beeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#fab005"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e7f5ff"/>
      <stop offset="100%" style="stop-color:#d0ebff"/>
    </linearGradient>
  </defs>
  <!-- Central hive -->
  <polygon points="400,150 450,175 450,225 400,250 350,225 350,175" fill="url(#hexGrad)" stroke="#74c0fc" stroke-width="2"/>
  <polygon points="400,175 425,190 425,210 400,225 375,210 375,190" fill="url(#beeGrad)"/>
  <text x="400" y="205" text-anchor="middle" font-size="28">🐝</text>
  <text x="400" y="280" text-anchor="middle" font-size="16" fill="#495057" font-weight="bold">Agent Swarm</text>
  <!-- Orbiting agents -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 400 200" to="360 400 200" dur="20s" repeatCount="indefinite"/>
    <circle cx="400" cy="120" r="20" fill="url(#beeGrad)" opacity="0.8">
      <animate attributeName="r" values="20;24;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="400" y="126" text-anchor="middle" font-size="14">🤖</text>
    <circle cx="480" cy="160" r="18" fill="url(#beeGrad)" opacity="0.7">
      <animate attributeName="r" values="18;22;18" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="480" y="166" text-anchor="middle" font-size="12">⚖️</text>
    <circle cx="480" cy="240" r="22" fill="url(#beeGrad)" opacity="0.9">
      <animate attributeName="r" values="22;26;22" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="480" y="246" text-anchor="middle" font-size="14">📄</text>
    <circle cx="400" cy="280" r="19" fill="url(#beeGrad)" opacity="0.75">
      <animate attributeName="r" values="19;23;19" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="400" y="286" text-anchor="middle" font-size="13">🔍</text>
    <circle cx="320" cy="240" r="21" fill="url(#beeGrad)" opacity="0.85">
      <animate attributeName="r" values="21;25;21" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <text x="320" y="246" text-anchor="middle" font-size="14">💡</text>
    <circle cx="320" cy="160" r="20" fill="url(#beeGrad)" opacity="0.8">
      <animate attributeName="r" values="20;24;20" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <text x="320" y="166" text-anchor="middle" font-size="13">🎯</text>
  </g>
  <!-- Connection lines -->
  <g stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.6">
    <line x1="400" y1="200" x2="400" y2="120">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="480" y2="160">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="480" y2="240">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="400" y2="280">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="320" y2="240">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="200" x2="320" y2="160">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.1s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" font-size="18" fill="#343a40" font-weight="bold">从单一智能到蜂群协作</text>
  <text x="400" y="405" text-anchor="middle" font-size="14" fill="#6c757d">Subagent → Agent Swarm 范式跃迁</text>
</svg>