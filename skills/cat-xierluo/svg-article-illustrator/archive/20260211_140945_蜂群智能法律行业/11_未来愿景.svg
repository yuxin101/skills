<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="width:100%;max-width:800px;height:auto;margin:20px 0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:12px;">
  <defs>
    <linearGradient id="futureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74c0fc"/>
      <stop offset="100%" style="stop-color:#339af0"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="50%" style="stop-color:#fab005"/>
      <stop offset="100%" style="stop-color:#ffd43b"/>
    </linearGradient>
  </defs>
  <!-- Stars background -->
  <g fill="#fff" opacity="0.6">
    <circle cx="100" cy="80" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="150" r="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="100" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="200" r="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="350" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="380" r="1">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Central hub -->
  <g transform="translate(400, 225)">
    <circle cx="0" cy="0" r="60" fill="url(#futureGrad)">
      <animate attributeName="r" values="60;65;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-5" text-anchor="middle" font-size="36">🌟</text>
    <text x="0" y="20" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">法律大系统</text>
  </g>
  <!-- Orbiting elements -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 400 225" to="360 400 225" dur="30s" repeatCount="indefinite"/>
    <circle cx="400" cy="115" r="25" fill="#69db7c"/>
    <text x="400" y="120" text-anchor="middle" font-size="16">⚖️</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 400 225" to="480 400 225" dur="30s" repeatCount="indefinite"/>
    <circle cx="495" cy="283" r="25" fill="#ffd43b"/>
    <text x="495" y="288" text-anchor="middle" font-size="16">🤖</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 400 225" to="600 400 225" dur="30s" repeatCount="indefinite"/>
    <circle cx="305" cy="283" r="25" fill="#ff8787"/>
    <text x="305" y="288" text-anchor="middle" font-size="16">👤</text>
  </g>
  <!-- Connection rings -->
  <circle cx="400" cy="225" r="110" fill="none" stroke="#339af0" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="8" to="0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="225" r="160" fill="none" stroke="#4dabf7" stroke-width="1" stroke-dasharray="6,6" opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Bottom glow text -->
  <rect x="250" y="380" width="300" height="40" rx="20" fill="url(#glowGrad)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="400" y="406" text-anchor="middle" font-size="14" fill="#1a1a2e" font-weight="bold">🚀 人机融合 · Agent 协同</text>
</svg>