<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="width:100%;max-width:800px;height:auto;margin:20px 0;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);border-radius:12px;">
  <defs>
    <linearGradient id="centBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dabf7"/>
      <stop offset="100%" style="stop-color:#339af0"/>
    </linearGradient>
    <linearGradient id="decentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#fab005"/>
    </linearGradient>
  </defs>
  <!-- Left: Centralized -->
  <rect x="60" y="60" width="320" height="330" rx="12" fill="none" stroke="#339af0" stroke-width="2" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="220" y="90" text-anchor="middle" font-size="16" fill="#339af0" font-weight="bold">Subagent: 中心化</text>
  <circle cx="220" cy="160" r="40" fill="url(#centBlue)">
    <animate attributeName="r" values="40;43;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="220" y="167" text-anchor="middle" font-size="24">👑</text>
  <!-- Hub and spokes -->
  <g stroke="#339af0" stroke-width="2">
    <line x1="220" y1="200" x2="140" y2="280">
      <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="220" y1="200" x2="220" y2="290">
      <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="220" y1="200" x2="300" y2="280">
      <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </line>
  </g>
  <circle cx="140" cy="300" r="25" fill="#a5d8ff"/>
  <circle cx="220" cy="310" r="25" fill="#a5d8ff"/>
  <circle cx="300" cy="300" r="25" fill="#a5d8ff"/>
  <text x="140" y="306" text-anchor="middle" font-size="16">A</text>
  <text x="220" y="316" text-anchor="middle" font-size="16">B</text>
  <text x="300" y="306" text-anchor="middle" font-size="16">C</text>
  <!-- Arrow from hub -->
  <path d="M 185 175 L 155 270" stroke="#adb5bd" stroke-width="1.5" fill="none" marker-end="url(#arrowS)"/>
  <text x="220" y="365" text-anchor="middle" font-size="12" fill="#6c757d">自上而下 | 分配-汇报</text>
  <!-- Right: Decentralized -->
  <rect x="420" y="60" width="320" height="330" rx="12" fill="none" stroke="#fab005" stroke-width="2" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="580" y="90" text-anchor="middle" font-size="16" fill="#e67700" font-weight="bold">Agent Swarm: 去中心化</text>
  <!-- Network of peers -->
  <g>
    <circle cx="500" cy="160" r="28" fill="url(#decentGold)">
      <animate attributeName="r" values="28;31;28" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="500" y="166" text-anchor="middle" font-size="18">🤖</text>
  </g>
  <g>
    <circle cx="660" cy="160" r="28" fill="url(#decentGold)">
      <animate attributeName="r" values="28;31;28" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <text x="660" y="166" text-anchor="middle" font-size="18">⚖️</text>
  </g>
  <g>
    <circle cx="440" cy="280" r="28" fill="url(#decentGold)">
      <animate attributeName="r" values="28;31;28" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <text x="440" y="286" text-anchor="middle" font-size="18">🔍</text>
  </g>
  <g>
    <circle cx="580" cy="310" r="28" fill="url(#decentGold)">
      <animate attributeName="r" values="28;31;28" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="580" y="316" text-anchor="middle" font-size="18">📄</text>
  </g>
  <g>
    <circle cx="720" cy="280" r="28" fill="url(#decentGold)">
      <animate attributeName="r" values="28;31;28" dur="2.0s" repeatCount="indefinite"/>
    </circle>
    <text x="720" y="286" text-anchor="middle" font-size="18">💡</text>
  </g>
  <!-- Dynamic connections -->
  <g stroke="#e67700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7">
    <line x1="500" y1="160" x2="660" y2="160">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="160" x2="440" y2="280">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="160" x2="580" y2="310">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="660" y1="160" x2="580" y2="310">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <line x1="660" y1="160" x2="720" y2="280">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="1.3s" repeatCount="indefinite"/>
    </line>
    <line x1="440" y1="280" x2="580" y2="310">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="580" y1="310" x2="720" y2="280">
      <animate attributeName="stroke-dashoffset" from="7" to="0" dur="1.5s" repeatCount="indefinite"/>
    </line>
  </g>
  <text x="580" y="365" text-anchor="middle" font-size="12" fill="#6c757d">自下而上 | 动态移交 | 涌现智能</text>
  <!-- Arrow between -->
  <g transform="translate(400, 225)">
    <path d="M -20 0 L 20 0" stroke="#868e96" stroke-width="3" fill="none" marker-end="url(#arrowM)"/>
    <polygon points="15,-8 30,0 15,8" fill="#868e96">
      <animateTransform attributeName="transform" type="translate" values="-5,0;5,0;-5,0" dur="1s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <defs>
    <marker id="arrowS" markerWidth="8" markerHeight="8" refX="7" refY="2" orient="auto">
      <polygon points="0 0, 8 2, 0 4" fill="#adb5bd"/>
    </marker>
    <marker id="arrowM" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#868e96"/>
    </marker>
  </defs>
</svg>