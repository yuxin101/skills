<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="width:100%;max-width:800px;height:auto;margin:20px 0;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);border-radius:12px;">
  <defs>
    <linearGradient id="swarmAgent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#fab005"/>
    </linearGradient>
  </defs>
  <!-- Agents in swarm formation -->
  <g>
    <circle cx="400" cy="150" r="38" fill="url(#swarmAgent)">
      <animate attributeName="cy" values="150;145;150" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="400" y="156" text-anchor="middle" font-size="24">🐝</text>
    <text x="400" y="200" text-anchor="middle" font-size="13" fill="#495057">协调者</text>
  </g>
  <g>
    <circle cx="200" cy="250" r="32" fill="url(#swarmAgent)">
      <animate attributeName="cy" values="250;245;250" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="200" y="256" text-anchor="middle" font-size="20">🔍</text>
    <text x="200" y="295" text-anchor="middle" font-size="12" fill="#495057">研究 Agent</text>
  </g>
  <g>
    <circle cx="330" cy="320" r="32" fill="url(#swarmAgent)">
      <animate attributeName="cy" values="320;315;320" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <text x="330" y="326" text-anchor="middle" font-size="20">⚖️</text>
    <text x="330" y="365" text-anchor="middle" font-size="12" fill="#495057">法律 Agent</text>
  </g>
  <g>
    <circle cx="470" cy="320" r="32" fill="url(#swarmAgent)">
      <animate attributeName="cy" values="320;315;320" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <text x="470" y="326" text-anchor="middle" font-size="20">📝</text>
    <text x="470" y="365" text-anchor="middle" font-size="12" fill="#495057">写作 Agent</text>
  </g>
  <g>
    <circle cx="600" cy="250" r="32" fill="url(#swarmAgent)">
      <animate attributeName="cy" values="250;245;250" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="600" y="256" text-anchor="middle" font-size="20">💡</text>
    <text x="600" y="295" text-anchor="middle" font-size="12" fill="#495057">策略 Agent</text>
  </g>
  <!-- Dynamic connections -->
  <g stroke="#868e96" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7">
    <line x1="400" y1="150" x2="200" y2="250">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="250" x2="330" y2="320">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="330" y1="320" x2="470" y2="320">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="470" y1="320" x2="600" y2="250">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.1s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="250" x2="400" y2="150">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.3s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Transfer indicators -->
  <g font-size="18">
    <text x="265" y="285" opacity="0">
      →
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="400" y="335" opacity="0">
      ↔
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </text>
    <text x="535" y="285" opacity="0">
      →
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="400" y="420" text-anchor="middle" font-size="16" fill="#343a40" font-weight="bold">Agent Swarm 模式：去中心化动态移交</text>
</svg>