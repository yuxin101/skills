<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="width:100%;max-width:800px;height:auto;margin:20px 0;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);border-radius:12px;">
  <defs>
    <linearGradient id="agentA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8787"/>
      <stop offset="100%" style="stop-color:#fa5252"/>
    </linearGradient>
    <linearGradient id="agentB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74c0fc"/>
      <stop offset="100%" style="stop-color:#4dabf7"/>
    </linearGradient>
    <linearGradient id="agentC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c"/>
      <stop offset="100%" style="stop-color:#51cf66"/>
    </linearGradient>
  </defs>
  <!-- Three agents in triangle -->
  <g transform="translate(400, 80)">
    <circle cx="0" cy="0" r="45" fill="url(#agentA)">
      <animate attributeName="r" values="45;48;45" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-size="24">📋</text>
    <text x="0" y="60" text-anchor="middle" font-size="13" fill="#495057" font-weight="bold">事实梳理</text>
  </g>
  <g transform="translate(200, 320)">
    <circle cx="0" cy="0" r="45" fill="url(#agentB)">
      <animate attributeName="r" values="45;48;45" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-size="24">⚖️</text>
    <text x="0" y="60" text-anchor="middle" font-size="13" fill="#495057" font-weight="bold">法律适用</text>
  </g>
  <g transform="translate(600, 320)">
    <circle cx="0" cy="0" r="45" fill="url(#agentC)">
      <animate attributeName="r" values="45;48;45" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-size="24">💡</text>
    <text x="0" y="60" text-anchor="middle" font-size="13" fill="#495057" font-weight="bold">论证构建</text>
  </g>
  <!-- Central document -->
  <g transform="translate(400, 240)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#fff" stroke="#339af0" stroke-width="2">
      <animate attributeName="stroke-width" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="-5" text-anchor="middle" font-size="28">📄</text>
    <text x="0" y="20" text-anchor="middle" font-size="12" fill="#339af0" font-weight="bold">起诉状</text>
  </g>
  <!-- Feedback arrows (circular) -->
  <g stroke-width="2" fill="none">
    <path d="M 365 115 Q 300 180, 235 280" stroke="#ff8787" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 565 115 Q 500 180, 565 280" stroke="#51cf66" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 250 280 Q 400 350, 550 280" stroke="#4dabf7" stroke-dasharray="6,4">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Output arrows to document -->
  <g stroke="#868e96" stroke-width="1.5" fill="none" stroke-dasharray="4,2">
    <path d="M 380 120 L 380 200"/>
    <path d="M 240 280 L 340 245"/>
    <path d="M 560 280 L 460 245"/>
  </g>
  <!-- Role label -->
  <rect x="280" y="390" width="240" height="40" rx="20" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="400" y="416" text-anchor="middle" font-size="14" fill="#339af0" font-weight="bold">👤 法律人：总设计师 & 审核者</text>
</svg>