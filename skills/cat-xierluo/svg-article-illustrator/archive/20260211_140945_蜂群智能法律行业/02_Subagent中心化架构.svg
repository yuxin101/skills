<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="width:100%;max-width:800px;height:auto;margin:20px 0;background:linear-gradient(135deg,#f8f9fa 0%,#e9ecef 100%);border-radius:12px;">
  <defs>
    <linearGradient id="mainAgent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dabf7"/>
      <stop offset="100%" style="stop-color:#339af0"/>
    </linearGradient>
    <linearGradient id="subAgent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c"/>
      <stop offset="100%" style="stop-color:#51cf66"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#868e96"/>
    </marker>
  </defs>
  <!-- Main Agent -->
  <circle cx="400" cy="120" r="45" fill="url(#mainAgent)">
    <animate attributeName="r" values="45;48;45" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="400" y="125" text-anchor="middle" font-size="28">👑</text>
  <text x="400" y="180" text-anchor="middle" font-size="16" fill="#343a40" font-weight="bold">主 Agent</text>
  <text x="400" y="200" text-anchor="middle" font-size="12" fill="#6c757d">控制中心</text>
  <!-- Sub Agents -->
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2s" repeatCount="indefinite"/>
    <circle cx="200" cy="320" r="35" fill="url(#subAgent)"/>
    <text x="200" y="325" text-anchor="middle" font-size="22">🤖</text>
    <text x="200" y="370" text-anchor="middle" font-size="13" fill="#495057">子 Agent A</text>
  </g>
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <circle cx="400" cy="320" r="35" fill="url(#subAgent)"/>
    <text x="400" y="325" text-anchor="middle" font-size="22">⚖️</text>
    <text x="400" y="370" text-anchor="middle" font-size="13" fill="#495057">子 Agent B</text>
  </g>
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <circle cx="600" cy="320" r="35" fill="url(#subAgent)"/>
    <text x="600" y="325" text-anchor="middle" font-size="22">📄</text>
    <text x="600" y="370" text-anchor="middle" font-size="13" fill="#495057">子 Agent C</text>
  </g>
  <!-- Arrows: Task delegation -->
  <g stroke="#868e96" stroke-width="2" fill="none" marker-end="url(#arrowHead)">
    <path d="M 380 155 L 220 280">
      <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 400 165 L 400 280">
      <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 420 155 L 580 280">
      <animate attributeName="stroke-dasharray" from="0,200" to="200,0" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Return arrows -->
  <g stroke="#adb5bd" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.6">
    <path d="M 180 280 Q 250 200 370 150"/>
    <path d="M 400 280 Q 400 220 400 165"/>
    <path d="M 620 280 Q 550 200 430 150"/>
  </g>
  <!-- Labels -->
  <text x="400" y="420" text-anchor="middle" font-size="16" fill="#343a40" font-weight="bold">Subagent 模式：中心化委托-汇报</text>
</svg>