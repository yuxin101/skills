<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="400" y="40" font-size="28" font-weight="bold" fill="#333" text-anchor="middle">多 Agent 有价值的三种场景</text>

  <!-- 场景 1: 上下文保护 -->
  <g transform="translate(133, 180)">
    <circle cx="0" cy="0" r="55" fill="#E3F2FD" stroke="#1976D2" stroke-width="3">
      <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" font-size="40" text-anchor="middle">🛡️</text>
    <text x="0" y="80" font-size="16" font-weight="bold" fill="#1565C0" text-anchor="middle">上下文保护</text>
    <text x="0" y="105" font-size="13" fill="#666" text-anchor="middle">隔离噪音污染</text>
  </g>

  <!-- 场景 2: 并行化 -->
  <g transform="translate(400, 180)">
    <circle cx="0" cy="0" r="55" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3">
      <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <text x="0" y="5" font-size="40" text-anchor="middle">⚡</text>
    <text x="0" y="80" font-size="16" font-weight="bold" fill="#2E7D32" text-anchor="middle">并行化</text>
    <text x="0" y="105" font-size="13" fill="#666" text-anchor="middle">扩大搜索空间</text>
  </g>

  <!-- 场景 3: 专业化 -->
  <g transform="translate(667, 180)">
    <circle cx="0" cy="0" r="55" fill="#FFF3E0" stroke="#FF9800" stroke-width="3">
      <animate attributeName="fill-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text x="0" y="5" font-size="40" text-anchor="middle">🎯</text>
    <text x="0" y="80" font-size="16" font-weight="bold" fill="#E65100" text-anchor="middle">专业化</text>
    <text x="0" y="105" font-size="13" fill="#666" text-anchor="middle">不同工具集</text>
  </g>

  <!-- 底部说明 -->
  <rect x="150" y="320" width="500" height="60" rx="8" fill="#FFEBEE" stroke="#FFCDD2" stroke-width="2"/>
  <text x="400" y="350" font-size="16" fill="#C62828" text-anchor="middle">适合松耦合、简单任务传递</text>
  <text x="400" y="370" font-size="14" fill="#666" text-anchor="middle">目标清晰 · 边界明确 · 一次性任务</text>
</svg>