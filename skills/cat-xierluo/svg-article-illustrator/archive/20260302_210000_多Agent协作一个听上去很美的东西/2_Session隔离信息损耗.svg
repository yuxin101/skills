<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90E2"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="400" y="45" font-size="28" font-weight="bold" fill="#333" text-anchor="middle">Session 隔离 · 信息损耗</text>

  <!-- 用户请求 - 大圆球 -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="70" fill="#E3F2FD" stroke="#1976D2" stroke-width="3"/>
    <text x="0" y="10" font-size="45" text-anchor="middle">👤</text>
    <text x="0" y="100" font-size="16" fill="#333" text-anchor="middle">完整请求</text>
    <text x="0" y="120" font-size="14" fill="#666" text-anchor="middle">(100% 上下文)</text>
  </g>

  <!-- 中间消息传递 -->
  <g transform="translate(400, 200)">
    <rect x="-60" y="-40" width="120" height="80" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
    <text x="0" y="8" font-size="16" fill="#E65100" text-anchor="middle">sessions_send</text>
    <text x="0" y="30" font-size="12" fill="#666" text-anchor="middle">仅传递文本</text>
  </g>

  <!-- 箭头动画 -->
  <line x1="180" y1="200" x2="320" y2="200" stroke="#4A90E2" stroke-width="4" marker-end="url(#arrow2)" stroke-dasharray="150" stroke-dashoffset="150">
    <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Agent 接收 - 小圆球 -->
  <g transform="translate(700, 200)">
    <circle cx="0" cy="0" r="50" fill="#FFEBEE" stroke="#E57373" stroke-width="2"/>
    <text x="0" y="10" font-size="35" text-anchor="middle">🤔</text>
    <text x="0" y="80" font-size="16" fill="#333" text-anchor="middle">仅收到</text>
    <text x="0" y="100" font-size="14" fill="#C62828" text-anchor="middle">&lt;10% 上下文</text>
  </g>

  <!-- 底部损耗标注 -->
  <g transform="translate(400, 380)">
    <rect x="-150" y="-25" width="300" height="50" rx="8" fill="#FFCDD2"/>
    <text x="0" y="5" font-size="18" fill="#C62828" text-anchor="middle">信息损耗：90%+</text>
  </g>
</svg>