<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FAFAFA"/>
  <text x="400" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#2D3748">打字 ≠ 表达</text>
  <g transform="translate(200, 225)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2s" repeatCount="indefinite"/>
    <text font-size="100" text-anchor="middle" dominant-baseline="middle">⌨️</text>
    <rect x="-50" y="60" width="100" height="30" rx="5" fill="#E2E8F0"/>
    <text x="0" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#718096">打字</text>
  </g>
  <g transform="translate(400, 225)">
    <text font-size="60" text-anchor="middle" dominant-baseline="middle" fill="#E53E3E" font-weight="bold">≠</text>
  </g>
  <g transform="translate(600, 225)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="2.5s" repeatCount="indefinite"/>
    <text font-size="100" text-anchor="middle" dominant-baseline="middle">💭</text>
    <rect x="-50" y="60" width="100" height="30" rx="5" fill="#FED7D7"/>
    <text x="0" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle" fill="#C53030">表达</text>
  </g>
  <text x="400" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="20" text-anchor="middle" fill="#718096">会打字 ≠ 会表达 ≠ 知道想要什么</text>
</svg>