<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <text x="400" y="75" font-size="36" font-weight="bold" fill="#2d3748" text-anchor="middle">隐形债务</text>

  <!-- 冰山隐喻 -->
  <!-- 水面线 -->
  <line x1="100" y1="220" x2="700" y2="220" stroke="#4A90E2" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="720" y="225" font-size="16" fill="#4A90E2">水面</text>

  <!-- 冰山上部（可见的轻松） -->
  <polygon points="400,100 450,220 350,220" fill="#E8F4F8" stroke="#4A90E2" stroke-width="3"/>
  <text x="400" y="180" font-size="24" fill="#10B981" text-anchor="middle">轻松</text>

  <!-- 冰山下部（隐藏的成本） -->
  <polygon points="400,220 500,380 300,380" fill="#FEE2E2" stroke="#E53E3E" stroke-width="3">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <text x="400" y="290" font-size="50" text-anchor="middle">💸</text>
  <text x="400" y="340" font-size="18" fill="#E53E3E" text-anchor="middle">审查成本</text>
  <text x="400" y="365" font-size="14" fill="#718096" text-anchor="middle">重构·解释·维护</text>

  <!-- 左侧对比标签 -->
  <g transform="translate(120, 160)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#10B981"/>
    <text x="50" y="27" font-size="16" fill="white" text-anchor="middle">前期轻</text>
  </g>
  <g transform="translate(120, 300)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#E53E3E"/>
    <text x="50" y="27" font-size="16" fill="white" text-anchor="middle">后期重</text>
  </g>
</svg>
