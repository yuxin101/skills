<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <text x="400" y="70" font-size="36" font-weight="bold" fill="#2d3748" text-anchor="middle">控制权丧失</text>

  <!-- 人 -->
  <g transform="translate(150, 150)">
    <circle cx="50" cy="50" r="50" fill="#E8F4F8" stroke="#4A90E2" stroke-width="3"/>
    <text x="50" y="70" font-size="60" text-anchor="middle">👤</text>
    <text x="50" y="140" font-size="18" fill="#4A90E2" text-anchor="middle">你</text>
  </g>

  <!-- 控制权转移箭头 -->
  <g>
    <line x1="280" y1="200" x2="520" y2="200" stroke="#E53E3E" stroke-width="4" stroke-dasharray="240" stroke-dashoffset="240">
      <animate attributeName="stroke-dashoffset" from="240" to="0" dur="2s" repeatCount="indefinite"/>
    </line>
    <polygon points="520,193 540,200 520,207" fill="#E53E3E"/>
    <text x="400" y="180" font-size="16" fill="#E53E3E" text-anchor="middle">结构主导权</text>
  </g>

  <!-- AI -->
  <g transform="translate(550, 150)">
    <circle cx="50" cy="50" r="50" fill="#FEE2E2" stroke="#E53E3E" stroke-width="3"/>
    <text x="50" y="70" font-size="60" text-anchor="middle">🤖</text>
    <text x="50" y="140" font-size="18" fill="#E53E3E" text-anchor="middle">AI</text>
  </g>

  <!-- 底部说明 -->
  <rect x="150" y="330" width="500" height="80" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="365" font-size="18" fill="#92400E" text-anchor="middle">表面：你一直在发指令</text>
  <text x="400" y="395" font-size="18" fill="#92400E" text-anchor="middle">实际：结构已被 AI 悄悄决定</text>
</svg>
