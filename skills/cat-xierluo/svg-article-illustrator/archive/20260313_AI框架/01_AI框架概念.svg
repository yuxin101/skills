<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <text x="400" y="90" font-size="48" font-weight="bold" fill="#2d3748" text-anchor="middle">AI 框架</text>
  <rect x="150" y="130" width="500" height="240" rx="16" fill="#E8F4F8" stroke="#4A90E2" stroke-width="4" stroke-dasharray="15,8">
    <animate attributeName="stroke-dashoffset" from="46" to="0" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <g transform="translate(280, 200)">
    <text x="0" y="35" font-size="80" text-anchor="middle">⚙️</text>
    <animateTransform attributeName="transform" type="translate" values="280,200; 280,190; 280,200" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>
  <g transform="translate(400, 220)">
    <text x="0" y="35" font-size="80" text-anchor="middle">🔧</text>
    <animateTransform attributeName="transform" type="translate" values="400,220; 400,210; 400,220" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>
  <g transform="translate(520, 200)">
    <text x="0" y="35" font-size="80" text-anchor="middle">📊</text>
    <animateTransform attributeName="transform" type="translate" values="520,200; 520,190; 520,200" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>
  <text x="400" y="400" font-size="28" fill="#718096" text-anchor="middle">封装复杂度</text>
</svg>
