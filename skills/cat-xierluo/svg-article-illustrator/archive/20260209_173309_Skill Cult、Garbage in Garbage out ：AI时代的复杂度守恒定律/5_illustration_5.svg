<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#F3E8F8" rx="10"/>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8E44AD"/>
    </marker>
  </defs>

  <!-- 左侧：复杂度源 -->
  <g transform="translate(150, 225)">
    <circle r="70" fill="#E8DAEF" stroke="#8E44AD" stroke-width="4"/>
    <text x="0" y="20" font-size="80" text-anchor="middle">🌀</text>
  </g>

  <!-- 箭头1：向右移动 -->
  <line x1="220" y1="225" x2="380" y2="225" stroke="#8E44AD" stroke-width="4"
    marker-end="url(#arrow3)" stroke-dasharray="160" stroke-dashoffset="160">
    <animate attributeName="stroke-dashoffset" from="160" to="0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 中间：封装 -->
  <g transform="translate(475, 225)">
    <rect x="-95" y="-70" width="190" height="140" fill="#E8DAEF" rx="10"
      stroke="#8E44AD" stroke-width="4" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="20" font-size="70" text-anchor="middle">📦</text>
  </g>

  <!-- 箭头2：向右移动 -->
  <line x1="570" y1="225" x2="580" y2="225" stroke="#8E44AD" stroke-width="4"
    marker-end="url(#arrow3)" stroke-dasharray="10" stroke-dashoffset="10">
    <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 右侧：复杂度仍在 -->
  <g transform="translate(650, 225)">
    <circle r="70" fill="#E8DAEF" stroke="#8E44AD" stroke-width="4">
      <animate attributeName="fill-opacity" values="0.7; 1; 0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="20" font-size="80" text-anchor="middle">🌀</text>
  </g>

  <text x="400" y="400" font-size="44" fill="#2C3E50" text-anchor="middle" font-weight="bold">复杂度守恒</text>
</svg>
