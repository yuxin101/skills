<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="400" y="50" font-size="36" text-anchor="middle" fill="#333" font-weight="bold">被AI放大</text>

  <!-- 左边小人 -->
  <g transform="translate(150, 260)">
    <circle cx="0" cy="-60" r="30" fill="#E8F4F8" stroke="#4A90E2" stroke-width="3"/>
    <text x="0" y="-50" font-size="30" text-anchor="middle">👤</text>
    <rect x="-25" y="-20" width="50" height="60" fill="#E8F4F8" rx="8"/>
    <text x="0" y="100" font-size="20" text-anchor="middle" fill="#666">有准备的人</text>
  </g>

  <!-- 放大箭头 -->
  <g>
    <path d="M220,260 Q300,200 380,260" fill="none" stroke="#4A90E2" stroke-width="4" stroke-dasharray="160" stroke-dashoffset="160">
      <animate attributeName="stroke-dashoffset" from="160" to="0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="380,260 365,250 368,268" fill="#4A90E2"/>
    <text x="300" y="180" font-size="50" text-anchor="middle">🚀</text>
    <text x="300" y="150" font-size="24" text-anchor="middle" fill="#4A90E2">AI放大</text>
  </g>

  <!-- 右边大人与AI -->
  <g transform="translate(550, 260)">
    <circle cx="0" cy="-70" r="40" fill="#E8F4F8" stroke="#4A90E2" stroke-width="3"/>
    <text x="0" y="-55" font-size="40" text-anchor="middle">👤</text>
    <rect x="-35" y="-20" width="70" height="80" fill="#E8F4F8" rx="10"/>

    <circle cx="100" cy="-40" r="35" fill="#4A90E2"/>
    <text x="100" y="-25" font-size="35" text-anchor="middle" fill="#fff">AI</text>

    <text x="50" y="120" font-size="20" text-anchor="middle" fill="#666">被放大后</text>

    <animateTransform attributeName="transform" type="translate" values="550,260; 550,250; 550,260" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>
</svg>