<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>

  <!-- 左侧：混乱 -->
  <g transform="translate(200, 250)">
    <text x="0" y="-120" font-size="32" text-anchor="middle" fill="#666">混乱的世界</text>
    <text x="-60" y="-30" font-size="40" text-anchor="middle" fill="#999">📄</text>
    <text x="20" y="-50" font-size="35" text-anchor="middle" fill="#999" transform="rotate(15, 20, -50)">📝</text>
    <text x="-30" y="20" font-size="38" text-anchor="middle" fill="#999" transform="rotate(-10, -30, 20)">🗂️</text>
    <text x="50" y="10" font-size="36" text-anchor="middle" fill="#999" transform="rotate(8, 50, 10)">📎</text>
    <text x="-50" y="70" font-size="34" text-anchor="middle" fill="#999" transform="rotate(-5, -50, 70)">💭</text>
    <text x="30" y="80" font-size="32" text-anchor="middle" fill="#999" transform="rotate(12, 30, 80)">❓</text>
  </g>

  <!-- 箭头 -->
  <g>
    <line x1="320" y1="250" x2="480" y2="250" stroke="#4A90E2" stroke-width="4" stroke-dasharray="160" stroke-dashoffset="160">
      <animate attributeName="stroke-dashoffset" from="160" to="0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <polygon points="480,250 465,242 465,258" fill="#4A90E2"/>
  </g>

  <!-- 右侧：有序 -->
  <g transform="translate(600, 250)">
    <text x="0" y="-120" font-size="32" text-anchor="middle" fill="#4A90E2">有序的世界</text>
    <rect x="-80" y="-80" width="160" height="180" fill="#E8F4F8" rx="10" stroke="#4A90E2" stroke-width="2"/>
    <rect x="-60" y="-60" width="120" height="30" fill="#fff" rx="5"/>
    <rect x="-60" y="-20" width="120" height="30" fill="#fff" rx="5"/>
    <rect x="-60" y="20" width="120" height="30" fill="#fff" rx="5"/>
    <rect x="-60" y="60" width="120" height="30" fill="#fff" rx="5"/>
    <circle cx="-45" cy="-45" r="8" fill="#4A90E2"/>
    <circle cx="-45" cy="-5" r="8" fill="#4A90E2"/>
    <circle cx="-45" cy="35" r="8" fill="#4A90E2"/>
    <circle cx="-45" cy="75" r="8" fill="#4A90E2"/>
  </g>

  <!-- 标题 -->
  <text x="400" y="50" font-size="36" text-anchor="middle" fill="#333" font-weight="bold">AI最怕什么？</text>
</svg>