<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="400" y="50" font-size="32" text-anchor="middle" fill="#333" font-weight="bold">个人操作系统</text>

  <!-- 中心大框 -->
  <rect x="150" y="90" width="500" height="320" fill="#E8F4F8" rx="15" stroke="#4A90E2" stroke-width="3"/>

  <!-- 顶层：组织文件 -->
  <g transform="translate(250, 150)">
    <rect x="-70" y="-30" width="140" height="60" fill="#fff" rx="8"/>
    <text x="0" y="-5" font-size="40" text-anchor="middle">📁</text>
    <text x="0" y="20" font-size="14" text-anchor="middle" fill="#333">组织文件</text>
    <animateTransform attributeName="transform" type="translate" values="250,150; 250,145; 250,150" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- 顶层右：沉淀知识 -->
  <g transform="translate(550, 150)">
    <rect x="-70" y="-30" width="140" height="60" fill="#fff" rx="8"/>
    <text x="0" y="-5" font-size="40" text-anchor="middle">📚</text>
    <text x="0" y="20" font-size="14" text-anchor="middle" fill="#333">沉淀知识</text>
    <animateTransform attributeName="transform" type="translate" values="550,150; 550,145; 550,150" dur="3s" repeatCount="indefinite" begin="0.3s"/>
  </g>

  <!-- 中层：推进任务 -->
  <g transform="translate(250, 250)">
    <rect x="-70" y="-30" width="140" height="60" fill="#fff" rx="8"/>
    <text x="0" y="-5" font-size="40" text-anchor="middle">✅</text>
    <text x="0" y="20" font-size="14" text-anchor="middle" fill="#333">推进任务</text>
    <animateTransform attributeName="transform" type="translate" values="250,250; 250,245; 250,250" dur="3s" repeatCount="indefinite" begin="0.6s"/>
  </g>

  <!-- 中层右：管理项目 -->
  <g transform="translate(550, 250)">
    <rect x="-70" y="-30" width="140" height="60" fill="#fff" rx="8"/>
    <text x="0" y="-5" font-size="40" text-anchor="middle">📋</text>
    <text x="0" y="20" font-size="14" text-anchor="middle" fill="#333">管理项目</text>
    <animateTransform attributeName="transform" type="translate" values="550,250; 550,245; 550,250" dur="3s" repeatCount="indefinite" begin="0.9s"/>
  </g>

  <!-- 底层：保存上下文、记录判断、维护版本 -->
  <g transform="translate(400, 350)">
    <rect x="-180" y="-25" width="360" height="50" fill="#fff" rx="8"/>
    <text x="-100" y="8" font-size="28" text-anchor="middle">🔗</text>
    <text x="0" y="8" font-size="28" text-anchor="middle">💭</text>
    <text x="100" y="8" font-size="28" text-anchor="middle">📝</text>
    <text x="0" y="-35" font-size="12" text-anchor="middle" fill="#666">上下文 · 判断 · 版本</text>
  </g>

  <!-- AI接入点 -->
  <g transform="translate(720, 250)">
    <circle cx="0" cy="0" r="35" fill="#4A90E2"/>
    <text x="0" y="8" font-size="24" text-anchor="middle" fill="#fff" font-weight="bold">AI</text>
    <text x="0" y="60" font-size="14" text-anchor="middle" fill="#4A90E2">接入点</text>
  </g>

  <!-- 连接线 -->
  <line x1="650" y1="250" x2="685" y2="250" stroke="#4A90E2" stroke-width="2" stroke-dasharray="5,3"/>
</svg>