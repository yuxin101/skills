<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#FFFFFF"/>

  <text x="400" y="45" font-size="28" text-anchor="middle" fill="#1A1A2E" font-weight="bold">三层防护</text>

  <g>
    <rect x="100" y="80" width="600" height="90" rx="10" fill="#E8F4F8" stroke="#4A90E2" stroke-width="2"/>
    <text x="140" y="130" font-size="40" text-anchor="middle">📋</text>
    <text x="280" y="125" font-size="20" font-weight="bold" fill="#4A90E2">合同合规</text>
    <text x="280" y="150" font-size="14" fill="#888">成本低</text>
    <line x1="400" y1="175" x2="400" y2="195" stroke="#10B981" stroke-width="3" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" from="8" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <g>
    <rect x="100" y="200" width="600" height="90" rx="10" fill="#E8F5E8" stroke="#10B981" stroke-width="2"/>
    <text x="140" y="250" font-size="40" text-anchor="middle">🔧</text>
    <text x="280" y="245" font-size="20" font-weight="bold" fill="#10B981">技术脱敏</text>
    <text x="280" y="270" font-size="14" fill="#888">成本中</text>
    <line x1="400" y1="295" x2="400" y2="315" stroke="#10B981" stroke-width="3" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" from="8" to="0" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <g>
    <rect x="100" y="320" width="600" height="90" rx="10" fill="#FFF5F5" stroke="#E24A4A" stroke-width="2"/>
    <text x="140" y="370" font-size="40" text-anchor="middle">🏠</text>
    <text x="280" y="365" font-size="20" font-weight="bold" fill="#E24A4A">本地部署</text>
    <text x="280" y="390" font-size="14" fill="#888">成本高</text>
  </g>
</svg>