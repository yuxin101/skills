<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow5a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrow5b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>

  <!-- Left: Multi-Agent System -->
  <g transform="translate(200, 220)">
    <rect x="-150" y="-120" width="300" height="240" fill="#dcfce7" stroke="#16a34a" stroke-width="3" rx="15"/>
    <text x="0" y="-90" text-anchor="middle" font-size="18" font-weight="bold" fill="#166534">Claude Code 多 Agent 系统</text>
    <text x="0" y="-65" text-anchor="middle" font-size="14" fill="#15803d">(同一模型内部)</text>

    <!-- Single Brain -->
    <circle cx="0" cy="-10" r="50" fill="#86efac" stroke="#22c55e" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">同一个</text>
    <text x="0" y="15" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">大脑 🧠</text>

    <!-- Sub-agents -->
    <g transform="translate(-80, 70)">
      <rect x="-40" y="-20" width="80" height="40" fill="#fff" stroke="#16a34a" stroke-width="2" rx="8"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="#166534">Sub-agent 1</text>
    </g>
    <g transform="translate(0, 70)">
      <rect x="-40" y="-20" width="80" height="40" fill="#fff" stroke="#16a34a" stroke-width="2" rx="8"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="#166534">Sub-agent 2</text>
    </g>
    <g transform="translate(80, 70)">
      <rect x="-40" y="-20" width="80" height="40" fill="#fff" stroke="#16a34a" stroke-width="2" rx="8"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="#166534">Sub-agent 3</text>
    </g>

    <!-- Arrow -->
    <line x1="0" y1="30" x2="0" y2="50" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow5a)" stroke-dasharray="20" stroke-dashoffset="20">
      <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
    </line>

    <text x="0" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">✅ 有效</text>
  </g>

  <!-- Right: Multi-Agent Configuration -->
  <g transform="translate(600, 220)">
    <rect x="-150" y="-120" width="300" height="240" fill="#fee2e2" stroke="#dc2626" stroke-width="3" rx="15"/>
    <text x="0" y="-90" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">OpenClaw 多 Agent 配置</text>
    <text x="0" y="-65" text-anchor="middle" font-size="14" fill="#b91c1c">(独立 agent)</text>

    <!-- Separate Brains -->
    <g transform="translate(-60, -20)">
      <circle cx="0" cy="0" r="35" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-size="11" fill="#7f1d1d">Brain A</text>
      <text x="0" y="10" text-anchor="middle" font-size="11" fill="#7f1d1d">🧠</text>
    </g>
    <g transform="translate(60, -20)">
      <circle cx="0" cy="0" r="35" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-size="11" fill="#1e3a8a">Brain B</text>
      <text x="0" y="10" text-anchor="middle" font-size="11" fill="#1e3a8a">🧠</text>
    </g>

    <!-- Sessions -->
    <g transform="translate(-60, 50)">
      <rect x="-50" y="-15" width="100" height="30" fill="#fff" stroke="#fca5a5" stroke-width="2" rx="6"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#7f1d1d">Session A</text>
    </g>
    <g transform="translate(60, 50)">
      <rect x="-50" y="-15" width="100" height="30" fill="#fff" stroke="#93c5fd" stroke-width="2" rx="6"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#1e3a8a">Session B</text>
    </g>

    <!-- Communication -->
    <line x1="-30" y1="80" x2="30" y2="80" stroke="#f97316" stroke-width="3" marker-end="url(#arrow5b)" stroke-dasharray="60" stroke-dashoffset="60">
      <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <text x="0" y="110" text-anchor="middle" font-size="12" fill="#c2410c">sessions_send</text>

    <text x="0" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">❌ 代价高</text>
  </g>

  <!-- Bottom conclusion -->
  <g transform="translate(400, 420)">
    <rect x="-300" y="-20" width="600" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">进程间通信 ≠ 同一个大脑内的任务分工</text>
  </g>
</svg>