<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow9" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#fff1f2"/>

  <!-- Title -->
  <g transform="translate(400, 40)">
    <text x="0" y="0" text-anchor="middle" font-size="24" font-weight="bold" fill="#be123c">Token 成本：3-10 倍</text>
  </g>

  <!-- Single Agent -->
  <g transform="translate(200, 220)">
    <rect x="-120" y="-80" width="240" height="160" fill="#dcfce7" stroke="#16a34a" stroke-width="3" rx="15"/>
    <text x="0" y="-50" text-anchor="middle" font-size="18" font-weight="bold" fill="#166534">单 Agent</text>

    <!-- Brain -->
    <circle cx="0" cy="0" r="50" fill="#86efac" stroke="#22c55e" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" font-size="40">🧠</text>
    <text x="0" y="25" text-anchor="middle" font-size="12" fill="#15803d">单一上下文</text>

    <!-- Token cost -->
    <rect x="-60" y="65" width="120" height="30" fill="#fff" stroke="#16a34a" stroke-width="2" rx="6"/>
    <text x="0" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">100% Token</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(400, 220)">
    <text x="0" y="0" text-anchor="middle" font-size="40">➡️</text>
  </g>

  <!-- Multi Agent -->
  <g transform="translate(600, 220)">
    <rect x="-120" y="-80" width="240" height="160" fill="#fee2e2" stroke="#ef4444" stroke-width="3" rx="15"/>
    <text x="0" y="-50" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">多 Agent</text>

    <!-- Multiple Brains -->
    <g transform="translate(-35, 0)">
      <circle cx="0" cy="0" r="30" fill="#fca5a5" stroke="#ef4444" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-size="20">🧠</text>
    </g>
    <g transform="translate(35, 0)">
      <circle cx="0" cy="0" r="30" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
      <text x="0" y="-5" text-anchor="middle" font-size="20">🧠</text>
    </g>

    <!-- Multiple contexts -->
    <text x="0" y="45" text-anchor="middle" font-size="12" fill="#b91c1c">每个 agent 独立上下文</text>

    <!-- Token cost -->
    <rect x="-60" y="65" width="120" height="30" fill="#fff" stroke="#ef4444" stroke-width="2" rx="6"/>
    <text x="0" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">300-1000% Token</text>
  </g>

  <!-- Reasons -->
  <g transform="translate(400, 420)">
    <rect x="-320" y="-25" width="640" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="10"/>
    <text x="0" y="-5" text-anchor="middle" font-size="13" fill="#b45309">原因：独立上下文 + 协调消息 + 传递时总结</text>
  </g>
</svg>