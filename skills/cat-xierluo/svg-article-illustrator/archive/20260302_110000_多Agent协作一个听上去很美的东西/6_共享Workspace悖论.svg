<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#fff7ed"/>

  <!-- Title -->
  <g transform="translate(400, 40)">
    <text x="0" y="0" text-anchor="middle" font-size="24" font-weight="bold" fill="#c2410c">共享 Workspace 悖论</text>
  </g>

  <!-- Central Shared Workspace -->
  <g transform="translate(400, 180)">
    <rect x="-120" y="-70" width="240" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="4" rx="15"/>
    <text x="0" y="-40" text-anchor="middle" font-size="18" font-weight="bold" fill="#b45309">📁 共享 Workspace</text>

    <!-- Memory blocks -->
    <rect x="-90" y="-15" width="60" height="30" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="4"/>
    <text x="-60" y="5" text-anchor="middle" font-size="11" fill="#c2410c">记忆A</text>

    <rect x="-20" y="-15" width="60" height="30" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="4"/>
    <text x="10" y="5" text-anchor="middle" font-size="11" fill="#c2410c">记忆B</text>

    <rect x="50" y="-15" width="60" height="30" fill="#fed7aa" stroke="#ea580c" stroke-width="2" rx="4"/>
    <text x="80" y="5" text-anchor="middle" font-size="11" fill="#c2410c">记忆C</text>

    <text x="0" y="45" text-anchor="middle" font-size="12" fill="#c2410c">每次加载全部记忆</text>
  </g>

  <!-- Agent A and B connecting to shared workspace -->
  <g transform="translate(200, 320)">
    <rect x="-60" y="-30" width="120" height="60" fill="#fee2e2" stroke="#ef4444" stroke-width="3" rx="10"/>
    <text x="0" y="-5" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">🔴 Agent A</text>
    <text x="0" y="20" text-anchor="middle" font-size="12" fill="#dc2626">Session A</text>
  </g>

  <g transform="translate(600, 320)">
    <rect x="-60" y="-30" width="120" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" rx="10"/>
    <text x="0" y="-5" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">🔵 Agent B</text>
    <text x="0" y="20" text-anchor="middle" font-size="12" fill="#2563eb">Session B</text>
  </g>

  <!-- Arrows to workspace -->
  <line x1="200" y1="300" x2="340" y2="250" stroke="#f97316" stroke-width="3" marker-end="url(#arrow6)" stroke-dasharray="150" stroke-dashoffset="150">
    <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <line x1="600" y1="300" x2="460" y2="250" stroke="#f97316" stroke-width="3" marker-end="url(#arrow6)" stroke-dasharray="150" stroke-dashoffset="150">
    <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </line>

  <!-- Paradox Box -->
  <g transform="translate(400, 420)">
    <rect x="-280" y="-25" width="560" height="50" fill="#fef2f2" stroke="#ef4444" stroke-width="3" rx="10"/>
    <text x="0" y="-5" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">❌ 悖论：增加协调成本 + 重复加载全部记忆</text>
  </g>
</svg>