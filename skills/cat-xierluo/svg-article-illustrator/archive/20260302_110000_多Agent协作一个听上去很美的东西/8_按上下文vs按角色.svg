<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow8" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#fefce8"/>

  <!-- Title -->
  <g transform="translate(400, 35)">
    <text x="0" y="0" text-anchor="middle" font-size="22" font-weight="bold" fill="#a16207">按上下文划分 vs 按角色划分</text>
  </g>

  <!-- Left: Wrong Approach -->
  <g transform="translate(200, 220)">
    <rect x="-130" y="-100" width="260" height="200" fill="#fee2e2" stroke="#ef4444" stroke-width="3" rx="15"/>
    <text x="0" y="-70" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">❌ 按角色划分</text>

    <!-- Role cards -->
    <g transform="translate(-60, -30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#fff" stroke="#fca5a5" stroke-width="2" rx="8"/>
      <text x="0" y="0" text-anchor="middle" font-size="13" fill="#b91c1c">法律 Agent</text>
    </g>
    <g transform="translate(60, -30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#fff" stroke="#fca5a5" stroke-width="2" rx="8"/>
      <text x="0" y="0" text-anchor="middle" font-size="13" fill="#b91c1c">研究 Agent</text>
    </g>
    <g transform="translate(0, 40)">
      <rect x="-60" y="-25" width="120" height="50" fill="#fff" stroke="#fca5a5" stroke-width="2" rx="8"/>
      <text x="0" y="0" text-anchor="middle" font-size="13" fill="#b91c1c">写作 Agent</text>
    </g>

    <!-- Phone game effect -->
    <g transform="translate(0, 100)">
      <rect x="-80" y="-20" width="160" height="35" fill="#fef2f2" stroke="#f87171" stroke-width="2" rx="6"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="#dc2626">📞 电话游戏效应</text>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(400, 220)">
    <text x="0" y="0" text-anchor="middle" font-size="30">➡️</text>
  </g>

  <!-- Right: Correct Approach -->
  <g transform="translate(600, 220)">
    <rect x="-130" y="-100" width="260" height="200" fill="#dcfce7" stroke="#16a34a" stroke-width="3" rx="15"/>
    <text x="0" y="-70" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">✅ 按上下文划分</text>

    <!-- Context boundaries -->
    <g transform="translate(-60, -30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#fff" stroke="#86efac" stroke-width="2" rx="8"/>
      <text x="0" y="0" text-anchor="middle" font-size="12" fill="#15803d">研究路径</text>
      <text x="0" y="15" text-anchor="middle" font-size="11" fill="#166534">(独立)</text>
    </g>
    <g transform="translate(60, -30)">
      <rect x="-50" y="-25" width="100" height="50" fill="#fff" stroke="#86efac" stroke-width="2" rx="8"/>
      <text x="0" y="0" text-anchor="middle" font-size="12" fill="#15803d">验证路径</text>
      <text x="0" y="15" text-anchor="middle" font-size="11" fill="#166534">(黑盒)</text>
    </g>
    <g transform="translate(0, 40)">
      <rect x="-60" y="-25" width="120" height="50" fill="#fff" stroke="#86efac" stroke-width="2" rx="8"/>
      <text x="0" y="0" text-anchor="middle" font-size="12" fill="#15803d">组件接口</text>
      <text x="0" y="15" text-anchor="middle" font-size="11" fill="#166534">(清晰边界)</text>
    </g>

    <!-- No information loss -->
    <g transform="translate(0, 100)">
      <rect x="-80" y="-20" width="160" height="35" fill="#ecfccb" stroke="#65a30d" stroke-width="2" rx="6"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="#3f6212">✓ 信息不丢失</text>
    </g>
  </g>

  <!-- Key insight -->
  <g transform="translate(400, 430)">
    <rect x="-350" y="-20" width="700" height="35" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" rx="8"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">采用上下文视角而不是问题视角来分解工作</text>
  </g>
</svg>