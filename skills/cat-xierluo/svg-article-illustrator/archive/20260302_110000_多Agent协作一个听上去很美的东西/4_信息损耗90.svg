<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#fff7ed"/>

  <!-- Title -->
  <g transform="translate(400, 40)">
    <text x="0" y="0" text-anchor="middle" font-size="24" font-weight="bold" fill="#c2410c">信息传递损耗</text>
  </g>

  <!-- Original Message - Full -->
  <g transform="translate(400, 100)">
    <rect x="-250" y="-50" width="500" height="100" fill="#ecfccb" stroke="#65a30d" stroke-width="3" rx="12"/>
    <text x="0" y="-20" text-anchor="middle" font-size="16" font-weight="bold" fill="#3f6212">用户原始请求</text>
    <text x="0" y="15" text-anchor="middle" font-size="14" fill="#4d7c0f">"帮我做一个关于</text>
    <text x="0" y="35" text-anchor="middle" font-size="14" fill="#4d7c0f">AI版权的报告，受众是律师，</text>
    <text x="0" y="55" text-anchor="middle" font-size="14" fill="#4d7c0f">需要深度分析，截止周五"</text>
  </g>

  <!-- Arrow down -->
  <line x1="400" y1="160" x2="400" y2="210" stroke="#f97316" stroke-width="3" marker-end="url(#arrow4)" stroke-dasharray="50" stroke-dashoffset="50">
    <animate attributeName="stroke-dashoffset" from="50" to="0" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- sessions_send -->
  <g transform="translate(400, 240)">
    <rect x="-150" y="-25" width="300" height="50" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="8"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">sessions_send 传递</text>
  </g>

  <!-- Arrow down -->
  <line x1="400" y1="275" x2="400" y2="310" stroke="#f97316" stroke-width="3" marker-end="url(#arrow4)" stroke-dasharray="35" stroke-dashoffset="35">
    <animate attributeName="stroke-dashoffset" from="35" to="0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- What Researcher Receives - Minimal -->
  <g transform="translate(400, 360)">
    <rect x="-200" y="-50" width="400" height="100" fill="#fee2e2" stroke="#ef4444" stroke-width="3" rx="12"/>
    <text x="0" y="-20" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">Researcher 收到的</text>
    <text x="0" y="15" text-anchor="middle" font-size="18" fill="#dc2626">"帮我搜索最近AI版权的新闻"</text>
    <text x="0" y="45" text-anchor="middle" font-size="14" fill="#b91c1c">❌ 不知道"做报告"</text>
    <text x="0" y="65" text-anchor="middle" font-size="14" fill="#b91c1c">❌ 不知道受众/深度/截止日</text>
  </g>

  <!-- 90% Loss Label -->
  <g transform="translate(700, 80)">
    <rect x="-60" y="-30" width="120" height="60" fill="#fef2f2" stroke="#ef4444" stroke-width="3" rx="10"/>
    <text x="0" y="-5" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">信息损耗</text>
    <text x="0" y="18" text-anchor="middle" font-size="22" font-weight="bold" fill="#ef4444">90%+</text>
    <animateTransform attributeName="transform" type="scale" values="1; 1.1; 1" dur="1.5s" repeatCount="indefinite"/>
  </g>
</svg>