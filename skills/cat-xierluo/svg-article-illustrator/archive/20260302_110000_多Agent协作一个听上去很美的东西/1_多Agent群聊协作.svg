<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90E2"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>

  <!-- Central Chat Group -->
  <g transform="translate(400, 200)">
    <rect x="-120" y="-80" width="240" height="160" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" rx="15"/>
    <text x="0" y="-45" text-anchor="middle" font-size="18" font-weight="bold" fill="#0369a1">多 Agent 协作群</text>

    <!-- Agent Bubbles -->
    <g>
      <rect x="-100" y="-20" width="80" height="40" fill="#fff" stroke="#4A90E2" stroke-width="2" rx="8"/>
      <text x="-60" y="5" text-anchor="middle" font-size="14" fill="#1e40af">🔍 搜索</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </g>

    <g transform="translate(60, 0)">
      <rect x="-40" y="-20" width="80" height="40" fill="#fff" stroke="#8B5CF6" stroke-width="2" rx="8"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="#6d28d9">✍️ 写作</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </g>

    <g transform="translate(-20, 50)">
      <rect x="-60" y="-20" width="120" height="40" fill="#fff" stroke="#10B981" stroke-width="2" rx="8"/>
      <text x="0" y="5" text-anchor="middle" font-size="14" fill="#047857">👥 审核</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" begin="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </g>
  </g>

  <!-- Arrows showing communication -->
  <line x1="310" y1="200" x2="350" y2="200" stroke="#4A90E2" stroke-width="3" marker-end="url(#arrow1)" stroke-dasharray="40" stroke-dashoffset="40">
    <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite"/>
  </line>

  <line x1="450" y1="200" x2="490" y2="200" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrow1)" stroke-dasharray="40" stroke-dashoffset="40">
    <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" begin="0.3s" repeatCount="indefinite"/>
  </line>

  <!-- User at bottom -->
  <g transform="translate(400, 400)">
    <rect x="-80" y="-30" width="160" height="35" fill="#1e40af" rx="17"/>
    <text x="0" y="-4" text-anchor="middle" font-size="14" fill="white">👤 用户</text>
  </g>

  <!-- Dotted connections -->
  <rect x="320" y="350" width="160" height="30" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,3" rx="5">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.5s" repeatCount="indefinite"/>
  </rect>
</svg>