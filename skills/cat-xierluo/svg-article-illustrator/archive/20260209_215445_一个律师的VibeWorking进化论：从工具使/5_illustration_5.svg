<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FFF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C6F6D5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad6)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#276749">SuitAgent 四层架构</text>

  <!-- 第一层：输入层 -->
  <g transform="translate(400, 100)">
    <rect x="-320" y="-22" width="640" height="44" fill="#E6FFFA" stroke="#38B2AC" stroke-width="3" rx="8" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="-280" y="5" text-anchor="middle" font-size="28">📥</text>
    <text x="-150" y="5" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C7A7B">输入层</text>
    <text x="50" y="5" text-anchor="middle" font-size="16" fill="#285E61">DocAnalyzer | EvidenceAnalyzer</text>
  </g>

  <!-- 箭头1 -->
  <line x1="400" y1="135" x2="400" y2="160" stroke="#38A169" stroke-width="4" marker-end="url(#arrowD1)" stroke-dasharray="30" stroke-dashoffset="30">
    <animate attributeName="stroke-dashoffset" from="30" to="0" dur="0.6s" repeatCount="indefinite"/>
  </line>

  <!-- 第二层：分析层 -->
  <g transform="translate(400, 185)">
    <rect x="-320" y="-22" width="640" height="44" fill="#FEEBC8" stroke="#DD6B20" stroke-width="3" rx="8" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <text x="-280" y="5" text-anchor="middle" font-size="28">🔍</text>
    <text x="-150" y="5" text-anchor="middle" font-size="18" font-weight="bold" fill="#C05621">分析层</text>
    <text x="50" y="5" text-anchor="middle" font-size="16" fill="#7C2D12">IssueIdentifier | Researcher | Strategist</text>
  </g>

  <!-- 箭头2 -->
  <line x1="400" y1="220" x2="400" y2="245" stroke="#38A169" stroke-width="4" marker-end="url(#arrowD2)" stroke-dasharray="30" stroke-dashoffset="30">
    <animate attributeName="stroke-dashoffset" from="30" to="0" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
  </line>

  <!-- 第三层：输出层 -->
  <g transform="translate(400, 270)">
    <rect x="-320" y="-22" width="640" height="44" fill="#FED7E2" stroke="#D53F8C" stroke-width="3" rx="8" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <text x="-280" y="5" text-anchor="middle" font-size="28">📤</text>
    <text x="-150" y="5" text-anchor="middle" font-size="18" font-weight="bold" fill="#97266D">输出层</text>
    <text x="50" y="5" text-anchor="middle" font-size="16" fill="#702459">Writer | Reporter | Summarizer</text>
  </g>

  <!-- 箭头3 -->
  <line x1="400" y1="305" x2="400" y2="330" stroke="#38A169" stroke-width="4" marker-end="url(#arrowD3)" stroke-dasharray="30" stroke-dashoffset="30">
    <animate attributeName="stroke-dashoffset" from="30" to="0" dur="0.6s" repeatCount="indefinite" begin="0.4s"/>
  </line>

  <!-- 第四层：支持层 -->
  <g transform="translate(400, 355)">
    <rect x="-320" y="-22" width="640" height="44" fill="#BEE3F8" stroke="#3182CE" stroke-width="3" rx="8" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <text x="-280" y="5" text-anchor="middle" font-size="28">⚙️</text>
    <text x="-150" y="5" text-anchor="middle" font-size="18" font-weight="bold" fill="#2B6CB0">支持层</text>
    <text x="50" y="5" text-anchor="middle" font-size="16" fill="#1A365D">Scheduler | Reviewer</text>
  </g>

  <!-- 右侧效率标签 -->
  <g transform="translate(680, 230)">
    <circle cx="0" cy="0" r="55" fill="#C6F6D5" stroke="#38A169" stroke-width="3">
      <animate attributeName="r" values="55; 60; 55" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-8" text-anchor="middle" font-size="22" font-weight="bold" fill="#276749">15-30</text>
    <text x="0" y="15" text-anchor="middle" font-size="14" fill="#276749">分钟</text>
  </g>

  <text x="580" y="230" text-anchor="middle" font-size="32">⚡</text>

  <defs>
    <marker id="arrowD1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38A169"/>
    </marker>
    <marker id="arrowD2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38A169"/>
    </marker>
    <marker id="arrowD3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38A169"/>
    </marker>
  </defs>
</svg>
