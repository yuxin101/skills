<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad)" rx="12"/>

  <!-- 标题 -->
  <text x="400" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="bold" fill="#2C5282">Vibe Working 进化论</text>

  <!-- 进化路径 - 从工具使用者到 Skill 创造者 -->
  <!-- 阶段1：工具使用者 -->
  <g transform="translate(120, 200)">
    <circle cx="0" cy="0" r="60" fill="#E2E8F0" stroke="#4A90E2" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-size="50">🔧</text>
    <text x="0" y="90" text-anchor="middle" font-size="16" fill="#4A5568">工具使用者</text>
    <animateTransform attributeName="transform" type="translate" values="120,200; 120,188; 120,200" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>

  <!-- 箭头1 -->
  <line x1="200" y1="200" x2="280" y2="200" stroke="#4A90E2" stroke-width="4" marker-end="url(#arrow1)" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- 阶段2：探索者 -->
  <g transform="translate(320, 200)">
    <circle cx="0" cy="0" r="60" fill="#E6FFFA" stroke="#38B2AC" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-size="50">🔍</text>
    <text x="0" y="90" text-anchor="middle" font-size="16" fill="#4A5568">探索者</text>
    <animateTransform attributeName="transform" type="translate" values="320,200; 320,188; 320,200" dur="3s" repeatCount="indefinite" begin="0.5s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>

  <!-- 箭头2 -->
  <line x1="400" y1="200" x2="480" y2="200" stroke="#38B2AC" stroke-width="4" marker-end="url(#arrow2)" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </line>

  <!-- 阶段3：创造者 -->
  <g transform="translate(560, 200)">
    <circle cx="0" cy="0" r="70" fill="#FAF5FF" stroke="#9F7AEA" stroke-width="3"/>
    <text x="0" y="15" text-anchor="middle" font-size="60">⚡</text>
    <text x="0" y="100" text-anchor="middle" font-size="16" fill="#4A5568">Skill 创造者</text>
    <animateTransform attributeName="transform" type="translate" values="560,200; 560,185; 560,200" dur="3s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </g>

  <!-- 箭头3 -->
  <line x1="640" y1="200" x2="700" y2="200" stroke="#9F7AEA" stroke-width="4" marker-end="url(#arrow3)" stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" from="80" to="0" dur="1s" repeatCount="indefinite" begin="0.6s"/>
  </line>

  <!-- 终点：蜂巢智能 -->
  <g transform="translate(730, 200)">
    <circle cx="0" cy="0" r="45" fill="#FEFCBF" stroke="#D69E2E" stroke-width="3">
      <animate attributeName="fill-opacity" values="0.6; 1; 0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="12" text-anchor="middle" font-size="40">🐝</text>
  </g>

  <!-- 定义箭头标记 -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90E2"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38B2AC"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9F7AEA"/>
    </marker>
  </defs>

  <!-- 底部时间线 -->
  <rect x="80" y="380" width="640" height="4" fill="#CBD5E0" rx="2"/>
  <circle cx="120" cy="382" r="8" fill="#4A90E2"/>
  <circle cx="320" cy="382" r="8" fill="#38B2AC"/>
  <circle cx="560" cy="382" r="8" fill="#9F7AEA"/>
  <circle cx="730" cy="382" r="8" fill="#D69E2E"/>
  <text x="120" y="420" text-anchor="middle" font-size="14" fill="#718096">2024</text>
  <text x="320" y="420" text-anchor="middle" font-size="14" fill="#718096">2025初</text>
  <text x="560" y="420" text-anchor="middle" font-size="14" fill="#718096">2025底</text>
  <text x="730" y="420" text-anchor="middle" font-size="14" fill="#718096">2026</text>
</svg>
