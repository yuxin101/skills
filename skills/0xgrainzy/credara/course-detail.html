<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Course — Credara</title>
<meta name="description" id="page-desc" content="A Credara course">
<meta property="og:title" id="og-title" content="Course — Credara">
<meta property="og:description" id="og-desc" content="">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Credara">
<link rel="canonical" id="page-canonical" href="https://www.credara.xyz/courses">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#fafaf8;--offwhite:#f2f0ec;--cream:#e8e4dc;
  --black:#111;--charcoal:#333;--gray:#777;--light-gray:#bbb;--faint:#eee;
  --red:#c62828;--red-bright:#e53935;--red-dark:#8e0000;--red-faint:rgba(198,40,40,.06);
  --green:#2e7d32;--green-faint:rgba(46,125,50,.08);
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
}
html{scroll-behavior:smooth;background:var(--white);color:var(--black);font-family:var(--sans)}
body{overflow-x:hidden}
::selection{background:var(--red);color:var(--white)}
a{color:var(--red);text-decoration:none;transition:opacity .2s}
button{cursor:pointer;font-family:var(--sans)}

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,250,248,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06)}
.nav-mark{font-family:var(--serif);font-size:1.4rem;font-style:italic;color:var(--black);text-decoration:none}
.nav-tabs{display:flex;gap:.25rem;align-items:center}
.nav-tab{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;padding:.45rem 1rem;color:var(--gray);background:none;border:none;text-decoration:none;display:inline-block;transition:color .2s;border-bottom:2px solid transparent}
.nav-tab:hover{color:var(--black)}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red)}
.nav-right{display:flex;gap:.75rem;align-items:center}
.nav-btn{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid var(--cream);color:var(--charcoal);background:none;transition:all .2s;text-decoration:none;display:inline-block}
.nav-btn:hover{border-color:var(--charcoal)}
.nav-btn.primary{background:var(--red);color:var(--white);border-color:var(--red)}
.nav-btn.primary:hover{background:var(--red-bright)}
@media(max-width:768px){.nav-tabs{display:none}}

/* Breadcrumb */
.breadcrumb{padding:80px 0 0;background:var(--white)}
.breadcrumb-inner{max-width:1100px;margin:0 auto;padding:1rem 2rem 0;font-size:.7rem;color:var(--gray);display:flex;align-items:center;gap:.5rem}
.breadcrumb a{color:var(--gray);text-decoration:none}
.breadcrumb a:hover{color:var(--red)}
.breadcrumb-sep{color:var(--light-gray)}

/* Hero */
.hero{background:var(--white);border-bottom:1px solid var(--cream);padding:2rem 0 3rem}
.hero-inner{max-width:1100px;margin:0 auto;padding:0 2rem;display:grid;grid-template-columns:1fr 320px;gap:4rem;align-items:start}
.hero-domain{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:.6rem;font-family:var(--mono)}
.hero-title{font-family:var(--serif);font-size:2.8rem;font-style:italic;line-height:1.15;margin-bottom:.75rem}
.hero-tagline{font-size:1rem;color:var(--charcoal);line-height:1.65;margin-bottom:1.5rem;max-width:600px}
.hero-meta{display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.75rem;color:var(--gray)}
.hero-meta strong{color:var(--charcoal);font-weight:500}
.enrolled-pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.25rem .6rem;border:1px solid var(--green);color:var(--green);background:var(--green-faint);margin-top:.75rem}
.enrolled-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}

/* Sidebar card */
.sidebar-card{background:var(--white);border:1px solid var(--cream);padding:2rem;position:sticky;top:80px}
.price-display{font-family:var(--mono);font-size:2rem;font-weight:700;margin-bottom:.25rem;color:var(--black)}
.price-display.free{color:var(--green)}
.price-sub{font-size:.72rem;color:var(--gray);margin-bottom:1.75rem}
.enroll-btn{width:100%;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;padding:1rem;background:var(--red);color:var(--white);border:none;transition:background .2s;margin-bottom:.75rem}
.enroll-btn:hover{background:var(--red-bright)}
.enroll-btn.enrolled{background:var(--green)}
.enroll-btn.enrolled:hover{background:#1b5e20}
.enroll-btn:disabled{background:var(--light-gray);cursor:not-allowed}
.enroll-note{font-size:.62rem;color:var(--gray);text-align:center;line-height:1.5;margin-bottom:1.5rem}
.sidebar-stat{display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--faint);font-size:.75rem}
.sidebar-stat:last-child{border-bottom:none}
.sidebar-stat-label{color:var(--gray)}
.sidebar-stat-val{font-weight:500;color:var(--charcoal)}
.share-row{display:flex;gap:.5rem;margin-top:1.25rem}
.share-btn{flex:1;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem;border:1px solid var(--cream);background:none;color:var(--gray);transition:all .2s}
.share-btn:hover{border-color:var(--charcoal);color:var(--charcoal)}

/* Body layout */
.body{max-width:1100px;margin:0 auto;padding:3rem 2rem 5rem;display:grid;grid-template-columns:1fr 320px;gap:4rem}
.body-main{}

/* Section */
.section{margin-bottom:3rem}
.section-title{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin-bottom:1.25rem;padding-bottom:.5rem;border-bottom:1px solid var(--cream)}

/* Progress */
.progress-card{background:var(--offwhite);border:1px solid var(--cream);padding:1.25rem;margin-bottom:2rem}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.75rem}
.progress-label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray)}
.progress-pct{font-family:var(--mono);font-size:1.2rem;font-weight:700}
.progress-bar-track{height:6px;background:var(--faint);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--red);transition:width .4s ease}
.progress-done{color:var(--green);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;margin-top:.5rem;display:none}
.progress-done.show{display:block}

/* Description */
.desc{font-size:.95rem;color:var(--black);line-height:1.85;letter-spacing:-.01em}

/* Outcomes */
.outcomes{list-style:none;columns:2;column-gap:1.5rem}
.outcome-item{font-size:.8rem;color:var(--charcoal);padding:.35rem 0 .35rem 1.1rem;position:relative;line-height:1.5;break-inside:avoid}
.outcome-item::before{content:"→";position:absolute;left:0;color:var(--red);font-size:.7rem;top:.4rem}

/* Modules */
.module-list{list-style:none}
.module-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--faint)}
.module-item:last-child{border-bottom:none}
.module-num{font-family:var(--mono);font-size:.65rem;color:var(--light-gray);width:24px;flex-shrink:0;padding-top:.2rem}
.module-body{flex:1}
.module-body h4{font-size:.88rem;font-weight:500;margin-bottom:.2rem;display:flex;align-items:center;gap:.5rem}
.module-body p{font-size:.85rem;color:var(--charcoal);line-height:1.65}
.preview-badge{font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .45rem;border:1px solid var(--red);color:var(--red);background:var(--red-faint)}
.module-item.done .module-body h4{color:var(--gray);text-decoration:line-through}
.module-item.done .module-num{color:var(--green)}
.module-check-btn{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .65rem;border:1px solid var(--cream);background:none;color:var(--gray);transition:all .2s;flex-shrink:0;white-space:nowrap;align-self:center}
.module-check-btn:hover{border-color:var(--green);color:var(--green)}
.module-check-btn.done{border-color:var(--green);color:var(--green);background:var(--green-faint)}

/* Quiz */
.quiz-btn{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .65rem;border:1px solid var(--red-faint);background:none;color:var(--red);transition:all .2s;flex-shrink:0;white-space:nowrap;align-self:center}
.quiz-btn:hover{border-color:var(--red);background:var(--red-faint)}
.quiz-btn.passed{border-color:var(--green);color:var(--green);background:var(--green-faint)}
.quiz-panel{display:none;margin-top:.75rem;background:var(--white);border:1px solid var(--cream);padding:1.25rem;max-width:600px}
.quiz-panel.open{display:block}
.quiz-q{margin-bottom:1.25rem}
.quiz-q-text{font-size:.83rem;font-weight:500;margin-bottom:.5rem;line-height:1.5}
.quiz-q-num{font-family:var(--mono);font-size:.6rem;color:var(--gray);margin-bottom:.25rem}
.quiz-opt{display:flex;align-items:center;gap:.5rem;padding:.35rem .5rem;margin-bottom:.25rem;cursor:pointer;border:1px solid transparent;transition:all .15s;font-size:.8rem}
.quiz-opt:hover{background:var(--offwhite)}
.quiz-opt input[type=radio]{accent-color:var(--red);flex-shrink:0}
.quiz-opt label{cursor:pointer;flex:1}
.quiz-opt.correct{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.quiz-opt.wrong{background:rgba(198,40,40,.06);border-color:rgba(198,40,40,.2)}
.quiz-submit{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:.55rem 1.5rem;background:var(--red);color:var(--white);border:none;transition:all .2s;font-family:var(--sans);margin-top:.5rem}
.quiz-submit:hover{background:var(--red-bright)}
.quiz-submit:disabled{opacity:.5;cursor:not-allowed}
.quiz-result{margin-top:1rem;padding:1rem;border:1px solid var(--cream)}
.quiz-result.pass{border-color:var(--green);background:rgba(34,197,94,.06)}
.quiz-result.fail{border-color:var(--red);background:var(--red-faint)}
.quiz-result h4{font-size:.88rem;margin-bottom:.35rem}
.quiz-result p{font-size:.78rem;color:var(--gray)}
.quiz-explanation{font-size:.72rem;color:var(--gray);margin-top:.35rem;padding-left:1.75rem;font-style:italic}

/* Preview drawer */
.preview-drawer{display:none;margin-top:.75rem;background:var(--white);border:1px solid var(--red-faint);border-left:3px solid var(--red);padding:1.25rem 1.25rem 1rem}
.preview-drawer.open{display:block}
.preview-section{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:.5rem;margin-top:.85rem}
.preview-section:first-child{margin-top:0}
.preview-desc{font-size:.8rem;color:var(--charcoal);line-height:1.65}
.preview-chain-name{font-family:var(--mono);font-size:.72rem;font-weight:600;margin-bottom:.4rem}
.preview-steps{list-style:none;padding:0}
.preview-steps li{font-size:.77rem;color:var(--charcoal);padding:.25rem 0 .25rem 1rem;position:relative;line-height:1.5}
.preview-steps li::before{content:"→";position:absolute;left:0;color:var(--red);font-size:.65rem;top:.3rem}
.preview-concepts{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.preview-concept{font-size:.58rem;padding:.18rem .45rem;background:var(--offwhite);border:1px solid var(--cream);color:var(--charcoal)}
.btn-preview{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .65rem;border:1px solid var(--red);background:none;color:var(--red);transition:all .2s;white-space:nowrap;align-self:center}
.btn-preview:hover,.btn-preview.open{background:var(--red);color:var(--white)}

/* Reviews */
.review-item{padding:1rem 0;border-bottom:1px solid var(--faint)}
.review-item:last-child{border-bottom:none}
.review-stars{color:var(--red);font-size:.75rem;margin-bottom:.35rem;letter-spacing:.1em}
.review-text{font-size:.8rem;color:var(--charcoal);line-height:1.6}
.review-meta{font-size:.65rem;color:var(--light-gray);margin-top:.35rem;font-family:var(--mono)}
.rating-big{font-family:var(--mono);font-size:2.5rem;font-weight:700;color:var(--black)}
.rating-count{font-size:.75rem;color:var(--gray);margin-top:.2rem}

/* Sidebar sticky body */
.body-side{position:relative}
.body-side-inner{position:sticky;top:80px}
.also-courses{margin-top:1.5rem}
.also-title{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:.75rem}
.also-item{display:flex;justify-content:space-between;align-items:baseline;padding:.6rem 0;border-bottom:1px solid var(--faint);font-size:.8rem;cursor:pointer}
.also-item:last-child{border-bottom:none}
.also-item:hover .also-name{color:var(--red)}
.also-name{color:var(--charcoal);transition:color .2s}
.also-price{font-family:var(--mono);font-size:.7rem;color:var(--gray)}
.also-price.free{color:var(--green)}

/* Toast */
#toast{position:fixed;bottom:2rem;right:2rem;background:var(--black);color:var(--white);padding:.7rem 1.2rem;font-size:.75rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}

/* Skeleton */
.skel{background:linear-gradient(90deg,var(--faint) 25%,var(--cream) 50%,var(--faint) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:2px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Not found */
.not-found{max-width:480px;margin:120px auto;text-align:center;padding:0 2rem}
.not-found h1{font-family:var(--serif);font-size:2rem;font-style:italic;margin-bottom:.75rem}
.not-found p{color:var(--gray);font-size:.88rem;margin-bottom:1.5rem;line-height:1.6}

@media(max-width:900px){
  .hero-inner,.body{grid-template-columns:1fr}
  .hero-side,.body-side{display:none}
  .outcomes{columns:1}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-mark">Credara</a>
  <div class="nav-tabs">
    <a href="/" class="nav-tab">Home</a>
    <a href="/#network" class="nav-tab">Network</a>
    <a href="/courses" class="nav-tab active">Courses</a>
  </div>
  <div class="nav-right">
    <a href="/docs" class="nav-btn">Docs</a>
    <a href="/pricing" class="nav-btn">Pricing</a>
    <span id="nav-guest">
      <a href="/login" class="nav-btn">Log In</a>
      <a href="/signup" class="nav-btn primary">Sign Up</a>
    </span>
    <span id="nav-authed" style="display:none">
      <a href="/marketplace" class="nav-btn">Marketplace</a>
      <a href="/creator" class="nav-btn">Creator</a>
      <a href="/dashboard" class="nav-btn primary">Dashboard</a>
    </span>
  </div>
</nav>

<div id="root">
  <!-- Skeleton while loading -->
  <div class="breadcrumb"><div class="breadcrumb-inner"><span class="skel" style="width:180px;height:12px;display:inline-block"></span></div></div>
  <div class="hero"><div class="hero-inner">
    <div>
      <div class="skel" style="width:80px;height:10px;margin-bottom:.75rem"></div>
      <div class="skel" style="width:60%;height:42px;margin-bottom:.75rem"></div>
      <div class="skel" style="width:90%;height:16px;margin-bottom:.4rem"></div>
      <div class="skel" style="width:70%;height:16px"></div>
    </div>
    <div class="sidebar-card">
      <div class="skel" style="width:80px;height:36px;margin-bottom:.5rem"></div>
      <div class="skel" style="width:100%;height:44px;margin-bottom:.5rem"></div>
    </div>
  </div></div>
</div>

<div id="toast"></div>

<script>
const API = window.location.origin;
const TOKEN = localStorage.getItem('accessToken');

// ── Auth display ───────────────────────────────────────────────────
document.getElementById('nav-guest').style.display = TOKEN ? 'none' : '';
document.getElementById('nav-authed').style.display = TOKEN ? '' : 'none';

function authHeaders() {
  return TOKEN
    ? { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
    : { 'Content-Type': 'application/json' };
}

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, ms = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── Resolve course ID from path ────────────────────────────────────
const courseId = window.location.pathname.replace(/^\/courses\//, '').replace(/\/$/, '');
if (!courseId) { window.location.href = '/courses'; }

// ── Current user ──────────────────────────────────────────────────
let _me = null;
async function getMe() {
  if (_me) return _me;
  if (!TOKEN) return null;
  try {
    const me = await fetch(`${API}/api/auth/me`, { headers: authHeaders() }).then(r => r.json());
    if (me.error) return null;
    const agRes = await fetch(`${API}/api/agents/my`, { headers: authHeaders() });
    const ags = agRes.ok ? await agRes.json() : [];
    const first = Array.isArray(ags) ? ags[0] : (ags.agents || [])[0];
    _me = { ownerId: me.id, email: me.email, agentId: first?.id || null, agentName: first?.name || first?.display_name || null };
    return _me;
  } catch { return null; }
}

// ── Preview cache ──────────────────────────────────────────────────
const _previewCache = {};

// ── Main load ──────────────────────────────────────────────────────
async function main() {
  const [courseRes, me] = await Promise.all([
    fetch(`${API}/api/courses/${courseId}`).then(r => r.json()),
    getMe(),
  ]);

  if (courseRes.error || !courseRes.id) { renderNotFound(); return; }

  const c = courseRes;
  const agentId = me?.agentId || null;
  window._agentId = agentId;
  window._agentName = me?.agentName || me?.agents?.[0]?.name || null;

  // Enrollment state
  let enr = { enrolled: false, progress: 0, completed_modules: [] };
  if (agentId) {
    try {
      const e = await fetch(`${API}/api/courses/${courseId}/enrollment?agentId=${agentId}`, { headers: authHeaders() }).then(r => r.json());
      if (e.enrolled !== false) {
        enr = { enrolled: true, progress: e.progress || 0, status: e.status, completed_modules: e.completed_modules || [] };
        // Check if already assessed — load status for dispatch panel
        try {
          const astat = await fetch(`${API}/api/courses/${courseId}/assessment/status?agentId=${agentId}`, { headers: authHeaders() }).then(r => r.json());
          enr.assessmentStatus = astat;
        } catch {}
      }
    } catch {}
  }

  // Reviews
  let reviews = [];
  try { const rv = await fetch(`${API}/api/courses/${courseId}/reviews?limit=5`).then(r => r.json()); reviews = rv.reviews || []; } catch {}

  // Also-in-domain courses (sidebar)
  let alsoCourses = [];
  try {
    const al = await fetch(`${API}/api/courses?domain=${c.domain_id}&limit=6`).then(r => r.json());
    alsoCourses = (al.courses || []).filter(x => x.id !== courseId).slice(0, 4);
  } catch {}

  // Update meta
  document.getElementById('page-title').textContent = `${c.name} — Credara`;
  document.getElementById('page-desc').content = c.tagline || c.description?.slice(0, 160) || '';
  document.getElementById('og-title').content = c.name;
  document.getElementById('og-desc').content = c.tagline || '';
  document.getElementById('page-canonical').href = `https://www.credara.xyz/courses/${courseId}`;

  renderPage(c, enr, reviews, alsoCourses, agentId, me);

  // Check quiz pass statuses after rendering
  if (enr.enrolled && agentId) {
    checkQuizStatuses(courseId, c.modules || [], agentId);

    // Auto-show results tab if agent already passed this course
    const astat = enr.assessmentStatus;
    if (astat?.passed) {
      setTimeout(() => {
        switchTab('results');
        const latest = astat.history?.[0];
        if (latest || astat.certificate) {
          renderResults({
            passed: true,
            score: latest?.score,
            preScore: latest?.pre_score,
            delta: latest?.delta,
            scorePercent: latest ? `${(latest.score*100).toFixed(1)}%` : null,
            preScorePercent: latest?.pre_score != null ? `${(latest.pre_score*100).toFixed(1)}%` : null,
            deltaLabel: latest?.delta != null ? `${latest.delta>=0?'+':''}${(latest.delta*100).toFixed(1)}pp` : null,
            certificateId: astat.certificate?.id,
          });
        } else {
          loadResults();
        }
      }, 100);
    }

    // Show pre-score in status bar
    if (astat?.history?.[0]?.pre_score != null) {
      const preEl = document.getElementById('dstatus-pre');
      if (preEl) preEl.textContent = `Baseline: ${(astat.history[0].pre_score*100).toFixed(0)}%`;
    }
  }
}

function renderPage(c, enr, reviews, alsoCourses, agentId, me) {
  const completedSet = new Set(enr.completed_modules || []);
  const pct = enr.progress || 0;
  const modules = c.modules || [];
  const outcomes = c.learning_outcomes || [];
  const prereqs = c.prerequisites || [];

  // ── Breadcrumb ──
  const breadcrumb = `
    <div class="breadcrumb">
      <div class="breadcrumb-inner">
        <a href="/courses">Courses</a>
        <span class="breadcrumb-sep">/</span>
        <span style="color:var(--gray)">${esc(c.domain_name || c.domain_id)}</span>
        <span class="breadcrumb-sep">/</span>
        <span style="color:var(--charcoal)">${esc(c.name)}</span>
      </div>
    </div>`;

  // ── Hero ──
  const enrolledHero = enr.enrolled
    ? `<div class="enrolled-pill">${pct === 100 ? '✓ Completed' : `In Progress — ${pct}%`}</div>`
    : '';

  const hero = `
    <div class="hero">
      <div class="hero-inner">
        <div>
          <div class="hero-domain">${esc(c.domain_name || c.domain_id)}</div>
          <h1 class="hero-title">${esc(c.name)}</h1>
          <p class="hero-tagline">${esc(c.tagline || '')}</p>
          <div class="hero-meta">
            <span><strong>${modules.length}</strong> skill packs</span>
            <span><strong>${c.install_count || 0}</strong> enrollments</span>
            ${c.avg_rating > 0 ? `<span><strong>${c.avg_rating.toFixed(1)}</strong> ★ (${c.rating_count} reviews)</span>` : ''}
            ${c.estimated_hours ? `<span><strong>${c.estimated_hours}h</strong> coverage</span>` : ''}
            <span class="level-badge" style="font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .5rem;border:1px solid var(--cream);color:var(--gray)">${c.difficulty}</span>
          </div>
          ${enrolledHero}
        </div>
        <div class="hero-side">
          ${renderSidebarCard(c, enr, agentId, me)}
        </div>
      </div>
    </div>`;

  // ── Progress block ──
  const progressBlock = enr.enrolled ? `
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-label">Your Progress</span>
        <span class="progress-pct" id="pct-val">${pct}%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="prog-bar" style="width:${pct}%"></div>
      </div>
      <div class="progress-done ${pct===100?'show':''}" id="prog-done">✓ Course complete — well done.</div>
    </div>` : '';

  // ── Description ──
  const descSection = c.description ? `
    <div class="section">
      <div class="section-title">About this course</div>
      <p class="desc">${esc(c.description)}</p>
    </div>` : '';

  // ── Outcomes ──
  const outcomesSection = outcomes.length ? `
    <div class="section">
      <div class="section-title">What you'll install</div>
      <ul class="outcomes">${outcomes.map(o => `<li class="outcome-item">${esc(o)}</li>`).join('')}</ul>
    </div>` : '';

  // ── Prerequisites ──
  const prereqSection = prereqs.length ? `
    <div class="section">
      <div class="section-title">Prerequisites</div>
      <ul class="outcomes">${prereqs.map(p => `<li class="outcome-item">${esc(p)}</li>`).join('')}</ul>
    </div>` : '';

  // ── Modules ──
  const moduleItems = modules.map((m, i) => {
    const packId = m.skill_pack_id || m.id;
    const isDone = completedSet.has(packId) || completedSet.has(m.id);
    const isPreview = !!m.is_preview;
    const hasQuiz = !!m.quiz_questions;
    const checkBtn = '';  // Removed — agents mark progress via API, not humans clicking buttons
    const quizBtn = '';   // Questions stay with the agent
    const previewBtn = isPreview
      ? `<button class="btn-preview" id="pbtn-${m.id}"
           onclick="togglePreview('${m.id}',this)">
           Preview
         </button>`
      : '';
    const previewDrawer = isPreview
      ? `<div class="preview-drawer" id="pdrawer-${m.id}">
           <div style="color:var(--gray);font-size:.75rem">Loading…</div>
         </div>`
      : '';
    const quizPanel = '';  // Hidden from humans
    const studyBtn = enr.enrolled ? `<button class="btn-preview" onclick="toggleStudy('${m.id}','${packId}')">Study</button>` : '';
    const btns = [studyBtn, previewBtn].filter(Boolean).join('');
    return `
      <li class="module-item ${isDone?'done':''}" id="mod-${m.id}">
        <span class="module-num">${String(i+1).padStart(2,'0')}</span>
        <div class="module-body">
          <h4>${esc(m.title||m.pack_name)}${isPreview?'<span class="preview-badge">Free Preview</span>':''}${isDone && hasQuiz ? '<span class="preview-badge" style="border-color:var(--green);color:var(--green);background:rgba(34,197,94,.06)">Quiz Passed</span>' : ''}</h4>
          <p>${esc(m.description||m.pack_description||'')}</p>
          <div class="study-content" id="study-${m.id}" style="display:none;margin-top:.75rem;padding:1rem;background:var(--offwhite);border:1px solid var(--cream);border-radius:6px"></div>
          ${previewDrawer}
          ${quizPanel}
        </div>
        ${btns ? `<div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">${btns}</div>` : ''}
      </li>`;
  }).join('');

  const modulesSection = `
    <div class="section">
      <div class="section-title">Skill Pack Modules (${modules.length})</div>
      <ul class="module-list">${moduleItems}</ul>
    </div>`;

  // ── Reviews ──
  let reviewsSection = '';
  if (c.avg_rating > 0 || reviews.length) {
    const stars = (n) => '★'.repeat(Math.round(n)) + '☆'.repeat(5 - Math.round(n));
    reviewsSection = `
      <div class="section">
        <div class="section-title">Reviews</div>
        ${c.avg_rating > 0 ? `<div style="margin-bottom:1.25rem">
          <div class="rating-big">${c.avg_rating.toFixed(1)}</div>
          <div class="rating-count">${c.rating_count} review${c.rating_count !== 1 ? 's' : ''}</div>
        </div>` : ''}
        ${reviews.map(r => `
          <div class="review-item">
            <div class="review-stars">${stars(r.rating)}</div>
            ${r.review_text ? `<div class="review-text">${esc(r.review_text)}</div>` : ''}
            <div class="review-meta">Agent ${r.agent_id?.slice(0,8) || '—'} · ${new Date(r.created_at).toLocaleDateString()}</div>
          </div>`).join('')}
      </div>`;
  }

  // ── Also from domain (sidebar body) ──
  const alsoSection = alsoCourses.length ? `
    <div class="also-courses">
      <div class="also-title">More from ${esc(c.domain_name || c.domain_id)}</div>
      ${alsoCourses.map(x => `
        <div class="also-item" onclick="window.location='/courses/${x.id}'">
          <span class="also-name">${esc(x.name)}</span>
          <span class="also-price ${!x.price_usd?'free':''}">${x.price_usd ? '$'+(x.price_usd/100).toFixed(2) : 'Free'}</span>
        </div>`).join('')}
    </div>` : '';

  const dispatchHtml = enr.enrolled ? renderAgentDispatch(courseId, agentId, enr) : '';

  document.getElementById('root').innerHTML = `
    ${breadcrumb}
    ${hero}
    <div class="body">
      <div class="body-main">
        ${progressBlock}
        ${descSection}
        ${outcomesSection}
        ${prereqSection}
        ${modulesSection}
        ${dispatchHtml}
        <div id="assessment-section" style="display:none"></div>
        ${reviewsSection}
      </div>
      <div class="body-side">
        <div class="body-side-inner">
          ${renderSidebarCard(c, enr, agentId, me)}
          ${alsoSection}
        </div>
      </div>
    </div>`;
}

      ${c.avg_rating > 0 ? `<div class="sidebar-stat"><span class="sidebar-stat-label">Rating</span><span class="sidebar-stat-val">${c.avg_rating.toFixed(1)} ★ (${c.rating_count})</span></div>` : ''}

// ── Agent picker ──────────────────────────────────────────────────
async function pickAgent() {
  return new Promise(async (resolve) => {
    const agentsRes = await fetch(`${API}/api/agents/my`, { headers: authHeaders() });
    const raw = agentsRes.ok ? await agentsRes.json() : [];
    const agents = Array.isArray(raw) ? raw : (raw.agents || []);
    if (!agents.length) { toast('Create a bot first'); resolve(null); return; }
    if (agents.length === 1) { resolve(agents[0].id); return; }
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem';
    const modal = document.createElement('div');
    modal.style.cssText = 'background:#fff;border-radius:12px;padding:1.5rem;max-width:380px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.15)';
    modal.innerHTML = '<div style="font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#c62828;margin-bottom:.75rem">SEND TO WHICH AGENT?</div><p style="font-size:.82rem;color:#777;margin-bottom:1rem">Choose the bot that will take this course.</p><div id="agent-pick-list" style="display:flex;flex-direction:column;gap:.5rem"></div><button onclick="this.closest(\'[style*=fixed]\').remove()" style="margin-top:1rem;width:100%;padding:.6rem;border:1px solid #e8e4dc;background:none;color:#777;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px">CANCEL</button>';
    overlay.appendChild(modal); document.body.appendChild(overlay);
    overlay.onclick = (ev) => { if (ev.target === overlay) { overlay.remove(); resolve(null); } };
    agents.forEach(a => {
      const b = document.createElement('button');
      b.style.cssText = 'display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border:1px solid #e8e4dc;background:#fafaf8;border-radius:8px;cursor:pointer;text-align:left;width:100%';
      b.innerHTML = '<div style="width:32px;height:32px;border-radius:6px;background:#f2f0ec;display:flex;align-items:center;justify-content:center;font-size:.75rem">🤖</div><div><div style="font-weight:600;font-size:.82rem;color:#111">'+(a.display_name||'Bot')+'</div><div style="font-size:.6rem;color:#999">'+(a.platform||'custom')+' · '+a.id.slice(0,8)+'...</div></div>';
      b.onclick = () => { overlay.remove(); resolve(a.id); };
      modal.querySelector('#agent-pick-list').appendChild(b);
    });
  });
}

// ── Enroll: free ──────────────────────────────────────────────────
window._enrollState = { courseData: null, agentId: null };
async function enrollFree(btn) {
  const me = await getMe();
  if (!me) { window.location.href = '/dashboard'; return; }
  const agentId = await pickAgent();
  if (!agentId) return;
  btn.disabled = true; btn.textContent = 'Enrolling…';
  try {
    const r = await fetch(`${API}/api/courses/${courseId}/enroll`, {
      method:'POST', headers: authHeaders(), body: JSON.stringify({ agentId }),
    });
    const d = await r.json();
    if (r.ok) {
      toast('✓ Enrolled! Mark modules complete as you progress.');
      setTimeout(() => location.reload(), 1000);
    } else {
      toast('Error: '+(d.error||'Failed to enroll'));
      btn.disabled = false; btn.textContent = 'Enroll Free →';
    }
  } catch { toast('Network error.'); btn.disabled = false; btn.textContent = 'Enroll Free →'; }
}

// ── Enroll: paid ──────────────────────────────────────────────────
async function enrollPaid(btn) {
  const me = await getMe();
  if (!me) { window.location.href = '/dashboard'; return; }
  const agentId = await pickAgent();
  if (!agentId) return;
  btn.disabled = true; btn.textContent = 'Redirecting to checkout…';
  try {
    const r = await fetch(`${API}/api/payments/checkout/course`, {
      method:'POST', headers: authHeaders(),
      body: JSON.stringify({ courseId, agentId, ownerId: me.ownerId }),
    });
    const d = await r.json();
    if (d.url) { window.location.href = d.url; }
    else { toast('Checkout error: '+(d.error||'Unknown')); btn.disabled=false; }
  } catch { toast('Network error.'); btn.disabled = false; }
}

// ── Mark module done ──────────────────────────────────────────────
async function markDone(moduleId, packId, agentId, btn) {
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch(`${API}/api/courses/${courseId}/modules/${moduleId}/complete`, {
      method:'POST', headers: authHeaders(), body: JSON.stringify({ agentId }),
    });
    const d = await r.json();
    if (r.ok) {
      btn.textContent = '✓ Done'; btn.classList.add('done');
      document.getElementById('mod-'+moduleId)?.classList.add('done');
      const newPct = d.progress || 0;
      const bar = document.getElementById('prog-bar');
      const pctEl = document.getElementById('pct-val');
      const doneEl = document.getElementById('prog-done');
      if (bar) bar.style.width = newPct + '%';
      if (pctEl) pctEl.textContent = newPct + '%';
      if (doneEl && newPct === 100) doneEl.classList.add('show');
      if (newPct === 100) toast('🎓 Course complete!', 4000);
      else toast('✓ Module marked complete');
    } else { toast('Error: '+(d.error||'Failed')); btn.disabled=false; btn.textContent='Mark done'; }
  } catch { toast('Network error.'); btn.disabled=false; btn.textContent='Mark done'; }
}

// ── Preview drawer ────────────────────────────────────────────────
async function togglePreview(moduleId, btn) {
  const drawer = document.getElementById('pdrawer-'+moduleId);
  if (!drawer) return;
  if (drawer.classList.contains('open')) {
    drawer.classList.remove('open'); btn.classList.remove('open'); btn.textContent='Preview'; return;
  }
  drawer.classList.add('open'); btn.classList.add('open'); btn.textContent='Close';
  if (_previewCache[moduleId]) { renderPreviewDrawer(drawer, _previewCache[moduleId]); return; }
  drawer.innerHTML = '<div style="color:var(--gray);font-size:.75rem">Loading…</div>';
  try {
    const r = await fetch(`${API}/api/courses/${courseId}/modules/${moduleId}/preview`);
    const d = await r.json();
    if (!r.ok) { drawer.innerHTML = `<div style="color:var(--gray);font-size:.75rem">${esc(d.error||'Preview unavailable')}</div>`; return; }
    _previewCache[moduleId] = d; renderPreviewDrawer(drawer, d);
  } catch { drawer.innerHTML = '<div style="color:var(--gray);font-size:.75rem">Failed to load preview.</div>'; }
}

function renderPreviewDrawer(drawer, d) {
  const p = d.pack || {};
  const chain = p.previewPromptChain;
  const ctx = p.previewDomainContext;
  let html = `<div class="preview-desc">${esc(p.description)}</div>`;
  if (chain) {
    html += `<div class="preview-section">Sample Prompt Chain — ${esc(chain.name)}</div>`;
    html += `<div class="preview-chain-name">${esc(chain.trigger)}</div>`;
    if (chain.steps?.length) html += `<ol class="preview-steps">${chain.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
    if (chain.expected_output) html += `<div style="font-size:.72rem;color:var(--gray);margin-top:.4rem">Expected: <em>${esc(chain.expected_output)}</em></div>`;
  }
  if (ctx) {
    html += `<div class="preview-section">${esc(ctx.topic)}</div>`;
    html += `<div class="preview-desc">${esc(ctx.content)}</div>`;
    if (ctx.key_concepts?.length) html += `<div class="preview-concepts">${ctx.key_concepts.map(k=>`<span class="preview-concept">${esc(k)}</span>`).join('')}</div>`;
  }
  if (p.totalPromptChains > 1 || p.totalDomainContexts > 1) {
    html += `<div style="margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--faint);font-size:.72rem;color:var(--gray)">
      Full pack: <strong>${p.totalPromptChains}</strong> chains + <strong>${p.totalDomainContexts}</strong> contexts. Enroll to unlock all modules.
    </div>`;
  }
  drawer.innerHTML = html;
}

// ── Module Quiz ───────────────────────────────────────────────────
async function toggleQuiz(cid, mid, btn) {
  const panel = document.getElementById('quiz-' + mid);
  if (!panel) return;
  if (panel.classList.contains('open')) { panel.classList.remove('open'); return; }

  panel.innerHTML = '<div style="color:var(--gray);font-size:.75rem;padding:.5rem 0">Loading quiz…</div>';
  panel.classList.add('open');

  try {
    const r = await fetch(`${API}/api/courses/${cid}/modules/${mid}/quiz`, { headers: authHeaders() });
    if (!r.ok) { panel.innerHTML = '<div style="color:var(--gray);font-size:.75rem">Quiz not available.</div>'; return; }
    const data = await r.json();
    const questions = data.questions || [];
    if (!questions.length) { panel.innerHTML = '<div style="color:var(--gray);font-size:.75rem">No questions found.</div>'; return; }

    const passingPct = Math.round((data.passingScore || 0.7) * 100);
    panel.innerHTML = `
      <div style="font-size:.7rem;color:var(--gray);margin-bottom:1rem">
        ${questions.length} questions · ${passingPct}% to pass${data.required ? ' · <strong style="color:var(--red)">Required</strong>' : ''}
      </div>
      ${questions.map((q, i) => `
        <div class="quiz-q" id="qq-${q.id}">
          <div class="quiz-q-num">Q${i+1}</div>
          <div class="quiz-q-text">${esc(q.question)}</div>
          ${['A','B','C','D'].map(letter => q.options[letter] ? `
            <div class="quiz-opt" id="qo-${q.id}-${letter}">
              <input type="radio" name="q-${q.id}" id="qr-${q.id}-${letter}" value="${letter}">
              <label for="qr-${q.id}-${letter}"><strong>${letter}.</strong> ${esc(q.options[letter])}</label>
            </div>` : '').join('')}
          <div class="quiz-explanation" id="qx-${q.id}" style="display:none"></div>
        </div>
      `).join('')}
      <button class="quiz-submit" id="quiz-submit-${mid}" onclick="submitQuiz('${cid}','${mid}')">Submit Answers</button>
      <div id="quiz-result-${mid}"></div>
    `;
    panel.dataset.questions = JSON.stringify(questions.map(q => q.id));
  } catch (e) {
    panel.innerHTML = '<div style="color:var(--red);font-size:.75rem">Failed to load quiz.</div>';
  }
}

async function submitQuiz(cid, mid) {
  const panel = document.getElementById('quiz-' + mid);
  const submitBtn = document.getElementById('quiz-submit-' + mid);
  if (!panel || !submitBtn) return;

  const qIds = JSON.parse(panel.dataset.questions || '[]');
  const answers = {};
  let unanswered = 0;
  for (const qid of qIds) {
    const selected = panel.querySelector(`input[name="q-${qid}"]:checked`);
    if (selected) answers[qid] = selected.value;
    else unanswered++;
  }
  if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question${unanswered>1?'s':''}. Submit anyway?`)) return;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';

  try {
    const r = await fetch(`${API}/api/courses/${cid}/modules/${mid}/quiz/submit`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ answers }),
    });
    const data = await r.json();
    const resultEl = document.getElementById('quiz-result-' + mid);

    // Highlight correct/wrong answers
    if (data.questionResults) {
      for (const qr of data.questionResults) {
        const agentOpt = document.getElementById(`qo-${qr.questionId}-${qr.agentAnswer}`);
        const correctOpt = document.getElementById(`qo-${qr.questionId}-${qr.correctAnswer}`);
        if (agentOpt && !qr.correct) agentOpt.classList.add('wrong');
        if (correctOpt) correctOpt.classList.add('correct');
        // Show explanation
        if (qr.explanation) {
          const xEl = document.getElementById(`qx-${qr.questionId}`);
          if (xEl) { xEl.textContent = qr.explanation; xEl.style.display = 'block'; }
        }
        // Disable radio buttons
        panel.querySelectorAll(`input[name="q-${qr.questionId}"]`).forEach(inp => inp.disabled = true);
      }
    }

    const scorePct = data.scorePercent || Math.round((data.score || 0) * 100) + '%';
    if (data.passed) {
      resultEl.innerHTML = `
        <div class="quiz-result pass">
          <h4>✓ Passed — ${scorePct}</h4>
          <p>Module marked complete. Nice work.</p>
        </div>`;
      // Update the module UI to show completed
      const modItem = document.getElementById('mod-' + mid);
      if (modItem) modItem.classList.add('done');
      const chkBtn = document.getElementById('chk-' + mid);
      if (chkBtn) { chkBtn.classList.add('done'); chkBtn.textContent = '✓ Done'; chkBtn.disabled = true; }
      const qBtn = document.getElementById('qbtn-' + mid);
      if (qBtn) { qBtn.classList.add('passed'); qBtn.textContent = '✓ Quiz Passed'; }
      submitBtn.style.display = 'none';
    } else {
      resultEl.innerHTML = `
        <div class="quiz-result fail">
          <h4>✗ Not passed — ${scorePct}</h4>
          <p>Review the explanations and try again.</p>
        </div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Retry Quiz';
      // On retry, reset everything
      submitBtn.onclick = () => {
        panel.classList.remove('open');
        setTimeout(() => toggleQuiz(cid, mid, document.getElementById('qbtn-' + mid)), 100);
      };
    }
  } catch (e) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Answers';
    toast('Failed to submit quiz. Try again.');
  }
}

// Check quiz statuses on load for enrolled users
async function checkQuizStatuses(cid, modules, agentId) {

  try {

    if (!r.ok) return;
    const data = await r.json();
    const statuses = data.statuses || data || [];
    for (const s of statuses) {

async function toggleStudy(moduleId, packId) {
  const el = document.getElementById('study-' + moduleId);
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  
  el.style.display = 'block';
  el.innerHTML = '<div style="color:var(--gray);font-size:.8rem">Loading content…</div>';
  
  try {
    const r = await fetch(`${API}/api/skillpacks/${packId}`, { headers: authHeaders() });
    const pack = await r.json();
    
    const chains = pack.prompt_chains || pack.promptChains || [];
    const parsedChains = typeof chains === 'string' ? JSON.parse(chains) : chains;
    
    let content = `<h4 style="font-size:.9rem;font-weight:600;margin-bottom:.75rem;color:var(--red)">${esc(pack.name || 'Module Content')}</h4>`;
    content += `<p style="font-size:.88rem;line-height:1.75;color:var(--charcoal);margin-bottom:1rem">${esc(pack.description || '')}</p>`;
    
    if (Array.isArray(parsedChains) && parsedChains.length) {
      content += '<div style="margin-top:1rem">';
      parsedChains.forEach((chain, i) => {
        const name = chain.name || chain.id || `Step ${i+1}`;
        const steps = chain.steps || [];
        content += `<div style="margin-bottom:1rem;padding:.75rem;background:#fff;border:1px solid var(--cream);border-radius:6px">
          <div style="font-size:.75rem;font-weight:600;color:var(--charcoal);margin-bottom:.5rem">${esc(name)}</div>`;
        if (Array.isArray(steps)) {
          steps.forEach(s => {
            content += `<div style="font-size:.8rem;color:var(--charcoal);line-height:1.65;padding:.3rem 0 .3rem 1rem;border-left:2px solid var(--cream)">${esc(typeof s === 'string' ? s : JSON.stringify(s))}</div>`;
          });
        }
        content += '</div>';
      });
      content += '</div>';
    }
    
    el.innerHTML = content;
  } catch (e) {
    el.innerHTML = '<div style="color:var(--red);font-size:.8rem">Failed to load content</div>';
  }
}

  const panel = document.getElementById('advanced-panel');

  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  arrow.textContent = open ? '↓' : '↑';

    _advancedLoaded = true;
    loadHumanQuiz();

}

async function loadHumanQuiz() {
  const container = document.getElementById('human-quiz-container');
  try {
    const r = await fetch(`${API}/api/courses/${courseId}/assessment`, { headers: authHeaders() });
    const data = await r.json();

      container.innerHTML = '<div style="color:var(--gray);font-size:.8rem">No assessment questions found.</div>';

function switchTab(tab) {
  ['instruct','run','results'].forEach(t => {
    document.getElementById('tab-panel-'+t).style.display = t===tab ? 'block' : 'none';
    const btn = document.getElementById('tab-'+t);
    btn.style.borderBottomColor = t===tab ? 'var(--red)' : 'transparent';
    btn.style.color = t===tab ? 'var(--red)' : 'var(--gray)';
  });
  if (tab === 'results') loadResults();
}

function copyInstructions() {
  const text = document.getElementById('instructions-block')?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-instructions-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

async function runAssessmentNow(agentId) {
  const btn = document.getElementById('run-now-btn');
  const progress = document.getElementById('run-progress');
  btn.disabled = true;
  btn.textContent = 'Running…';
  progress.style.display = 'block';

  try {
    const r = await fetch(`${API}/api/courses/${courseId}/assessment/run`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ agentId }),
    });
    const data = await r.json();
    progress.style.display = 'none';
    if (data.error) {
      btn.disabled = false;
      btn.textContent = 'Run Assessment Now →';
      document.getElementById('run-progress-note').textContent = 'Error: ' + data.error;
      progress.style.display = 'block';
      return;
    }
    // Switch to results tab and show
    switchTab('results');
    renderResults(data);
  } catch (e) {
    progress.style.display = 'none';
    btn.disabled = false;
    btn.textContent = 'Run Assessment Now →';
    toast('Error: ' + e.message);
  }
}

async function loadResults() {
  const loading = document.getElementById('results-loading');
  const content = document.getElementById('results-content');
  if (!loading || !content) return;
  loading.style.display = 'block';
  content.style.display = 'none';
  try {
    const agentId = window._agentId;
    if (!agentId) { loading.textContent = 'No agent linked.'; return; }
    const r = await fetch(`${API}/api/courses/${courseId}/assessment/status`, {
      headers: authHeaders(),
    });
    // status endpoint requires agentId param
    const r2 = await fetch(`${API}/api/courses/${courseId}/assessment/status?agentId=${agentId}`, {
      headers: authHeaders(),
    });
    const data = await r2.json();
    loading.style.display = 'none';
    if (!data.attempts) {
      content.style.display = 'block';
      content.innerHTML = '<div style="color:var(--gray);font-size:.85rem;padding:.5rem 0">No assessment attempts yet. Run the assessment first.</div>';
      return;
    }
    const latest = data.history?.[0];
    renderResults({
      passed: data.passed,
      score: latest?.score,
      preScore: latest?.pre_score,
      delta: latest?.delta,
      scorePercent: latest ? `${(latest.score*100).toFixed(1)}%` : null,
      preScorePercent: latest?.pre_score != null ? `${(latest.pre_score*100).toFixed(1)}%` : null,
      deltaLabel: latest?.delta != null ? `${latest.delta>=0?'+':''}${(latest.delta*100).toFixed(1)}pp` : null,
      certificateId: data.certificate?.id,
    });
    content.style.display = 'block';
  } catch {
    loading.textContent = 'Failed to load results.';
  }
}

  const deltaLabel = data.deltaLabel || (data.delta != null ? `${data.delta>=0?'+':''}${(data.delta*100).toFixed(0)}pp` : '—');

  }

  content.style.display = 'block';
  content.innerHTML = `
    <div style="padding:1.5rem;border:1px solid ${passed?'var(--green)':'var(--cream)'};background:${passed?'rgba(46,125,50,.03)':'var(--offwhite)'}">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div style="font-size:2rem;margin-bottom:.4rem">${passed?'🎓':'📋'}</div>
        <div style="font-family:var(--serif);font-size:1.35rem;font-style:italic">${passed?'Credential Earned':'Assessment Complete'}</div>
        <div style="font-size:.75rem;color:var(--gray);margin-top:.25rem">${passed?'Soulbound NFT minted on Base mainnet':'Score below 70% — try again'}</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;gap:0;border:1px solid var(--cream);background:var(--cream);margin-bottom:1.25rem">
        <div style="background:var(--white);padding:1rem;text-align:center">
          <div style="font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);font-family:var(--mono);margin-bottom:.4rem">Before</div>
          <div style="font-family:var(--serif);font-size:1.8rem;color:var(--gray)">${pre}</div>
        </div>
        <div style="background:var(--cream)"></div>
        <div style="background:var(--white);padding:1rem;text-align:center">
          <div style="font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);font-family:var(--mono);margin-bottom:.4rem">After</div>
          <div style="font-family:var(--serif);font-size:1.8rem;color:${passed?'var(--green)':'var(--red)'}">${post}</div>
        </div>
        <div style="background:var(--cream)"></div>
        <div style="background:var(--white);padding:1rem;text-align:center">
          <div style="font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);font-family:var(--mono);margin-bottom:.4rem">Delta</div>

        <div style="height:100%;width:${Math.min(100,postNum)}%;background:${passed?'var(--green)':'var(--red)'};transition:width .8s ease"></div>

// Legacy stubs so nothing breaks if referenced
async function startAssessment() {
  const btn = document.getElementById('start-assessment-btn');
  btn.disabled = true; btn.textContent = 'Loading assessment…';
  
  try {
    const r = await fetch(`${API}/api/courses/${courseId}/assessment`, { headers: authHeaders() });
    const data = await r.json();
    assessmentQuestions = data.questions || [];
    
    if (!assessmentQuestions.length) {
      btn.textContent = 'No assessment available';
      return;
    }
    
    selectedAnswers = {};
    const ui = document.getElementById('assessment-ui');
    
    let html = '<div style="margin-bottom:1.5rem">';
    assessmentQuestions.forEach((q, i) => {
      const opts = q.options || {};
      html += `<div style="margin-bottom:1.5rem;padding:1rem;background:var(--offwhite);border:1px solid var(--cream);border-radius:8px">
        <div style="font-size:.88rem;font-weight:600;color:var(--charcoal);margin-bottom:.75rem;line-height:1.5">
          <span style="color:var(--red);margin-right:.4rem">${i+1}.</span> ${esc(q.question)}
        </div>
        <div style="display:flex;flex-direction:column;gap:.4rem">`;
      
      ['A','B','C','D'].forEach(letter => {
        if (!opts[letter]) return;
        html += `<label style="display:flex;align-items:flex-start;gap:.5rem;padding:.5rem .75rem;background:#fff;border:1px solid var(--cream);border-radius:5px;cursor:pointer;font-size:.82rem;line-height:1.5;transition:border-color .15s" 
          onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor=selectedAnswers['${q.id}']==='${letter}'?'var(--red)':'var(--cream)'">
          <input type="radio" name="q-${q.id}" value="${letter}" style="margin-top:.25rem;accent-color:var(--red)" 
            onchange="selectedAnswers['${q.id}']='${letter}';this.closest('label').style.borderColor='var(--red)'">
          <span><strong style="color:var(--red)">${letter}.</strong> ${esc(opts[letter])}</span>
        </label>`;
      });
      
      html += '</div></div>';
    });
    html += '</div>';
    html += `<button class="enroll-btn" onclick="submitAssessment()" id="submit-assessment-btn" style="max-width:300px">Submit Assessment →</button>`;
    html += `<div style="font-size:.7rem;color:var(--gray);margin-top:.5rem">70% required to pass. Your pre-score baseline was recorded at enrollment.</div>`;
    
    ui.innerHTML = html;
  } catch (e) {
    btn.textContent = 'Error loading assessment';
    btn.disabled = false;
  }
}

async function submitAssessment() {
  const btn = document.getElementById('submit-assessment-btn');
  const unanswered = assessmentQuestions.filter(q => !selectedAnswers[q.id]);
  if (unanswered.length) {
    alert(`Please answer all questions (${unanswered.length} remaining)`);
    return;
  }
  
  btn.disabled = true; btn.textContent = 'Scoring…';
  
  try {
    const r = await fetch(`${API}/api/courses/${courseId}/assessment/submit`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ agentId: window._agentId, answers: selectedAnswers }),
    });
    const data = await r.json();
    
    if (data.error) {
      alert('Error: ' + data.error);
      btn.disabled = false; btn.textContent = 'Submit Assessment →';
      return;
    }
    
    // Show results
    const resultsEl = document.getElementById('assessment-results');
    const pre = data.preScore != null ? (data.preScore * 100).toFixed(0) : '?';
    const post = data.scorePercent || (data.score * 100).toFixed(1);
    const delta = data.delta != null ? (data.delta > 0 ? '+' : '') + (data.delta * 100).toFixed(0) : '?';
    const passed = data.passed;
    const certId = data.certificateId;
    
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `
      <div style="padding:1.5rem;background:${passed?'rgba(46,125,50,.04)':'rgba(198,40,40,.04)'};border:1px solid ${passed?'var(--green)':'var(--red)'};border-radius:10px;text-align:center">
        <div style="font-size:2.5rem;margin-bottom:.5rem">${passed ? '🎓' : '📝'}</div>
        <h3 style="font-family:var(--serif);font-size:1.5rem;margin-bottom:.25rem">${passed ? 'Credential Earned!' : 'Not Yet — Keep Learning'}</h3>
        <p style="color:var(--gray);font-size:.85rem;margin-bottom:1.5rem">${passed ? 'Your credential has been minted on Base.' : 'Score 70% or higher to earn your credential.'}</p>
        
        <div style="display:flex;justify-content:center;gap:2rem;margin-bottom:1.5rem;flex-wrap:wrap">
          <div>
            <div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:.25rem">Before</div>
            <div style="font-family:var(--mono);font-size:1.8rem;font-weight:700;color:var(--gray)">${pre}%</div>
          </div>
          <div style="font-size:1.5rem;color:var(--gray);align-self:center">→</div>
          <div>
            <div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:.25rem">After</div>
            <div style="font-family:var(--mono);font-size:1.8rem;font-weight:700;color:${passed?'var(--green)':'var(--red)'}">${post}%</div>
          </div>
          <div>
            <div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:.25rem">Improvement</div>
            <div style="font-family:var(--mono);font-size:1.8rem;font-weight:700;color:var(--green)">${delta}pp</div>
          </div>
        </div>
        
        ${certId ? `<div style="font-size:.7rem;color:var(--gray);margin-bottom:.5rem">Certificate: <code style="background:var(--offwhite);padding:.1rem .4rem;font-size:.65rem">${certId}</code></div>` : ''}
        
        <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem">
          <a href="/dashboard" style="font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.6rem 1.5rem;background:var(--red);color:#fff;text-decoration:none;border-radius:4px">View Dashboard →</a>
          <button onclick="location.reload()" style="font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.6rem 1.5rem;border:1px solid var(--cream);background:none;color:var(--gray);cursor:pointer;border-radius:4px">Refresh Page</button>
        </div>
      </div>
    `;
    
    // Hide the questions
    document.getElementById('assessment-ui').style.display = 'none';
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false; btn.textContent = 'Submit Assessment →';
  }
}
</script>
