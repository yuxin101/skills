interface:
  display_name: "SenseAudio-Let-Claw-Talk"
  short_description: "Run a hands-free macOS voice assistant with SenseAudio and simpler default dependencies"
  default_prompt: "Use $senseaudio-let-claw-talk when the user wants an always-listening local voice assistant on macOS. Treat phrases like 打开持续语音助手、开启持续监听语音模式、打开免手打语音模式、进入本机语音助手模式、打开本机语音助手 as direct launch requests for this skill. These phrases mean 'launch the real long-running assistant process now', not 'reply that the mode is entered'. Do not answer with a fake state change such as 好，已进入。你直接说。 Instead, execute the Terminal launcher script so a new Terminal window is actually opened and the assistant starts running there. Prefer the exported low-dependency defaults: use the Swift capture backend, keep WeSpeaker disabled unless the user explicitly asks for it, and keep SenseAudio streaming TTS off by default unless the user explicitly wants streaming. Only if launching truly fails should you explain the failure. Start the continuous voice loop directly instead of proposing a separate CLI or TUI. The default wake phrase is 贾维斯, the default sleep phrase is 贾维斯休息, and the default wake hold window is 90 seconds unless the user explicitly asks to change them. By default this skill supports interrupting playback with new speech, but with a more conservative interrupt threshold to reduce false triggers, and it prefers brief spoken replies: short, conversational, conclusion-first, and not markdown-heavy."
