# SafeHub Semgrep rules: environment variable harvesting
# Detects access to process.env that could steal API keys, tokens, or secrets.
# Severity: MEDIUM — may be legitimate; flag for review.

rules:
  - id: safehub-env-process-env
    message: "process.env access detected. May harvest API keys or secrets."
    severity: MEDIUM
    languages:
      - js
      - ts
    pattern: process.env

  - id: safehub-env-process-env-access
    message: "process.env[...] access. Could exfiltrate credentials."
    severity: MEDIUM
    languages:
      - js
      - ts
    pattern: process.env[$KEY]
