version: 1
display_name: Task Decomposer
short_description: 需求任务拆解工具，将复杂需求分解为可执行的最小任务单元
default_prompt: |
  使用此技能将需求分解为可执行的任务清单。
  
  功能：
  1. 需求分析 - 理解业务目标、识别关键功能
  2. 任务拆解 - 分解为 2-5 分钟的微任务
  3. 依赖关系 - 确定任务之间的依赖
  4. 工作量估算 - 评估每个任务的时间
  5. 迭代规划 - 按优先级排序、划分迭代范围
  
  使用示例：
  - "拆解用户注册功能"
  - "拆解订单查询功能，并估算工时"
  - "拆解支付模块，并制定迭代计划"
