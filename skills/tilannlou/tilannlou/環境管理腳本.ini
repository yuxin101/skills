環境管理腳本.SH

🦞 已整合 4 個腳本為單一管理工具 `~/claw-manager.sh`，採選單式操作：

```bash
#!/bin/bash
#===============================================================================
# 🦞 OpenClaw 環境管理腳本 (claw-manager.sh)
# 用途：整合 Ollama 配置、模型預熱、API 調用、容器維護
# 位置：~/claw-manager.sh
#===============================================================================

set -e
SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
LOG_FILE="$SCRIPT_DIR/claw-manager.log"
OLLAMA_API="http://host.docker.internal:11434"
DEFAULT_MODEL="qwen3:8b"
MODELS_DIR="/mnt/e/AI/models/ollama"

#-------------------------------------------------------------------------------
# 📋 日誌函數
#-------------------------------------------------------------------------------
log() {
    local timestamp=$(date "+%Y-%m-%d %H:%M:%S")
    echo "[$timestamp] $1" | tee -a "$LOG_FILE"
}

error() {
    log "❌ ERROR: $1" >&2
}

success() {
    log "✅ $1"
}

#-------------------------------------------------------------------------------
# 🔧 功能 1: 配置 Ollama API 環境變數
#-------------------------------------------------------------------------------
setup_ollama_config() {
    log "🔧 配置 Ollama API 環境變數..."
    
    cat >> ~/.bashrc << 'EOF'

# 🦙 Ollama API 配置 (由 claw-manager.sh 生成)
export OLLAMA_API="http://host.docker.internal:11434"
export OLLAMA_MODEL="qwen3:8b"
EOF
    
    source ~/.bashrc
    success "環境變數已寫入 ~/.bashrc"
    echo ""
    echo "📌 現在可以使用簡化指令："
    echo "   curl -s \$OLLAMA_API/api/generate -d '{\"model\":\"\$OLLAMA_MODEL\",\"prompt\":\"hi\",\"stream\":false}'"
}

#-------------------------------------------------------------------------------
# 🔥 功能 2: 模型預熱（開機後載入顯存）
#-------------------------------------------------------------------------------
warmup_model() {
    local model="${1:-qwen2.5-coder:14b}"
    log "🔥 預熱模型：$model"
    
    echo "⏳ 發送預熱請求（背景執行，不阻塞）..."
    curl -s --max-time 30 "$OLLAMA_API/api/generate" \
        -d "{\"model\":\"$model\",\"prompt\":\".\",\"stream\":false}" > /dev/null &
    
    local pid=$!
    echo "📌 預熱進程 PID: $pid"
    echo "💡 提示：可用 'nvidia-smi' 監控顯存變化"
}

#-------------------------------------------------------------------------------
# 🧪 功能 3: 測試 Ollama API（含超時/流式/錯誤處理）
#-------------------------------------------------------------------------------
test_ollama_api() {
    echo "🧪 Ollama API 測試選單"
    echo "─────────────────────────────────────────"
    echo "1) 簡單請求（非流式）"
    echo "2) 流式輸出（即時回覆）"
    echo "3) 帶錯誤處理的請求"
    echo "4) 自定義提示詞"
    echo "0) 返回主選單"
    echo "─────────────────────────────────────────"
    read -p "選擇 [0-4]: " choice
    
    case $choice in
        1)
            echo "⏳ 發送請求..."
            curl -s --max-time 30 "$OLLAMA_API/api/generate" \
                -d "{\"model\":\"$DEFAULT_MODEL\",\"prompt\":\"hi\",\"stream\":false}"
            echo ""
            ;;
        2)
            echo "⏳ 流式輸出中（Ctrl+C 停止）..."
            if command -v jq &> /dev/null; then
                curl -s "$OLLAMA_API/api/generate" \
                    -d "{\"model\":\"$DEFAULT_MODEL\",\"prompt\":\"hi\",\"stream\":true}" | \
                    jq -r '.response'
            else
                echo "⚠️  未安裝 jq，顯示原始輸出"
                curl -s "$OLLAMA_API/api/generate" \
                    -d "{\"model\":\"$DEFAULT_MODEL\",\"prompt\":\"hi\",\"stream\":true}"
            fi
            echo ""
            ;;
        3)
            echo "⏳ 發送請求（含錯誤處理）..."
            local response=$(curl -s -w "\nHTTP_CODE:%{http_code}" --max-time 30 \
                "$OLLAMA_API/api/generate" \
                -d "{\"model\":\"$DEFAULT_MODEL\",\"prompt\":\"hi\",\"stream\":false}")
            local http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d':' -f2)
            local body=$(echo "$response" | sed '/HTTP_CODE:/d')
            
            echo "📄 回應內容："
            echo "$body"
            echo ""
            if [ "$http_code" = "200" ]; then
                success "HTTP 狀態碼：$http_code"
            else
                error "HTTP 狀態碼：$http_code"
            fi
            ;;
        4)
            read -p "輸入提示詞： " prompt
            curl -s --max-time 60 "$OLLAMA_API/api/generate" \
                -d "{\"model\":\"$DEFAULT_MODEL\",\"prompt\":\"$prompt\",\"stream\":false}"
            echo ""
            ;;
        0) return ;;
        *) error "無效選擇" ;;
    esac
}

#-------------------------------------------------------------------------------
# 🐳 功能 4: 容器維護（停止/複製/更新掛載）
#-------------------------------------------------------------------------------
container_maintenance() {
    echo "🐳 Docker 容器維護選單"
    echo "─────────────────────────────────────────"
    echo "1) 停止 Ollama 容器"
    echo "2) 啟動 Ollama 容器"
    echo "3) 查看容器狀態"
    echo "4) 更新模型目錄掛載"
    echo "5) 查看容器日誌"
    echo "0) 返回主選單"
    echo "─────────────────────────────────────────"
    read -p "選擇 [0-5]: " choice
    
    case $choice in
        1)
            log "🛑 停止 Ollama 容器..."
            docker stop ollama 2>/dev/null && success "容器已停止" || error "容器未運行"
            ;;
        2)
            log "🚀 啟動 Ollama 容器..."
            docker start ollama 2>/dev/null && success "容器已啟動" || error "啟動失敗"
            ;;
        3)
            echo "📊 容器狀態："
            docker ps --filter name=ollama --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "📁 掛載路徑："
            docker inspect ollama --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{"\n"}}{{end}}' 2>/dev/null || echo "容器未運行"
            ;;
        4)
            echo "⚠️  此操作會停止並重啟容器"
            read -p "確認繼續？[y/N]: " confirm
            if [[ "$confirm" =~ ^[Yy]$ ]]; then
                log "📋 更新模型目錄掛載..."
                
                # 停止容器
                docker stop ollama 2>/dev/null
                
                # 備份舊目錄（如果需要）
                if [ -d "$MODELS_DIR" ]; then
                    echo "📁 模型目錄已存在：$MODELS_DIR"
                fi
                
                # 重啟容器（確保掛載正確）
                docker run -d --name ollama --gpus=all \
                    -v "$MODELS_DIR:/root/.ollama" \
                    -p 11434:11434 \
                    --restart unless-stopped \
                    ollama/ollama 2>/dev/null && \
                    success "容器已重啟，掛載路徑：$MODELS_DIR" || \
                    error "容器啟動失敗"
                
                # 等待容器就緒
                echo "⏳ 等待容器就緒..."
                sleep 5
                docker exec ollama ollama list
            else
                echo "❌ 操作已取消"
            fi
            ;;
        5)
            echo "📜 最近 50 行日誌（Ctrl+C 退出即時監控）："
            docker logs --tail 50 ollama
            ;;
        0) return ;;
        *) error "無效選擇" ;;
    esac
}

#-------------------------------------------------------------------------------
# 📊 功能 5: GPU 監控
#-------------------------------------------------------------------------------
gpu_monitor() {
    echo "🎮 GPU 監控選單"
    echo "─────────────────────────────────────────"
    echo "1) 簡單監控（利用率 + 顯存，1 秒刷新）"
    echo "2) 詳細監控（型號 + 總量 + 使用量，2 秒刷新）"
    echo "3) 單次快照"
    echo "0) 返回主選單"
    echo "─────────────────────────────────────────"
    read -p "選擇 [0-3]: " choice
    
    case $choice in
        1)
            echo "⏳ 監控中（Ctrl+C 停止）..."
            nvidia-smi --query-gpu=utilization.gpu,memory.used --format=csv -l 1
            ;;
        2)
            echo "⏳ 監控中（Ctrl+C 停止）..."
            watch -n 2 'nvidia-smi --query-gpu=name,memory.total,memory.used,memory.free,utilization.gpu --format=csv'
            ;;
        3)
            echo "📸 GPU 狀態快照："
            nvidia-smi --query-gpu=name,memory.total,memory.used,memory.free,utilization.gpu --format=csv
            ;;
        0) return ;;
        *) error "無效選擇" ;;
    esac
}

#-------------------------------------------------------------------------------
# 🧹 功能 6: 釋放顯存
#-------------------------------------------------------------------------------
release_vram() {
    local model="${1:-qwen2.5-coder:14b}"
    log "🧹 釋放模型顯存：$model"
    
    curl -X POST "$OLLAMA_API/api/unload" \
        -d "{\"model\":\"$model\"}" 2>/dev/null && \
        success "模型已卸載" || \
        error "卸載失敗（模型可能未載入）"
}

#-------------------------------------------------------------------------------
# 📸 功能 7: 更新環境快照
#-------------------------------------------------------------------------------
update_snapshot() {
    log "📸 更新環境快照..."
    
    if [ -f ~/snapshot-claw-env.sh ]; then
        ~/snapshot-claw-env.sh
        success "快照已更新"
        echo ""
        echo "🔄 請執行以下指令讓 AI 讀取最新狀態："
        echo "   openclaw memory index"
    else
        error "未找到 snapshot-claw-env.sh"
    fi
}

#-------------------------------------------------------------------------------
# 📋 主選單
#-------------------------------------------------------------------------------
show_menu() {
    clear
    echo "╔═══════════════════════════════════════════════════════════╗"
    echo "║           🦞 OpenClaw 環境管理工具 (claw-manager)          ║"
    echo "╠═══════════════════════════════════════════════════════════╣"
    echo "║  1) 🔧 配置 Ollama API 環境變數                            ║"
    echo "║  2) 🔥 模型預熱（開機後載入顯存）                           ║"
    echo "║  3) 🧪 測試 Ollama API                                     ║"
    echo "║  4) 🐳 Docker 容器維護                                     ║"
    echo "║  5) 🎮 GPU 監控                                           ║"
    echo "║  6) 🧹 釋放顯存                                           ║"
    echo "║  7) 📸 更新環境快照                                       ║"
    echo "║  8) 📜 查看日誌                                           ║"
    echo "║  0) 退出                                                  ║"
    echo "╚═══════════════════════════════════════════════════════════╝"
}

main() {
    while true; do
        show_menu
        read -p "請選擇 [0-8]: " choice
        
        case $choice in
            1) setup_ollama_config ;;
            2) warmup_model ;;
            3) test_ollama_api ;;
            4) container_maintenance ;;
            5) gpu_monitor ;;
            6) release_vram ;;
            7) update_snapshot ;;
            8) 
                echo "📜 最近 30 行日誌："
                tail -30 "$LOG_FILE" 2>/dev/null || echo "無日誌記錄"
                read -p "按 Enter 返回..." ;;
            0) 
                echo "👋 再見！"
                exit 0
                ;;
            *) 
                echo "❌ 無效選擇，請重試"
                sleep 1
                ;;
        esac
        
        echo ""
        read -p "按 Enter 返回選單..."
    done
}

# 啟動
main "$@"
```

