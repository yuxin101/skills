# AWP Workflow Manifest Template
# Compliance Level: L0+ (add sections for higher levels)
#
# Replace all "{{PLACEHOLDER}}" values with your workflow-specific configuration.

awp: "1.0.0"

workflow:
  name: "{{WORKFLOW_NAME}}"                         # kebab-case, MUST match directory name (R1)
  version: "1.0.0"
  description: "{{WORKFLOW_DESCRIPTION}}"

# --- Orchestration (DAG) ---
orchestration:
  engine: dag
  graph:
    - id: "{{AGENT_ID}}"                           # snake_case required (R2)
      agent: "{{AGENT_ID}}"
      enabled: true
      depends_on: []
      share_input: {}
      description: "{{AGENT_DESCRIPTION}}"

    # Add more agents:
    # - id: second_agent
    #   agent: second_agent
    #   depends_on:
    #     - agent: "{{AGENT_ID}}"
    #       condition: success
    #   share_input:
    #     "{{AGENT_ID}}": ["{{OUTPUT_FIELD}}"]
    #   description: "..."

  execution:
    mode: sequential                                # sequential | parallel | conditional
    timeout:
      per_agent: 120
      total: 300
    error_handling:
      default: continue                             # continue | stop | retry

# --- State ---
state:
  persistence:
    enabled: true
    path: data/state
    format: json
  sharing:
    strategy: full                                  # full | selective | isolated
  required_fields: []
  auto_inject: {}

# --- Environment & Secrets (L0+) ---
