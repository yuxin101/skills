# AWP Workflow: {{WORKFLOW_NAME}}
# Generated by AWP Skill — Cloudflare Dynamic Workers Adapter

name = "{{WORKFLOW_NAME}}"
main = "src/index.ts"
compatibility_date = "2026-03-24"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# --- Workflow State (always required) ---
[[kv_namespaces]]
binding = "STATE"
id = "{{KV_NAMESPACE_ID}}"

# --- Long-term Memory (L3+) ---
# Uncomment if workflow uses long-term memory (MEMORY.md)
# [[r2_buckets]]
# binding = "MEMORY"
# bucket_name = "{{WORKFLOW_NAME}}-memory"

# --- Short-term Memory / Daily Logs (L3+) ---
# Uncomment if workflow uses daily logs or short-term memory
# [[d1_databases]]
# binding = "DB"
# database_name = "{{WORKFLOW_NAME}}-db"
# database_id = "{{D1_DATABASE_ID}}"

# --- Workers AI (optional LLM backend) ---
# Uncomment to use Cloudflare Workers AI instead of external LLM
# [ai]
# binding = "AI"

# --- Secrets ---
# Set via: wrangler secret put LLM_API_KEY
# LLM_API_KEY, LLM_MODEL, LLM_BASE_URL are read from env

# --- Cron Triggers (optional) ---
# Uncomment for scheduled workflow execution
# [triggers]
# crons = ["0 */6 * * *"]  # Every 6 hours
