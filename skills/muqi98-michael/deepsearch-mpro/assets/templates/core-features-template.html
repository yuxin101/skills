<!--
  核心功能模板 (Core Features Template)
  用于展示产品/服务的核心功能模块
  
  使用方式：
  1. 替换 {{变量名}} 为实际内容
  2. 根据实际功能数量复制/删除 feature-card 区块（建议 3-6 个）
  3. 每个 feature-card 包含：图标、标题、描述
-->

<div class="section" id="features">
  <div class="section-header">
    <div class="icon" style="background:#E8F5E9">⚡</div>
    <div><h2>核心功能</h2><div class="sub">Core Features</div></div>
  </div>
  
  <div class="grid-3">
  
    <!-- 功能模块 1 -->
    <div class="feature-card">
      <div class="icon">🧠</div>
      <h3>{{功能1名称}}</h3>
      <p>{{功能1详细描述：功能说明、技术特点、应用场景}}</p>
    </div>
    
    <!-- 功能模块 2 -->
    <div class="feature-card">
      <div class="icon">🔐</div>
      <h3>{{功能2名称}}</h3>
      <p>{{功能2详细描述}}</p>
    </div>
    
    <!-- 功能模块 3 -->
    <div class="feature-card">
      <div class="icon">📁</div>
      <h3>{{功能3名称}}</h3>
      <p>{{功能3详细描述}}</p>
    </div>
    
    <!-- 功能模块 4 -->
    <div class="feature-card">
      <div class="icon">🤝</div>
      <h3>{{功能4名称}}</h3>
      <p>{{功能4详细描述}}</p>
    </div>
    
    <!-- 功能模块 5 -->
    <div class="feature-card">
      <div class="icon">📱</div>
      <h3>{{功能5名称}}</h3>
      <p>{{功能5详细描述}}</p>
    </div>
    
    <!-- 功能模块 6 -->
    <div class="feature-card">
      <div class="icon">🛒</div>
      <h3>{{功能6名称}}</h3>
      <p>{{功能6详细描述}}</p>
    </div>
    
  </div>
</div>

<!--
样式说明：
- grid-3: 三列网格布局
- feature-card: 自动带边框和 hover 效果
- icon emoji 可根据功能特点选择：
  · 🧠 AI/智能
  · 🔐 安全/合规
  · 📁 文件/存储
  · 🤝 协作/协调
  · 📱 移动/远程
  · 🛒 市场/生态
  · ⚡ 性能/速度
  · 🔧 工具/开发
-->
