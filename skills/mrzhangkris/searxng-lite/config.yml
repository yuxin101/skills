# SearXNG-lite configuration
# Edit categories to enable/disable engine groups. Changes take effect immediately (hot-reload).

# Proxy URL for engines that need it (Google, YouTube, Reddit, etc.)
# Supports http, https, socks5, socks5h protocols.
# Examples:
#   proxy: http://127.0.0.1:7890
#   proxy: socks5h://127.0.0.1:1080
# Leave empty or comment out to disable proxy (proxy-required engines will be skipped).
# Can also be set via HTTPS_PROXY environment variable.
proxy: ""

# Category toggles (true = enabled, false = disabled)
categories:
  general: true       # bing, brave, duckduckgo, googleЁЯМР, startpage, yahoo
  knowledge: true     # wikipedia, wikidata, wolframalphaЁЯМР
  dev: true           # github, gitlab, stackoverflow, hackernews, redditЁЯМР, huggingfaceЁЯМР, mdn
  academic: true      # arxiv, semantic_scholar, google_scholarЁЯМР, crossref
  news: false         # bing_news, reuters
  video: false        # youtubeЁЯМР
  images: false       # unsplash
  social: false       # lemmyЁЯМР
  translate: false    # lingvaЁЯМР

# ЁЯМР = requires proxy. Without a proxy configured, these engines will fail silently.
