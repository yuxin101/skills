<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Browser</title>
    <script src="js/highlight.min.js"></script>
    <script>
        // 加载marked.js并配置
        (function() {
            const script = document.createElement('script');
            script.src = 'js/marked.min.js';
            script.onload = function() {
                console.log('marked.js loaded');
                // 配置marked使用highlight.js
                if (window.marked) {
                    window.marked.use({
                        renderer: {
                            code(code, language) {
                                if (language && hljs.getLanguage(language)) {
                                    try {
                                        return '<pre><code class="hljs language-' + language + '">' +
                                            hljs.highlight(code, { language: language }).value +
                                            '</code></pre>';
                                    } catch (e) {
                                        console.warn('Highlight error:', e);
                                    }
                                }
                                // 自动检测
                                try {
                                    const result = hljs.highlightAuto(code);
                                    return '<pre><code class="hljs">' + result.value + '</code></pre>';
                                } catch (e) {
                                    return '<pre><code>' + code + '</code></pre>';
                                }
                            }
                        }
                    });
                }
                window.markedLoaded = true;
            };
            script.onerror = function() {
                console.warn('marked.js failed to load');
                window.markedLoaded = false;
            };
            document.head.appendChild(script);
        })();
    </script>
    <style>
        /* highlight.js GitHub Light 主题 */
        pre code.hljs {
            display: block;
            overflow-x: auto;
            padding: 1em;
            border-radius: 6px;
        }
        code.hljs {
            padding: 3px 5px;
        }
        .hljs {
            background: #f6f8fa;
            color: #24292e;
        }
        .hljs-comment,
        .hljs-quote {
            color: #6a737d;
            font-style: italic;
        }
        .hljs-doctag,
        .hljs-keyword,
        .hljs-formula {
            color: #d73a49;
        }
        .hljs-section,
        .hljs-name,
        .hljs-selector-tag,
        .hljs-deletion,
        .hljs-subst {
            color: #b31d28;
        }
        .hljs-literal {
            color: #005cc5;
        }
        .hljs-string,
        .hljs-regexp,
        .hljs-addition,
        .hljs-attribute,
        .hljs-meta .hljs-string {
            color: #22863a;
        }
        .hljs-attr,
        .hljs-variable,
        .hljs-template-variable,
        .hljs-type,
        .hljs-selector-class,
        .hljs-selector-attr,
        .hljs-selector-pseudo,
        .hljs-number {
            color: #e36209;
        }
        .hljs-symbol,
        .hljs-bullet,
        .hljs-link,
        .hljs-meta,
        .hljs-selector-id,
        .hljs-title {
            color: #6f42c1;
        }
        .hljs-built_in,
        .hljs-title.class_,
        .hljs-class .hljs-title {
            color: #6f42c1;
        }
        .hljs-emphasis {
            font-style: italic;
        }
        .hljs-strong {
            font-weight: bold;
        }
        .hljs-link {
            color: #005cc5;
            text-decoration: underline;
        }
        .hljs-code {
            color: #24292e;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --border: #e5e7eb;
            --hover-bg: #f3f4f6;
            --active-bg: #dbeafe;
            --version-bg: #e0e7ff;
            --version-text: #3730a3;
            --version-active-bg: #3b82f6;
            --version-active-text: #ffffff;
            --meta-tag-bg: #f3f4f6;
            --meta-tag-text: #6b7280;
            --meta-tag-active-bg: #bfdbfe;
            --meta-tag-active-text: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", sans-serif;
            height: 100vh;
            display: flex;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .sidebar {
            width: 340px;
            min-width: 340px;
            background: var(--bg-white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .logo-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .search-box {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            background: var(--bg-light);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        .card-count {
            padding: 10px 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .card-count span {
            color: var(--primary);
            font-weight: 600;
        }

        .skills-list {
            flex: 1;
            overflow-y: auto;
        }

        .skills-list::-webkit-scrollbar {
            width: 5px;
        }

        .skills-list::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .skill-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .skill-item:hover {
            background: var(--hover-bg);
        }

        .skill-item.active {
            background: var(--active-bg);
            border-left: 3px solid var(--primary);
            padding-left: 17px;
        }

        .skill-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }

        .skill-item-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #3b82f6;
            flex: 1;
            margin-right: 8px;
            transition: color 0.2s, font-size 0.2s, font-weight 0.2s;
        }

        .skill-item.active .skill-item-name {
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .skill-item-version {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--version-text);
            background: var(--version-bg);
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
            border: 1px solid #c7d2fe;
            transition: all 0.15s;
        }

        .skill-item.active .skill-item-version {
            color: var(--version-active-text);
            background: var(--version-active-bg);
            border-color: var(--version-active-bg);
        }

        .skill-item-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .skill-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-tag {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--meta-tag-text);
            background: var(--meta-tag-bg);
            padding: 2px 6px;
            border-radius: 3px;
            transition: all 0.15s;
        }

        .skill-item.active .meta-tag {
            color: var(--meta-tag-active-text);
            background: var(--meta-tag-active-bg);
        }

        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-white);
            overflow: hidden;
        }

        .empty-detail {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .empty-detail-icon {
            width: 56px;
            height: 56px;
            background: var(--bg-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .detail-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-white);
        }

        .detail-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .detail-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            margin-right: 12px;
            margin-left: 0px;
        }

        .detail-version {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--version-text);
            background: var(--version-bg);
            padding: 4px 10px;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid #c7d2fe;
        }

        .detail-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: var(--bg-light);
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .detail-meta {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .detail-meta-item {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: var(--meta-tag-bg);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .detail-meta-item span {
            font-weight: 500;
            color: var(--text-primary);
        }

        .detail-content {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            line-height: 1.6;
            font-size: 0.85rem;
        }

        .detail-content::-webkit-scrollbar {
            width: 5px;
        }

        .detail-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .detail-content h1,
        .detail-content h2,
        .detail-content h3 {
            color: var(--text-primary);
            margin: 20px 0 10px;
            font-weight: 600;
        }

        .detail-content h1 {
            font-size: 1.2rem;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary);
        }

        .detail-content h2 {
            font-size: 1.1rem;
        }

        .detail-content h3 {
            font-size: 0.95rem;
        }

        .detail-content p {
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .detail-content code {
            background: var(--bg-light);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: "SF Mono", Monaco, monospace;
            font-size: 0.8em;
            color: var(--primary-dark);
        }

        .detail-content pre {
            background: #f6f8fa;
            color: #24292e;
            padding: 14px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 14px 0;
            border: 1px solid #e1e4e8;
        }

        .detail-content pre code {
            background: none !important;
            padding: 0;
            color: inherit;
        }

        .detail-content ul,
        .detail-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }

        .detail-content li {
            margin-bottom: 5px;
            color: var(--text-secondary);
        }

        .detail-content blockquote {
            border-left: 3px solid var(--primary);
            padding: 8px 12px;
            margin: 12px 0;
            background: var(--bg-light);
            color: var(--text-secondary);
        }

        .detail-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            font-size: 0.9rem;
        }

        .detail-content table th,
        .detail-content table td {
            border: 1px solid var(--border);
            padding: 10px 12px;
            text-align: left;
        }

        .detail-content table th {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--text-primary);
        }

        .detail-content table tr:nth-child(even) {
            background: var(--bg-light);
        }

        .detail-content table tr:hover {
            background: #f3f4f6;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            padding: 32px;
            text-align: center;
            color: #dc2626;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                min-width: 100%;
            }
            .detail-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">S</div>
                <span class="logo-text">Skills</span>
            </div>
            <input type="text" class="search-box" id="searchBox" placeholder="搜索技能...">
        </div>
        <div class="card-count" id="cardCount">加载中...</div>
        <div class="skills-list" id="skillsList">
            <div class="loading"><div class="loading-spinner"></div>加载中</div>
        </div>
    </div>
    <div class="detail-panel" id="detailPanel">
        <div class="empty-detail">
            <div class="empty-detail-icon">→</div>
            <div>选择左侧技能查看详情</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let skills = [];
        let currentSkillId = null;

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            if (!text) return "";
            
            console.log("[Markdown] markedLoaded:", window.markedLoaded, "marked:", !!window.marked, "hljs:", typeof hljs);
            
            // 检查marked.js是否已加载并可用
            if (window.markedLoaded === false || !window.marked) {
                console.log("[Markdown] Using fallback parser");
                return '<div data-markdown-parser="fallback">' + fallbackMarkdownParser(text) + '</div>';
            }
            
            try {
                // 使用已配置好的marked.js
                const result = window.marked.parse(text);
                console.log("[Markdown] Result length:", result.length, "Has hljs class:", result.includes('hljs'));
                return '<div data-markdown-parser="marked.js">' + result + '</div>';
            } catch (e) {
                console.error("[Markdown] Error with marked.js:", e);
                return '<div data-markdown-parser="fallback">' + fallbackMarkdownParser(text) + '</div>';
            }
        }
        
        function fallbackMarkdownParser(text) {
            let html = escapeHtml(text);
            // 基础markdown解析
            html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
            html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
            html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");
            html = html.replace(/```[\s\S]*?```/g, function(match) {
                return "<pre><code>" + match.replace(/```/g, "") + "</code></pre>";
            });
            html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
            html = html.replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>");
            html = html.replace(/^\* (.+)$/gm, "<li>$1</li>");
            html = html.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
            html = html.replace(/(<li>.*?<\/li>)+/g, "<ul>$&</ul>");
            html = html.replace(/\n\n/g, "</p><p>");
            html = "<p>" + html + "</p>";
            html = html.replace(/<p><\/p>/g, "");
            return html;
        }

        function renderSkills(filter = "") {
            const listEl = document.getElementById("skillsList");
            const filtered = skills.filter(s => 
                (s.name + " " + (s.description || "")).toLowerCase().includes(filter.toLowerCase())
            );
            
            document.getElementById("cardCount").innerHTML = 
                '共 <span>' + filtered.length + '</span> 个技能';

            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="empty-detail"><div class="empty-detail-icon">?</div><div>未找到匹配的技能</div></div>';
                return;
            }

            listEl.innerHTML = filtered.map(skill => {
                const metaItems = [];
                if (skill.Author) metaItems.push('<span class="meta-tag">' + escapeHtml(skill.Author) + '</span>');
                if (skill.Date) metaItems.push('<span class="meta-tag">' + escapeHtml(skill.Date) + '</span>');
                
                return '<div class="skill-item ' + (skill.id === currentSkillId ? 'active' : '') + '" data-skill-id="' + skill.id + '">' +
                    '<div class="skill-item-header">' +
                        '<div class="skill-item-name">' + escapeHtml(skill.name) + '</div>' +
                        (skill.BusinessSupportVersion ? '<div class="skill-item-version">' + escapeHtml(skill.BusinessSupportVersion) + '</div>' : '') +
                    '</div>' +
                    '<div class="skill-item-desc">' + escapeHtml(skill.description) + '</div>' +
                    '<div class="skill-item-meta">' +
                        '<div class="meta-info">' + (skill.Author ? '<span class="meta-tag">' + escapeHtml(skill.Author) + '</span>' : '') + '</div>' +
                        '<div class="meta-info">' + (skill.Date ? '<span class="meta-tag">' + escapeHtml(skill.Date) + '</span>' : '') + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');

            document.querySelectorAll('.skill-item').forEach(item => {
                item.addEventListener('click', function() {
                    showDetail(this.dataset.skillId);
                });
            });
        }

        async function showDetail(skillId) {
            currentSkillId = skillId;
            renderSkills(document.getElementById("searchBox").value);
            
            const detailPanel = document.getElementById("detailPanel");
            detailPanel.innerHTML = '<div class="loading"><div class="loading-spinner"></div>加载中...</div>';

            try {
                const resp = await fetch(API_BASE + "/api/skill/" + skillId);
                const data = await resp.json();
                
                detailPanel.innerHTML = 
                    '<div class="detail-header">' +
                        '<div class="detail-title-container">' +
                            '<div class="detail-title">' + escapeHtml(data.frontmatter.name || skillId) + '</div>' +
                            (data.frontmatter.BusinessSupportVersion ? '<div class="detail-version">v' + escapeHtml(data.frontmatter.BusinessSupportVersion) + '</div>' : '') +
                        '</div>' +
                        (data.frontmatter.description ? '<div class="detail-description">' + escapeHtml(data.frontmatter.description) + '</div>' : '') +
                        '<div class="detail-meta">' +
                            (data.frontmatter.Author ? '<div class="detail-meta-item"><span>作者</span> ' + escapeHtml(data.frontmatter.Author) + '</div>' : '') +
                            (data.frontmatter.Date ? '<div class="detail-meta-item"><span>创建</span> ' + escapeHtml(data.frontmatter.Date) + '</div>' : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="detail-content">' + renderMarkdown(data.content) + '</div>';
            } catch (e) {
                console.error(e);
                detailPanel.innerHTML = '<div class="error-message">加载失败: ' + e.message + '</div>';
            }
        }

        document.getElementById("searchBox").addEventListener("input", e => renderSkills(e.target.value));

        fetch(API_BASE + "/api/skills")
            .then(r => {
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.json();
            })
            .then(data => {
                skills = data;
                renderSkills();
            })
            .catch(e => {
                console.error("获取失败:", e);
                document.getElementById("skillsList").innerHTML = '<div class="error-message">获取失败: ' + e.message + '</div>';
            });
    </script>
</body>
</html>
