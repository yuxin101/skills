# Platonic Coding Configuration
# See more about project https://github.com/caesar0301/platonic-coding-skills
# Generated by platonic-init on {{DATE}}

project:
  name: "{{PROJECT_NAME}}"
  description: "{{PROJECT_DESCRIPTION}}"
  language: "{{LANGUAGE}}"        # e.g. rust, python, typescript, go, java
  framework: "{{FRAMEWORK}}"     # e.g. tokio, django, nextjs, spring (leave empty if none)

paths:
  specs: "docs/specs"             # Where RFC specifications live
  impl: "docs/impl"              # Where implementation guides live
  drafts: "docs/drafts"          # Where Phase 0 design drafts live

specs:
  numbering: "RFC-NNNN"          # RFC numbering format (NNNN = 4-digit zero-padded)
  stages: []                     # Custom stages, e.g. ["Core", "Storage", "API", "Infra"]
