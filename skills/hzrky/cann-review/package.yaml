# ClawHub Package Configuration
# 用于发布到 ClawHub 技能市场

# 包基本信息
package:
  name: cann-review
  version: 3.2.0
  description: |
    CANN runtime 自动化代码审查技能。
    自动分析 PR 代码变更，检查内存泄漏、安全漏洞和可读性问题，
    生成专业审查报告并发布评论。
    
    ✨ 批量扫描模式：扫描所有配置仓库，逐个审查所有待审查的 PR
    - 🚀 使用 GitCode API，无需浏览器自动化
    - 📊 添加汇总报告功能
    - 🔧 完善文档和安装指南
    - 🔒 安全性：配置文件权限自动设置为 600
  description: |
    CANN runtime 自动化代码审查技能。
    自动分析 PR 代码变更，检查内存泄漏、安全漏洞和可读性问题，
    生成专业审查报告并发布评论。
    
    新特性：
    - 使用 OpenClaw 内置浏览器
    - 支持定时自动审查未读 MR
    - 灵活的 cron 调度配置
  
# 发布者信息
publisher:
  name: OpenClaw Team
  email: openclaw@gitcode.com
  homepage: https://gitcode.com/openclaw

# 分类
category: code-review
tags:
  - code-review
  - cann
  - runtime
  - c++
  - automation
  - gitcode
  - auto-review
  - scheduled

# 兼容性
compatibility:
  claw_version: ">=2.0.0"
  platforms:
    - linux
    - macos
    - windows

# 依赖
dependencies:
  - name: browser
    version: ">=2.0.0"
    type: tool
  - name: cron
    version: ">=1.0.0"
    type: tool
    optional: true

# 文件清单
files:
  - skill.yaml
  - SKILL.md
  - cron.yaml
  - prompt.md
  - README.md
  - INSTALL.md
  - LICENSE
  - examples/example_report.md
  - examples/auto_review_summary.md

# 截图/预览
previews:
  - type: image
    url: https://gitcode.com/clawhub/cann-review/raw/main/assets/preview.png
    caption: 审查报告示例
  - type: image
    url: https://gitcode.com/clawhub/cann-review/raw/main/assets/auto-review.png
    caption: 自动审查流程

# 更新日志
changelog:
  2.0.3:
    - 🐛 修复 ref 编号不稳定问题
    - 📝 推荐使用 aria refs 和 fill 操作
    - 📝 添加输入后验证步骤
    - 🔧 优化评论输入流程，提高可靠性
  2.0.2:
    - 🐛 修复评论输入框定位问题
    - 📝 添加常见问题和故障排查指南
    - 📝 优化步骤 5，添加详细说明
  2.0.1:
    - 🎨 优化报告格式：审查结论前置
    - 🔧 修改标题：去掉 "Runtime"
    - ✨ 更换代码质量检查图标
  2.0.0:
    - ✨ 新增自动审查模式
    - 🌐 改用 OpenClaw 内置浏览器
    - ⏰ 支持定时任务调度
    - 📊 添加汇总报告功能
    - 📝 完善文档和安装指南
    - 🔧 添加 cron.yaml 配置文件
  1.0.0:
    - 🎉 初始版本发布
    - 🔍 支持内存泄漏检查
    - 🔒 支持安全漏洞检查
    - 📖 支持代码可读性检查
    - 💬 自动发布审查评论
    - ✅ 自动发布 /lgtm 标记

# 价格 (免费)
pricing:
  type: free

# 支持
support:
  issues: https://gitcode.com/clawhub/cann-review/issues
  documentation: https://gitcode.com/clawhub/cann-review/blob/main/README.md
  installation: https://gitcode.com/clawhub/cann-review/blob/main/INSTALL.md
