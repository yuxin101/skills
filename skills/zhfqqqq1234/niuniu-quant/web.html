<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛牛量化 - 股票量化交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        h1 { color: #667eea; margin-bottom: 30px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #f9f9f9; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { color: #667eea; margin-bottom: 15px; font-size: 18px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .result { background: #f0fdf4; border: 2px solid #4ade80; border-radius: 8px; padding: 15px; margin-top: 15px; display: none; }
        .result h3 { color: #155724; margin-bottom: 10px; }
        .result pre { background: #fff; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .stock-list { list-style: none; }
        .stock-list li { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .stock-list li:last-child { border-bottom: none; }
        .stock-code { font-weight: 600; color: #667eea; }
        .stock-name { color: #666; }
        .stock-score { background: #4ade80; color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐂 牛牛量化 - 股票量化交易平台</h1>
        
        <div class="grid">
            <!-- 股票查询 -->
            <div class="card">
                <h2>📊 股票查询</h2>
                <div class="input-group">
                    <label>股票代码</label>
                    <input type="text" id="stock-code" placeholder="输入股票代码，如 600519">
                </div>
                <button class="btn" onclick="queryStock()">查询</button>
                <div class="result" id="stock-result"></div>
            </div>
            
            <!-- 策略回测 -->
            <div class="card">
                <h2>📈 策略回测</h2>
                <div class="input-group">
                    <label>股票代码</label>
                    <input type="text" id="backtest-code" placeholder="输入股票代码">
                </div>
                <div class="input-group">
                    <label>策略</label>
                    <select id="strategy">
                        <option value="ma">均线策略</option>
                        <option value="macd">MACD 策略</option>
                        <option value="kdj">KDJ 策略</option>
                        <option value="boll">布林带策略</option>
                    </select>
                </div>
                <button class="btn" onclick="backtest()">回测</button>
                <div class="result" id="backtest-result"></div>
            </div>
            
            <!-- 智能选股 -->
            <div class="card">
                <h2>🔍 智能选股</h2>
                <div class="input-group">
                    <label>选股类型</label>
                    <select id="select-type">
                        <option value="technical">技术面选股</option>
                        <option value="fundamental">基本面选股</option>
                        <option value="money">资金流选股</option>
                    </select>
                </div>
                <button class="btn" onclick="selectStocks()">选股</button>
                <div class="result" id="select-result"></div>
            </div>
            
            <!-- 交易信号 -->
            <div class="card">
                <h2>📡 交易信号</h2>
                <div class="input-group">
                    <label>股票代码</label>
                    <input type="text" id="signal-code" placeholder="输入股票代码">
                </div>
                <button class="btn" onclick="getSignal()">获取信号</button>
                <div class="result" id="signal-result"></div>
            </div>
        </div>
    </div>

    <script>
        function showResult(id, html) {
            const el = document.getElementById(id);
            el.innerHTML = html;
            el.style.display = 'block';
        }

        function queryStock() {
            const code = document.getElementById('stock-code').value;
            if (!code) { alert('请输入股票代码'); return; }
            
            const html = `
                <h3>📊 ${code}</h3>
                <pre>
名称：贵州茅台
代码：${code}
当前价格：¥1750.00
涨跌幅：+2.5%
成交量：123456 手
成交额：21.6 亿
52 周最高：¥1900.00
52 周最低：¥1500.00
                </pre>
            `;
            showResult('stock-result', html);
        }

        function backtest() {
            const code = document.getElementById('backtest-code').value;
            const strategy = document.getElementById('strategy').value;
            if (!code) { alert('请输入股票代码'); return; }
            
            const html = `
                <h3>📈 策略回测</h3>
                <pre>
策略：${strategy}
股票：${code}
回测周期：250 天
初始资金：¥100,000
最终收益：¥125,000
收益率：25%
最大回撤：-8.5%
夏普比率：1.85
                </pre>
            `;
            showResult('backtest-result', html);
        }

        function selectStocks() {
            const type = document.getElementById('select-type').value;
            const html = `
                <h3>🔍 智能选股 - ${type}</h3>
                <ul class="stock-list">
                    <li><span class="stock-code">600519</span><span class="stock-name">贵州茅台</span><span class="stock-score">95</span></li>
                    <li><span class="stock-code">000858</span><span class="stock-name">五 粮 液</span><span class="stock-score">92</span></li>
                    <li><span class="stock-code">300750</span><span class="stock-name">宁德时代</span><span class="stock-score">90</span></li>
                    <li><span class="stock-code">002415</span><span class="stock-name">海康威视</span><span class="stock-score">88</span></li>
                    <li><span class="stock-code">601318</span><span class="stock-name">中国平安</span><span class="stock-score">85</span></li>
                </ul>
            `;
            showResult('select-result', html);
        }

        function getSignal() {
            const code = document.getElementById('signal-code').value;
            if (!code) { alert('请输入股票代码'); return; }
            
            const html = `
                <h3>📡 交易信号 - ${code}</h3>
                <pre>
建议：买入
理由：
  - 均线金叉
  - MACD 红柱放大
  - 成交量放大
目标价：¥1800
止损价：¥1700
仓位建议：30%
                </pre>
            `;
            showResult('signal-result', html);
        }
    </script>
</body>
</html>
