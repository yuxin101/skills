dashboard:
  kpis:
  - key: total_companies
    label: Companies
    type: count
    action: list-companies
    drill_action: list-companies
  - key: total_users
    label: Users
    type: count
    action: list-users
    drill_action: list-users
  - key: total_accounts
    label: Accounts
    type: count
    action: list-accounts
    drill_action: list-accounts
  - key: open_periods
    label: Open Periods
    type: count
    action: list-fiscal-years
    drill_action: list-fiscal-years
  - key: frozen_accounts
    label: Frozen Accounts
    type: count
    action: list-accounts
    filter:
      is-frozen: true
    severity: info
    drill_action: list-accounts
    drill_filter:
      is-frozen: true
  - key: total_journal_entry
    label: Journal Entries
    type: count
    action: list-journal-entries
    drill_action: list-journal-entries
  - key: draft_journal_entry
    label: Draft Journal Entries
    type: count
    action: list-journal-entries
    filter:
      status: draft
    severity: warning
    drill_action: list-journal-entries
    drill_filter:
      status: draft
  - key: total_payments
    label: Payments
    type: count
    action: list-payments
    drill_action: list-payments
  - key: draft_payments
    label: Draft Payments
    type: count
    action: list-payments
    filter:
      status: draft
    severity: warning
    drill_action: list-payments
    drill_filter:
      status: draft
  - key: submitted_payments
    label: Submitted Payments
