action_map:
  setup-company:
    component: FormView
    entity: company
    mode: create
    success_redirect: get-company
    success_toast: Company '{name}' created successfully
  update-company:
    component: FormView
    entity: company
    mode: edit
    success_redirect: get-company
  get-company:
    component: DetailView
    entity: company
  list-companies:
    component: DataTable
    entity: company
    default_sort: name
    searchable: true
    add_action: setup-company
  add-currency:
    component: FormView
    entity: currency
    mode: create
    success_toast: Currency {code} added
  list-currencies:
    component: DataTable
    entity: currency
    default_sort: code
    searchable: true
    add_action: add-currency
  add-exchange-rate:
    component: FormView
    entity: exchange_rate
    mode: create
    success_toast: Exchange rate added for {effective_date}
  get-exchange-rate:
    component: DetailView
    entity: exchange_rate
  list-exchange-rates:
    component: DataTable
    entity: exchange_rate
    default_sort: effective_date
    default_sort_dir: desc
    add_action: add-exchange-rate
  add-payment-terms:
    component: FormView
    entity: payment_terms
    mode: create
    success_toast: Payment terms '{name}' created
  list-payment-terms:
    component: DataTable
    entity: payment_terms
    default_sort: due_days
    searchable: true
    add_action: add-payment-terms
  add-uom:
    component: FormView
    entity: uom
    mode: create
    success_toast: Unit of measure '{name}' added
  list-uoms:
    component: DataTable
    entity: uom
    default_sort: name
    searchable: true
    add_action: add-uom
  add-uom-conversion:
    component: FormView
    entity: uom_conversion
    mode: create
    success_toast: UoM conversion added
  add-user:
    component: FormView
    entity: erp_user
    mode: create
    success_redirect: get-user
    success_toast: User '{username}' created
  update-user:
    component: FormView
    entity: erp_user
    mode: edit
    success_redirect: get-user
  get-user:
    component: DetailView
    entity: erp_user
  list-users:
    component: DataTable
    entity: erp_user
    default_sort: username
    searchable: true
    add_action: add-user
  add-role:
    component: FormView
    entity: role
    mode: create
    success_toast: Role '{name}' created
  list-roles:
    component: DataTable
    entity: role
    default_sort: name
    add_action: add-role
  get-audit-log:
    component: DataTable
    entity: audit_log
    default_sort: timestamp
    default_sort_dir: desc
    searchable: false
  setup-chart-of-accounts:
    component: WizardFlow
    entity: account
    steps:
    - label: Select Template
      fields:
      - name: template
        type: select
        label: Chart of Accounts Template
        required: true
        default: us_gaap
        options:
        - value: us_gaap
          label: US GAAP (Full ~90 accounts)
        - value: us_gaap_simplified
          label: US GAAP Simplified (~40 accounts)
      - name: company_id
        type: link
        label: Company
        required: true
        link_entity: company
        link_display_field: name
        link_search_action: list-companies
    - label: Confirm
