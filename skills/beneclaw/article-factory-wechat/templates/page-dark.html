<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1280px;
      height: auto;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
      background: transparent;
    }
    .page {
      width: 1280px;
      min-height: 720px;
      background: #1a1a2e;
      position: relative;
      padding: 60px;
      box-sizing: border-box;
      border-radius: 16px;
      overflow: hidden;
    }
    /* 装饰性背景 */
    .page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .page-content {
      position: relative;
      z-index: 1;
    }
    .page-title {
      font-size: 36px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 32px;
      line-height: 1.4;
    }
    .page-body {
      font-size: 24px;
      color: #b0b8c1;
      line-height: 1.8;
    }
    .page-body p {
      margin-bottom: 20px;
    }
    .page-body p:last-child {
      margin-bottom: 0;
    }
    /* 强调文本 */
    .highlight {
      color: #8b5cf6;
      font-weight: 500;
    }
    /* 列表样式 */
    .page-body ul {
      margin: 20px 0;
      padding-left: 32px;
    }
    .page-body li {
      margin-bottom: 12px;
    }
    /* 装饰性元素 */
    .page-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #4f46e5, #8b5cf6);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header"></div>
    <div class="page-content">
      <h1 class="page-title">{{title}}</h1>
      <div class="page-body">
        {{content}}
      </div>
    </div>
  </div>
</body>
</html>
