<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1280px;
      height: 544px;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
      background: transparent;
    }
    .cover {
      width: 1280px;
      height: 544px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    /* 装饰性圆点背景 */
    .cover::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      top: -100px;
      left: -100px;
    }
    .cover::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      bottom: -50px;
      right: -50px;
    }
    .title {
      font-size: 48px;
      font-weight: 700;
      color: white;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      z-index: 1;
      line-height: 1.4;
      padding: 0 40px;
    }
    .subtitle {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 20px;
      z-index: 1;
      font-weight: 400;
    }
    .badge {
      position: absolute;
      top: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="badge">{{公众号名称}}</div>
    <div class="title">{{title}}</div>
    {{#if subtitle}}
    <div class="subtitle">{{subtitle}}</div>
    {{/if}}
  </div>
</body>
</html>
