<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1080px;
      height: auto;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
      background: transparent;
    }
    .image-container {
      width: 1080px;
      padding: 40px;
      background: #1a1a2e;
      box-sizing: border-box;
    }
    .content-card {
      background: #16213e;
      padding: 40px 36px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .title {
      font-size: 36px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .content {
      font-size: 26px;
      color: #b0b8c1;
      line-height: 1.7;
    }
    .content p {
      margin-bottom: 16px;
    }
    .content p:last-child {
      margin-bottom: 0;
    }
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 18px;
      color: #6c757d;
      text-align: right;
    }
    /* 装饰性元素 */
    .card-decoration {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #4f46e5, #8b5cf6);
      border-radius: 16px 16px 0 0;
    }
  </style>
</head>
<body>
  <div class="image-container">
    <div class="content-card">
      <div class="card-decoration"></div>
      <h2 class="title">{{title}}</h2>
      <div class="content">
        {{content}}
      </div>
      <div class="footer">
        {{公众号名称}}
      </div>
    </div>
  </div>
</body>
</html>
