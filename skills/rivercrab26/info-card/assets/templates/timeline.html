<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=900">
<title>Timeline Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 1200px;
    overflow: hidden;
    background: $bg_color;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  }

  .card {
    width: 900px;
    height: 1200px;
    background: $bg_color;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 背景装饰 */
  .bg-deco {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .bg-line {
    position: absolute;
    width: 1px;
    height: 100%;
    background: $timeline_line;
    left: 128px;
    opacity: 0.3;
  }
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    border: 2px solid $accent_color;
    opacity: 0.06;
  }
  .bg-circle-1 { top: -80px; right: -60px; width: 300px; height: 300px; }
  .bg-circle-2 { bottom: -40px; left: 200px; width: 200px; height: 200px; opacity: 0.04; }

  /* 顶部品牌栏 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 48px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    border: 1.5px solid $accent_color;
    padding: 5px 12px;
    border-radius: 2px;
  }
  .period-badge {
    font-size: 11px;
    font-weight: 600;
    color: $text_secondary;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.08em;
  }

  /* 标题区 */
  .header {
    padding: 36px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .main-title {
    font-size: 46px;
    font-weight: 900;
    line-height: 1.15;
    color: $title_color;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .title-underline {
    width: 56px;
    height: 4px;
    background: $accent_color;
    border-radius: 2px;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: $text_secondary;
    max-width: 600px;
  }

  /* 分割线 */
  .divider {
    margin: 28px 60px 24px 60px;
    height: 1px;
    background: $divider_color;
    position: relative;
    z-index: 1;
  }

  /* 时间线区域 */
  .timeline-section {
    flex: 1;
    padding: 0 60px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .timeline-item {
    display: flex;
    gap: 24px;
    flex: 1;
    min-height: 0;
    position: relative;
  }
  .timeline-date-col {
    width: 80px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    padding-top: 4px;
  }
  .timeline-date {
    font-size: 13px;
    font-weight: 700;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.02em;
    text-align: right;
    line-height: 1.3;
  }
  .timeline-marker-col {
    width: 24px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .timeline-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: $accent_color;
    flex-shrink: 0;
    margin-top: 6px;
    position: relative;
    z-index: 2;
  }
  .timeline-dot.highlight {
    width: 18px;
    height: 18px;
    margin-top: 4px;
    box-shadow: 0 0 0 4px $dot_glow;
  }
  .timeline-connector {
    flex: 1;
    width: 2px;
    background: $timeline_line;
    margin: 4px 0;
  }
  .timeline-content {
    flex: 1;
    padding-bottom: 8px;
  }
  .timeline-title {
    font-size: 19px;
    font-weight: 700;
    color: $title_color;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .timeline-desc {
    font-size: 14px;
    font-weight: 400;
    color: $text_secondary;
    line-height: 1.55;
  }

  /* 底部 */
  .footer {
    padding: 20px 60px 44px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .footer-text {
    font-size: 12px;
    color: $text_muted;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }
  .footer-brand {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-deco">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
  </div>

  <div class="top-bar">
    <div class="brand-tag">$brand</div>
    <div class="period-badge">$period</div>
  </div>

  <div class="header">
    <div class="main-title">$title</div>
    <div class="title-underline"></div>
    <div class="subtitle">$subtitle</div>
  </div>

  <div class="divider"></div>

  <div class="timeline-section">
    $items_html
  </div>

  <div class="footer">
    <div class="footer-text">$footer_text</div>
    <div class="footer-brand">$brand</div>
  </div>
</div>
</body>
</html>
