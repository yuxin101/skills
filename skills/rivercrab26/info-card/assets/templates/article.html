<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=900">
<title>Article Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 1200px;
    overflow: hidden;
    background: $bg_color;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  }

  .card {
    width: 900px;
    height: 1200px;
    background: $bg_color;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 顶部品牌栏 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 44px 56px 0 56px;
    position: relative;
    z-index: 1;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
  .category-tag {
    font-size: 11px;
    font-weight: 600;
    color: $accent_color;
    background: $tag_bg;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid $tag_border;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }

  /* 标题区 */
  .header {
    padding: 28px 56px 0 56px;
    position: relative;
    z-index: 1;
  }
  .main-title {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.2;
    color: $title_color;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: $text_secondary;
  }

  /* 分割线 */
  .divider {
    margin: 22px 56px 20px 56px;
    height: 1px;
    background: $divider_color;
    position: relative;
    z-index: 1;
  }

  /* 正文区 */
  .content {
    flex: 1;
    padding: 0 56px;
    position: relative;
    z-index: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .section {
    margin-bottom: 0;
    padding: 18px 0;
    border-bottom: 1px solid $divider_color;
  }
  .section:last-child {
    border-bottom: none;
  }
  .section-title {
    font-size: 18px;
    font-weight: 800;
    color: $title_color;
    margin-bottom: 8px;
    padding-left: 14px;
    border-left: 3px solid $accent_color;
    line-height: 1.3;
  }
  .section-text {
    font-size: 15px;
    font-weight: 400;
    color: $text_primary;
    line-height: 1.85;
    text-align: justify;
  }

  /* 底部 */
  .footer {
    padding: 16px 56px 40px 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
    border-top: 1px solid $divider_color;
  }
  .footer-text {
    font-size: 12px;
    color: $text_muted;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }
  .footer-brand {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <div class="brand-tag">$brand</div>
    <div class="category-tag">$category</div>
  </div>

  <div class="header">
    <div class="main-title">$title</div>
    <div class="subtitle">$subtitle</div>
  </div>

  <div class="divider"></div>

  <div class="content">
    $sections_html
  </div>

  <div class="footer">
    <div class="footer-text">$footer_text</div>
    <div class="footer-brand">$brand</div>
  </div>
</div>
</body>
</html>
