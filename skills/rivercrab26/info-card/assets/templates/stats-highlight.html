<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=900">
<title>Stats Highlight Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 1200px;
    overflow: hidden;
    background: $bg_color;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  }

  .card {
    width: 900px;
    height: 1200px;
    background: $bg_color;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 背景装饰 */
  .bg-deco {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    border: 2px solid $accent_color;
    opacity: 0.08;
  }
  .bg-circle-1 { top: -120px; right: -80px; width: 400px; height: 400px; }
  .bg-circle-2 { bottom: -60px; left: -100px; width: 300px; height: 300px; opacity: 0.06; }
  .bg-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient($grid_color 1px, transparent 1px),
      linear-gradient(90deg, $grid_color 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.4;
  }

  /* 顶部品牌栏 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 52px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    border: 1.5px solid $accent_color;
    padding: 5px 12px;
    border-radius: 2px;
  }
  .period-tag {
    font-size: 12px;
    font-weight: 600;
    color: $text_secondary;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }

  /* 标题区 */
  .header {
    padding: 36px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .main-title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.15;
    color: $title_color;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: $text_secondary;
    max-width: 600px;
  }

  /* 主要数据高亮区 */
  .hero-stat {
    margin: 36px 60px 0 60px;
    padding: 36px 40px;
    background: $hero_bg;
    border-radius: 16px;
    border: 1px solid $hero_border;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .hero-number {
    font-size: 96px;
    font-weight: 900;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .hero-arrow {
    display: inline-block;
    font-size: 48px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .hero-arrow.up { color: $up_color; }
  .hero-arrow.down { color: $down_color; }
  .hero-label {
    font-size: 18px;
    font-weight: 500;
    color: $text_secondary;
    margin-top: 12px;
    line-height: 1.5;
  }

  /* 分割线 */
  .divider {
    margin: 32px 60px 28px 60px;
    height: 1px;
    background: $divider_color;
    position: relative;
    z-index: 1;
  }

  /* 次要数据网格 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat($grid_cols, 1fr);
    gap: 16px;
    padding: 0 60px;
    position: relative;
    z-index: 1;
    flex: 1;
  }
  .stat-item {
    background: $stat_bg;
    border-radius: 12px;
    padding: 28px 24px;
    border: 1px solid $stat_border;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .stat-number {
    font-size: 36px;
    font-weight: 800;
    color: $title_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .stat-trend {
    display: inline-block;
    font-size: 14px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }
  .stat-trend.up { color: $up_color; }
  .stat-trend.down { color: $down_color; }
  .stat-label {
    font-size: 14px;
    font-weight: 400;
    color: $text_secondary;
    line-height: 1.4;
  }

  /* 底部 */
  .footer {
    padding: 28px 60px 48px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .footer-text {
    font-size: 12px;
    color: $text_muted;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }
  .footer-brand {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-deco">
    <div class="bg-grid"></div>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
  </div>

  <div class="top-bar">
    <div class="brand-tag">$brand</div>
    <div class="period-tag">$period</div>
  </div>

  <div class="header">
    <div class="main-title">$title</div>
    <div class="subtitle">$subtitle</div>
  </div>

  <div class="hero-stat">
    <div>
      <span class="hero-number">$hero_number</span>
      <span class="hero-arrow $hero_direction">$hero_arrow</span>
    </div>
    <div class="hero-label">$hero_label</div>
  </div>

  <div class="divider"></div>

  <div class="stats-grid">
    $stats_html
  </div>

  <div class="footer">
    <div class="footer-text">$footer_text</div>
    <div class="footer-brand">$brand</div>
  </div>
</div>
</body>
</html>
