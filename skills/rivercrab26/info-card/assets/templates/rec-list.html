<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=900">
<title>Recommendation List Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 1200px;
    overflow: hidden;
    background: $bg_color;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  }

  .card {
    width: 900px;
    height: 1200px;
    background: $bg_color;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 背景装饰 */
  .bg-deco {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .bg-stripe {
    position: absolute;
    width: 260px;
    height: 260px;
    border: 2px solid $accent_color;
    border-radius: 50%;
    opacity: 0.07;
  }
  .bg-stripe-1 { top: -60px; right: -40px; width: 300px; height: 300px; }
  .bg-stripe-2 { bottom: 80px; left: -80px; width: 220px; height: 220px; }

  /* 顶部品牌栏 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 48px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    border: 1.5px solid $accent_color;
    padding: 5px 12px;
    border-radius: 2px;
  }
  .category-tag {
    font-size: 12px;
    font-weight: 600;
    color: $text_secondary;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }

  /* 标题区 */
  .header {
    padding: 36px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .main-title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.15;
    color: $title_color;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: $text_secondary;
    max-width: 600px;
  }

  /* 分割线 */
  .divider {
    margin: 28px 60px 24px 60px;
    height: 1px;
    background: $divider_color;
    position: relative;
    z-index: 1;
  }

  /* 推荐列表 */
  .rec-list {
    flex: 1;
    padding: 0 60px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .rec-item {
    display: flex;
    align-items: center;
    gap: 20px;
    flex: 1;
    border-bottom: 1px solid $divider_color;
    padding: 0 4px;
    min-height: 50px;
  }
  .rec-item:last-child {
    border-bottom: none;
  }
  .rec-rank {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    flex-shrink: 0;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
  .rec-rank.top { background: $accent_color; color: #FFFFFF; }
  .rec-rank.normal { background: $rank_bg; color: $rank_color; }
  .rec-info {
    flex: 1;
    min-width: 0;
  }
  .rec-name {
    font-size: 19px;
    font-weight: 700;
    color: $title_color;
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .rec-desc {
    font-size: 13px;
    font-weight: 400;
    color: $text_secondary;
    line-height: 1.45;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rec-rating {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .rating-score {
    font-size: 22px;
    font-weight: 800;
    color: $rating_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    line-height: 1;
  }
  .rating-stars {
    font-size: 11px;
    color: $rating_color;
    letter-spacing: 1px;
  }

  /* 底部 */
  .footer {
    padding: 20px 60px 44px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .footer-text {
    font-size: 12px;
    color: $text_muted;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }
  .footer-brand {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-deco">
    <div class="bg-stripe bg-stripe-1"></div>
    <div class="bg-stripe bg-stripe-2"></div>
  </div>

  <div class="top-bar">
    <div class="brand-tag">$brand</div>
    <div class="category-tag">$category</div>
  </div>

  <div class="header">
    <div class="main-title">$title</div>
    <div class="subtitle">$subtitle</div>
  </div>

  <div class="divider"></div>

  <div class="rec-list">
    $items_html
  </div>

  <div class="footer">
    <div class="footer-text">$footer_text</div>
    <div class="footer-brand">$brand</div>
  </div>
</div>
</body>
</html>
