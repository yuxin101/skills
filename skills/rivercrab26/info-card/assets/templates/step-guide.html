<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=900">
<title>Step Guide Card</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 1200px;
    overflow: hidden;
    background: $bg_color;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  }

  .card {
    width: 900px;
    height: 1200px;
    background: $bg_color;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 背景装饰 */
  .bg-deco {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .bg-blob {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
    background: $accent_color;
  }
  .bg-blob-1 { top: -100px; right: -50px; width: 350px; height: 350px; }
  .bg-blob-2 { bottom: 100px; left: -80px; width: 250px; height: 250px; opacity: 0.04; }

  /* 顶部品牌栏 */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 48px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .brand-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    border: 1.5px solid $accent_color;
    padding: 5px 12px;
    border-radius: 2px;
  }
  .step-count {
    font-size: 12px;
    font-weight: 600;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.08em;
  }

  /* 标题区 */
  .header {
    padding: 36px 60px 0 60px;
    position: relative;
    z-index: 1;
  }
  .main-title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.15;
    color: $title_color;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .title-underline {
    width: 56px;
    height: 4px;
    background: $accent_color;
    border-radius: 2px;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    color: $text_secondary;
    max-width: 600px;
  }

  /* 分割线 */
  .divider {
    margin: 32px 60px 28px 60px;
    height: 1px;
    background: $divider_color;
    position: relative;
    z-index: 1;
  }

  /* 步骤区 */
  .steps-section {
    flex: 1;
    padding: 0 60px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow: hidden;
  }
  .step-row {
    display: flex;
    align-items: stretch;
    gap: 20px;
    flex: 1;
    min-height: 0;
  }
  .step-number-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 56px;
    flex-shrink: 0;
  }
  .step-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: $accent_color;
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 800;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-line {
    flex: 1;
    width: 2px;
    background: $connector_color;
    margin: 6px 0;
  }
  .step-content {
    flex: 1;
    background: $step_bg;
    border-radius: 14px;
    padding: 22px 26px;
    border: 1px solid $step_border;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .step-title {
    font-size: 20px;
    font-weight: 700;
    color: $title_color;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .step-desc {
    font-size: 14px;
    font-weight: 400;
    color: $text_secondary;
    line-height: 1.55;
  }
  .step-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  /* 底部 */
  .footer {
    padding: 24px 60px 48px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .footer-text {
    font-size: 12px;
    color: $text_muted;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.05em;
  }
  .footer-brand {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: $accent_color;
    font-family: "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-deco">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
  </div>

  <div class="top-bar">
    <div class="brand-tag">$brand</div>
    <div class="step-count">$step_count</div>
  </div>

  <div class="header">
    <div class="main-title">$title</div>
    <div class="title-underline"></div>
    <div class="subtitle">$subtitle</div>
  </div>

  <div class="divider"></div>

  <div class="steps-section">
    $steps_html
  </div>

  <div class="footer">
    <div class="footer-text">$footer_text</div>
    <div class="footer-brand">$brand</div>
  </div>
</div>
</body>
</html>
