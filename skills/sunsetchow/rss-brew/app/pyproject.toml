[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rss-brew"
version = "0.1.0"
description = "RSS-Brew app scaffold (v1 compat phase)"
requires-python = ">=3.10"
dependencies = ["openai>=1.0.0"]

[project.scripts]
rss-brew = "rss_brew.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
