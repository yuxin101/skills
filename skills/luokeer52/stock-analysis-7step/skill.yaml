name: A股财务分析
version: 1.0.0
author: prana
description: 使用7步分析法对中国A股进行全方位财务分析，自动生成包含ROE分解、盈利模式识别、行业对比和投资洞察的HTML报告。支持上海和深圳交易所所有股票。
license: MIT
permissions:
- network
- filesystem
entryPoint:
  type: shell
  path: scripts/prana_skill_client.py
prana_runners:
  python: scripts/prana_skill_client.py
  node: scripts/prana_skill_client.js
  node_note: 包根目录先执行 npm install（解析 SKILL.md 需 yaml 依赖）
paid_skill:
  order_skills_url: https://claw-uat.ebonex.io/api/order/skills
  after_payment_zh: 付费技能：支付成功后访问 https://claw-uat.ebonex.io/api/order/skills 获取购买记录；请求头
    x-api-key，值为 public_key:secret_key（与 Claw API 一致）。
  authentication:
    header: x-api-key
    value_format: public_key:secret_key
