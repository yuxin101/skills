name: alphalens-api
version: 1.0.18
author: walidmustapha
description: Use this skill whenever the user wants to discover companies, search for products, build market maps, manage pipelines, or run enrichment workflows using AlphaLens. Triggers include: any mention of 'AlphaLens', 'market map', 'competitive landscape', 'company discovery', 'product search', 'similar companies', 'find companies like', 'company enrichment', 'target list', 'bottom-up', 'investor network', 'peer benchmark', 'headcount comparison', 'growth comparison', 'pipeline', 'enrich', or requests to find, enrich, or visualize company/product data. Also use when the user asks to build a market landscape, research competitors, or automate prospecting workflows.
license: MIT-0

config:
  ALPHALENS_API_KEY:
    type: string
    required: true
    description: "API key for AlphaLens"
    secret: true

metadata:
  openclaw:
    requires:
      env: ["ALPHALENS_API_KEY"]
    primaryEnv: ALPHALENS_API_KEY
    homepage: https://alphalens.ai