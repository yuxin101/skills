title: BeautsGO 韩国医美预约指南
description: BeautsGO 平台韩国医疗美容机构预约流程，支持中英日泰多语言
baseurl: "/korean-booking"
url: "https://beautsgo.github.io"

# 主题（GitHub Pages 内置，无需安装）
theme: minima

# 不处理 node_modules
exclude:
  - node_modules/
  - scripts/
  - api/
  - core/

# 默认 layout
defaults:
  - scope:
      path: "clinics"
    values:
      layout: default
