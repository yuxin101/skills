# Version Drift — config.yaml
# Copy this file to config.yaml and customize for your infrastructure.
# Delete the sections you don't need. Env vars: use ${VAR_NAME} anywhere.

# ══════════════════════════════════════════════════════════════════════
# EXAMPLE 1: Homelab / Self-Hosted Stack
# ══════════════════════════════════════════════════════════════════════
hosts:
  # Check versions on a remote server via SSH
  - name: "my-server"
    type: "ssh"
    host: "my-server.local"
    user: "root"
    # ssh_key: "~/.ssh/id_rsa"          # optional
    # strict_host_key: "accept-new"     # default: trust-on-first-use (accept-new|yes|no)
    checks:
      - name: "docker"
        installed: "docker --version | grep -oP 'version \\K[^,]+'"
        latest:
          source: "github"
          repo: "moby/moby"

      - name: "nginx"
        installed: "nginx -v 2>&1 | grep -oP '[\\d.]+'"
        latest:
          source: "github"
          repo: "nginx/nginx"

      - name: "postgres"
        installed: "psql --version | grep -oP '[\\d.]+'"
        latest:
          source: "github"
          repo: "postgres/postgres"

  # Check a service with an API (e.g. Home Assistant, Grafana, Gitea)
  - name: "home-assistant"
    type: "http"
    url: "http://homeassistant.local:8123/api/config"
    # verify_ssl: false                  # uncomment for self-signed certs
    headers:
      Authorization: "Bearer ${HA_TOKEN}"
    checks:
      - name: "ha-core"
        installed:
          json_path: "version"
        latest:
          source: "github"
          repo: "home-assistant/core"

  # Check versions on the machine running this script
  - name: "this-machine"
    type: "local"
    checks:
      - name: "python"
        installed: "python3 --version | awk '{print $2}'"
        latest:
          source: "github"
          repo: "python/cpython"

      - name: "node"
        installed: "node -v | tr -d v"
        latest:
          source: "github"
          repo: "nodejs/node"

