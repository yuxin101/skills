<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="25%" style="stop-color:#ffa502"/>
      <stop offset="50%" style="stop-color:#ff6348"/>
      <stop offset="75%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow orbs (solid radial circles, no filter needed) -->
  <circle cx="200" cy="300" r="280" fill="#ff6b6b" opacity="0.04"/>
  <circle cx="200" cy="300" r="200" fill="#ff6b6b" opacity="0.03"/>
  <circle cx="200" cy="300" r="120" fill="#ff6b6b" opacity="0.03"/>
  <circle cx="1080" cy="340" r="320" fill="#ffa502" opacity="0.03"/>
  <circle cx="1080" cy="340" r="220" fill="#ffa502" opacity="0.03"/>
  <circle cx="1080" cy="340" r="140" fill="#ffa502" opacity="0.02"/>
  <circle cx="640" cy="520" r="250" fill="#ff4757" opacity="0.03"/>
  <circle cx="640" cy="520" r="160" fill="#ff4757" opacity="0.02"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.2">
    <circle cx="180" cy="120" r="3" fill="#ff6b6b"/>
    <circle cx="350" cy="80" r="2" fill="#ffa502"/>
    <circle cx="520" cy="150" r="2.5" fill="#ff6348"/>
    <circle cx="760" cy="100" r="2" fill="#ff4757"/>
    <circle cx="950" cy="130" r="3" fill="#ff6b6b"/>
    <circle cx="1100" cy="90" r="2" fill="#ffa502"/>
    <circle cx="200" cy="520" r="2" fill="#ff6348"/>
    <circle cx="400" cy="560" r="3" fill="#ff4757"/>
    <circle cx="880" cy="540" r="2.5" fill="#ff6b6b"/>
    <circle cx="1050" cy="510" r="2" fill="#ffa502"/>
  </g>

  <!-- Accent lines (top-left corner) -->
  <rect x="80" y="60" width="40" height="3" rx="1.5" fill="#ff6b6b" opacity="0.3"/>
  <rect x="80" y="70" width="25" height="3" rx="1.5" fill="#ffa502" opacity="0.2"/>

  <!-- Accent lines (bottom-right corner) -->
  <rect x="1160" y="567" width="40" height="3" rx="1.5" fill="#ff4757" opacity="0.3"/>
  <rect x="1175" y="577" width="25" height="3" rx="1.5" fill="#ffa502" opacity="0.2"/>

  <!-- "nobody" text -->
  <text x="640" y="265" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="130" font-weight="900" letter-spacing="-5" fill="#ffffff" opacity="0.95">nobody</text>

  <!-- "built" text with gradient -->
  <text x="640" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="130" font-weight="900" letter-spacing="-5" fill="url(#glow)">built</text>

  <!-- Underline accent bar -->
  <rect x="370" y="412" width="540" height="5" rx="2.5" fill="url(#glow)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="640" y="475" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#ffffff" opacity="0.5" letter-spacing="4">FIND WHAT NOBODY HAS BUILT YET</text>

  <!-- Bottom platform row -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
    <rect x="295" y="530" width="110" height="30" rx="5" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="350" y="550" opacity="0.4">Claude Code</text>

    <rect x="420" y="530" width="80" height="30" rx="5" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="460" y="550" opacity="0.4">Cursor</text>

    <rect x="515" y="530" width="75" height="30" rx="5" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="552" y="550" opacity="0.4">Codex</text>

    <rect x="605" y="530" width="100" height="30" rx="5" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="655" y="550" opacity="0.4">Gemini CLI</text>

    <rect x="720" y="530" width="100" height="30" rx="5" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="770" y="550" opacity="0.4">OpenClaw</text>

    <rect x="835" y="530" width="90" height="30" rx="5" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="880" y="550" opacity="0.4">Windsurf</text>
  </g>

  <!-- Corner brackets -->
  <g opacity="0.25" stroke="url(#glow)" stroke-width="2" fill="none">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1220,30 1250,30 1250,60"/>
    <polyline points="30,580 30,610 60,610"/>
    <polyline points="1220,610 1250,610 1250,580"/>
  </g>
</svg>
