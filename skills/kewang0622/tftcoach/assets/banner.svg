<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c89b3c"/>
      <stop offset="50%" style="stop-color:#f0e6d2"/>
      <stop offset="100%" style="stop-color:#c89b3c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ac8b9"/>
      <stop offset="100%" style="stop-color:#0397ab"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient -->
  <circle cx="300" cy="320" r="250" fill="#c89b3c" opacity="0.03"/>
  <circle cx="300" cy="320" r="150" fill="#c89b3c" opacity="0.02"/>
  <circle cx="980" cy="320" r="250" fill="#0ac8b9" opacity="0.03"/>
  <circle cx="980" cy="320" r="150" fill="#0ac8b9" opacity="0.02"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- TFT hex grid (subtle) -->
  <g transform="translate(640, 180)" fill="none" stroke="#c89b3c" stroke-width="1" opacity="0.1">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"/>
    <polygon points="52,-30 78,-15 78,15 52,30 26,15 26,-15" transform="translate(0,0)"/>
    <polygon points="-52,-30 -26,-15 -26,15 -52,30 -78,15 -78,-15"/>
    <polygon points="26,15 52,30 52,60 26,75 0,60 0,30"/>
    <polygon points="-26,15 0,30 0,60 -26,75 -52,60 -52,30"/>
  </g>

  <!-- "tft" -->
  <text x="640" y="410" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="140" font-weight="900" letter-spacing="-3" fill="url(#gold)">tft</text>

  <!-- "coach" -->
  <text x="640" y="520" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="100" font-weight="300" letter-spacing="4" fill="url(#blue)">coach</text>

  <!-- Tagline -->
  <text x="640" y="590" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#ffffff" opacity="0.3" letter-spacing="4">YOUR BOARD. YOUR ITEMS. THE PLAY.</text>

  <!-- Corner brackets -->
  <g opacity="0.2" stroke="url(#gold)" stroke-width="2" fill="none">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1220,30 1250,30 1250,60"/>
    <polyline points="30,580 30,610 60,610"/>
    <polyline points="1220,610 1250,610 1250,580"/>
  </g>
</svg>
