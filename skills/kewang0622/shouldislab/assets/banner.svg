<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffcb05"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffcb05"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="250" cy="320" r="250" fill="#ffcb05" opacity="0.04"/>
  <circle cx="250" cy="320" r="150" fill="#ffcb05" opacity="0.03"/>
  <circle cx="1030" cy="320" r="250" fill="#ff0000" opacity="0.03"/>
  <circle cx="1030" cy="320" r="150" fill="#ff0000" opacity="0.02"/>

  <!-- Card slab shape (centered, subtle) -->
  <rect x="540" y="80" width="200" height="300" rx="12" fill="none" stroke="#ffcb05" stroke-width="2" opacity="0.15"/>
  <rect x="555" y="95" width="170" height="230" rx="8" fill="none" stroke="#ffcb05" stroke-width="1" opacity="0.1"/>
  <!-- PSA label area -->
  <rect x="555" y="330" width="170" height="35" rx="4" fill="#ffcb05" opacity="0.08"/>
  <text x="640" y="354" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffcb05" opacity="0.25">PSA 10</text>

  <!-- "should" -->
  <text x="640" y="460" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="80" font-weight="300" letter-spacing="2" fill="#ffffff" opacity="0.6">should i</text>

  <!-- "slab" with gold gradient -->
  <text x="640" y="545" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="110" font-weight="900" letter-spacing="-3" fill="url(#gold)">slab?</text>

  <!-- Tagline -->
  <text x="640" y="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff" opacity="0.4" letter-spacing="3">KNOW BEFORE YOU GRADE</text>

  <!-- Corner brackets -->
  <g opacity="0.2" stroke="url(#gold)" stroke-width="2" fill="none">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1220,30 1250,30 1250,60"/>
    <polyline points="30,580 30,610 60,610"/>
    <polyline points="1220,610 1250,610 1250,580"/>
  </g>
</svg>
