<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00cc6a"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="300" cy="320" r="250" fill="#00ff88" opacity="0.03"/>
  <circle cx="300" cy="320" r="150" fill="#00ff88" opacity="0.02"/>
  <circle cx="980" cy="320" r="250" fill="#b388ff" opacity="0.03"/>
  <circle cx="980" cy="320" r="150" fill="#b388ff" opacity="0.02"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Hint level indicators -->
  <g transform="translate(640, 140)" text-anchor="middle">
    <!-- Hint 1 bar -->
    <rect x="-200" y="0" width="130" height="36" rx="6" fill="#00ff88" opacity="0.15" stroke="#00ff88" stroke-width="1" stroke-opacity="0.3"/>
    <text x="-135" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#00ff88" opacity="0.7">Hint 1: Nudge</text>

    <!-- Hint 2 bar -->
    <rect x="-55" y="0" width="110" height="36" rx="6" fill="#b388ff" opacity="0.1" stroke="#b388ff" stroke-width="1" stroke-opacity="0.2"/>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b388ff" opacity="0.5">Hint 2: Clue</text>

    <!-- Hint 3 bar -->
    <rect x="70" y="0" width="130" height="36" rx="6" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-width="1" stroke-opacity="0.1"/>
    <text x="135" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff" opacity="0.3">Hint 3: Answer</text>
  </g>

  <!-- "hint" -->
  <text x="640" y="310" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="140" font-weight="900" letter-spacing="-5" fill="url(#green)">hint</text>

  <!-- "me" -->
  <text x="640" y="420" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="300" letter-spacing="2" fill="#ffffff" opacity="0.8">me</text>

  <!-- Tagline -->
  <text x="640" y="490" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#ffffff" opacity="0.35" letter-spacing="4">STUCK IN A GAME? GET A HINT, NOT A SPOILER.</text>

  <!-- Bottom badges -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">
    <rect x="370" y="540" width="100" height="28" rx="5" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="420" y="559" opacity="0.35">Any Game</text>

    <rect x="485" y="540" width="120" height="28" rx="5" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="545" y="559" opacity="0.35">Screenshot In</text>

    <rect x="620" y="540" width="100" height="28" rx="5" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="670" y="559" opacity="0.35">3 Hint Levels</text>

    <rect x="735" y="540" width="110" height="28" rx="5" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="790" y="559" opacity="0.35">Zero Spoilers</text>
  </g>

  <!-- Corner brackets -->
  <g opacity="0.2" stroke="url(#green)" stroke-width="2" fill="none">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1220,30 1250,30 1250,60"/>
    <polyline points="30,580 30,610 60,610"/>
    <polyline points="1220,610 1250,610 1250,580"/>
  </g>
</svg>
