<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d1160"/>
      <stop offset="50%" style="stop-color:#17408b"/>
      <stop offset="100%" style="stop-color:#1d1160"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e85d04"/>
      <stop offset="50%" style="stop-color:#f77f00"/>
      <stop offset="100%" style="stop-color:#e85d04"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="320" cy="320" r="250" fill="#e85d04" opacity="0.04"/>
  <circle cx="320" cy="320" r="150" fill="#e85d04" opacity="0.03"/>
  <circle cx="960" cy="320" r="250" fill="#c2185b" opacity="0.03"/>
  <circle cx="960" cy="320" r="150" fill="#c2185b" opacity="0.02"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Basketball outline (subtle) -->
  <circle cx="640" cy="250" r="90" fill="none" stroke="#e85d04" stroke-width="2" opacity="0.15"/>
  <path d="M 550 250 Q 640 200 730 250" fill="none" stroke="#e85d04" stroke-width="1.5" opacity="0.12"/>
  <path d="M 550 250 Q 640 300 730 250" fill="none" stroke="#e85d04" stroke-width="1.5" opacity="0.12"/>
  <line x1="640" y1="160" x2="640" y2="340" stroke="#e85d04" stroke-width="1.5" opacity="0.12"/>

  <!-- "ball" -->
  <text x="640" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="130" font-weight="900" letter-spacing="-4" fill="url(#orange)">ball</text>

  <!-- "talk" -->
  <text x="640" y="540" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="100" font-weight="300" letter-spacing="3" fill="#ffffff" opacity="0.7">talk</text>

  <!-- Tagline -->
  <text x="640" y="600" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#ffffff" opacity="0.3" letter-spacing="4">YOUR AI BASKETBALL BRAIN</text>

  <!-- Corner brackets -->
  <g opacity="0.2" stroke="url(#orange)" stroke-width="2" fill="none">
    <polyline points="30,60 30,30 60,30"/>
    <polyline points="1220,30 1250,30 1250,60"/>
    <polyline points="30,580 30,610 60,610"/>
    <polyline points="1220,610 1250,610 1250,580"/>
  </g>
</svg>
