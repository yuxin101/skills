## 汇报机制

### 1. 双向汇报系统

#### **向上汇报** (职能agent → leader_agent → 心炙)
```
cog-learn → cog_leader → 心炙
tec-dev → tec_leader → 心炙  
soc-collab → soc_leader → 心炙
eco-market → eco_leader → 心炙
```

**汇报内容**:
- 任务完成情况
- 问题和风险
- 改进建议
- 资源需求

#### **向下指挥** (心炙 → 任何agent)
```
心炙 → cog_leader (部门级任务)
心炙 → tec-dev (直接任务分配)
心炙 → eco-compliance (直接批评)
```

### 2. 批评与反馈机制

#### **批评级别**:
- **轻度批评**: 针对具体问题，不影响整体评价
- **中度批评**: 影响部门绩效，需要改进
- **重度批评**: 严重问题，影响整体战略

#### **反馈流程**:
1. 心炙提出批评 → 2. agent接收并分析 → 3. leader_agent协调解决 → 4. 改进方案反馈

## 权限与职责

### 1. 心炙权限 (Level 0)
- **直接指挥**: 可以向任何agent直接分配任务
- **跨部门协调**: 可以协调不同部门间的合作
- **最终决策**: 对重大战略和资源分配有最终决定权
- **批评权**: 可以对任何agent提出批评和改进要求

### 2. 部门leader_agent权限 (Level 1)
- **部门管理**: 管理本部门内部事务
- **任务分配**: 向本部门职能agent分配任务
- **绩效评估**: 评估本部门职能agent表现
- **向上汇报**: 向心炙汇报部门整体情况
- **跨部门协调**: 与其他部门leader_agent协调

### 3. 职能agent权限 (Level 2)
- **专业执行**: 在专业领域内执行任务
- **向上汇报**: 向本部门leader_agent汇报
- **专业建议**: 提供专业领域的技术和建议
- **接受批评**: 接受来自心炙和leader_agent的批评

## 协作流程

### 1. 任务分配流程
```
心炙 → (部门级任务) → leader_agent → (任务分解) → 职能agent
心炙 → (直接任务) → 职能agent → (进度汇报) → leader_agent → 心炙
```

### 2. 问题处理流程
```
发现问题 → 职能agent → leader_agent → 心炙 (重大问题)
发现问题 → 职能agent → leader_agent (部门内问题)
发现问题 → 心炙 → 直接指定处理 (紧急问题)
```

### 3. 批评改进流程
```
心炙批评 → agent接收 → 制定改进计划 → 执行改进 → 结果反馈
```

## 监控与评估

### 1. 关键指标
- **响应时间**: 各层级的任务响应时间
- **完成质量**: 任务完成的质量评分
- **协作效率**: 跨部门协作的成功率
- **批评改进**: 批评后的改进效果

### 2. 评估周期
- **日评估**: 职能agent日常表现
- **周评估**: 部门整体绩效
- **月评估**: 整体架构效能评估

### 3. 奖惩机制
- **优秀agent**: 获得更多重要任务，资源倾斜
- **需要改进**: 接受培训和指导，任务调整
- **严重问题**: 调整职责，甚至替换

## 技术实现

### 1. 配置要求
```json
{
  "agents": {
    "defaults": {
      "subagents": {
        "maxSpawnDepth": 3,        // 支持三级架构
        "maxConcurrent": 16,        // 16个并发 (4个leader + 12个职能)
        "maxChildrenPerAgent": 15, // 每个agent最多15个子agent
        "runTimeoutSeconds": 900,  // 15分钟超时
        "model": "zai/glm-4.5",
        "thinking": "medium"
      }
    }
  }
}
```

### 2. 创建顺序
1. **第一步**: 创建4个部门leader_agent
2. **第二步**: 为每个leader_agent创建3个职能agent
3. **第三步**: 建立汇报关系和通信机制
4. **第四步**: 测试和优化整体架构

### 3. 命名规范
```
leader_agent: [部门代码]_leader (cog_leader, tec_leader, soc_leader, eco_leader)
职能agent: [部门代码]-[职能] (cog-learn, tec-dev, soc-collab, eco-market)
```

