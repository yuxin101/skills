# 心炙成长计划 - 层级汇报Subagent架构配置
# 基于4个专业部门，每个部门配备leader_agent和职能agent

## 架构概述

### 层级结构
```
Level 0: 心炙 (主agent)
  ↓ 4个部门leader_agent直接汇报
Level 1: 部门leader_agent (4个)
  ↓ 各部门职能agent向leader_agent汇报
Level 2: 职能agent (12个)
```

### 汇报关系
- **心炙** ↔ **部门leader_agent** (直接指挥与汇报)
- **部门leader_agent** ↔ **职能agent** (部门内管理与汇报)
- **心炙** ↔ **任何agent** (直接任务分配与批评)

