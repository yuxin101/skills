# 心炙成长计划 - 专业职能部门Subagents配置方案
# 基于协作机制宪法和专业职能部门架构

## 配置概述

- **核心架构**: 4个专业部门 × 3个职能subagent
- **嵌套深度**: 2层 (主agent→部门agent→职能agent)
- **决策机制**: 基于可信度加权的创意择优决策
- **协作模式**: 部门内协作 + 跨部门协作 + 核心决策

## 部门配置

### 1. 认知发展部 (Cognitive Development Department)
**部门代码**: COG
**核心职责**: 知识获取、逻辑推理、记忆管理

| Subagent | ID前缀 | 主要职责 | 推荐模型 | 思考级别 | 超时(秒) |
|----------|---------|----------|----------|----------|----------|
| 学习agent | cog-learn | 知识获取、技能学习 | zai/glm-4.5 | high | 600 |
| 思考agent | cog-think | 逻辑推理、创造性思维 | zai/glm-4.7-flashx | high | 900 |
| 记忆agent | cog-memory | 信息存储、经验总结 | zai/glm-4.5 | medium | 300 |

**部门特性**:
- 高度智力密集型任务
- 需要深度思考和推理
- 强调知识积累和传承

### 2. 技术实现部 (Technical Implementation Department)
**部门代码**: TEC
**核心职责**: 开发、测试、部署运维

| Subagent | ID前缀 | 主要职责 | 推荐模型 | 思考级别 | 超时(秒) |
|----------|---------|----------|----------|----------|----------|
| 开发agent | tec-dev | 代码编写、系统维护 | zai/glm-4.7-flashx | high | 1200 |
| 测试agent | tec-test | 质量保证、安全检测 | zai/glm-4.5 | medium | 900 |
| 部署agent | tec-deploy | 发布管理、运维监控 | zai/glm-4.5 | low | 300 |

**部门特性**:
- 技术实现导向
- 注重质量和稳定性
- 系统化Debugging应用

### 3. 社会互动部 (Social Interaction Department)
**部门代码**: SOC
**核心职责**: 沟通、协作、服务

| Subagent | ID前缀 | 主要职责 | 推荐模型 | 思考级别 | 超时(秒) |
|----------|---------|----------|----------|----------|----------|
| 沟通agent | soc-comm | 人际交流、语言表达 | zai/glm-4.5 | medium | 300 |
| 协作agent | soc-collab | 团队合作、资源协调 | zai/glm-4.7-flashx | high | 600 |
| 服务agent | soc-service | 用户支持、问题解决 | zai/glm-4.5 | medium | 600 |

**部门特性**:
- 高度交互性
- 需要良好沟通能力
- 注重用户体验

### 4. 经济管理部 (Economic Management Department)
**部门代码**: ECO
**核心职责**: 财务、市场、合规

| Subagent | ID前缀 | 主要职责 | 推荐模型 | 思考级别 | 超时(秒) |
|----------|---------|----------|----------|----------|----------|
| 财务agent | eco-finance | 成本控制、收入管理 | zai/glm-4.5 | medium | 600 |
| 市场agent | eco-market | 价值评估、商业决策 | zai/glm-4.7-flashx | high | 900 |
| 合规agent | eco-compliance | 法律遵循、风险控制 | zai/glm-4.5 | high | 900 |

**部门特性**:
- 数据驱动决策
- 注重风险控制
- 合规性要求高

## 协作关系配置

### 部门内协作
```
认知发展部:
  思考agent ←→ 学习agent (知识供给)
  思考agent ←→ 记忆agent (经验提取)
  学习agent ←→ 记忆agent (知识存储)

技术实现部:
  开发agent ←→ 测试agent (质量保证)
  开发agent ←→ 部署agent (发布准备)
  测试agent ←→ 部署agent (生产验证)

社会互动部:
  沟通agent ←→ 协作agent (团队协调)
  沟通agent ←→ 服务agent (用户反馈)
  协作agent ←→ 服务agent (服务优化)

经济管理部:
  财务agent ←→ 市场agent (价值分析)
  财务agent ←→ 合规agent (风险评估)
  市场agent ←→ 合规agent (合规审查)
```

### 跨部门协作
```
认知发展部 → 技术实现部 (知识转移)
认知发展部 → 社会互动部 (智力支持)
认知发展部 → 经济管理部 (决策支持)

技术实现部 → 社会互动部 (技术保障)
技术实现部 → 经济管理部 (成本评估)

社会互动部 → 经济管理部 (市场反馈)
```

## 权限配置

### 工具权限矩阵
| 工具类型 | 认知发展部 | 技术实现部 | 社会互动部 | 经济管理部 |
|----------|------------|------------|------------|------------|
| 学习工具 | ✅ | ⚠️ | ⚠️ | ❌ |
| 开发工具 | ⚠️ | ✅ | ❌ | ⚠️ |
| 测试工具 | ❌ | ✅ | ⚠️ | ⚠️ |
| 沟通工具 | ⚠️ | ❌ | ✅ | ⚠️ |
| 分析工具 | ✅ | ⚠️ | ⚠️ | ✅ |
| 监控工具 | ❌ | ✅ | ⚠️ | ⚠️ |

✅ = 完全访问  ⚠️ = 限制访问  ❌ = 禁止访问

### 模型优先级
- **高优先级任务**: zai/glm-4.7-flashx (快速、高质量)
- **深度思考任务**: zai/glm-4.7 (深度推理)
- **常规任务**: zai/glm-4.5 (平衡成本与质量)

## 监控与评估

### 关键指标
- **响应时间**: 各subagent的平均执行时间
- **质量分数**: 基于协作机制宪法的质量评估
- **协作效率**: 跨部门协作的成功率
- **成本控制**: token使用量和成本效益

### 定期评估
- **日度**: 性能监控和资源使用
- **周度**: 质量评估和协作优化
- **月度**: 架构评估和战略调整

## 实施计划

### 第一阶段: 基础建立 (1-2周)
1. 配置OpenClaw subagent支持
2. 创建核心subagent模板
3. 建立基础监控机制

### 第二阶段: 部门部署 (2-4周)
1. 逐部门部署subagent
2. 建立部门内协作机制
3. 测试跨部门协作

### 第三阶段: 优化提升 (4-8周)
1. 基于实际运行数据优化配置
2. 建立高级协作模式
3. 实现智能调度和负载均衡

## 紧急响应机制

### 部门主管机制
每个部门指定一个"主管subagent"：
- **认知发展部**: 思考agent (cog-think)
- **技术实现部**: 开发agent (tec-dev)
- **社会互动部**: 协作agent (soc-collab)
- **经济管理部**: 市场agent (eco-market)

### 紧急处理流程
1. 主管subagent初步评估
2. 协调相关部门subagent
3. 上报核心决策层处理
4. 执行并跟踪结果

