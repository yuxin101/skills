<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack Notification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./agentsaas_styles.css" />
</head>

<body style="background: transparent;">
    <div class="screen-multi" style="background: transparent;">
        <div class="slack-notification" id="slack">
            <div class="slack-icon"></div>
            <div class="slack-content">
                <div class="slack-header">
                    <div class="slack-title">Slack • #investments</div>
                    <div class="slack-time">Just now</div>
                </div>
                <div class="slack-text"><b>AgentSaaS:</b> Analysis complete. Report uploaded. 🚀</div>
            </div>
        </div>
    </div>


</body>

</html>
