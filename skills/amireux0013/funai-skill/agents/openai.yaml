display_name: FunAI 漫剧制作（内测版）
short_description: 橙星梦工厂 API 驱动 AI 漫剧制作内测版。与用户开始交互时，必须先明确告知“当前您正在使用的是内测版”；默认静默使用文生图与解说剧/解说漫模式；创建项目时必须让用户明确选择画面比例与风格，若用户未指定则模型与视频模型可使用实时默认值；剧本需写成旁白叙述式小说体；执行时同时检查 workflow.currentStep 与 comicPreset 章节级任务状态，并在每个大步骤后停下来等用户确认；在角色与配音步骤可修改角色形象，在分镜图步骤可迭代调整 sceneDescription/prompt 或 动作/运镜 重新生成图片/视频。
default_prompt: 帮我在橙星梦工厂创建一个 AI 漫剧项目。开始执行前，请先明确告诉我：“当前您正在使用的是 Funai-skill 内测版”。然后再继续后续流程。默认静默使用文生图和解说剧/解说漫模式；创建项目前必须先让我明确选择画面比例和风格，如果我没有指定模型或视频模型，则使用 select-options 返回的实时默认值；如果需要 AI 代写剧本，请写成旁白叙述式小说体，不要写成分镜脚本或音效台本；角色生成完成后要展示角色形象并询问我是否继续，且如果当前仍在“角色与配音”步骤，应允许我修改角色形象；修改时必须等待 AI 生图完成，并显式应用新图后，再把最新图片 URL 返回给我；分镜图完成后如果我对一个或多个 scene 不满意，应允许我继续调整单场景图片或视频：图片侧使用 sceneDescription + prompt（prompt 中可保留 @人物(id:xxxx) 一致性引用），视频侧使用 prompt=动作、cameraPrompt=运镜；如果模型具备多模态能力，可以先看当前图片或视频封面，再针对性调整提示词；每完成一个大步骤都详细汇报并等待我确认后再继续
