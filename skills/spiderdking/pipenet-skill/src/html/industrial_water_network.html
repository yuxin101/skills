    <body>
        <div class="card" style="width: 100%">

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#3498db", "computed_pressure": 200.0, "id": "pump_station", "label": "pump_station", "pressure_set": 200.0, "shape": "box", "size": 10, "title": "\u003cb\u003epump_station\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u6cf5\u7ad9\u003cbr\u003e\u8bbe\u5b9a\u538b\u529b: 200.0 MPa\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 200.00 MPa", "type": "source"}, {"color": "#95a5a6", "computed_pressure": 133.875, "id": "junction_main", "label": "junction_main", "shape": "dot", "size": 10, "title": "\u003cb\u003ejunction_main\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u4e09\u901a\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 133.88 MPa", "type": "junction"}, {"color": "#2ecc71", "computed_pressure": 130.67499999999984, "demand": 2.0, "id": "load_high_pressure", "label": "load_high_pressure", "shape": "diamond", "size": 10, "title": "\u003cb\u003eload_high_pressure\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u8d1f\u8f7d\u003cbr\u003e\u9700\u6c42\u6d41\u91cf: 2.0\u003cbr\u003e\u9700\u6c42\u538b\u529b: 7.0\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 130.67 MPa", "type": "load"}, {"color": "#95a5a6", "computed_pressure": 25.574999999998443, "id": "junction_branch", "label": "junction_branch", "shape": "dot", "size": 10, "title": "\u003cb\u003ejunction_branch\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u4e09\u901a\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 25.57 MPa", "type": "junction"}, {"color": "#2ecc71", "computed_pressure": 12.074999999987185, "demand": 3.0, "id": "load_mid_process", "label": "load_mid_process", "shape": "diamond", "size": 10, "title": "\u003cb\u003eload_mid_process\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u8d1f\u8f7d\u003cbr\u003e\u9700\u6c42\u6d41\u91cf: 3.0\u003cbr\u003e\u9700\u6c42\u538b\u529b: 5.0\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 12.07 MPa", "type": "load"}, {"color": "#e74c3c", "computed_pressure": -6.424999999983772, "demand": 4.0, "id": "load_cooling", "label": "load_cooling", "shape": "diamond", "size": 10, "title": "\u003cb\u003eload_cooling\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u8d1f\u8f7d\u003cbr\u003e\u9700\u6c42\u6d41\u91cf: 4.0\u003cbr\u003e\u9700\u6c42\u538b\u529b: 4.0\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: -6.42 MPa", "type": "load"}, {"color": "#2ecc71", "computed_pressure": 19.950000000030613, "demand": 1.5, "id": "load_fire_suppression", "label": "load_fire_suppression", "shape": "diamond", "size": 10, "title": "\u003cb\u003eload_fire_suppression\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u8d1f\u8f7d\u003cbr\u003e\u9700\u6c42\u6d41\u91cf: 1.5\u003cbr\u003e\u9700\u6c42\u538b\u529b: 3.0\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 19.95 MPa", "type": "load"}, {"color": "#2ecc71", "computed_pressure": 23.774999999998734, "demand": 1.0, "id": "temp_load", "label": "temp_load", "shape": "diamond", "size": 10, "title": "\u003cb\u003etemp_load\u003c/b\u003e\u003cbr\u003e\u7c7b\u578b: \u8d1f\u8f7d\u003cbr\u003e\u9700\u6c42\u6d41\u91cf: 1.0\u003cbr\u003e\u9700\u6c42\u538b\u529b: 4.0\u003cbr\u003e\u8ba1\u7b97\u538b\u529b: 23.77 MPa", "type": "load"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "green", "computed_flow": 11.5, "from": "pump_station", "is_open": true, "label": "pipe_main\n(R=0.5)", "resistance": 0.5, "title": "\u7ba1\u9053: pipe_main\u003cbr\u003e\u6d41\u963b: 0.5\u003cbr\u003e\u6d41\u91cf: 11.50\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "junction_main", "width": 1}, {"arrows": "to", "color": "green", "computed_flow": 2.0000000000000497, "from": "junction_main", "is_open": true, "label": "pipe_to_high_pressure\n(R=0.8)", "resistance": 0.8, "title": "\u7ba1\u9053: pipe_to_high_pressure\u003cbr\u003e\u6d41\u963b: 0.8\u003cbr\u003e\u6d41\u91cf: 2.00\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "load_high_pressure", "width": 1}, {"arrows": "to", "color": "green", "computed_flow": 9.50000000000007, "from": "junction_main", "is_open": true, "label": "pipe_to_branch\n(R=1.2)", "resistance": 1.2, "title": "\u7ba1\u9053: pipe_to_branch\u003cbr\u003e\u6d41\u963b: 1.2\u003cbr\u003e\u6d41\u91cf: 9.50\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "junction_branch", "width": 1}, {"arrows": "to", "color": "green", "computed_flow": 3.000000000001251, "from": "junction_branch", "is_open": true, "label": "pipe_to_process\n(R=1.5)", "resistance": 1.5, "title": "\u7ba1\u9053: pipe_to_process\u003cbr\u003e\u6d41\u963b: 1.5\u003cbr\u003e\u6d41\u91cf: 3.00\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "load_mid_process", "width": 1}, {"arrows": "to", "color": "green", "computed_flow": 3.9999999999988884, "from": "junction_branch", "is_open": true, "label": "pipe_to_cooling\n(R=2.0)", "resistance": 2.0, "title": "\u7ba1\u9053: pipe_to_cooling\u003cbr\u003e\u6d41\u963b: 2.0\u003cbr\u003e\u6d41\u91cf: 4.00\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "load_cooling", "width": 1}, {"arrows": "to", "color": "green", "computed_flow": 1.4999999999957108, "from": "junction_branch", "is_open": true, "label": "pipe_to_fire\n(R=2.5)", "resistance": 2.5, "title": "\u7ba1\u9053: pipe_to_fire\u003cbr\u003e\u6d41\u963b: 2.5\u003cbr\u003e\u6d41\u91cf: 1.50\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "load_fire_suppression", "width": 1}, {"arrows": "to", "color": "green", "computed_flow": 0.9999999999999193, "from": "junction_branch", "is_open": true, "label": "temp_pipe\n(R=1.8)", "resistance": 1.8, "title": "\u7ba1\u9053: temp_pipe\u003cbr\u003e\u6d41\u963b: 1.8\u003cbr\u003e\u6d41\u91cf: 1.00\u003cbr\u003e\u72b6\u6001: \u5f00\u542f", "to": "temp_load", "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -2000,
            "springConstant": 0.001,
            "springLength": 100
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
