title: Intent Security Agent
description: Autonomous agent with intent validation, security monitoring, and continuous learning
baseurl: "/self-improving-intent-security-agent"
url: "https://nishantapatil3.github.io"

# Theme
remote_theme: just-the-docs/just-the-docs

# Just the Docs theme configuration
search_enabled: true
heading_anchors: true

# Navigation structure
nav_order: 1

# Aux links for the upper right navigation
aux_links:
  "View on GitHub":
    - "https://github.com/nishantapatil3/self-improving-intent-security-agent"

# Footer
footer_content: "Copyright &copy; 2025. Released under the MIT License."

# Color scheme
color_scheme: nil

# Enable copy button on code blocks
enable_copy_code_button: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-relative-links

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Exclude from processing
exclude:
  - node_modules/
  - .agent/
  - scripts/
  - Gemfile
  - Gemfile.lock
  - vendor/
