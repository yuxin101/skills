# T+0 基金监控配置 - 健壮版

# 监控配置
monitor:
  interval: 120          # 检查间隔（秒）
  fast_mode: true       # 启用快速模式（更早信号）
  max_retries: 3        # 最大重试次数
  retry_delay: 1        # 重试延迟（秒）
  market_hours:
    start: "09:30"
    end: "15:00"
    noon_break:
      start: "11:30"
      end: "13:00"

# 技术指标参数
indicators:
  macd:
    fast: 12
    slow: 26
    signal: 9
  kdj:
    n: 9
    m1: 3
    m2: 3
  rsi:
    period: 14

# 信号阈值
signals:
  buy:
    kdj_max: 20        # 标准模式
    kdj_early: 30      # 快速模式
    volume_ratio: 1.2
  sell:
    kdj_min: 80
  stop_loss: 2
  take_profit: 3

# 通知配置
notify:
  dingtalk:
    enabled: false
    webhook: ""
  wechat:
    enabled: false
    key: ""
  terminal:
    enabled: true
    sound: true

# 日志配置
logging:
  level: INFO
  max_bytes: 10485760   # 10MB
  backup_count: 5
