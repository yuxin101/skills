# Academic Literature Search - Configuration Example
# Copy this file to config.yaml and modify the settings

# ===================
# API Configuration
# ===================
apis:
  semantic_scholar:
    enabled: true
    # Get API key: https://www.semanticscholar.org/product/api
    api_key: ""  # Or set via SEMANTIC_SCHOLAR_API_KEY env
  
  crossref:
    enabled: true
    # Provide email for polite use
    email: "openclaw@example.com"  # Or set via CROSSREF_API_EMAIL env
  
  pubmed:
    enabled: true
    # Get API key: https://www.ncbi.nlm.nih.gov/account/
    api_key: ""  # Or set via PUBMED_API_KEY env
  
  arxiv:
    enabled: true

# ===================
# Search Configuration
# ===================
search:
  default_max_results: 50
  default_databases:
    - semantic_scholar
    - crossref
  timeout_per_database: 10
  max_total_results: 1000
  
  # Sort settings
  sort_by: "relevance"  # relevance, citations, year, influential
  sort_order: "desc"    # asc, desc
  
  # Filter settings
  default_filters:
    open_access_only: false
    min_citations: 0
    peer_reviewed_only: false

# ===================
# Cache Configuration
# ===================
cache:
  enabled: true
  memory_cache_size: 1000
  memory_cache_ttl: 300    # 5 minutes
  disk_cache_size: 10000
  disk_cache_ttl: 3600     # 1 hour
  cache_dir: "~/.cache/openclaw/literature"

# ===================
# Output Configuration
# ===================
output:
  default_format: "markdown"
  auto_save: false
  save_directory: "./literature_search_results"
  
  # Markdown output settings
  markdown:
    include_statistics: true
    include_abstract: true
    abstract_max_length: 200
    include_keywords: false
    include_links: true
  
  # CSV output settings
  csv:
    encoding: "utf-8-sig"
    delimiter: ","
  
  # BibTeX output settings
  bibtex:
    max_authors: 10
    include_abstract: false

# ===================
# Network Configuration
# ===================
network:
  timeout: 30
  max_retries: 3
  proxy: ""  # e.g., http://proxy.example.com:8080
  user_agent: "OpenClawLiteratureSearch/2.0.0"

# ===================
# Advanced Features
# ===================
advanced:
  query_expansion: true
  spell_check: true
  deduplication_level: "strict"  # none, basic, strict, aggressive
  
  # Query expansion options
  query_expansion_options:
    use_wordnet: false
    use_acronyms: true
    use_related_terms: true

# ===================
# Monitoring Configuration
# ===================
monitoring:
  enabled: true
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "literature_search.log"
  performance_tracking: true
