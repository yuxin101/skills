---
# 选型配置规则
---

law:
  id: law_linkage_rule
  name: 联动规则(强条)
  domain: 选型规则
  statement: IF 项目要求报警后自动切断气源 THEN 必须选型带联动输出功能的探测器 + 配套电磁式燃气紧急切断阀
  conditions:
    - 项目要求报警后自动切断气源
  effects:
    - 探测器的联动输出类型(如12V脉冲)必须与切断阀驱动类型完全匹配
    - 接头规格需完全匹配
    - 切断阀公称尺寸需与燃气管道管径匹配
  source: 知识库-家用可燃气体探测器 R1
  confidence: CONFIRMED

law:
  id: law_network_rule
  name: 联网规则(推荐)
  domain: 选型规则
  statement: IF 用户有远程报警需求或项目为集中管理 THEN 推荐选型带NB-IoT/4G-CAT1通讯功能的探测器
  conditions:
    - 用户有远程报警需求
    - 项目为集中管理
  effects:
    - 确认项目所在区域的NB-IoT/4G网络覆盖情况
    - 确认通讯费是否包含在设备价格内
  source: 知识库-家用可燃气体探测器 R2
  confidence: CONFIRMED

law:
  id: law_environment_rule
  name: 环境材质规则(阻断)
  domain: 选型规则
  statement: IF 安装环境为高油污或高湿度 THEN 锁定激光原理或半导体式带过滤膜
  conditions:
    - 安装环境为高油污(如厨房爆炒)
    - 安装环境为高湿度(如南方潮湿地区)
  effects:
    - 半导体传感器在重油污环境下易误报，必须加装过滤膜
    - 激光原理抗干扰能力最强
  source: 知识库-家用可燃气体探测器 R3
  confidence: CONFIRMED

law:
  id: law_high_building_rule
  name: 超高层强制规则
  domain: 选型规则
  statement: 建筑高度大于100m时，用气场所应设置燃气泄漏报警装置，并在燃气引入管处设置紧急自动切断装置
  regulation: GB55009-2021 6.1.5条
  effects:
    - 必须具备4G-CAT1通讯能力
    - 需采用激光、催化等测量范围大的报警器
    - 支持多级报警
  source: GB55009-2021
  confidence: CONFIRMED
