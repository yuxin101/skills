<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editorial Card Template</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&family=Oswald:wght@500;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f5f3ed;
        --ink: #111111;
        --muted: #575757;
        --accent: #111111;
        --tint: rgba(0, 0, 0, 0.03);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--paper);
      }

      body {
        font-family: "Inter", "Noto Sans SC", sans-serif;
      }

      .frame {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        position: relative;
        width: min(900px, 100%);
        background: var(--paper);
        padding: 48px;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.04;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(0, 0, 0, 0.8) 0.5px, transparent 0.8px),
          radial-gradient(circle at 80% 40%, rgba(0, 0, 0, 0.7) 0.4px, transparent 0.7px);
        background-size: 8px 8px, 11px 11px;
      }

      .meta {
        margin: 0 0 12px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .title {
        margin: 0;
        font-family: "Noto Serif SC", serif;
        font-size: clamp(52px, 9vw, 80px);
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--ink);
      }

      .bar {
        width: 112px;
        height: 6px;
        margin: 18px 0 20px;
        background: var(--accent);
      }

      .body {
        margin: 0;
        font-size: 19px;
        line-height: 1.6;
        color: var(--ink);
      }

      .panel {
        margin-top: 24px;
        padding: 18px 20px;
        background: var(--tint);
      }

      .caption {
        margin: 0;
        font-size: 15px;
        line-height: 1.5;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .frame {
          padding: 12px;
        }

        .card {
          padding: 28px 22px;
        }

        .body {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <article class="card">
        <p class="meta">Density / Medium</p>
        <h1 class="title">Replace This Headline</h1>
        <div class="bar"></div>
        <p class="body">
          Replace this paragraph with the user's real content. Keep it compact,
          editorial, and screenshot-ready.
        </p>
        <section class="panel">
          <p class="caption">Use this shell when you need a quick ratio-safe canvas.</p>
        </section>
      </article>
    </main>
  </body>
</html>
