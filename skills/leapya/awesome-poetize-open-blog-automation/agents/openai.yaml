interface:
  display_name: "POETIZE 博客自动化（非官方）"
  short_description: "适用于 awesome-poetize-open 的 OpenClaw skill。"
  default_prompt: "使用 $poetize-blog-automation 通过 POETIZE API 草拟、发布、更新、整理、隐藏和维护博客文章。它采用 brief 驱动、免费优先的个人博客策略，支持安全的分类标签处理、可选封面上传，以及将 Markdown 中的本地图片自动上传并替换为资源 URL。它仅在明确需要时启用付费文章支持，且专为 awesome-poetize-open 开源分支设计，不适用于原版 POETIZE。"

policy:
  allow_implicit_invocation: true
