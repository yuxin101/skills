<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记封面 - 文案 1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 3/4;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 40px;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .emoji {
      font-size: 48px;
      margin-bottom: 30px;
    }
    
    .text {
      font-size: 42px;
      font-weight: 700;
      line-height: 1.7;
      text-align: center;
      color: #1a1a2e;
    }
    
    .highlight {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 16px;
      border-radius: 12px;
      margin: 0 4px;
    }
    
    .guide {
      margin-top: 40px;
      font-size: 28px;
      color: #667eea;
      font-weight: 600;
      background: rgba(102, 126, 234, 0.1);
      padding: 12px 24px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🤖</div>
    <div class="text">
      <span class="highlight">OpenClaw</span>、<span class="highlight">WorkBuddy</span>、<span class="highlight">Deer-Flow2</span>、<span class="highlight">Qclaw</span><br>到底选哪个？
    </div>
    <div class="guide">求用过的大佬说说！</div>
  </div>
</body>
</html>
