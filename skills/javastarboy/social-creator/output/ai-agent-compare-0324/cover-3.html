<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记封面 - 文案 3</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 3/4;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 40px;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }
    
    .emoji {
      font-size: 48px;
      margin-bottom: 30px;
    }
    
    .text {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.7;
      text-align: center;
      color: #1a1a2e;
    }
    
    .highlight {
      display: inline-block;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 4px 16px;
      border-radius: 12px;
      margin: 0 4px;
    }
    
    .subtext {
      font-size: 30px;
      color: #666;
      margin-top: 24px;
      font-weight: 500;
    }
    
    .guide {
      margin-top: 40px;
      font-size: 32px;
      color: #f5576c;
      font-weight: 700;
      background: rgba(245, 87, 108, 0.1);
      padding: 14px 28px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">😫</div>
    <div class="text">
      纠结症犯了！<br><span class="highlight">OpenClaw</span><span class="highlight">WorkBuddy</span><br><span class="highlight">Deer-Flow2</span><span class="highlight">Qclaw</span>
    </div>
    <div class="subtext">有没有人说说各自优缺点</div>
    <div class="guide">在线等！急！</div>
  </div>
</body>
</html>
