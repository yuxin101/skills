<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记封面 - 文案 2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 3/4;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 40px;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    
    .emoji {
      font-size: 48px;
      margin-bottom: 30px;
    }
    
    .text {
      font-size: 38px;
      font-weight: 700;
      line-height: 1.8;
      text-align: center;
      color: #1a1a2e;
    }
    
    .highlight {
      display: inline-block;
      background: #1a1a2e;
      color: white;
      padding: 4px 14px;
      border-radius: 10px;
      margin: 2px;
      font-size: 32px;
    }
    
    .subtext {
      font-size: 32px;
      color: #666;
      margin-top: 20px;
      font-weight: 500;
    }
    
    .guide {
      margin-top: 40px;
      font-size: 28px;
      color: #1a1a2e;
      font-weight: 600;
      background: rgba(26, 26, 46, 0.08);
      padding: 12px 24px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">💻</div>
    <div class="text">
      <span class="highlight">OpenClaw</span><span class="highlight">WorkBuddy</span><span class="highlight">Deer-Flow2</span><span class="highlight">Qclaw</span>
    </div>
    <div class="subtext">哪个上手最快？<br>哪个功能最实用？</div>
    <div class="guide">评论区聊聊真实体验！</div>
  </div>
</body>
</html>
