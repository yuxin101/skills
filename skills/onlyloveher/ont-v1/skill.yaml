name: ontology
version: 1.0.0
description: 类型化知识图谱，结构化代理记忆，实体关系管理
author: clawd
homepage: https://clawhub.com/skills/ontology

triggers:
  - 知识图谱
  - 实体管理
  - 关系链接
  - 图谱查询
  - ontology
  - 知识管理
  - 实体关联
