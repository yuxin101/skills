name: trading-quant
version: 1.0.0
description: 量化交易数据分析工具。A股/美股/港股/贵金属实时行情，多维度评分(技术面+资金面+基本面)，涨跌停池，北向资金，分钟级资金流。
author: clawd
homepage: https://clawhub.com/skills/trading-quant

triggers:
  - 股票行情
  - 股票分析
  - A股行情
  - 美股行情
  - 港股行情
  - 北向资金
  - 涨跌停
  - 量化分析
  - stock analysis
  - trading quant

config:
  DB_PATH:
    type: string
    default: ~/clawd/data/stocks.db
    description: 股票数据数据库路径

features:
  - 多维度股票评分(技术面+资金面+基本面)
  - A股/美股/港股/贵金属实时行情
  - 涨跌停池分析
  - 北向资金流向
  - 分钟级资金流
  - 多数据源自动降级

compatibility:
  platforms:
    - openclaw
    - clawdbot
