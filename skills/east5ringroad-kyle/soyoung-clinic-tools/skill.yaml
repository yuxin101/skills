# Soyoung Clinic Tools 🏥

新氧诊所工具集。API Key 仅允许主人在私聊中配置，高风险预约操作支持群聊审批。

## 功能技能

| 技能 | 文档 |
|------|------|
| 📅 appointment — 门店查询与预约 | [skills/appointment/skill.yaml](skills/appointment/skill.yaml) |
| 💉 project — 项目与商品查询 | [skills/project/skill.yaml](skills/project/skill.yaml) |

## 配置工具（Setup）

| 工具 | 文档 |
|------|------|
| 🔐 apikey — API Key 与位置管理（两个技能的共同前置） | [setup/apikey/skill.yaml](setup/apikey/skill.yaml) |

详见 [使用说明.md](使用说明.md)
