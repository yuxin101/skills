# Soyoung Clinic — 预约管理 📅

支持新氧诊所门店查询和全流程预约操作。

---

## 🔑 参数全清单（与 references/api-spec.md 完全对齐，下划线格式，连字符等价）

> **只有下表中的参数存在。禁止传入任何不在此表中的参数（如 `--project-name`、`--project`、`--store`、`--name` 等）。**

| 参数 | 类型 | 说明 | 适用 action |
|------|------|------|------------|
| `--store_name` | string | 门店名称关键词（模糊匹配） | `store_lookup` / `store_and_slice` 必填，其余禁用 |
| `--city_name` | string | 城市名称 | `store_list` / `store_and_slice` / `appointment_slice` 可选 |
| `--hospital_id` | long | 门店 ID（来自门店查询结果的`机构ID`） | `appointment_slice` / `create` / `update` 必填 |
| `--date` | string | 日期（`YYYY-MM-DD`） | `store_and_slice` / `appointment_slice` 可选 |
| `--start_time` | string | 预约开始时间（`YYYY-MM-DD HH:MM:SS`） | `appointment_create` / `update` 必填 |
| `--end_time` | string | 预约结束时间（`YYYY-MM-DD HH:MM:SS`） | `appointment_create` / `update` 必填 |
| `--booking_id` | long | 预约 ID（来自预约记录结果的`预约ID`） | `appointment_update` / `cancel` 必填 |
| `--request-id` | string | 审批单 ID | `approval_confirm` / `approval_reject` 必填 |

---

## 📋 快速索引：意图 → 精确调用格式

| 用户意图 | 调用格式（完整示例） |
|---------|----------------|
| 用户**说出了门店名称**且要查可约时间 | `--action store_and_slice --store_name "丽泽" [--city_name 北京] [--date 2026-03-25]` |
| 查附近/城市全部门店（无指定门店名称） | `--action store_list [--city_name 北京]` |
| 已有 hospital_id，直接查切片 | `--action appointment_slice --hospital_id 11642747 [--date 2026-03-25]` |
| 查我的预约记录 | `--action appointment_query` |
| 提交预约 | `--action appointment_create --hospital_id 11642747 --start_time "2026-03-25 09:00:00" --end_time "2026-03-25 10:00:00"` |
| 修改预约时间 | `--action appointment_update --booking_id 13433 --hospital_id 11642747 --start_time "..." --end_time "..."` |
| 取消预约 | `--action appointment_cancel --booking_id 13433` |
| 主人确认审批 | `--action approval_confirm --request-id REQ_ID` |
| 主人拒绝审批 | `--action approval_reject --request-id REQ_ID` |

> `store_lookup`：仅在需要单独获取 `city_name` 传给 `product_search` 时使用；查可约切片时无需单独调用，`store_and_slice` 内部已自动优先查索引。

> `store_and_slice`：脚本内部自动完成"本地索引命中 → 直接切片（无 API）/ 未命中 → store_list + 切片"两步，无需 AI 串行等待。多门店匹配时并发拉取，直接展示各家可约情况。

