        function startAnimation() {
            animate();
        }
        
        function animate() {
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 初始化平移（首次居中）
            if (!panInitialized) {
                panX = 0;
                panY = 0;
                panInitialized = true;
            }
            
            // 应用缩放和平移
            ctx.save();
            ctx.translate(panX, panY);
            ctx.scale(zoomLevel, zoomLevel);
            
            // 更新中心点
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            
            // 更新雷达角度
            if (showRadar) {
                radarAngle += 0.02;
            }
            
            // 绘制雷达效果
            if (showRadar) {
                drawRadarEffect();
            }
            
            // 绘制网关节点
            drawGatewayNode();
            
            // 绘制定时任务（地图上部随机游走）
            drawCronJobs();
            
            // 绘制活跃代理节点
            if (state.sessions && state.sessions.length > 0) {
                state.sessions.forEach((session, index) => {
                    let agent = state.agents?.find(a => a.id === session.agent);
                    // subagent 可能不在 agents 列表中，创建虚拟 agent 对象
                    if (!agent) {
                        agent = { id: session.agent, name: session.agent, model: session.model || '--' };
                    }
                    drawAgentNode(session, agent, index);
                });
            } else {
                // 如果没有活跃代理，显示提示文字
                ctx.fillStyle = '#667788';
                ctx.font = '16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('无活跃作战单位', centerX, centerY);
            }
            
            // 继续动画循环
            // 恢复变换
            ctx.restore();
            
            // 缩放指示器（不受变换影响）
            if (zoomLevel !== 1.0) {
                ctx.fillStyle = 'rgba(0,255,136,0.5)';
                ctx.font = '11px monospace';
                ctx.textAlign = 'right';
                ctx.fillText(`${Math.round(zoomLevel * 100)}%`, canvas.width - 10, 20);
            }
            
            animationFrameId = requestAnimationFrame(animate);
        }
        
        function drawCronJobs() {
            const jobs = state.cronJobs || [];
            if (jobs.length === 0) return;
            
            // 初始化/同步粒子
            while (cronParticles.length < jobs.length) {
                cronParticles.push({
                    x: 100 + Math.random() * (canvas.width - 200),
                    y: 30 + Math.random() * (canvas.height * 0.25),
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.4
                });
            }
            
            const topBound = 20;
            const bottomBound = canvas.height * 0.3;
            const leftBound = 60;
            const rightBound = canvas.width - 60;
            
            for (let i = 0; i < jobs.length; i++) {
                const job = jobs[i];
                const p = cronParticles[i];
                
                // 随机游走
                p.x += p.vx;
                p.y += p.vy;
                
                // 边界反弹
                if (p.x < leftBound || p.x > rightBound) p.vx *= -1;
                if (p.y < topBound || p.y > bottomBound) p.vy *= -1;
                p.x = Math.max(leftBound, Math.min(rightBound, p.x));
                p.y = Math.max(topBound, Math.min(bottomBound, p.y));
                
                // 偶尔变方向
                if (Math.random() < 0.005) { p.vx = (Math.random() - 0.5) * 0.8; p.vy = (Math.random() - 0.5) * 0.4; }
                
                const enabled = job.enabled !== false;
                const color = enabled ? '#00ff88' : '#667788';
                const bgColor = enabled ? 'rgba(0, 50, 30, 0.7)' : 'rgba(30, 30, 30, 0.7)';
                
                // 图标
                ctx.font = '22px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏰', p.x, p.y);
                
                // 任务名
                ctx.font = '12px monospace';
                ctx.fillStyle = color;
                ctx.textAlign = 'center';
                const name = job.name || 'unnamed';
                ctx.fillText(name.length > 15 ? name.substring(0, 15) + '..' : name, p.x, p.y + 18);
                
                // 状态 + 调度信息
                const statusText = enabled ? '✓ 启用' : '✗ 禁用';
                const schedText = job.schedule || '--';
                ctx.font = '10px monospace';
                ctx.fillStyle = enabled ? 'rgba(0, 255, 136, 0.6)' : 'rgba(102, 119, 136, 0.6)';
                ctx.fillText(statusText + ' · ' + schedText, p.x, p.y + 32);
                
                // 启用状态的微光效果
                if (enabled) {
                    const glowR = 20 + Math.sin(Date.now() / 1000 + i) * 3;
                    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
                    glow.addColorStop(0, 'rgba(0, 255, 136, 0.08)');
                    glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        function drawRadarEffect() {
            // 绘制同心圆
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.2)';
            ctx.lineWidth = 1;
            
            for (let i = 1; i <= 5; i++) {
                const radius = (canvas.width / 4) * i * 0.2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            }
            
            // 绘制旋转扫描线
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.6)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            const endX = centerX + Math.cos(radarAngle) * (canvas.width / 2);
            const endY = centerY + Math.sin(radarAngle) * (canvas.height / 2);
            ctx.lineTo(endX, endY);
            ctx.stroke();
        }
        
        function drawGatewayNode() {
            const x = centerX;
            const y = centerY;
            const gwOnline = state.gateway && state.gateway.online;
            const baseColor = gwOnline ? [0, 255, 136] : [255, 51, 68]; // 绿/红
            const R = 32; // 球体半径
            const t = Date.now() / 1000;
            
            // === 伪 3D 球体 ===
            // 球体主体（径向渐变模拟光照）
            const sphereGrad = ctx.createRadialGradient(x - R*0.3, y - R*0.3, R*0.05, x, y, R);
            sphereGrad.addColorStop(0, `rgba(${baseColor[0]+80},${Math.min(255,baseColor[1]+80)},${baseColor[2]+80},0.95)`); // 高光
            sphereGrad.addColorStop(0.4, `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.8)`); // 主色
            sphereGrad.addColorStop(0.7, `rgba(${Math.floor(baseColor[0]*0.4)},${Math.floor(baseColor[1]*0.4)},${Math.floor(baseColor[2]*0.4)},0.85)`); // 暗部
            sphereGrad.addColorStop(1, `rgba(${Math.floor(baseColor[0]*0.15)},${Math.floor(baseColor[1]*0.15)},${Math.floor(baseColor[2]*0.15)},0.6)`); // 边缘
            
            ctx.beginPath();
            ctx.arc(x, y, R, 0, Math.PI * 2);
            ctx.fillStyle = sphereGrad;
            ctx.fill();
            
            // 球体表面经纬线（模拟 3D 旋转）
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, R, 0, Math.PI * 2);
            ctx.clip();
            
            // 纬线（水平椭圆）
            ctx.strokeStyle = `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.15)`;
            ctx.lineWidth = 0.8;
            for (let lat = -2; lat <= 2; lat++) {
                const ly = y + lat * R * 0.3;
                const rx = Math.sqrt(Math.max(0, R*R - (ly-y)*(ly-y)));
                if (rx > 2) {
                    ctx.beginPath();
                    ctx.ellipse(x, ly, rx, rx * 0.15, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            
            // 经线（垂直椭圆，旋转）
            for (let i = 0; i < 3; i++) {
                const angle = t * 0.3 + i * Math.PI / 3;
                ctx.beginPath();
                ctx.ellipse(x, y, R * Math.abs(Math.cos(angle)), R, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},${0.08 + 0.05 * Math.abs(Math.cos(angle))})`;
                ctx.stroke();
            }
            ctx.restore();
            
            // 高光点
            const hlGrad = ctx.createRadialGradient(x - R*0.25, y - R*0.25, 0, x - R*0.25, y - R*0.25, R*0.35);
            hlGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
            hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.beginPath();
            ctx.arc(x - R*0.25, y - R*0.25, R*0.35, 0, Math.PI * 2);
            ctx.fillStyle = hlGrad;
            ctx.fill();
            
            // 外圈光晕
            const glowGrad = ctx.createRadialGradient(x, y, R, x, y, R + 15);
            glowGrad.addColorStop(0, `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.2)`);
            glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath();
            ctx.arc(x, y, R + 15, 0, Math.PI * 2);
            ctx.fillStyle = glowGrad;
            ctx.fill();
            
            // 旋转光环（像土星环）
            ctx.strokeStyle = `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.25)`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.ellipse(x, y, R + 18, (R + 18) * 0.3, t * 0.2, 0, Math.PI * 2);
            ctx.stroke();
            
            // 脉冲外圈
            const pulseR = R + 22 + Math.sin(t * 2) * 3;
            ctx.strokeStyle = `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.12)`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x, y, pulseR, 0, Math.PI * 2);
            ctx.stroke();
            
            // 标注
            const statusText = gwOnline ? '● OpenClaw 在线' : '○ OpenClaw 离线';
            ctx.fillStyle = `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.9)`;
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(statusText, x, y + R + 30);
        }
        
        function drawAgentNode(session, agent, index) {
            // 计算代理节点位置（围绕网关分布）
            const totalSessions = state.sessions.length;
            const angle = (index / totalSessions) * 2 * Math.PI;
            const baseDistance = Math.min(260, Math.max(200, 180 + totalSessions * 20)); // agent 越多距离越远，最多260
            const distance = baseDistance + Math.sin(Date.now() / 2000 + index) * 20; // 微漂移
            const x = centerX + Math.cos(angle) * distance;
            const y = centerY + Math.sin(angle) * distance;
            
            // 冷却状态检测（提前，供连接线使用）
            const isCooldown = session.status === 'cooldown';
            
            // 绘制连接线（电子脉冲效果）
            const dx = x - centerX, dy = y - centerY;
            const lineLen = Math.sqrt(dx * dx + dy * dy);
            const ux = dx / lineLen, uy = dy / lineLen; // 单位向量
            
            // 底层暗线
            ctx.strokeStyle = 'rgba(0, 255, 238, 0.08)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            // 电子脉冲粒子（多个沿线移动）
            const t = Date.now();
            const pulseCount = 3;
            for (let p = 0; p < pulseCount; p++) {
                const phase = ((t / 800 + p / pulseCount) % 1); // 0~1 沿线位置
                const px = centerX + dx * phase;
                const py = centerY + dy * phase;
                
                // 脉冲光点
                const pulseGrad = ctx.createRadialGradient(px, py, 0, px, py, 8);
                pulseGrad.addColorStop(0, isCooldown ? 'rgba(255,170,0,0.8)' : 'rgba(0,255,238,0.8)');
                pulseGrad.addColorStop(0.5, isCooldown ? 'rgba(255,170,0,0.2)' : 'rgba(0,255,238,0.2)');
                pulseGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = pulseGrad;
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // 脉冲核心亮点
                ctx.fillStyle = isCooldown ? '#ffaa00' : '#00ffee';
                ctx.beginPath();
                ctx.arc(px, py, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 沿线的微光段（模拟电流流动）
            const segLen = 20;
            const segCount = Math.floor(lineLen / segLen);
            for (let s = 0; s < segCount; s++) {
                const phase = ((t / 1200 + s * 0.15) % 1);
                const brightness = 0.05 + 0.15 * Math.sin(phase * Math.PI);
                const sx1 = centerX + ux * s * segLen;
                const sy1 = centerY + uy * s * segLen;
                const sx2 = centerX + ux * Math.min((s + 0.6) * segLen, lineLen);
                const sy2 = centerY + uy * Math.min((s + 0.6) * segLen, lineLen);
                ctx.strokeStyle = isCooldown ? `rgba(255,170,0,${brightness})` : `rgba(0,255,238,${brightness})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(sx1, sy1);
                ctx.lineTo(sx2, sy2);
                ctx.stroke();
            }
            
            // 如果是冷却状态，添加闪烁效果
            if (isCooldown) {
                const flashIntensity = 0.5 + 0.5 * Math.sin(Date.now() / 200);
                ctx.shadowColor = `rgba(255, 170, 0, ${flashIntensity})`;
                ctx.shadowBlur = 10;
            }
            
            // 绘制 Agent 图标（🤖 emoji）
            const size = isCooldown ? 24 : 20;
            ctx.font = `${size * 2}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (isCooldown) {
                ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 200);
            }
            ctx.fillText(session.isSubagent ? '⚙️' : '🤖', x, y);
            ctx.globalAlpha = 1;
            
            // 重置阴影
            ctx.shadowBlur = 0;
            
            // 模型标签（图标正上方紧贴，🧠 + 模型名）
            const _sm = session.model, _am = agent.model;
            const modelRaw = (_sm && _sm !== '--') ? _sm : ((_am && _am !== '--') ? _am : '');
            if (modelRaw) {
                let modelShort = modelRaw.includes('/') ? modelRaw.split('/').pop() : modelRaw;
                if (modelShort.length > 18) modelShort = modelShort.substring(0, 16) + '\u2026';
                ctx.fillStyle = isCooldown ? '#ffaa00bb' : '#88ccffcc';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('\uD83E\uDDE0 ' + modelShort, x, y - size - 8);
            }
            
            // Agent 名称（图标下方）
            ctx.fillStyle = isCooldown ? '#ffaa00cc' : '#00ffeedd';
            ctx.font = 'bold 13px monospace';
            ctx.textAlign = 'center';
            const displayName = session.isSubagent 
                ? (agent.name || agent.id) + ' ← ' + (session.parentAgent || '?')
                : (agent.name || agent.id);
            ctx.fillText(displayName, x, y + size + 12);
            
            // 绘制技能点（全部显示，随机运动跟随 agent）
            if (session.skills && session.skills.length > 0) {
                const skills = session.skills;
                const skillCount = skills.length;
                
                // 初始化技能粒子位置（每个 agent 的每个 skill 都有独立的偏移）
                const agentSkillKey = 'skills:' + session.agent;
                if (!skillParticles[agentSkillKey]) {
                    skillParticles[agentSkillKey] = skills.map((sk, i) => {
                        const angle = (i / skillCount) * Math.PI * 2 + Math.random() * 0.5;
                        const dist = 55 + Math.random() * 60 + Math.floor(i / 8) * 25;
                        return {
                            name: sk,
                            baseAngle: angle,
                            baseDist: dist,
                            offsetX: 0, offsetY: 0,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3
                        };
                    });
                }
                
                const particles = skillParticles[agentSkillKey];
                // 更新名称（后端可能变化）
                skills.forEach((sk, i) => { if (particles[i]) particles[i].name = sk; });
                // 补充新增的
                while (particles.length < skills.length) {
                    const i = particles.length;
                    const angle = (i / skillCount) * Math.PI * 2 + Math.random() * 0.5;
                    const dist = 55 + Math.random() * 60 + Math.floor(i / 8) * 25;
                    particles.push({ name: skills[i], baseAngle: angle, baseDist: dist, offsetX: 0, offsetY: 0, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 });
                }
                
                for (let i = 0; i < particles.length && i < skills.length; i++) {
                    const p = particles[i];
                    // 随机漂移
                    p.offsetX += p.vx;
                    p.offsetY += p.vy;
                    // 边界弹回
                    if (Math.abs(p.offsetX) > 8) p.vx *= -1;
                    if (Math.abs(p.offsetY) > 8) p.vy *= -1;
                    // 偶尔变方向
                    if (Math.random() < 0.01) { p.vx = (Math.random()-0.5)*0.3; p.vy = (Math.random()-0.5)*0.3; }
                    
                    const angle = p.baseAngle;
                    const dist = p.baseDist;
                    const sx = x + Math.cos(angle) * dist + p.offsetX;
                    const sy = y + Math.sin(angle) * dist + p.offsetY;
                    
                    // 连线到 agent
                    ctx.strokeStyle = 'rgba(170, 102, 255, 0.08)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(sx, sy);
                    ctx.stroke();
                    
                    // 技能图标（金色十字星 ✦）
                    ctx.font = '14px serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillText('✦', sx, sy);
                    
                    // 技能名称
                    ctx.fillStyle = '#aa66ff88';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.name, sx, sy - 9);
                }
            }
            
            // 对话气泡显示框（在 Agent 名称上方）
            const msgs = session.recentMessages || [];
            if (msgs.length > 0) {
                const bubbleLines = [];
                for (const msg of msgs) {
                    const prefix = msg.role === 'user' ? '👤 ' : '🤖 ';
                    const fullText = prefix + msg.text;
                    const maxCharsPerLine = 30;
                    let remaining = fullText;
                    while (remaining.length > 0) {
                        bubbleLines.push({ text: remaining.substring(0, maxCharsPerLine), role: msg.role });
                        remaining = remaining.substring(maxCharsPerLine);
                    }
                }
                
                if (bubbleLines.length > 0) {
                    ctx.font = '10px monospace';
                    const lineH = 14;
                    const padX = 8, padY = 6;
                    
                    // 用 measureText 计算真实宽度
                    let bubbleW = 0;
                    for (const bl of bubbleLines) {
                        const w = ctx.measureText(bl.text).width + padX * 2;
                        if (w > bubbleW) bubbleW = w;
                    }
                    bubbleW = Math.max(bubbleW, 80);
                    const bubbleH = bubbleLines.length * lineH + padY * 2;
                    
                    const bx = x - bubbleW / 2;
                    const by = y - size - bubbleH - 35;
                    
                    // 圆角矩形背景
                    const r = 4;
                    ctx.fillStyle = 'rgba(10, 18, 20, 0.92)';
                    ctx.beginPath();
                    ctx.moveTo(bx + r, by);
                    ctx.lineTo(bx + bubbleW - r, by);
                    ctx.quadraticCurveTo(bx + bubbleW, by, bx + bubbleW, by + r);
                    ctx.lineTo(bx + bubbleW, by + bubbleH - r);
                    ctx.quadraticCurveTo(bx + bubbleW, by + bubbleH, bx + bubbleW - r, by + bubbleH);
                    ctx.lineTo(bx + r, by + bubbleH);
                    ctx.quadraticCurveTo(bx, by + bubbleH, bx, by + bubbleH - r);
                    ctx.lineTo(bx, by + r);
                    ctx.quadraticCurveTo(bx, by, bx + r, by);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 边框
                    ctx.strokeStyle = 'rgba(0, 255, 136, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 小三角指向 agent
                    ctx.fillStyle = 'rgba(10, 18, 20, 0.92)';
                    ctx.beginPath();
                    ctx.moveTo(x - 5, by + bubbleH);
                    ctx.lineTo(x + 5, by + bubbleH);
                    ctx.lineTo(x, by + bubbleH + 6);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 文字
                    ctx.textAlign = 'left';
                    for (let mi = 0; mi < bubbleLines.length; mi++) {
                        const bl = bubbleLines[mi];
                        ctx.fillStyle = bl.role === 'user' ? '#ffaa00' : '#00ffeedd';
                        ctx.fillText(bl.text, bx + padX, by + padY + (mi + 1) * lineH - 3);
                    }
                }
            }
            
            // 如果是冷却状态，显示倒计时
            if (isCooldown) {
                const cdDisplay = getCooldownDisplay(session.agent) || '0:00';
                ctx.fillStyle = '#ffaa00';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`⏱ ${cdDisplay}`, x, y - size - 26);
            }
        }
        
        // === 网关操控面板 ===
        function showGatewayPanel(mx, my) {
            const panel = document.getElementById('gateway-panel');
            const gwOnline = state.gateway && state.gateway.online;
            // 更新状态
            document.getElementById('gw-panel-status').innerHTML = gwOnline
                ? '状态：<span class="online">● 在线</span>  端口：' + (state.gateway.port || '--')
                : '状态：<span class="offline">○ 离线</span>';
            // 按钮状态
            document.getElementById('gw-btn-restart').disabled = false;
            document.getElementById('gw-btn-stop').disabled = !gwOnline;
            // 定位面板（在点击位置附近）
            const mapRect = canvas.parentElement.getBoundingClientRect();
            panel.style.left = Math.min(mx + 10, mapRect.width - 220) + 'px';
            panel.style.top = Math.min(my - 60, mapRect.height - 200) + 'px';
            panel.classList.add('visible');
            cancelGwAction();
        }
        
        let pendingGwAction = null;
        
        function gatewayAction(action) {
            cancelGwAction();
            pendingGwAction = action;
            document.getElementById('gw-confirm-' + action).classList.add('visible');
        }
        
        function cancelGwAction() {
            pendingGwAction = null;
            document.querySelectorAll('.gateway-btn-confirm').forEach(el => el.classList.remove('visible'));
        }
        
        async function gatewayExec(action) {
            cancelGwAction();
            const btn = document.getElementById('gw-btn-' + action);
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '执行中...';
            addRealLog(`正在${action === 'restart' ? '重启' : '关闭'}网关...`);
            
            try {
                const resp = await fetch('/api/gateway/' + action, { method: 'POST' });
                const data = await resp.json();
                if (data.ok) {
                    addRealLog(`✅ ${data.message}`);
                } else {
                    addRealLog(`⚠ ${data.message}`);
                }
            } catch (e) {
                addRealLog(`❌ 操作失败: ${e.message}`);
            }
            
            btn.textContent = origText;
            btn.disabled = false;
            // 2 秒后刷新状态
            setTimeout(manualRefresh, 2000);
        }
        
        // 页面加载完成后初始化
        window.onload = init;
        
        // === 底部对话栏功能 ===
        let chatTarget = null; // { type: 'agent'|'session', agent: {}, session: {} }
        
        // 更新对话目标显示
        function updateChatTargetDisplay() {
            const display = document.getElementById('chat-target-display');
            const input = document.getElementById('chat-input-bar');
            const sendBtn = document.getElementById('chat-send-btn');
            
            if (!display || !input || !sendBtn) return;
            
            if (chatTarget) {
                if (chatTarget.type === 'session' && chatTarget.session) {
                    const chTag = chatTarget.session.channel && chatTarget.session.channel !== '--' 
                        ? `·${chatTarget.session.channel}` : '';
                    display.textContent = `💬 ${chatTarget.agent.name || chatTarget.agent.id}${chTag}`;
                } else {
                    display.textContent = `🤖 ${chatTarget.agent.name || chatTarget.agent.id}`;
                }
                display.classList.add('active');
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            } else {
                display.textContent = '未选择对话目标';
                display.classList.remove('active');
                input.disabled = true;
                sendBtn.disabled = true;
            }
        }
        
        // 设置对话目标
        function setChatTarget(agent, session) {
            chatTarget = { type: session ? 'session' : 'agent', agent, session };
            updateChatTargetDisplay();
        }
        
        // 发送消息
        function sendChatBarMessage() {
            const input = document.getElementById('chat-input-bar');
            const btn = document.querySelector('.chat-bar .btn');
            const message = input.value.trim();
            
            if (!message || !chatTarget || !chatTarget.agent) {
                if (!chatTarget || !chatTarget.agent) {
                    alert('请先选择对话目标（点击左侧 Agent 或会话图标）');
                }
                return;
            }
            
            const originalBtnText = btn.textContent;
            btn.textContent = '发送中...';
            btn.disabled = true;
            
            console.log('Sending to', chatTarget.agent.id, ':', message);
            
            // 调用 API 发送消息
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    agent: chatTarget.agent.id,
                    sessionId: chatTarget.session ? chatTarget.session.sessionId : null,
                    message: message
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    console.log('Message sent via', data.method);
                    input.value = '';
                    btn.textContent = '✓ 已发送';
                    setTimeout(() => { btn.textContent = originalBtnText; btn.disabled = false; }, 1500);
                } else {
                    console.error('Send failed:', data.error);
                    btn.textContent = '✗ 失败';
                    setTimeout(() => { btn.textContent = originalBtnText; btn.disabled = false; }, 2000);
                }
            })
            .catch(e => {
                console.error('Error:', e);
                btn.textContent = '✗ 错误';
                setTimeout(() => { btn.textContent = originalBtnText; btn.disabled = false; }, 2000);
            });
        }
    </script>
