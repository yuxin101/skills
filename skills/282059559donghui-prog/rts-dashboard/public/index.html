<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ OPENCLAW 战术指挥中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #0a0e14;
            color: #c0ccdd;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CRT扫描线效果 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                transparent 50%,
                rgba(0, 255, 136, 0.05) 50%
            );
            background-size: 100% 4px;
            z-index: 1000;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100%);
            }
        }

        .dashboard-container {
            display: grid;
            grid-template-rows: 60px 1fr 40px;
            grid-template-columns: 240px 1fr 280px;
            height: 100vh;
            gap: 2px;
            padding: 2px;
        }

        /* 顶部资源栏 */
        .top-bar {
            grid-column: 1 / 4;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff88;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.7);
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }

        .clock {
            font-size: 16px;
            color: #00ffee;
        }

        /* 左侧面板 */
        .left-panel {
            grid-row: 2;
            grid-column: 1;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff88;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .panel-title {
            color: #00ff88;
            font-size: 16px;
            margin-bottom: 5px;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 5px;
        }

        .agents-list {
            flex: 1;
        }

        .agent-item {
            background: rgba(30, 40, 50, 0.7);
            border: 1px solid #667788;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .agent-item:hover {
            border-color: #00ff88;
            box-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }

        .agent-item.active {
            border-color: #00ff88;
            background: rgba(0, 50, 30, 0.5);
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .pulse-bar {
            height: 4px;
            background: linear-gradient(to right, transparent, #00ff88, transparent);
            border-radius: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .agent-task {
            font-size: 11px;
            color: #667788;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skills-list {
            flex: 1;
        }

        .search-box {
            width: 100%;
            padding: 5px;
            background: rgba(30, 40, 50, 0.7);
            border: 1px solid #667788;
            color: #c0ccdd;
            margin-bottom: 10px;
        }

        .skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            background: rgba(30, 40, 50, 0.7);
            border: 1px solid #667788;
            border-radius: 3px;
            margin-bottom: 3px;
            font-size: 12px;
        }

        .skill-category {
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            color: white;
        }

        .category-user { background: #aa66ff; }
        .category-built-in { background: #0077ff; }
        .category-extension { background: #ffaa00; }

        /* 中央战术地图 */
        .center-map {
            grid-row: 2;
            grid-column: 2;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff88;
            position: relative;
            overflow: hidden;
        }

        .session-bar {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 6px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 4px;
            overflow-y: auto;
            max-height: 80%;
        }
        .session-bar::-webkit-scrollbar { width: 3px; }
        .session-bar::-webkit-scrollbar-thumb { background: #004422; border-radius: 2px; }
        .session-bar-label {
            font-size: 13px;
            color: #667788;
            letter-spacing: 1px;
            white-space: nowrap;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .session-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: default;
            min-width: 56px;
            transition: background 0.2s;
            position: relative;
        }
        .session-icon:hover { background: rgba(0, 255, 136, 0.08); }
        .session-icon .icon { font-size: 32px; }
        .session-icon .label { font-size: 12px; color: #667788; white-space: nowrap; margin-top: 3px; }
        .session-icon.active .icon { filter: drop-shadow(0 0 6px #00ff88); }
        .session-icon.active .label { color: #00ff88; font-weight: bold; }
        .session-icon .status-dot {
            position: absolute;
            top: 2px;
            right: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #334;
        }
        .session-icon.active .status-dot { background: #00ff88; box-shadow: 0 0 4px #00ff88; }
        .session-icon.cooling .icon { filter: drop-shadow(0 0 4px #ffaa00); animation: pulse 2s infinite; }
        .session-icon.cooling .label { color: #ffaa00; }
        .session-icon.cooling .status-dot { background: #ffaa00; box-shadow: 0 0 4px #ffaa00; }

        .canvas-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .canvas-wrapper canvas { width: 100%; height: 100%; }

        #map-canvas {
            width: 100%;
            height: 100%;
        }

        .radar-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .minimap { display:none; }
        .legend { display:none; }

        /* 右侧情报面板 */
        
        /* 网关操控面板 */
        .gateway-panel {
            display: none;
            position: absolute;
            z-index: 100;
            background: rgba(10, 14, 20, 0.95);
            border: 1px solid #00ff88;
            border-radius: 4px;
            padding: 16px;
            min-width: 200px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        .gateway-panel.visible { display: block; }
        .gateway-panel-title {
            font-size: 13px;
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .gateway-panel-status {
            font-size: 11px;
            color: #c0ccdd;
            margin-bottom: 12px;
        }
        .gateway-panel-status .online { color: #00ff88; }
        .gateway-panel-status .offline { color: #ff3344; }
        .gateway-btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #1a2332;
            border: 1px solid #1e2d3d;
            color: #c0ccdd;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 1px;
        }
        .gateway-btn:hover { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 8px rgba(0,255,136,0.2); }
        .gateway-btn.danger { border-color: #422; }
        .gateway-btn.danger:hover { border-color: #ff3344; color: #ff3344; box-shadow: 0 0 8px rgba(255,51,68,0.2); }
        .gateway-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .gateway-btn-confirm {
            display: none;
            font-size: 10px;
            color: #ffaa00;
            margin-top: -4px;
            margin-bottom: 8px;
            text-align: center;
        }
        .gateway-btn-confirm.visible { display: block; }
        .gateway-btn-confirm button {
            background: none; border: 1px solid #ffaa00; color: #ffaa00;
            font-family: inherit; font-size: 10px; padding: 2px 8px; cursor: pointer; margin: 0 4px;
        }
        .gateway-btn-confirm button:hover { background: rgba(255,170,0,0.1); }
        .gateway-btn-confirm button.cancel { border-color: #667788; color: #667788; }

        .right-panel {
            grid-row: 2;
            grid-column: 3;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff88;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .info-section {
            margin-bottom: 15px;
        }

        .info-label {
            color: #00ff88;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 12px;
            margin-bottom: 3px;
            word-break: break-all;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #222;
            border: 1px solid #667788;
            border-radius: 5px;
            overflow: hidden;
            margin: 5px 0;
        }

        .progress-fill {
            height: 100%;
            background: #00ff88;
            transition: width 0.3s ease;
        }

        .log-entry {
            font-size: 11px;
            margin-bottom: 2px;
            padding: 2px;
            border-left: 2px solid #00ff88;
            padding-left: 5px;
        }

        /* 详情面板样式 */
        .detail-section {
            margin-bottom: 12px;
            background: rgba(20, 30, 40, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 4px;
            padding: 8px;
        }
        .detail-header {
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .detail-item {
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .detail-label {
            color: #667788;
            font-size: 10px;
        }
        .detail-value {
            color: #c0ccdd;
            font-size: 11px;
        }
        .detail-value.active { color: #00ff88; }
        .detail-value.cooldown { color: #ffaa00; }
        .task-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 170, 0, 0.2);
            border-radius: 4px;
            padding: 8px;
            font-size: 11px;
            color: #c0ccdd;
            line-height: 1.5;
            max-height: 80px;
            overflow-y: auto;
        }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .skill-tag {
            background: rgba(170, 102, 255, 0.2);
            border: 1px solid rgba(170, 102, 255, 0.4);
            color: #aa66ff;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
        }
        .skill-tag:hover {
            background: rgba(170, 102, 255, 0.4);
            border-color: #aa66ff;
        }
        .agent-tag {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.4);
            color: #00ff88;
        }
        .agent-tag:hover {
            background: rgba(0, 255, 136, 0.4);
            border-color: #00ff88;
        }
        .skill-count {
            color: #667788;
            font-size: 11px;
            font-weight: normal;
        }
        .messages-container {
            max-height: 100px;
            overflow-y: auto;
        }
        .msg-line {
            font-size: 10px;
            margin-bottom: 4px;
            line-height: 1.4;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .msg-line:last-child { border-bottom: none; }
        .empty-state {
            text-align: center;
            padding: 20px 10px;
            color: #667788;
        }
        


        /* 底部命令栏 */
        .bottom-bar {
            grid-column: 1 / 4;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff88;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            gap: 10px;
        }
        .status-indicators {
            display: flex;
            gap: 12px;
            font-size: 11px;
            white-space: nowrap;
        }

        .controls {
            display: flex;
            gap: 15px;
        }
        
        .chat-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex: 1;
            max-width: 800px;
            margin: 0 20px;
        }
        .chat-target-display {
            min-width: 180px;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-input-bar {
            flex: 1;
            min-width: 300px;
        .chat-input-bar {
            flex: 1;
            min-width: 200px;
        .chat-target-display {
            background: rgba(0, 30, 30, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ffee;
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 12px;
            min-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-target-display.active {
            border-color: #00ff88;
            color: #00ff88;
        }
        .chat-input-bar {
            flex: 1;
            min-width: 200px;
            background: rgba(30, 40, 50, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #c0ccdd;
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }
        .chat-input-bar:focus {`n            border-color: #00ff88;`n        }`n        .chat-input-bar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn {
            background: rgba(0, 50, 30, 0.5);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(0, 100, 60, 0.5);
            box-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }

        .status-indicators {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }

        .indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3344;
        }

        .indicator-dot.online {
            background: #00ff88;
            box-shadow: 0 0 5px #00ff88;
        }

        .cooldown {
            color: #ffaa00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        .selected-highlight {
            border: 2px solid #ffaa00 !important;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5) !important;
        }

        .crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: #ffaa00;
        }

        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
        }

        .crosshair::after {
            width: 20px;
            height: 2px;
            top: 9px;
        }
    </style>
</head>
<body>
    <!-- 隐藏的SVG龙虾定义 -->
    <svg id="lobster-svg" style="display: none;">
        <symbol id="mechanical-lobster" viewBox="0 0 80 80">
            <g stroke="#00aaff" stroke-width="2" fill="none">
                <!-- 身体 -->
                <ellipse cx="40" cy="40" rx="25" ry="15" fill="#1a3a5a" stroke="#00aaff"/>
                
                <!-- 钳子 -->
                <path d="M15 35 Q5 30 15 25" stroke="#00ff88" stroke-width="3" fill="none"/>
                <path d="M15 45 Q5 50 15 55" stroke="#00ff88" stroke-width="3" fill="none"/>
                
                <!-- 眼睛 -->
                <circle cx="30" cy="35" r="3" fill="#00ff88" stroke="#00aaff"/>
                <circle cx="50" cy="35" r="3" fill="#00ff88" stroke="#00aaff"/>
                
                <!-- 腿 -->
                <line x1="20" y1="45" x2="10" y2="55" stroke="#00aaff"/>
                <line x1="25" y1="48" x2="15" y2="58" stroke="#00aaff"/>
                <line x1="30" y1="50" x2="20" y2="60" stroke="#00aaff"/>
                <line x1="50" y1="50" x2="60" y2="60" stroke="#00aaff"/>
                <line x1="55" y1="48" x2="65" y2="58" stroke="#00aaff"/>
                <line x1="60" y1="45" x2="70" y2="55" stroke="#00aaff"/>
                
                <!-- 电路纹理 -->
                <path d="M35 30 L38 28 L42 30 L45 28" stroke="#00ff88" stroke-width="1" fill="none"/>
                <path d="M30 40 L35 38 L40 40 L45 38" stroke="#00ff88" stroke-width="1" fill="none"/>
            </g>
        </symbol>
    </svg>

    <div class="dashboard-container">
        <!-- 顶部资源栏 -->
        <div class="top-bar">
            <div class="logo">⚡ OPENCLAW 战术指挥中心</div>
            <div class="stats">
                <div class="stat-item">作战中: <span id="active-count" class="stat-value">0</span>/<span id="total-count" class="stat-value">0</span></div>
                <div class="stat-item">健康分：<span id="health-score" class="stat-value">--</span></div>
                <div class="stat-item">定时：<span id="cron-status" class="stat-value">--</span></div>
                <div class="stat-item">CPU: <span id="cpu-percent" class="stat-value">0%</span></div>
                <div class="stat-item">内存: <span id="mem-percent" class="stat-value">0%</span></div>
                <div class="stat-item">网关: <span id="gateway-status" class="stat-value">离线</span></div>
            </div>
            <div class="clock" id="current-time">00:00:00</div>
        </div>

        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="agents-list">
                <div class="panel-title">作战单位</div>
                <div id="agents-container"></div>
            </div>
            
            <div class="skills-list">
                <div class="panel-title">技能库</div>
                <input type="text" class="search-box" placeholder="搜索技能..." id="skill-search">
                <div id="skills-container"></div>
            </div>
        </div>

        <!-- 中央战术地图 -->
        <div class="center-map">
            <!-- Canvas 包装 -->
            <div class="canvas-wrapper">
                <!-- 会话状态栏（左侧竖排） -->
                <div class="session-bar" id="session-bar">
                    <span class="session-bar-label">💻 会话</span>
                </div>
                <canvas id="map-canvas"></canvas>
                <!-- 网关操控面板 -->
            <div class="gateway-panel" id="gateway-panel">
                <div class="gateway-panel-title">⚙ OpenClaw 网关控制</div>
                <div class="gateway-panel-status" id="gw-panel-status">状态：检测中...</div>
                <button class="gateway-btn" id="gw-btn-restart" onclick="gatewayAction('restart')">🔄 重启网关</button>
                <div class="gateway-btn-confirm" id="gw-confirm-restart">
                    确认重启？<button onclick="gatewayExec('restart')">确认</button><button class="cancel" onclick="cancelGwAction()">取消</button>
                </div>
                <button class="gateway-btn danger" id="gw-btn-stop" onclick="gatewayAction('stop')">⏹ 关闭网关</button>
                <div class="gateway-btn-confirm" id="gw-confirm-stop">
                    ⚠ 确认关闭？所有 Agent 将停止工作！<button onclick="gatewayExec('stop')">确认</button><button class="cancel" onclick="cancelGwAction()">取消</button>
                </div>
            </div>
            <div class="grid-lines" id="grid-lines" style="display: none;"></div>
            <div class="radar-effect" id="radar-effect" style="display: none;"></div>
            <div class="minimap" id="minimap"></div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background: #00ffee;"></div> 活跃单位</div>
                <div class="legend-item"><div class="legend-color" style="background: #ffaa00;"></div> 冷却中</div>
                <div class="legend-item"><div class="legend-color" style="background: #aa66ff;"></div> 已部署技能</div>
                <div class="legend-item"><div class="legend-color" style="background: #00ff88;"></div> 网关</div>
            </div>
            </div><!-- canvas-wrapper end -->
        </div>

        <!-- 右侧情报面板 -->
        <div class="right-panel">
            <div class="info-section">
                <div class="info-label">情报中心</div>
                <div id="selection-info">
                    <div class="info-value">请选择一个目标查看详情</div>
                </div>
            </div>
            
            <div class="info-section">
                <div class="info-label">系统状态</div>
                <div class="info-value">CPU: <span id="sys-cpu-detail">0%</span> (<span id="cpu-cores">0</span>核)</div>
                <div class="progress-bar"><div class="progress-fill" id="cpu-progress" style="width: 0%;"></div></div>
                
                <div class="info-value">内存: <span id="sys-mem-used">0</span>MB / <span id="sys-mem-total">0</span>MB</div>
                <div class="progress-bar"><div class="progress-fill" id="mem-progress" style="width: 0%;"></div></div>
                
                <div class="info-value">运行时间: <span id="sys-uptime">0</span></div>
            </div>
            
            <div class="info-section">
                <div class="info-label">网关</div>
                <div class="info-value">状态: <span id="gw-status-detail">离线</span></div>
            </div>
            
            <div class="info-section" id="event-log-section">
                <div class="info-label">事件日志</div>
                <div id="event-log"></div>
            </div>
            <div class="info-section" id="chat-history-section" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
                <div class="info-label" style="display:flex;justify-content:space-between;align-items:center;">
                    <span id="chat-history-title">💬 聊天记录</span>
                    <span style="cursor:pointer;color:#ffaa00;font-size:12px;" onclick="closeChatHistory()">✕ 关闭</span>
                </div>
                <div id="chat-history-content" style="flex:1;overflow-y:auto;max-height:calc(100vh - 500px);font-size:11px;line-height:1.6;"></div>
            </div>
        </div>

        <!-- 底部命令栏 -->
        <div class="bottom-bar">
            <div class="controls">
                <button class="btn" onclick="manualRefresh()">刷新</button>
                <button class="btn" onclick="toggleRadar()">雷达</button>
                <button class="btn" onclick="toggleGrid()">网格</button>
                <button class="btn" onclick="toggleTrails()">轨迹</button>
            </div>
            
            <!-- 对话输入框 -->
            <div class="chat-bar">
                <div id="chat-target-display" class="chat-target-display">未选择对话目标</div>
                <input type="text" id="chat-input-bar" class="chat-input-bar" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChatBarMessage()" disabled>
                <button class="btn" id="chat-send-btn" onclick="sendChatBarMessage()" disabled>发送</button>
            </div>
            
            <div class="status-indicators">
                <div class="indicator">
                    <div class="indicator-dot" id="gateway-indicator"></div>
                    <span>网关</span>
                </div>
                <div class="indicator">
                    <div class="indicator-dot" id="websocket-indicator"></div>
                    <span>WebSocket</span>
                </div>
                <div class="indicator">
                    <span id="last-update">从未更新</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let state = {};
        let ws = null;
        let selectedAgent = null;
        let selectedSkill = null;
        let animationFrameId = null;
        let lobsterImage = null;
        let radarAngle = 0;
        let showRadar = false;
        let showGrid = false;
        let showTrails = false;
        let canvas = null;
        let ctx = null;
        let centerX, centerY;
        const skillParticles = {};
        const cronParticles = []; // 定时任务粒子
        
        // 缩放与平移
        let zoomLevel = 1.0;
        let panX = 0, panY = 0;
        let panInitialized = false;
        let isPanning = false;
        let panStartX = 0, panStartY = 0; // { 'skills:agentId': [{name, baseAngle, baseDist, offsetX, offsetY, vx, vy}] }
        
        // 本地冷却倒计时缓存
        const localCooldowns = {};
        
        // 每秒递减冷却计时
        setInterval(() => {
            const now = Date.now();
            for (const [id, cd] of Object.entries(localCooldowns)) {
                if (cd.seconds <= 0) { delete localCooldowns[id]; continue; }
                const elapsed = Math.floor((now - cd.lastTick) / 1000);
                if (elapsed >= 1) {
                    cd.seconds = Math.max(0, cd.seconds - elapsed);
                    cd.lastTick = now;
                }
            }
        }, 1000);
        
        function syncCooldowns(sessions) {
            if (!sessions) return;
            const activeIds = new Set();
            sessions.forEach(s => {
                if (s.status === 'cooldown' && s.cooldownSeconds > 0) {
                    const existing = localCooldowns[s.agent];
                    if (!existing || Math.abs(existing.seconds - s.cooldownSeconds) > 5) {
                        localCooldowns[s.agent] = { seconds: s.cooldownSeconds, lastTick: Date.now() };
                    }
                    activeIds.add(s.agent);
                }
            });
            // 同步会话冷却（用后端返回的 cooldownSeconds）
            if (state.allSessions) {
                state.allSessions.forEach(sess => {
                    const cdKey = 'sess:' + sess.id;
                    if (sess.active && !sess.locked && sess.cooldownSeconds > 0) {
                        const existing = localCooldowns[cdKey];
                        if (!existing || Math.abs(existing.seconds - sess.cooldownSeconds) > 5) {
                            localCooldowns[cdKey] = { seconds: sess.cooldownSeconds, lastTick: Date.now() };
                        }
                        activeIds.add(cdKey);
                    } else if (sess.locked) {
                        delete localCooldowns[cdKey];
                    }
                });
            }
            for (const id of Object.keys(localCooldowns)) {
                if (!activeIds.has(id) && !id.startsWith('sess:')) delete localCooldowns[id];
                // 会话冷却到 0 自动清除
                if (id.startsWith('sess:') && localCooldowns[id] && localCooldowns[id].seconds <= 0) delete localCooldowns[id];
            }
        }
        
        function getCooldownDisplay(agentId) {
            const cd = localCooldowns[agentId];
            if (!cd || cd.seconds <= 0) return null;
            const m = Math.floor(cd.seconds / 60);
            const s = cd.seconds % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }
        
        // 初始化
        function init() {
            canvas = document.getElementById('map-canvas');
            ctx = canvas.getContext('2d');
            
            // 设置canvas大小
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 鼠标滚轮缩放（以鼠标位置为中心）
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1; // 乘法缩放更平滑
                const oldZoom = zoomLevel;
                const newZoom = Math.max(0.3, Math.min(3.0, zoomLevel * delta));
                
                // 鼠标在 canvas 上的坐标
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                
                // 鼠标在世界坐标中的位置（缩放前）
                const worldX = (mx - panX) / oldZoom;
                const worldY = (my - panY) / oldZoom;
                
                // 更新缩放
                zoomLevel = newZoom;
                
                // 调整平移，使鼠标位置不变
                panX = mx - worldX * zoomLevel;
                panY = my - worldY * zoomLevel;
            }, { passive: false });
            
            // 中键/右键拖拽平移
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 1 || e.button === 2) {
                    isPanning = true;
                    panStartX = e.clientX - panX;
                    panStartY = e.clientY - panY;
                    canvas.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            });
            canvas.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    panX = e.clientX - panStartX;
                    panY = e.clientY - panStartY;
                }
            });
            canvas.addEventListener('mouseup', () => {
                isPanning = false;
                canvas.style.cursor = 'default';
            });
            canvas.addEventListener('mouseleave', () => {
                isPanning = false;
                canvas.style.cursor = 'default';
            });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            
            // 双击重置视图
            canvas.addEventListener('dblclick', () => {
                zoomLevel = 1.0;
                panX = 0;
                panY = 0;
            });
            
            // 点击检测（网关球体 + Agent 节点）
            canvas.addEventListener('click', (e) => {
                if (isPanning) return;
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                // 转换到世界坐标
                const wx = (mx - panX) / zoomLevel;
                const wy = (my - panY) / zoomLevel;
                
                // 检测是否点击了网关球体（半径 32）
                const gdx = wx - centerX;
                const gdy = wy - centerY;
                const gdist = Math.sqrt(gdx*gdx + gdy*gdy);
                
                // 检测是否点击了 Agent 节点（使用固定位置，忽略动画偏移）
                let clickedAgent = null;
                if (state.sessions && state.sessions.length > 0) {
                    for (let i = 0; i < state.sessions.length; i++) {
                        const session = state.sessions[i];
                        const agent = state.agents?.find(a => a.id === session.agent);
                        if (!agent) continue;
                        const totalSessions = state.sessions.length;
                        const angle = (i / totalSessions) * 2 * Math.PI;
                        const baseDistance = Math.min(260, Math.max(200, 180 + totalSessions * 20));
                        // 使用平均距离，忽略动画波动
                        const ax = centerX + Math.cos(angle) * baseDistance;
                        const ay = centerY + Math.sin(angle) * baseDistance;
                        const adx = wx - ax;
                        const ady = wy - ay;
                        const adist = Math.sqrt(adx*adx + ady*ady);
                        // 放宽检测半径到 60
                        if (adist < 60) {
                            clickedAgent = { agent, session };
                            break;
                        }
                    }
                }
                
                const gwPanel = document.getElementById('gateway-panel');
                
                if (gdist < 40) {
                    // 点击了网关
                    showGatewayPanel(mx, my);
                } else if (clickedAgent) {
                    // 点击了 Agent，加载聊天记录到右侧栏
                    selectedAgent = { agent: clickedAgent.agent, session: clickedAgent.session };
                    selectedSkill = null;
                    setChatTarget(clickedAgent.agent, clickedAgent.session);
                    updateSelectionInfo();
                    loadChatHistory(clickedAgent.agent, clickedAgent.session);
                } else {
                    // 点击其他地方关闭面板
                    gwPanel.classList.remove('visible');
                    cancelGwAction();
                }
            });
            
            // 左键拖拽也支持平移（更直觉）
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0 && !e.shiftKey) {
                    isPanning = true;
                    panStartX = e.clientX - panX;
                    panStartY = e.clientY - panY;
                    canvas.style.cursor = 'grabbing';
                }
            });
            
            // 加载龙虾SVG为图片对象
            loadLobsterImage();
            
            // 初始化WebSocket
            connectWebSocket();
            
            // 更新时钟
            updateClock();
            setInterval(updateClock, 1000);
            
            // 开始动画循环
            startAnimation();
        }
        
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.offsetWidth;
            canvas.height = wrapper.offsetHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
        }
        
        function loadLobsterImage() {
            const svgElement = document.querySelector('#mechanical-lobster');
            const svgData = new XMLSerializer().serializeToString(document.querySelector('#lobster-svg'));
            const blob = new Blob([svgData], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            
            // 创建临时图片元素来加载SVG
            const tempImg = document.createElement('img');
            tempImg.onload = function() {
                // 创建一个canvas来渲染SVG为位图
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 80;
                tempCanvas.height = 80;
                const tempCtx = tempCanvas.getContext('2d');
                
                // 绘制SVG到临时canvas
                tempCtx.drawImage(tempImg, 0, 0, 80, 80);
                
                // 将临时canvas转换为blob URL
                tempCanvas.toBlob(function(blob) {
                    if (blob) {
                        const finalUrl = URL.createObjectURL(blob);
                        const finalImg = new Image();
                        finalImg.onload = function() {
                            lobsterImage = finalImg;
                            URL.revokeObjectURL(finalUrl);
                        };
                        finalImg.src = finalUrl;
                    }
                    URL.revokeObjectURL(url);
                });
            };
            tempImg.src = url;
        }
        
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function(event) {
                console.log('WebSocket连接已建立');
                document.getElementById('websocket-indicator').classList.add('online');
                addRealLog('实时连接已建立');
            };
            
            ws.onmessage = function(event) {
                try {
                    const newState = JSON.parse(event.data);
                    state = newState;
                    syncCooldowns(state.sessions);
                    updateUI();
                    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                } catch (error) {
                    console.error('解析WebSocket消息失败:', error);
                }
            };
            
            ws.onclose = function(event) {
                console.log('WebSocket连接已关闭，尝试重连...');
                document.getElementById('websocket-indicator').classList.remove('online');
                addRealLog('连接断开，3秒后重连...');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket错误:', error);
                document.getElementById('websocket-indicator').classList.remove('online');
            };
        }
        
        function manualRefresh() {
            fetch('/api/state')
                .then(response => response.json())
                .then(data => {
                    state = data;
                    updateUI();
                    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                })
                .catch(error => {
                    console.error('手动刷新失败:', error);
                });
        }
        
        function toggleRadar() {
            showRadar = !showRadar;
            document.getElementById('radar-effect').style.display = showRadar ? 'block' : 'none';
        }
        
        function toggleGrid() {
            showGrid = !showGrid;
            document.getElementById('grid-lines').style.display = showGrid ? 'block' : 'none';
        }
        
        function toggleTrails() {
            showTrails = !showTrails;
        }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        
        function updateUI() {
            if (!state || Object.keys(state).length === 0) return;
            
            // 更新顶部统计
            const activeAgents = state.sessions ? state.sessions.length : 0;
            const totalAgents = state.agents ? state.agents.length : 0;
            document.getElementById('active-count').textContent = activeAgents;
            document.getElementById('total-count').textContent = totalAgents;
            
            // 计算健康分（借鉴 control-center）
            let healthScore = 100;
            if (state.vitals) {
              if (state.vitals.cpuPercent > 80) healthScore -= 20;
              else if (state.vitals.cpuPercent > 50) healthScore -= 10;
              if (state.vitals.memPercent > 85) healthScore -= 20;
              else if (state.vitals.memPercent > 65) healthScore -= 10;
            }
            if (!state.gateway || !state.gateway.online) healthScore -= 30;
            if (state.cronJobs && state.cronJobs.length > 0) healthScore += 0; // 有定时任务不扣分
            healthScore = Math.max(0, Math.min(100, healthScore));
            const healthEl = document.getElementById('health-score');
            healthEl.textContent = healthScore;
            healthEl.style.color = healthScore >= 80 ? '#00ff88' : healthScore >= 50 ? '#ffaa00' : '#ff3344';
            
            // 定时任务状态
            const cronCount = state.cronJobs ? state.cronJobs.length : 0;
            const cronEl = document.getElementById('cron-status');
            cronEl.textContent = cronCount > 0 ? `${cronCount} 个` : '无';
            cronEl.style.color = cronCount > 0 ? '#00ff88' : '#667788';
            
            // 更新系统资源
            if (state.vitals) {
                document.getElementById('cpu-percent').textContent = `${Math.round(state.vitals.cpuPercent)}%`;
                document.getElementById('mem-percent').textContent = `${Math.round(state.vitals.memPercent)}%`;
                
                // 更新详细系统信息
                document.getElementById('sys-cpu-detail').textContent = `${Math.round(state.vitals.cpuPercent)}%`;
                document.getElementById('cpu-cores').textContent = state.vitals.cpuCount;
                document.getElementById('sys-mem-used').textContent = state.vitals.memUsed;
                document.getElementById('sys-mem-total').textContent = state.vitals.memTotal;
                document.getElementById('sys-uptime').textContent = formatUptime(state.vitals.uptime);
                
                // 更新进度条
                document.getElementById('cpu-progress').style.width = `${state.vitals.cpuPercent}%`;
                document.getElementById('mem-progress').style.width = `${state.vitals.memPercent}%`;
            }
            
            // 更新网关状态
            const gatewayOnline = state.gateway && state.gateway.online;
            document.getElementById('gateway-status').textContent = gatewayOnline ? '在线' : '离线';
            document.getElementById('gw-status-detail').textContent = gatewayOnline ? '在线' : '离线';
            
            if (gatewayOnline) {
                document.getElementById('gateway-indicator').classList.add('online');
            } else {
                document.getElementById('gateway-indicator').classList.remove('online');
            }
            
            // 更新代理列表
            updateAgentsList();

            // 更新会话栏
            updateSessionBar();

            // 更新技能列表
            updateSkillsList();
            
            // 更新事件日志（真实事件）
            updateEventLog();
            
            // 检测状态变化并记录
            if (typeof updateUI._prevSessionCount === 'undefined') {
                updateUI._prevSessionCount = 0;
                updateUI._prevGwOnline = null;
            }
            const curCount = state.sessions?.length || 0;
            if (curCount !== updateUI._prevSessionCount) {
                if (curCount > updateUI._prevSessionCount) {
                    const newSessions = state.sessions.slice(updateUI._prevSessionCount);
                    newSessions.forEach(s => addRealLog(`Agent ${s.agent} 开始作战`));
                } else if (updateUI._prevSessionCount > 0 && curCount < updateUI._prevSessionCount) {
                    addRealLog(`有 Agent 停止作战 (${updateUI._prevSessionCount} → ${curCount})`);
                }
                updateUI._prevSessionCount = curCount;
            }
            const gwNow = state.gateway?.online;
            if (updateUI._prevGwOnline !== null && gwNow !== updateUI._prevGwOnline) {
                addRealLog(gwNow ? '网关恢复在线' : '⚠ 网关离线！');
            }
            updateUI._prevGwOnline = gwNow;
        }
        
        function updateAgentsList() {
            const container = document.getElementById('agents-container');
            container.innerHTML = '';
            
            if (!state.agents) return;
            
            state.agents.forEach(agent => {
                const isActive = state.sessions && state.sessions.some(session => session.agent === agent.id);
                const session = isActive ? state.sessions.find(s => s.agent === agent.id) : null;
                
                const agentDiv = document.createElement('div');
                agentDiv.className = `agent-item ${isActive ? 'active' : ''}`;
                agentDiv.onclick = () => selectAgent(agent, session);
                
                let statusText = '待命';
                let statusClass = '';
                
                if (isActive && session) {
                    if (session.status === 'cooldown') {
                        const cdDisplay = getCooldownDisplay(agent.id) || '0:00';
                        statusText = `⏱ 冷却中 ${cdDisplay}`;
                        statusClass = 'cooldown';
                    } else {
                        statusText = '⚡ 作战中';
                    }
                }
                
                agentDiv.innerHTML = `
                    <div class="agent-status">
                        <span>${agent.name || agent.id}</span>
                        <span class="${statusClass}">${statusText}</span>
                    </div>
                    ${isActive && session?.currentTask ? `<div class="agent-task">${truncateText(session.currentTask, 50)}</div>` : ''}
                    ${isActive ? '<div class="pulse-bar"></div>' : ''}
                `;
                
                container.appendChild(agentDiv);
            });
        }
        
        function updateSessionBar() {
            const bar = document.getElementById('session-bar');
            if (!state.allSessions) return;
            
            bar.innerHTML = '<span class="session-bar-label">💻 会话</span>';
            
            state.allSessions.forEach(sess => {
                const div = document.createElement('div');
                const isCooling = sess.active && !sess.locked;
                div.className = `session-icon ${sess.locked ? 'active' : ''} ${isCooling ? 'cooling' : ''}`;
                
                let timeText;
                if (sess.locked) {
                    timeText = '活跃';
                } else if (sess.active) {
                    // 活跃但没有 lock = 冷却中，用本地倒计时
                    const cdKey = 'sess:' + sess.id;
                    const cd = localCooldowns[cdKey];
                    if (cd && cd.seconds > 0) {
                        const m = Math.floor(cd.seconds / 60);
                        const s = cd.seconds % 60;
                        timeText = `冷却 ${m}:${String(s).padStart(2,'0')}`;
                    } else {
                        timeText = '冷却中';
                    }
                } else if (sess.minutesAgo < 60) {
                    timeText = `${sess.minutesAgo}分前`;
                } else if (sess.minutesAgo < 1440) {
                    timeText = `${Math.floor(sess.minutesAgo / 60)}时前`;
                } else {
                    timeText = `${Math.floor(sess.minutesAgo / 1440)}天前`;
                }
                
                const chTag = sess.channel && sess.channel !== '--' ? `·${sess.channel}` : '';
                div.innerHTML = `
                    <div class="status-dot"></div>
                    <span class="icon">🖥️</span>
                    <span class="label">${sess.agent}${chTag}·${timeText}</span>
                `;
                div.title = `${sess.agent} | ${sess.channel} | ${sess.id} | ${sess.sizeKB}KB`;
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    const agent = state.agents?.find(a => a.id === sess.agent);
                    if (agent) setChatTarget(agent, sess);
                };
                bar.appendChild(div);
            });
        }
        
        function updateSkillsList() {
            const container = document.getElementById('skills-container');
            const searchInput = document.getElementById('skill-search');
            
            // 过滤技能
            let filteredSkills = state.skills || [];
            const searchTerm = searchInput.value.toLowerCase();
            
            if (searchTerm) {
                filteredSkills = filteredSkills.filter(skill => 
                    skill.name.toLowerCase().includes(searchTerm) || 
                    skill.id.toLowerCase().includes(searchTerm)
                );
            }
            
            container.innerHTML = '';
            
            filteredSkills.forEach(skill => {
                const skillDiv = document.createElement('div');
                skillDiv.className = 'skill-item';
                skillDiv.onclick = () => selectSkill(skill);
                
                let categoryClass = 'category-user';
                let categoryName = '用户';
                
                if (skill.category === '内置') {
                    categoryClass = 'category-built-in';
                    categoryName = '内置';
                } else if (skill.category === '扩展') {
                    categoryClass = 'category-extension';
                    categoryName = '扩展';
                }
                
                skillDiv.innerHTML = `
                    <span>${skill.name || skill.id}</span>
                    <span class="skill-category ${categoryClass}">${categoryName}</span>
                `;
                
                container.appendChild(skillDiv);
            });
        }
        
        function truncateText(text, maxLength) {
            if (!text) return '';
