# OpenClaw Deploy 主机清单示例
# 复制此文件为 inventory.ini 并填入真实主机信息
# 支持 ansible inventory 格式的简化子集

# ============================================
# 全局默认值（可选）
# ============================================
# ansible_user=root
# ansible_port=22
# ansible_ssh_private_key_file=~/.ssh/id_rsa

# ============================================
# 正式环境 (production)
# ============================================
[production]
# 格式: 主机别名 [ansible_host=<地址>] [ansible_user=<用户>] [ansible_port=<端口>]
web01 ansible_host=192.168.1.101 ansible_user=ubuntu
web02 ansible_host=192.168.1.102 ansible_user=ubuntu
web03 ansible_host=192.168.1.103 ansible_user=ubuntu

# ============================================
# 预发布环境 (staging)
# ============================================
[staging]
stage01 ansible_host=192.168.1.201 ansible_user=root ansible_port=2222

# ============================================
# 开发环境 (development)
# ============================================
[development]
dev01 ansible_host=192.168.1.50 ansible_user=developer ansible_ssh_private_key_file=~/.ssh/id_ed25519
dev02 ansible_host=192.168.1.51 ansible_user=developer

# ============================================
# 未分组主机
# ============================================
[ungrouped]
backup-server ansible_host=192.168.1.99 ansible_user=root
