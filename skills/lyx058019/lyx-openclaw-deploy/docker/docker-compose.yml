version: '3.8'

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    ports:
      - "2026:2026"      # Gateway port
      - "3000:3000"      # Web UI
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./data/workspace:/home/node/WorkSpace
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
