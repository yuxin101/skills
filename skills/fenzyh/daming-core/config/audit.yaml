# 大明朝廷审计配置

# 审计类型
audit_types:
  # 合规审计
  compliance:
    enabled: true
    frequency: "per_project"  # per_project/daily/weekly/monthly
    checkpoints:
      - decision_compliance
      - review_compliance
      - execution_compliance
      - quality_compliance
    standards:
      - internal_policies
      - external_regulations
      - best_practices
    
  # 性能审计
  performance:
    enabled: true
    frequency: "weekly"
    metrics:
      - decision_efficiency
      - review_effectiveness
      - execution_speed
      - resource_efficiency
    benchmarks:
      decision_time: 60      # 决策时间基准（秒）
      review_time: 30        # 审核时间基准（秒）
      execution_deviation: 0.1  # 执行偏差基准（10%）
      resource_usage: 0.9    # 资源使用基准（90%）
    
  # 安全审计
  security:
    enabled: true
    frequency: "monthly"
    aspects:
      - data_security
      - access_control
      - operation_security
      - archive_security
    requirements:
      - encryption_required
      - access_logging
      - permission_validation
      - backup_verification
    
  # 资源审计
  resource_usage:
    enabled: true
    frequency: "daily"
    resources:
      - token_usage
      - compute_usage
      - storage_usage
      - network_usage
    allocation_check: true
    utilization_check: true
    wastage_check: true

# 审计流程
audit_process:
  # 计划阶段
  planning:
    scope_definition: true
    objective_setting: true
    resource_allocation: true
    
  # 执行阶段
  execution:
    data_collection: true
    evidence_gathering: true
    analysis_performed: true
    
  # 报告阶段
  reporting:
    findings_documentation: true
    recommendations_provided: true
    report_generation: true
    
  # 跟进阶段
  followup:
    action_tracking: true
    improvement_verification: true
    closure_confirmation: true

# 审计报告
audit_report:
  format: "markdown"  # markdown/html/pdf
  sections:
    - executive_summary
    - audit_scope
    - methodology
    - findings
    - recommendations
    - conclusion
    - appendices
  
  detail_level: "detailed"  # summary/detailed/comprehensive
  include_evidence: true
  include_charts: true
  include_timeline: true

# 档案管理
archive_management:
  # 存储位置
  storage:
    projects: "./projects/"
    audit_reports: "./audit/"
    logs: "./logs/"
    
  # 保留策略
  retention:
    project_archives: "forever"      # 项目档案永久保留
    audit_reports: "365d"           # 审计报告保留365天
    detailed_logs: "90d"            # 详细日志保留90天
    summary_logs: "365d"            # 摘要日志保留365天
    
  # 备份策略
  backup:
    enabled: true
    frequency: "daily"
    retention: "30d"
    verification: true
    
  # 访问控制
  access_control:
    read_permission: "jinyiwei, xingbu"
    write_permission: "all_departments"
    delete_permission: "jinyiwei"
    archive_permission: "jinyiwei"

# 反查审计
traceability_audit:
  enabled: true
  capabilities:
    # 时间追溯
    timeline_reconstruction: true
    event_sequence: true
    decision_chain: true
    
    # 责任追溯
    responsibility_tracking: true
    action_attribution: true
    change_history: true
    
    # 影响追溯
    impact_analysis: true
    dependency_tracking: true
    root_cause_analysis: true
    
  # 查询接口
  query_interface:
    by_time: true
    by_project: true
    by_department: true
    by_person: true
    by_resource: true
    by_quality: true

# 审计质量标准
audit_quality:
  completeness: 0.95  # 审计完整性要求95%
  accuracy: 0.98      # 审计准确性要求98%
  timeliness: 0.90    # 审计及时性要求90%
  relevance: 0.95     # 审计相关性要求95%
  
  # 质量检查
  quality_checks:
    peer_review: true
    supervisor_review: true
    cross_validation: true
    sample_verification: true

# 审计风险等级
risk_levels:
  low:
    color: "green"
    response_time: "7d"
    escalation: false
    
  medium:
    color: "yellow"
    response_time: "3d"
    escalation: "supervisor"
    
  high:
    color: "orange"
    response_time: "1d"
    escalation: "department_head"
    
  critical:
    color: "red"
    response_time: "2h"
    escalation: "emperor"

# 审计改进跟踪
improvement_tracking:
  enabled: true
  tracking_methods:
    - action_items
    - progress_updates
    - closure_verification
    - effectiveness_assessment
  
  # 改进周期
  improvement_cycles:
    short_term: "7d"
    medium_term: "30d"
    long_term: "90d"
    
  # 效果评估
  effectiveness_assessment:
    metrics_improvement: true
    process_improvement: true
    risk_reduction: true
    cost_savings: true