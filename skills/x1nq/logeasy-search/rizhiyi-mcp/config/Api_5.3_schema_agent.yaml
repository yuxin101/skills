                            type: string
                            description: 用户全名
                            example: admin
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    put:
      operationId: update_agentgroup_detail
      description: 更新单个agent分组
      tags:
      - agentgroup
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 名称
                  pattern: .+
                memo:
                  type: string
                  description: 描述
                rt_names:
                  type: string
                  description: 资源标签
                  pattern: ^$|^org(\.[-A-Za-z_0-9\u4e00-\u9fa5]+){1,4}$
                roles:
                  type: array
                  description: 分配角色
                  items:
                    type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          description: 名称
                          maxLength: 255
                          type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    delete:
      operationId: delete_agentgroup_detail
      description: 删除单个agent分组
      tags:
      - agentgroup
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          description: 名称
                          maxLength: 255
                          type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
components:
  parameters:
    custom_collection:
      in: query
      name: custom_collection
      description: 是否仅返回收藏的资源
      schema:
        type: boolean
        default: false
    fields:
      in: query
      name: fields
      description: 指定返回的字段
      schema:
        type: string
        example: id,name
    id_list:
      in: query
      name: id_list
      description: 资源id，以`,`分割
      schema:
        type: string
        example: 1,2,3
    page:
      in: query
      name: page
      description: 所在页数
      schema:
        type: integer
        minimum: 0
        default: 0
    permit:
      in: query
      name: permit
      description: 是否获取资源相关权限集合
      schema:
        type: boolean
        default: true
    permits:
      in: query
      name: permits
      description: 是否获取资源相关权限集合
      schema:
        type: boolean
        default: true
    size:
      in: query
      name: size
      description: 每页条数
      schema:
        type: integer
        minimum: 1
        default: 10
  schemas:
    AgentGroup:
      type: object
      properties:
        domain_id:
          type: integer
        name:
          description: 名称
          maxLength: 255
          type: string
        memo:
          description: 描述
          maxLength: 255
          type: string
        creator_id:
          type: integer
        extra:
          description: 采集配置
          type: string
        from_app:
          description: 创建的时候关联的应用
          type: integer
    AgentGroupReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
        update_time:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
    AgentStatus:
      type: object
      properties:
        ip:
          description: Agent地址
          maxLength: 64
          type: string
        port:
          description: 端口
          type: integer
        status:
          description: 启动状态
          maxLength: 64
          type: string
        os:
          description: 操作系统
          maxLength: 32
          type: string
        platform:
          description: 平台
          maxLength: 64
          type: string
        cur_version:
          description: 版本
          maxLength: 64
          type: string
        expected_version:
          description: 预期版本
          maxLength: 64
          type: string
        is_server_heka:
          description: 类型 false-Agent,true-Server
          enum:
          - 'false'
          - 'true'
          type: boolean
        proxy_ip:
          description: 代理地址
          maxLength: 64
          type: string
        proxy_port:
          description: 代理端口
          type: integer
        domain_id:
          type: integer
        hostname:
          description: 主机名
          maxLength: 256
          type: string
        comment:
          description: 备注
          maxLength: 256
          type: string
        cmd:
          maxLength: 64
          type: string
        cmd_timestamp:
          type: string
          format: date-time
    AgentStatusReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        create_timestamp:
          description: agent 接入时间
          readOnly: true
          type: string
          format: date-time
        last_update_timestamp:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
    response-base:
      type: object
      properties:
        result:
          type: boolean
          description: 请求是否成功
          example: true
        traceid:
          type: string
          description: 请求唯一标识
          example: d1e754e2b2354276a1fa22ce2a1a9b51
    response-meta:
      type: object
      properties:
        meta:
          type: object
          description: 资源集合元数据
          properties:
            total:
              type: integer
              description: 资源总数
              example: 10
            size:
              type: integer
              description: 每页资源数
              example: 10
            page:
              type: integer
              description: 当前请求页码
              example: 0
            count:
              type: integer
              description: 当前页返回资源数
              example: 5
            category:
              type: string
              description: 资源分类
              example: Macro
    response-permit:
      type: object
      properties:
        permit:
          type: object
          properties:
            id:
              type: integer
              description: 资源id
              example: 1
            read:
              type: boolean
              description: 是否具有读取权限
              example: true
            update:
              type: boolean
              description: 是否具有更新权限
              example: true
            delete:
              type: boolean
              description: 是否具有删除权限
              example: true
    response-permits:
      type: object
      properties:
        permits:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                description: 资源id
                example: 1
              read:
                type: boolean
                description: 是否具有读取权限
                example: true
              update:
                type: boolean
                description: 是否具有更新权限
                example: true
              delete:
                type: boolean
                description: 是否具有删除权限
                example: true
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: apikey
    BasicAuth:
      type: http
      scheme: basic
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
