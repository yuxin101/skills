      tags:
      - model
      parameters:
      - in: query
        name: source
        schema:
          type: string
          format: number
          description: 源模型，非必填
        required: false
      - in: query
        name: target
        schema:
          type: string
          format: number
          description: 目标模型，当source存在时该值必填
        required: false
      - in: query
        name: and
        schema:
          type: string
          description: 当source存在时该值写死为false
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  meta:
                    type: object
                    description: 资源集合元数据
                    properties:
                      total:
                        type: number
                        description: 资源总数
                      page:
                        type: number
                        description: 当前请求页码
                      size:
                        type: number
                        description: 每页资源数
                      count:
                        type: number
                        description: 当前页返回资源数
                      category:
                        type: string
                        description: 资源分类
                  objects:
                    type: array
