        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: name
        schema:
          type: string
        required: false
      - in: query
        name: query
        schema:
          type: string
          description: 查询语句
        required: false
      - in: query
        name: is_published
        schema:
          type: boolean
          description: 已存搜索是否发布
        required: false
      - in: query
        name: time_range
        schema:
          type: string
          description: 搜索时间范围
        required: false
      - in: query
        name: marked
        schema:
          type: boolean
          description: 是否标记重要
        required: false
      - in: query
        name: data_user
        schema:
          type: string
          description: 已存搜索数据用户
        required: false
      - in: query
        name: app_id
        schema:
          type: integer
          description: 所属应用
        required: false
      - in: query
        name: export
        schema:
          type: string
          description: 资源范围 local-本APP内可见,system-全局可见
          enum:
          - local
          - system
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(-?\d+|all)(,-?\d+)*$|^$
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - id
          - is_published
          - marked
          - name
          - search_mode
          - time_range
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/SavedSearch'
                        - $ref: '#/components/schemas/SavedSearchReadOnly'
                        - type: object
                          properties:
                            rt_list:
                              type: array
                              description: 关联的资源标签
                              example:
                              - id: 1
                                name: 标签1
                              - id: 2
                                name: 标签2
                              items:
                                type: object
                            creator_enabled:
                              type: boolean
                              description: 用户是否可用
                            creator_name:
                              type: string
                              description: 用户名称
                              example: admin
                            creator_full_name:
                              type: string
                              description: 用户全名
                              example: admin
                            app_name:
                              type: string
                              description: 所属应用名称
                              example: 应用名称
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    post:
      operationId: create_savedsearches
      description: 新建已存搜索
      tags:
      - savedsearches
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  pattern: ^[\w\d\u4e00-\u9fa5\-_()（）]+$
                query:
                  description: 查询语句
                  type: string
                time_range:
                  description: 搜索时间范围
                  maxLength: 255
                  type: string
                market_day:
                  description: 是否只搜索交易日数据
                  maxLength: 255
                  type: string
                highlight:
                  description: 资源是否高亮，true或false
                  maxLength: 255
                  type: string
                  enum:
                  - 'False'
                  - 'True'
                only_sort_by_timestamp:
                  maxLength: 255
                  type: string
                source_groups:
                  maxLength: 255
                  type: string
                filters:
                  type: string
                dataset_ids:
                  description: 资源数据集列表，例如:[{"dataset_id":28},{"dataset_id":2,"node_id":5}]
                  type: string
                parameters:
                  description: 资源参数
                  type: string
                event_list_properties:
                  description: 已存搜索的展示模式配置
                  type: string
                anonymous:
                  description: 是否匿名
                  type: boolean
                marked:
                  description: 是否标记重要
                  type: boolean
                old_es_id:
                  description: 旧的ES_ID，要被废弃掉，但是导入的时候还需要
                  maxLength: 255
                  type: string
                source_group_ids:
                  maxLength: 255
                  type: string
                use_spark:
                  type: boolean
                search_mode:
                  description: 搜索模式
                  maxLength: 255
                  type: string
                data_user:
                  type: string
                  description: 可选值为viewer或creator
                  pattern: ^(viewer|creator)$
                is_published:
                  type: boolean
                app_id:
                  description: 所属应用
                  type: integer
                export:
                  description: 资源范围 local-本APP内可见,system-全局可见
                  enum:
                  - local
                  - system
                  maxLength: 255
                  type: string
                rt_names:
                  type: string
                  description: 关联的资源标签
                  example: 标签1,标签2
              required:
              - name
              - app_id
              - is_published
              - query
              - data_user
              - dataset_ids
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
