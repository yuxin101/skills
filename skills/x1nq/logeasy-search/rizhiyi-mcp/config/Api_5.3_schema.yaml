      operationId: generate_analysis_submit
      description: 开始分析
      tags:
      - parserrules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                algorithm_name:
                  type: string
                  description: 算法类型,目前支持DRAIN和LOG_MINE
                  enum:
                  - DRAIN
                  - LOG_MINE
                log_count:
                  type: number
                  description: 样本数量
                  enum:
                  - DRAIN
                  - LOG_MINE
                tokenizer_config:
                  type: object
                  description: 分词配置
                  example:
                    stop_word_mask: false
                    punctuation_mask: false
                    max_line_count: 1
                    max_token_count: 100
                    chinese_dictionary: '[]'
                    use_ik_chinese_segment: false
                search_params:
                  type: object
                  description: 搜索参数
                  example:
                    query: '*'
                    time_range: earliest,now
                    now: 1727173737316
                algorithm_config:
                  type: object
                  description: 算法配置,当algorithm_name为drain时，传drain里的参数，否则传log_mine的
                  example:
                    drain:
                      similarity_threshold: 0.55
                      depth: 2
                      allow_continuous_wild: false
                      lcs_reduce: false
                      lcs_wild_limit: 1
                    log_mine:
                      similarity_threshold: 0.55
                      layer_size: 1
                      cluster_alpha: 1.8
                      reducer_start_threshold: 0.01
                      reducer_stop_threshold: 0.55
              required:
              - algorithm_name
              - tokenizer_config
              - search_params
              - log_count
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  sid:
                    type: string
                    description: 任务id
                  type:
                    type: string
                    description: 任务类型
                  rc:
                    type: number
                    description: SPL是否成功返回
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
