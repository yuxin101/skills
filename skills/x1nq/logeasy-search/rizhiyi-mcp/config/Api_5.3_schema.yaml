                  - 1
                  - 2
                  type: integer
                schedule_window:
                  description: 调度窗口，单位 m/h/d
                  maxLength: 15
                  type: string
                create_mode:
                  description: 创建模式 common-普通,template-模板
                  enum:
                  - common
                  - template
                  maxLength: 255
                  type: string
                  pattern: ^(common|template)$
                edit_mode:
                  type: string
                  description: 编辑模式, 当report_type为doc时必填
                template_id:
                  description: 模板id
                  type: integer
                template_file:
                  type: string
                market_day:
                  description: 交易日id, -1表示默认交易日
                  type: integer
                email_use_html:
                  description: 报表图表是否显示在邮件正文中, 只能是true、false、follow中的一个
                  enum:
