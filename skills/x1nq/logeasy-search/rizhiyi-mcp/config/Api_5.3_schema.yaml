          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alert_type:
                  type: number
                  description: 0 完整导出 1 只导出插件名称，不导出插件meta信息 2 删除所有插件信息
                  enum:
                  - 0
                  - 1
                  - 2
                basic:
                  type: object
                  description: 基本配置
                  properties:
                    author:
                      type: string
                      description: 出品人
                    namespace:
                      type: string
                      description: 出厂标识
                    token:
                      type: string
                      description: 系统标识
                    version:
                      type: number
                      description: 版本
                    description:
                      type: string
                      description: 描述
                      maxLength: 255
                    name:
                      type: string
                      description: 名称
                      maxLength: 60
                      pattern: ^(?=.*[a-zA-Z\-\_\u4e00-\u9fa5])[a-zA-Z0-9\-\_\u4e00-\u9fa5]+$
                configs:
                  type: object
                  description: 配置
                  properties:
                    default_page:
                      type: object
                      description: 默认首页
                      example:
                        name: 监控首页
                        url: /alerts/
                    theme:
                      type: object
                      description: 主题
                      example:
                        color:
                          topnav: '#BF32E6FF'
                        logo_path: share.tmp.logo.36d54d9d96354d31ae899a66f3b7dd51
                    topnav:
                      type: array
                      description: 菜单栏
                      example:
                      - url: /dashboard/
                        name: wwww
                        children: []
                      - url: /alerts/
                        name: '2222'
                        children: []
                      items:
                        type: object
                field_config:
                  type: object
                  description: 字段配置
                  example:
                    props:
                      default:
                        alias:
                          aa:
                            a: a
                        public: {}
                        kv_mode: auto
                        report:
                          aa: aa
                        extract:
                          regex: ^[^"\n]*"(?P<AutoTestAppMethod>\w+)
                        eval:
                          auto-eval: AutoTestAppIsApache=like(appname,"apache")
                        lookup:
                          '1019':
                            transform_name: /data/rizhiyi/storage/1/share/dictionary_files/81/huiibo.csv
                            fields: '1:1'
                            case_sensitive: true
                    transform:
                      aa:
                        regex: a
                        source_key: raw_message
                        format: key1::$1
                parserrule_type:
                  type: number
                  description: 0 完整导出 1 删除所有字典信息
                  enum:
                  - 0
                  - 1
                resource_data:
                  type: array
                  description: 资源配置
                  items:
                    type: object
                    properties:
                      category:
                        type: string
                        description: 资源分类
                      ids:
                        type: string
                        description: 资源id
                        example: 1,2,3
              required:
              - configs
              - basic
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
