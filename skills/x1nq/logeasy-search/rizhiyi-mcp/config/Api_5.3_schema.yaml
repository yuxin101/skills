  /api/v3/parserrules/generate/log_reduce/:
    post:
      operationId: log_reduce_generate
      description: 生成规则
      tags:
      - parserrules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                pattern_rules:
                  type: array
                  description: 匹配的模式规则
                  example:
                  - token_list:
                    - id: 9
                      value: <DATETIME>
                      display_value: <DATETIME#1>
                      param_value: 2022-06-10 10:55:35,127
                      target_parameter: true
                      to_group: true
                      group_name: <DATETIME#1>123
                    - id: 212
                      value: INFO
                      display_value: INFO
                      param_value: INFO
                      target_parameter: false
                  items:
                    type: array
                time_rules:
                  type: array
                  description: 匹配的时间戳
                  example:
                  - source_field: raw_message
                    format: yyyy-MM-dd HH:mm:ss,SSS
                    timezone: Asia/Shanghai
                    language: en
                  items:
                    type: array
              required:
              - time_rules
              - pattern_rules
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  regex_rules:
                    type: array
                    description: 生成的正则规则
                    example:
                    - source_field: raw_message
                      regex: ((?<<DATETIME#1>123>((?:20\d\d|19\d\d)-(?:1[0-2]|0?[1-9])-(?:[12]\d|3[01]|0?[1-9])
                        (?:2[0123]|[01]?[0-9]):(?:[0-5][0-9]):(?:[0-5]\d),(?:\d{3}))))(\s*)(INFO)(\s*)(\[)(\s*)(.*?)(\s*)(\])(\s*)(.*?)(\s*)([-]?\d+(\.\d+)?)(\s*)(:)(\s*)(.*?)(\s*)
                    items:
                      type: object
                  time_rules:
                    type: array
                    description: 生成的时间规则
                    example:
                    - source_field: raw_message
                      format: yyyy-MM-dd HH:mm:ss,SSS
                      timezone: Asia/Shanghai
                      language: en
                    items:
                      type: object
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/parserrules/:
    get:
      operationId: get_parserrules_list
      description: 获取字段提取列表
      tags:
      - parserrules
      parameters:
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permits'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
      - in: query
        name: id
        schema:
          type: integer
        required: false
      - in: query
        name: uuid
        schema:
          type: string
        required: false
      - in: query
        name: domain_id
        schema:
          type: integer
        required: false
      - in: query
        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: name
        schema:
          type: string
          description: 自定义规则
        required: false
      - in: query
        name: from_app
        schema:
          type: integer
          description: 创建的时候关联的应用
        required: false
      - in: query
        name: enable
        schema:
          type: boolean
        required: false
      - in: query
        name: desc
        schema:
          type: string
        required: false
      - in: query
        name: logtype
        schema:
          type: string
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(-?\d+|all)(,-?\d+)*$|^$
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - category_id
          - creator_id
          - domain_id
          - enable
          - from_app
          - id
          - last_modified_timename
        required: false
      - in: query
        name: useAdvancedSearch
        schema:
          type: string
          format: boolean
          description: 是否启用高级搜索
        required: false
      - in: query
        name: appname
        schema:
          type: string
          description: appname,当useAdvancedSearch为true时该值必传
        required: false
      - in: query
        name: tag
        schema:
          type: string
          description: appname,当useAdvancedSearch为true时该值才有效
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/ParserRule'
                        - $ref: '#/components/schemas/ParserRuleReadOnly'
                        - type: object
                          properties:
                            rt_list:
                              type: array
                              description: 关联的资源标签
                              example:
                              - id: 1
                                name: 标签1
                              - id: 2
                                name: 标签2
                              items:
                                type: object
                            creator_enabled:
                              type: boolean
                              description: 用户是否可用
                            creator_name:
                              type: string
                              description: 用户名称
                              example: admin
                            creator_full_name:
                              type: string
                              description: 用户全名
                              example: admin
                            data_source:
                              type: string
                              description: 数据源
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    post:
      operationId: create_parserrules
      description: 创建字段提取
      tags:
      - parserrules
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: 自定义规则
                  maxLength: 40
                  type: string
                  pattern: .+
                conf:
                  type: string
                logtype:
                  type: string
                  pattern: .+
                desc:
                  type: string
                category_id:
                  type: integer
                enable:
                  type: boolean
                from_app:
                  description: 创建的时候关联的应用
                  type: integer
                notice_frequency:
                  description: 未解析日志的消息通知频率
                  maxLength: 20
                  type: string
                sink_conf:
                  description: 解析规则的指标索引配置
                  type: string
                rt_names:
                  type: string
                assign_data:
                  type: array
                  description: 数据分配
                  items:
                    type: object
                    properties:
                      appnames:
                        type: string
                      tags:
                        type: string
              required:
              - enable
              - name
              - conf
              - category_id
              - logtype
              - desc
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          description: 自定义规则
                          maxLength: 255
                          type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
