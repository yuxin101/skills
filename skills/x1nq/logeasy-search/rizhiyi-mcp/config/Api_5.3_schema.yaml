      - in: path
        name: id
        schema:
          type: integer
        required: true
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permit'
      - in: query
        name: type
        schema:
          type: string
          description: 可选值：download:下载字典;content:获取字典详情(数据分列展示，可分页展示);                                online_content:获取可用于在线编辑的字典详情;title:获取字典文件表头
        required: false
      - in: query
        name: page
        schema:
          type: string
          description: 请求type为content的时候需填写,分页获取字典详情的页数,默认是0
        required: false
      - in: query
        name: size
        schema:
          type: string
          description: 请求type为content的时候需填写,分页获取字典详情的每页返回条数,默认是50
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permit'
                - type: object
                  properties:
                    object:
                      allOf:
                      - $ref: '#/components/schemas/Dictionary'
                      - $ref: '#/components/schemas/DictionaryReadOnly'
