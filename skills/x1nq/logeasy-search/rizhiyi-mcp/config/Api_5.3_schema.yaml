          type: string
          description: 字段配置类型
          enum:
          - alias-字段别名
          - extract-字段萃取｜原文解析｜字段计算
          - lookup-字段查找
          - transform-字段转换
        required: true
      - in: query
        name: name
        schema:
          type: string
          description: 名称(type=alias|lookup|transform时传)
        required: false
      - in: query
        name: public
        schema:
          type: string
          format: boolean
          description: 全局共享(type=alias|lookup时传)
        required: false
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                <字段原名>:
                  type: string
                  description: type=alias 时key是字段原名,value是字段别名
                case_sensitive:
                  type: boolean
                  description: 大小写敏感
