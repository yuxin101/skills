                  - type: integer
                content:
                  type: string
                  pattern: .+
                frequency:
                  description: 频率, 只能是day、wek、mon、year、ctb中的一个
                  enum:
                  - day
                  - wek
                  - mon
                  - year
                  - ctb
                  maxLength: 255
                  type: string
                  pattern: ^(day|wek|mon|year|ctb)$
                triggertime:
                  description: 触发时间，格式为MMddhhmm
                  maxLength: 255
                  type: string
                email:
                  maxLength: 255
                  type: string
                carbon_copy:
                  maxLength: 255
                  type: string
                blind_carbon_copy:
                  maxLength: 255
                  type: string
                subject:
                  type: string
                crontab:
                  maxLength: 255
                  type: string
