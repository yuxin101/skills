  /api/v3/customcommands/:
    get:
      operationId: get_customcommands_list
      description: 获取指令配置列表
      tags:
      - customcommands
      parameters:
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permits'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
      - in: query
        name: id
        schema:
          type: integer
        required: false
      - in: query
        name: uuid
        schema:
          type: string
        required: false
      - in: query
        name: domain_id
        schema:
          type: integer
        required: false
      - in: query
        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: name
        schema:
          type: string
          description: 指令名称
        required: false
      - in: query
        name: app_id
        schema:
          type: integer
          description: 所属应用
        required: false
      - in: query
        name: export
        schema:
          type: string
          description: 资源范围 local-本APP内可见,system-全局可见
          enum:
          - local
          - system
        required: false
      - in: query
        name: file_name
        schema:
          type: string
          description: CustomScript表中的文件新名称
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(-?\d+|all)(,-?\d+)*$|^$
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - file_name
          - id
          - name
          - script_type
          - update_time
        required: false
      - in: query
        name: script_name
        schema:
          type: string
          description: 脚本名称
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/CustomCommand'
                        - $ref: '#/components/schemas/CustomCommandReadOnly'
                        - type: object
                          properties:
                            rt_list:
                              type: array
                              description: 关联的资源标签
                              example:
                              - id: 1
                                name: 标签1
                              - id: 2
                                name: 标签2
                              items:
                                type: object
                            creator_enabled:
                              type: boolean
                              description: 用户是否可用
                            creator_name:
                              type: string
                              description: 用户名称
                              example: admin
                            creator_full_name:
                              type: string
                              description: 用户全名
                              example: admin
                            app_name:
                              type: string
                              description: 所属应用名称
                              example: 应用名称
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    post:
      operationId: create_customcommands
      description: 创建指令配置
      tags:
      - customcommands
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 指令名称不能为空，且只能由数字，字母和下划线组成
                  pattern: ^[0-9a-zA-Z_]{1,}$
                file_name:
                  description: CustomScript表中的文件新名称
                  maxLength: 255
                  type: string
                  pattern: ^.+$
                script_type:
                  maxLength: 128
                  type: string
                protocol:
                  description: 脚本协议 v1-v1,v2-v2
                  enum:
                  - v1
                  - v2
                  maxLength: 32
                  type: string
                maxinputs:
                  type: number
                  description: 分批最大行数应为零或正整数
                  pattern: ^[0-9]*$
                python_version:
                  description: python版本 python2-python2,python3-python3
                  enum:
                  - python2
                  - python3
                  maxLength: 32
                  type: string
                command_type:
                  description: 命令的类型 GENERATING-生成数据命令,STREAMING-可分布式处理命令,CENTRALIZED-集中处理命令,TRANSFORMED-格式转化命令
                  enum:
                  - GENERATING
                  - STREAMING
                  - CENTRALIZED
                  - TRANSFORMED
                  maxLength: 32
                  type: string
                  pattern: ^.+$
                retainsevents:
                  type: boolean
                chunked:
                  description: 是否分批执行
                  type: boolean
                arguments:
                  description: 命令的参数：一般存储为["a","xxx"]
                  maxLength: 255
                  type: string
                app_id:
                  description: 所属应用
                  type: number
                export:
                  description: 资源范围 local-本APP内可见,system-全局可见
                  enum:
                  - local
                  - system
                  maxLength: 255
                  type: string
                rt_names:
                  type: string
                  description: 关联的资源标签
                  example: 标签1,标签2
              required:
              - name
              - file_name
              - command_type
              - app_id
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          description: 指令名称
                          maxLength: 255
                          type: string
                        app_id:
                          description: 所属应用
                          type: integer
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
