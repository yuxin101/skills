                  pattern: ^(true|false|follow)$
                app_id:
                  description: 所属应用
                  type: integer
                export:
                  description: 资源范围 local-本APP内可见,system-全局可见
                  enum:
                  - local
                  - system
                  maxLength: 255
                  type: string
                timezone:
                  description: 执行时区
                  maxLength: 255
                  type: string
                rt_names:
                  type: string
                  description: 关联的资源标签
                  example: 标签1,标签2
              required:
              - executor_id
              - name
              - content
              - email
              - layout
              - frequency
              - timezone
              - report_type
              - email_use_html
              - blind_carbon_copy
              - create_mode
              - carbon_copy
              - app_id
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
