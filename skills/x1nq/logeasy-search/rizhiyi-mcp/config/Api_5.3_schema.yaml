components:
  parameters:
    custom_collection:
      in: query
      name: custom_collection
      description: 是否仅返回收藏的资源
      schema:
        type: boolean
        default: false
    fields:
      in: query
      name: fields
      description: 指定返回的字段
      schema:
        type: string
        example: id,name
    id_list:
      in: query
      name: id_list
      description: 资源id，以`,`分割
      schema:
        type: string
        example: 1,2,3
    page:
      in: query
      name: page
      description: 所在页数
      schema:
        type: integer
        minimum: 0
        default: 0
    permit:
      in: query
      name: permit
      description: 是否获取资源相关权限集合
      schema:
        type: boolean
        default: true
    permits:
      in: query
      name: permits
      description: 是否获取资源相关权限集合
      schema:
        type: boolean
        default: true
    size:
      in: query
      name: size
      description: 每页条数
      schema:
        type: integer
        minimum: 1
        default: 10
  schemas:
    Acceleration:
      type: object
      properties:
        id:
          type: integer
        resource_type:
          description: 资源类型，趋势图=Trend
          maxLength: 255
          type: string
        resource_id:
          description: 资源ID，和资源类型一起对应一个资源
          type: integer
        user_id:
          description: 用户ID，创建加速的用户
          type: integer
        domain_id:
          description: 域ID，用户的域
          type: integer
        domain:
          description: 域
          maxLength: 255
          type: string
        query:
          description: 该加速对应的search_info
          type: string
        dataset_id:
          description: 数据集ID，SPL会定时扫描数据集，当数据集被修改时，更新使用到这个数据集的加速
          maxLength: 255
          type: string
        datasets:
          description: 数据集内容，SPL在扫描数据集时，发现数据集内容和真实内容已经不一致时，会更新该加速
          maxLength: 255
          type: string
        query_scope:
          description: 搜索权限，SPL会定时扫描用户的搜索权限，当搜索权限被修改时，更新使用到该搜索权限的加速
          maxLength: 255
          type: string
        macro:
          description: 搜索宏，SPL会定时扫描宏，当宏被修改时，更新使用到该宏的加速
          type: string
        range:
          description: 加速缓存范围，在SPL定时扫描更新加速时，需要用到该字段
          maxLength: 255
          type: string
        accelerate_indices:
          description: 加速用到的索引，SPL和beaver同步时会比对index是否一致
          maxLength: 255
          type: string
        accelerate_name:
          description: 加速名字，SPL和beaver使用该名字确定一条加速
          maxLength: 255
          type: string
        accelerate_interval:
          description: 加速粒度
          maxLength: 255
          type: string
        accelerate_hash:
          description: 加速hash，beaver算出的hash
          maxLength: 255
          type: string
        accelerate_enable:
          description: 加速是否开启 1-开启,0-关闭
          enum:
          - 1
          - 0
          type: boolean
        last_access:
          description: 加速最后访问taskName
          maxLength: 255
          type: string
        last_access_time:
          description: 加速最后访问时间
          type: integer
        cache_hit:
          description: 该加速被命中的次数
          type: integer
        update_time:
          description: 该加速最后更新时间
