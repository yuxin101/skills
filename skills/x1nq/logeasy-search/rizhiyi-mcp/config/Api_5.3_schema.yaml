        required: false
      - in: query
        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: default_display
        schema:
          type: integer
        required: false
      - in: query
        name: sequences
        schema:
          type: string
        required: false
      - in: query
        name: active_tab
        schema:
          type: integer
        required: false
      - in: query
        name: data_user
        schema:
          type: string
