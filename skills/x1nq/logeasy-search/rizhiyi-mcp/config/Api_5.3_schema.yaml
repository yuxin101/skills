                        type: string
                        description: 必填,模型之间的关系,connection:连接,belong:属于
                        pattern: ((connection)|(belong)).{0}
                      description:
                        type: string
                        description: 描述
                      source:
                        type: number
                        description: 源模型 id
                      target:
                        type: number
                        description: 目标模型 id
              required:
              - data
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: object
                    properties:
                      id:
                        type: number
                        description: relation id,单个model中有id为update,id的model代表新增,model
                          list中不存在的id表示删除
                      source:
                        type: number
                        description: 源模型 id
                      target:
                        type: number
                        description: 目标模型 id
                      relation:
                        type: string
                        description: 模型之间的关系,connection:连接,belong:属于
                      description:
                        type: string
                        description: 描述
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
