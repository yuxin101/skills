  /api/v3/resources/export/:
    post:
      operationId: export_resource_package
      description: 导出资源包
      tags:
      - resources
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                alert_type:
                  type: number
                  description: '关联告警插件处理方式, 0: 完整导出, 1: 仅保留插件名称, 2: 清空监控关联插件信息'
                  pattern: ^[0-2]$
                parserrule_type:
                  type: number
                  description: '字段提取关联字典处理方式, 0: 完整导出, 1: 不导出关联字典文件'
                  pattern: ^[0-1]$
                name:
                  type: string
                  description: 资源包名称
                field_config:
                  type: object
                  description: 字段配置数据
                  example:
                    props:
                      default:
                        alias: {}
                        lookup: {}
                        extract: {}
                        eval: {}
                        report: {}
                    transform: {}
                resource_data:
                  type: array
                  description: 资源数据
                  items:
                    type: object
                    properties:
                      category:
                        type: string
                        description: 资源类型
                      ids:
                        type: string
                        description: 资源id, 多个id用逗号分隔
              required:
              - name
              - resource_data
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        file_name:
                          type: string
                          description: 资源包文件名
                        object_id:
                          type: string
                          description: 资源包文件id, 对应文件存储在 hdfs 中
                          example: c623b64a168743f7b178b3fccb175b00
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/resources/:
    get:
      operationId: get_resources_list
      description: 获取资源列表
      tags:
      - resources
      parameters:
      - in: query
        name: page
        schema:
          type: string
          format: number
          description: 所在页数
        required: true
      - in: query
        name: size
        schema:
          type: string
          format: number
          description: 当页展示条数
        required: true
      - in: query
        name: name
        schema:
          type: string
          description: 资源名称
        required: false
      - in: query
        name: create_time
        schema:
          type: string
          description: 创建时间
        required: false
      - in: query
        name: update_time
        schema:
          type: string
          description: 更新时间
        required: false
      - in: query
        name: category
        schema:
          type: string
          description: 资源类型, 获取某个类型下的数据
        required: false
      - in: query
        name: type
        schema:
          type: string
          description: 资源类型为fieldconfig时，可选值为 alias, lookup, extract, transform, report,
            eval
          pattern: ^alias|lookup|extract|transform|report|eval|$
        required: false
      - in: query
        name: category_type
        schema:
          type: string
          description: '资源类型的分类, 获取某个分类下的数据, resource: 资源, datastream: 数据流, fieldconfig:
            字段配置'
          pattern: ^resource|datastream|fieldconfig$
        required: false
      - in: query
        name: app_id
        schema:
          type: string
          description: 应用id
          pattern: ^\d*$
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(\d+(,\d+)*)?$
        required: false
      - in: query
        name: org_ids
        schema:
          type: string
          description: 组织标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(\d+(,\d+)*)?$
        required: false
      - in: query
        name: app_ids
        schema:
          type: string
          description: 应用id过滤，支持多应用过滤，多个应用id之间用`,`分割
          pattern: ^(\d+(,\d+)*)?$
        required: false
      - in: query
        name: permits
        schema:
          type: string
          format: boolean
          description: 是否获取资源相关权限集合
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  permits:
                    type: array
                    description: 资源权限集合
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: 资源id
                        read:
                          type: boolean
                          description: 是否具有读取权限
                        update:
                          type: boolean
                          description: 是否具有更新权限
                        delete:
                          type: boolean
                          description: 是否具有删除权限
                  objects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          description: 资源id
                        name:
                          type: string
                          description: 资源名称
                        memo:
                          type: string
                          description: Agent 分组备注, 类型为 Agent 分组时返回
                        defination_name:
                          type: string
                          description: 字典名称, 类型为字典时返回
                        alias:
                          type: string
                          description: 别名, 类型为数据集时返回
                        app_id:
                          type: number
                          description: 应用id, 资源类型的分类为 resource 时返回
                        export:
                          type: string
                          description: 资源范围, 资源类型的分类为 resource 时返回
                        from_app:
                          type: string
                          description: 资源范围, 资源类型的分类为 datastream 时返回
                        creator_id:
                          type: number
                          description: 创建者id
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
