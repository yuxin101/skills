  /api/v3/agentgroup/:
    get:
      operationId: get_agentgroup_list
      description: 获取agent分组列表
      tags:
      - agentgroup
      parameters:
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permits'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
      - $ref: '#/components/parameters/custom_collection'
      - in: query
        name: id
        schema:
          type: integer
        required: false
      - in: query
        name: domain_id
        schema:
          type: integer
        required: false
      - in: query
        name: name
        schema:
          type: string
          description: 名称
        required: false
      - in: query
        name: memo
        schema:
          type: string
          description: 描述
        required: false
      - in: query
        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: from_app
        schema:
          type: integer
          description: 创建的时候关联的应用
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(-?\d+|all)(,-?\d+)*$|^$
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - creator_id
          - domain_id
          - from_app
          - id
          - memo
          - name
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/AgentGroup'
                        - $ref: '#/components/schemas/AgentGroupReadOnly'
                        - type: object
                          properties:
                            rt_list:
                              type: array
                              description: 关联的资源标签
                              example:
                              - id: 1
                                name: 标签1
                              - id: 2
                                name: 标签2
                              items:
                                type: object
                            creator_enabled:
                              type: boolean
                              description: 用户是否可用
                            creator_name:
                              type: string
                              description: 用户名称
                              example: admin
                            creator_full_name:
                              type: string
                              description: 用户全名
                              example: admin
                            is_collected:
                              type: boolean
                              description: 资源是否被收藏
                              example: true
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    post:
      operationId: create_agentgroup
      description: 新建agent分组
      tags:
      - agentgroup
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 名称
                  pattern: .+
                memo:
                  type: string
                  description: 描述
                rt_names:
                  type: string
                  description: 资源标签
                  pattern: ^$|^org(\.[-A-Za-z_0-9\u4e00-\u9fa5]+){1,4}$
                roles:
                  type: array
                  description: 分配角色
                  items:
                    type: number
              required:
              - name
              - roles
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          description: 名称
                          maxLength: 255
                          type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
