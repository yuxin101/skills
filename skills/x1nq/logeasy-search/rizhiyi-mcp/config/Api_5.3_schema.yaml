      tags:
      - dictionaries
      parameters:
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permits'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
      - in: query
        name: id
        schema:
          type: integer
        required: false
      - in: query
        name: uuid
        schema:
          type: string
        required: false
      - in: query
        name: domain_id
        schema:
          type: integer
        required: false
      - in: query
        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: defination_name
        schema:
          type: string
          description: 同一domain下唯一
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(-?\d+|all)(,-?\d+)*$|^$
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - defination_name
          - id
          - update_time
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/Dictionary'
                        - type: object
                          properties:
                            id:
                              readOnly: true
                              type: integer
                            uuid:
                              readOnly: true
                              type: string
                            domain_id:
                              readOnly: true
                              type: integer
                            creator_id:
                              readOnly: true
                              type: integer
                            create_time:
                              description: 创建时间
                              readOnly: true
                              type: string
                              format: date-time
                            rt_list:
                              type: array
                              description: 关联的资源标签
                              example:
                              - id: 1
                                name: 标签1
                              - id: 2
                                name: 标签2
                              items:
                                type: object
                            creator_enabled:
                              type: boolean
                              description: 用户是否可用
                            creator_name:
                              type: string
                              description: 用户名称
                              example: admin
                            creator_full_name:
                              type: string
                              description: 用户全名
                              example: admin
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    post:
      operationId: create_dictionaries
      description: 创建字典
      tags:
      - dictionaries
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file_name:
                  type: string
                  description: 文件名称
                  pattern: \S+
                defination_name:
                  type: string
                  description: 定义名称
                  pattern: \S+
                from_app:
                  description: 创建的时候关联的应用
                  type: integer
                rt_names:
                  type: string
                  description: 关联的资源标签
                  example: 标签1,标签2
                content:
                  type: string
                  description: 字典内容
                  pattern: .+
              required:
              - file_name
              - content
              - defination_name
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          type: string
                          description: 新建的字典名
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
