                    anotherName: testapi
                    expression: ''
                    expression_fieldSplit: ;
                    expression_kvSplit: ':'
                    expression_keyPrefix: ''
                    expression_keyReserved: ''
                    expression_keyDrop: ''
                    duplicate_key_strategy: use_last
