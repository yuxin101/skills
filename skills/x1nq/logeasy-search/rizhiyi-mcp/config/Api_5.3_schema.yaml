                      description: key是规则名称, value是新字段+等号+eval表达式;多条规则用逗号分隔
                      example: newField=evalExpression
                public:
                  type: object
                  description: 全局共享的字段萃、原文解析、字段计算
                  properties:
                    report:
                      type: array
                      description: 字段萃取全局共享的规则
                      example:
                      - ruleName
                      items:
                        type: object
                    extract:
                      type: array
                      description: 原文解析全局共享的规则
                      example:
                      - ruleName
                      items:
                        type: object
                    eval:
                      type: array
                      description: 字段计算全局共享的规则
                      example:
                      - ruleName
                      items:
                        type: object
                format:
                  type: string
                  description: 格式
                regex:
                  type: string
                  description: 正则解析
                source_key:
                  type: string
                  description: 来源字段
                clean_keys:
                  type: boolean
                  description: 自动清理字段名称
                mv_add:
                  type: boolean
                  description: 创建多值字段
                delims:
                  type: array
                  description: 分隔符
                  items:
                    type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        object:
                          type: boolean
          description: 请求成功
