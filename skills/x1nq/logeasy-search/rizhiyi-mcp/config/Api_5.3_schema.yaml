      tags:
      - schedules
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permit'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permit'
                - type: object
                  properties:
                    object:
                      allOf:
                      - $ref: '#/components/schemas/Schedule'
                      - $ref: '#/components/schemas/ScheduleReadOnly'
                      - type: object
                        properties:
                          rt_list:
                            type: array
                            description: 关联的资源标签
                            example:
                            - id: 1
                              name: 标签1
                            - id: 2
                              name: 标签2
                            items:
                              type: object
                          creator_enabled:
                            type: boolean
                            description: 用户是否可用
                          creator_name:
                            type: string
                            description: 用户名称
                            example: admin
                          creator_full_name:
                            type: string
                            description: 用户全名
                            example: admin
                          executor_enabled:
                            type: boolean
                            description: 执行人是否可用
                          executor_name:
                            type: string
                            description: 执行人名称
                            example: admin
                          executor_full_name:
                            type: string
                            description: 执行人全名
                            example: admin
                          app_name:
                            type: string
                            description: 所属应用名称
                            example: 应用名称
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    put:
      operationId: update_schedules_detail
      description: 更新定时任务
      tags:
      - schedules
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 定时任务名称
                  pattern: .+
                executor_id:
                  description: 运行用户id
                  type: integer
                request_method:
                  maxLength: 255
                  type: string
                email:
                  maxLength: 255
                  type: string
                description:
                  type: string
                  description: 定时任务描述
                post_parameters:
                  description: 传空值时为{}
                  type: string
                vis_type:
                  maxLength: 255
                  type: string
                chart_type:
                  maxLength: 255
                  type: string
                start_trigger_time:
                  type: integer
                check_interval:
                  description: 定时模式下可设定,crontab下默认传5
                  type: number
                request:
                  type: string
                category:
                  description: 类型,默认为1
                  type: integer
                crontab:
                  description: crontab模式下必传
                  maxLength: 255
                  type: string
                enabled:
                  description: 是否开启
                  type: boolean
                use_spark:
                  description: 是否使用高基模式
                  type: boolean
                market_day:
                  description: 交易日id, -1表示默认交易日
                  type: integer
                schedule_priority:
                  description: 调度优先级 0-默认,1-更高,2-最高
                  enum:
                  - 0
                  - 1
                  - 2
                  type: integer
                schedule_window:
                  description: 调度窗口，单位 m/h/d
                  maxLength: 15
                  type: string
                index_id:
                  description: indexInfo表中的id，用于定时任务写索引
                  type: integer
                app_id:
                  description: 所属应用
                  type: integer
                export:
                  description: 资源范围 local-本APP内可见,system-全局可见
                  enum:
                  - local
                  - system
                  maxLength: 255
                  type: string
                timezone:
                  description: 执行时区
                  maxLength: 255
                  type: string
                rt_names:
                  type: string
                  description: 资源标签(多值;支持零个或多个，多个资源之间以','分隔)
                jdbc_data:
                  type: string
                  description: 保存至JDBC,为dboutputId(多值;支持零个或多个，多个资源之间以','分隔)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: object
                    description: 修改什么字段,回传什么字段
                    properties:
                      id:
                        type: number
                        description: 定时任务id,必有
                      update_time:
                        type: number
                        description: 更新时间,必有
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    delete:
      operationId: delete_schedules_detail
      tags:
      - schedules
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          maxLength: 255
                          type: string
                        app_id:
                          description: 所属应用
                          type: integer
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/search/submit/:
    get:
      operationId: submit_search
      description: 提交异步搜索任务，提交任务后需要和 preview_search 配合使用，否则任务会心跳超时
      tags:
      - search
      parameters:
      - in: query
        name: now
        schema:
          type: string
          description: 当前时间戳, 默认为机器的系统时间
        required: false
      - in: query
        name: time_range
        schema:
          type: string
          description: 时间范围, 格式为"开始时间,结束时间", 支持毫秒、now、earliest、yyyy-MM-hh:HH:mm:ss、yyyy-MM-hh:HH:mm:ss:SSS格式
        required: false
      - in: query
        name: onlySortByTimestamp
        schema:
          type: string
          format: boolean
          description: 是否只按时间戳排序, 当 enable_accelerate 为 true 时, 该参数无效
          default: 'true'
        required: false
      - in: query
        name: scroll
        schema:
          type: string
          format: boolean
          description: 是否滚动查询
          default: 'false'
        required: false
      - in: query
        name: queryfilters
        schema:
          type: string
          description: 查询过滤条件
        required: false
      - in: query
        name: executor_id
        schema:
          type: string
          description: 执行者id, 默认为当前用户id
        required: false
      - in: query
        name: filter_field
        schema:
          type: string
        required: false
      - in: query
        name: query
        schema:
          type: string
          description: 查询语句
        required: false
      - in: query
        name: use_spark
        schema:
          type: string
          format: boolean
          description: 是否使用高基模式
          default: 'false'
        required: false
      - in: query
        name: order
        schema:
          type: string
          description: 排序方式
          default: desc
        required: false
      - in: query
        name: category
        schema:
          type: string
          description: 查询类别
          default: other
        required: false
      - in: query
        name: task_name
        schema:
          type: string
          description: 任务名称, 用于区分不同类型的任务
          default: search_task
        required: false
      - in: query
        name: background
        schema:
          type: string
          format: boolean
          description: 是否后台执行
          default: 'false'
        required: false
      - in: query
        name: lang
        schema:
          type: string
          description: 语言
          default: zh_CN
        required: false
      - in: query
        name: timeline
        schema:
          type: string
          format: boolean
          description: 是否返回时间轴
          default: 'true'
        required: false
      - in: query
        name: statsevents
        schema:
          type: string
          format: boolean
          description: stats搜索时, 搜索结果是否需要保留记录
          default: 'false'
        required: false
      - in: query
        name: fields
        schema:
          type: string
          format: boolean
          description: 是否返回字段信息
          default: 'true'
        required: false
      - in: query
        name: highlight
        schema:
          type: string
          format: boolean
          description: 是否需要高亮
          default: 'true'
        required: false
      - in: query
        name: datasets
        schema:
          type: string
          description: 数据集
          default: '[]'
        required: false
      - in: query
        name: market_day
        schema:
          type: string
          format: number
          description: '交易日id, -1: 系统默认交易日, 0: 非交易日, 其他: 交易日id'
        required: false
      - in: query
        name: onlyTransactionDate
        schema:
          type: string
          format: boolean
          description: 是否只查询交易日, 默认为false, 有 market_day 时优先使用 market_day
          default: 'false'
        required: false
      - in: query
        name: terminated_after_size
        schema:
          type: string
          description: 分片取样数量, 每个shard获取条数, 负数表示不启动
        required: false
      - in: query
        name: test_mode
        schema:
          type: string
          format: boolean
          default: 'false'
        required: false
      - in: query
        name: timezone
        schema:
          type: string
          description: 时区
          default: Asia/Shanghai
        required: false
      - in: query
        name: app_id
        schema:
          type: string
          description: 应用id
        required: false
      - in: query
        name: app_name
        schema:
          type: string
          description: 应用名称, 有 app_id 时优先使用 app_id
        required: false
      - in: query
        name: enable_accelerate
        schema:
          type: string
          format: boolean
          description: 是否启用加速
          default: 'false'
        required: false
      - in: query
        name: accelerate_id
        schema:
          type: string
          format: number
          description: 加速id
        required: false
      - in: query
        name: session_id
        schema:
          type: string
          description: 会话id
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  sid:
                    type: string
                    description: 任务id
                  type:
                    type: string
                    description: 任务类型
                  rc:
                    type: number
                    description: SPL是否成功返回
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
