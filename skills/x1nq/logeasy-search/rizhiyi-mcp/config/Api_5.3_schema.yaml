        required: false
      - in: query
        name: cluster_id
        schema:
          type: string
          description: 日志聚类id, 当 details 为 true 时, 该参数必填
        required: false
      - in: query
        name: level
        schema:
          type: string
          format: number
          description: 日志聚类分析结果级别, 当 details 为 true 时, 优先使用 details
          default: '1'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                    description: SPL是否成功返回
                  looseDataCommands:
                    type: array
                    description: 未解析的命令
                    items:
                      type: object
                  tree_layer:
                    type: object
                    example:
                      clusters: []
                      level: 0
                      max_level: 0
                      total_hits: 0
                  job_status:
                    type: string
                    description: 任务状态
                    example: RUNNING
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/search/drill_down/:
    get:
      operationId: drill_down
      description: 根据 filters 获取钻取语句
      tags:
      - search
      parameters:
      - in: query
        name: pipe_command
        schema:
          type: string
          description: 钻取命令
        required: true
      - in: query
        name: filters
        schema:
          type: string
          description: 钻取过滤条件，field 为字段名，value 为字段值，conjunction 为连接符，operator 为操作符
          example: '{"filters":[{"field":""ip"","value":["192.168.43.183"],"conjunction":"AND","operator":"eq"}]}'
        required: true
      - in: query
        name: type
        schema:
          type: string
          description: 钻取类型
          example: filter
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                    description: SPL是否成功返回
                  pipe_command:
                    type: string
                    description: 钻取语句
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/search/precheck/:
    get:
      operationId: precheck
      description: 预检查, 检查语法是否正确, 返回预检查结果
      tags:
      - search
      parameters:
      - in: query
        name: now
        schema:
          type: string
          description: 当前时间戳, 默认为机器的系统时间
        required: false
      - in: query
        name: time_range
        schema:
          type: string
          description: 时间范围, 格式为"开始时间,结束时间", 支持毫秒、now、earliest、yyyy-MM-hh:HH:mm:ss、yyyy-MM-hh:HH:mm:ss:SSS格式
        required: false
      - in: query
        name: interval
        schema:
          type: string
          description: 时间间隔, 格式为"时间长度+时间单位", 支持毫秒(ms)、秒(s)、分钟(m)、小时(h)、天(d)、周(w)、月(M)、年(y)格式
        required: false
      - in: query
        name: queryfilters
        schema:
          type: string
          description: 查询过滤条件
        required: false
      - in: query
        name: executor_id
        schema:
          type: string
          description: 执行者id, 默认为当前用户id
        required: false
      - in: query
        name: filter_field
        schema:
          type: string
        required: false
      - in: query
        name: query
        schema:
          type: string
          description: 查询语句
        required: false
      - in: query
        name: use_spark
        schema:
          type: string
          format: boolean
          description: 是否使用高基模式
          default: 'false'
        required: false
      - in: query
        name: order
        schema:
          type: string
          description: 排序方式
          default: desc
        required: false
      - in: query
        name: category
        schema:
          type: string
          description: 查询类别
          default: other
        required: false
      - in: query
        name: task_name
        schema:
          type: string
          description: 任务名称, 用于区分不同类型的任务
          default: search_task
        required: false
      - in: query
        name: background
        schema:
          type: string
          format: boolean
          description: 是否后台执行
          default: 'false'
        required: false
      - in: query
        name: lang
        schema:
          type: string
          description: 语言
          default: zh_CN
        required: false
      - in: query
        name: timeline
        schema:
          type: string
          format: boolean
          description: 是否返回时间轴
          default: 'true'
        required: false
      - in: query
        name: statsevents
        schema:
          type: string
          format: boolean
          description: stats搜索时, 搜索结果是否需要保留记录
          default: 'false'
        required: false
      - in: query
        name: fields
        schema:
          type: string
          format: boolean
          description: 是否返回字段信息
          default: 'true'
        required: false
      - in: query
        name: highlight
        schema:
          type: string
          format: boolean
          description: 是否需要高亮
          default: 'true'
        required: false
      - in: query
        name: datasets
        schema:
          type: string
          description: 数据集
          default: '[]'
        required: false
      - in: query
        name: market_day
        schema:
          type: string
          format: number
          description: '交易日id, -1: 系统默认交易日, 0: 非交易日, 其他: 交易日id'
        required: false
      - in: query
        name: onlyTransactionDate
        schema:
          type: string
          format: boolean
          description: 是否只查询交易日, 默认为false, 有 market_day 时优先使用 market_day
          default: 'false'
        required: false
      - in: query
        name: terminated_after_size
        schema:
          type: string
          description: 分片取样数量, 每个shard获取条数, 负数表示不启动
        required: false
      - in: query
        name: test_mode
        schema:
          type: string
          format: boolean
          default: 'false'
        required: false
      - in: query
        name: timezone
        schema:
          type: string
          description: 时区
          default: Asia/Shanghai
        required: false
      - in: query
        name: app_id
        schema:
          type: string
          description: 应用id
        required: false
      - in: query
        name: app_name
        schema:
          type: string
          description: 应用名称, 有 app_id 时优先使用 app_id
        required: false
      - in: query
        name: enable_accelerate
        schema:
          type: string
          format: boolean
          description: 是否启用加速
          default: 'false'
        required: false
      - in: query
        name: accelerate_id
        schema:
          type: string
          format: number
          description: 加速id
        required: false
      - in: query
        name: session_id
        schema:
          type: string
          description: 会话id
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                    description: SPL是否成功返回
                  type:
                    type: string
                    description: 任务类型
                  starttime:
                    type: number
                    description: 开始时间
                  endtime:
                    type: number
                    description: 结束时间
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/search/complete/:
    get:
      operationId: get_search_autocomplete_results
      description: 获取搜索语句自动补全提示
      tags:
      - search
      parameters:
      - in: query
        name: time_range
        schema:
          type: string
          description: 时间范围, 格式为"开始时间,结束时间", 支持毫秒、now、earliest、yyyy-MM-hh:HH:mm:ss、yyyy-MM-hh:HH:mm:ss:SSS格式
        required: false
      - in: query
        name: search
        schema:
          type: string
          description: 搜索语句
        required: false
      - in: query
        name: use_typeahead
        schema:
          type: string
          format: boolean
          description: 是否使用 typeahead, 默认为 true
          default: 'true'
        required: false
      - in: query
        name: show_command_doc
        schema:
          type: string
          format: boolean
          description: 是否显示命令文档, 默认为 true
          default: 'true'
        required: false
      - in: query
        name: show_syntax_desc
        schema:
          type: string
          format: boolean
          description: 是否显示语法描述, 默认为 true
          default: 'true'
        required: false
      - in: query
        name: app_id
        schema:
          type: string
          format: number
          description: 应用id
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                    description: SPL是否成功返回
                  error_text:
                    type: string
                    description: 错误信息
                  replace_begin:
                    type: number
                    description: 替换的起始字符
                  search_input:
                    type: string
                    description: 搜索语句
                  replacement:
                    type: array
                    description: 替换列表
                    items:
                      type: object
                  cmd_doc:
                    type: object
                    description: 命令文档
                    example:
                      cmd_name: stats
                      desc: 提供统计信息，可以选择按照字段分组
                      examples:
                      - example: logtype:apache | stats count() by apache.clientip,
                          apache.status
                        description: 统计ip和status的组合的事件数量
                  syntax_hints:
                    type: object
                    description: 语法描述
                    example:
                      cmd_name: stats
                      cmd_syntax: stats (<stats_function> [as <field>])+ [by <field-list>]
                      options: []
                      functions: []
                  fields:
                    type: array
                    description: 字段列表
                    items:
                      type: string
                  next_tokens:
                    type: array
                    description: 下一个token
                    example:
                    - date_histogram
                    - extended_stats
                    items:
                      type: string
                  similarCommands:
                    type: array
                    description: 相似命令
                    example:
                    - stats avg(a) by appname
                    - stats avg('timestamp')
                    items:
                      type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/search/tokens/:
    get:
      operationId: get_highlight_tokens
      description: 获取搜索语句输入框中需要高亮的所有 tokens
