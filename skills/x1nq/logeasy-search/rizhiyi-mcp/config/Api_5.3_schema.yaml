                  type: boolean
                number_of_shards:
                  type: integer
                node_filter_plan:
                  type: array
                  items:
                    type: object
              required:
              - pattern
              - rotation_period
              - name
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
