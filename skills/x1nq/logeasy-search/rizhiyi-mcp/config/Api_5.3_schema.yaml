                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                    description: SPL是否成功返回
                  tokens:
                    type: object
                    example:
                      lookup: A
                      abs: B
                      avg: C
                      by: D
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
