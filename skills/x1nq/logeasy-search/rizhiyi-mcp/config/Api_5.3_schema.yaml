  /api/v3/usage/:
    get:
      operationId: get_usage_list
      description: 获取用户搜索用量列表
      tags:
      - usage
      parameters:
      - in: query
        name: from
        schema:
          type: string
          format: number
          description: 开始时间
          example: 1701532800000
        required: true
      - in: query
        name: to
        schema:
          type: string
          format: number
          description: 结束时间
          example: 1701619200000
        required: true
      - in: query
        name: now
        schema:
          type: string
          format: number
          description: 当前时间
          example: 1701602800000
        required: false
      - in: query
        name: page
        schema:
          type: string
          format: number
          description: 页码
        required: false
      - in: query
        name: size
        schema:
          type: string
          format: number
          description: 每页条数
          example: 10
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  meta:
                    type: object
                    description: 资源集合元数据
                    properties:
                      total:
                        type: number
                        description: 资源总数
                      page:
                        type: number
                        description: 当前请求页码
                      size:
                        type: number
                        description: 每页资源数
                      count:
                        type: number
                        description: 当前页返回资源数
                      category:
                        type: string
                        description: 资源分类
                  objects:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:
                          type: number
                          description: 用户id
                        account_name:
                          type: string
                          description: 用户名
                        search_count:
                          type: number
                          description: 搜索次数
                        search_fail_count:
                          type: number
                          description: 搜索失败次数
                        search_cost:
                          type: number
                          description: 搜索耗时
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
