        name: id
        schema:
          type: string
        required: true
      - in: query
        name: action
        schema:
          type: string
          description: 操作类型, 获取资源权限时为操作类型, Read、Update、Delete 等等, 获取功能权限时为权限名称, CreateAlert、CreateDataSet
            等等
          example: Read
        required: false
      - in: query
        name: resource_type
        schema:
          type: string
          description: 权限类型, 获取资源权限时为资源类型, Alert、DataSet 等等, 获取功能权限时为空
          example: AgentGroup
        required: false
      - in: query
        name: resource_ids
        schema:
          type: string
          description: 资源id列表
          example: 1,2,3
          pattern: ^\d*(\,\d+)*$
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  objects:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          description: 权限id
                        resource_type:
                          type: string
                          description: 资源类型, 为空时表示功能权限
                        action:
                          type: string
                          description: 操作类型
                        resource_id:
                          type: number
                          description: 资源id
                        meta_id:
                          type: number
                          description: 权限meta id
                        grant:
                          type: boolean
                          description: 是否可转授
                        is_grant:
                          type: boolean
                          description: 同grant, 是否可转授
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    put:
      operationId: update_role_permissions
      description: 更新角色权限, 接口为全量更新, 即对数据中提供的 resource_type 下的 resource_ids 进行全量更新
      tags:
      - permissions
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_type:
                  type: string
                  description: 权限类型, 获取资源权限时为资源类型, Alert、DataSet 等等, 获取功能权限时为 Possess
                resource_ids:
                  type: string
                  description: 更新的若为资源权限, 需要指明目标资源 id 列表
                  pattern: ^\d*(\,\d+)*$
                update_permissions:
                  type: array
                  description: 更新的权限数据, 若更新功能权限，需给出角色所有的功能权限; 若更新资源权限，需给出 resource_type
                    和 resource_ids 对应的资源的所有权限，给出的权限代表新增或保留，未提供的权限代表删除
                  items:
                    type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: boolean
                    description: 是否更新成功
          description: 请求成功
