openapi: 3.0.3
info:
  title: 日志易 API 集合
  version: v3.0
paths:
  /api/v3/accelerations/check/:
    get:
      operationId: check_acceleration
      description: 校验语句是否可以加速
      tags:
      - accelerations
      parameters:
      - in: query
        name: query
        schema:
          type: string
          description: SPL语句
        required: true
      - in: query
        name: time_range
        schema:
          type: string
          description: 格式为开始时间,结束时间。支持毫秒、now、earliest、yyyy支持毫秒、now、earliest、yyyy-MM-hh:HH:mm:ss、yyyy-MM-hh:HH:mm:ss:SSS格式，不传默认为0
        required: true
      - in: query
        name: now
        schema:
          type: string
          description: 当前时间戳, 默认为机器的系统时间
        required: false
      - in: query
        name: executor_id
        schema:
          type: string
          description: 执行用户ID
        required: false
      - in: query
        name: task_name
        schema:
          type: string
          description: 任务名称， 用于区分不同类型的任务
        required: false
      - in: query
        name: background
        schema:
          type: string
          description: 后台任务标志, 后台任务无需preview保持心跳
        required: false
      - in: query
        name: timeline
        schema:
          type: string
          format: boolean
          description: 时间轴查看
          default: 'true'
        required: false
      - in: query
        name: statsevents
        schema:
          type: string
          format: boolean
          description: stats搜索时，搜索结果是否需要保留记录
          default: 'true'
        required: false
      - in: query
        name: fields
        schema:
          type: string
          format: boolean
          description: 返回结果是否包括字段信息
          default: 'true'
        required: false
      - in: query
        name: use_spark
        schema:
          type: string
          description: 是否启用高基模式
        required: false
      - in: query
        name: highlight
        schema:
          type: string
          format: boolean
          description: 是否需要高亮, 高亮字符使用包裹
          default: 'true'
        required: false
      - in: query
        name: market_day
        schema:
          type: string
          description: 不在交易日
        required: false
      - in: query
        name: onlyTransactionDate
        schema:
          type: string
          description: 系统默认交易日
        required: false
      - in: query
        name: lang
        schema:
          type: string
          description: 语言
        required: false
      - in: query
        name: app_id
        schema:
          type: string
          description: 所属应用id
        required: false
      - in: query
        name: terminated_after_size
        schema:
          type: string
          description: 分片取样数量, 每个shard获取条数, 负数表示不启动
          default: '-1'
        required: false
      - in: query
        name: test_mode
        schema:
          type: string
          default: 'false'
        required: false
      - in: query
        name: timezone
        schema:
          type: string
          default: Asia/Shanghai
        required: false
      - in: query
        name: filter_field
        schema:
          type: string
        required: false
      - in: query
        name: datasets
        schema:
          type: string
        required: false
      - in: query
        name: queryfilters
        schema:
          type: string
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                  interval_map:
                    type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/open/:
    post:
      operationId: open_acceleration
      description: 开启加速通知
      tags:
      - accelerations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_id:
                  oneOf:
                  - type: string
                  - type: number
                  description: 资源ID
                resource_type:
                  type: string
                  description: 资源类型
                range:
                  type: string
                  description: 加速缓存范围
                  enum:
                  - 1M
                  - 1d
                  - 1w
                  - 1y
                  - 3M
              required:
              - resource_type
              - resource_id
              - range
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/close/{resource_id}/:
    post:
      operationId: close_acceleration
      description: 关闭加速通知
      tags:
      - accelerations
      parameters:
      - in: path
        name: resource_id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_type:
                  type: string
                  description: 资源类型
              required:
              - resource_type
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/stats/:
    get:
      operationId: get_accelerate_stats
      description: 统计加速信息
      tags:
      - accelerations
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  meta:
                    type: object
                    properties:
                      total:
                        type: number
                        description: 资源总数
                      count:
                        type: number
                        description: 当前页返回资源数
                  objects:
                    type: array
                    items:
                      type: object
                      properties:
                        accelerate_interval:
                          type: string
                          description: 加速粒度
                        accelerate_time_range:
                          type: string
                        cache_cost_percent:
                          type: string
                        cache_hit_count:
                          type: number
                          description: 访问次数
                        cache_percentage:
                          type: string
                        cache_status:
                          type: string
                          description: 构建状态
                        disk_usage:
                          type: string
                        hash:
                          type: string
                          description: 任务 ID
                        last_access:
                          type: string
                          description: 最后来访资源
                        last_access_time:
                          type: string
                          description: 最后来访时间
                        ref_trends:
                          type: array
                          description: 趋势图个数
                          items:
                            type: number
                        update_time:
                          type: number
                          description: 更新时间
                        create_time:
                          type: string
                          description: 创建时间
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/edit/:
    post:
      operationId: edit_acceleration
      description: 编辑加速通知
      tags:
      - accelerations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_id:
                  oneOf:
                  - type: string
                  - type: number
                  description: 资源ID
                resource_type:
                  type: string
                  description: 资源类型
                range:
                  type: string
                  description: 加速缓存范围
                  enum:
                  - 1M
                  - 1d
                  - 1w
                  - 1y
                  - 3M
              required:
              - resource_type
              - resource_id
              - range
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/modifytrend/:
    post:
      operationId: modify_accelerate_relate_trend
      description: 修改趋势图信息通知接口
      tags:
      - accelerations
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_id:
                  oneOf:
                  - type: string
                  - type: number
                  description: 资源ID
                resource_type:
                  type: string
                  description: 资源类型
              required:
              - resource_type
              - resource_id
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/delete/:
    delete:
      operationId: delete_acceleration
      description: 删除加速任务
      tags:
      - accelerations
      parameters:
      - in: query
        name: hash
        schema:
          type: string
          description: 任务 ID
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/:
    get:
      operationId: get_accelerations_list
      description: 获取加速任务列表
      tags:
      - accelerations
      parameters:
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permits'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
      - in: query
        name: id
        schema:
          type: integer
        required: false
      - in: query
        name: resource_type
        schema:
          type: string
          description: 资源类型，趋势图=Trend
        required: false
      - in: query
        name: resource_id
        schema:
          type: integer
          description: 资源ID，和资源类型一起对应一个资源
        required: false
      - in: query
        name: user_id
        schema:
          type: integer
          description: 用户ID，创建加速的用户
        required: false
      - in: query
        name: domain_id
        schema:
          type: integer
          description: 域ID，用户的域
        required: false
      - in: query
        name: domain
        schema:
          type: string
          description: 域
        required: false
      - in: query
        name: dataset_id
        schema:
          type: string
          description: 数据集ID，SPL会定时扫描数据集，当数据集被修改时，更新使用到这个数据集的加速
        required: false
      - in: query
        name: datasets
        schema:
          type: string
          description: 数据集内容，SPL在扫描数据集时，发现数据集内容和真实内容已经不一致时，会更新该加速
        required: false
      - in: query
        name: query_scope
        schema:
          type: string
          description: 搜索权限，SPL会定时扫描用户的搜索权限，当搜索权限被修改时，更新使用到该搜索权限的加速
        required: false
      - in: query
        name: range
        schema:
          type: string
          description: 加速缓存范围，在SPL定时扫描更新加速时，需要用到该字段
        required: false
      - in: query
        name: accelerate_indices
        schema:
          type: string
          description: 加速用到的索引，SPL和beaver同步时会比对index是否一致
        required: false
      - in: query
        name: accelerate_name
        schema:
          type: string
          description: 加速名字，SPL和beaver使用该名字确定一条加速
        required: false
      - in: query
        name: accelerate_interval
        schema:
          type: string
          description: 加速粒度
        required: false
      - in: query
        name: accelerate_hash
        schema:
          type: string
          description: 加速hash，beaver算出的hash
        required: false
      - in: query
        name: accelerate_enable
        schema:
          type: boolean
          description: 加速是否开启 1-开启,0-关闭
          enum:
          - 0
          - 1
        required: false
      - in: query
        name: last_access
        schema:
          type: string
          description: 加速最后访问taskName
        required: false
      - in: query
        name: last_access_time
        schema:
          type: integer
          description: 加速最后访问时间
        required: false
      - in: query
        name: cache_hit
        schema:
          type: integer
          description: 该加速被命中的次数
        required: false
      - in: query
        name: update_time
        schema:
          type: integer
          description: 该加速最后更新时间
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - accelerate_enable
          - accelerate_hash
          - accelerate_indices
          - accelerate_interval
          - accelerate_name
          - cache_hit
          - dataset_id
          - datasets
          - domain
          - domain_id
          - id
          - last_access
          - last_access_time
          - query_scope
          - range
          - resource_id
          - resource_type
          - update_time
          - user_id
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/Acceleration'
                        - $ref: '#/components/schemas/AccelerationReadOnly'
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accelerations/{resource_id}/:
    get:
      operationId: get_accelerations_detail
      description: 获取单个加速任务
      tags:
      - accelerations
      parameters:
      - in: path
        name: resource_id
        schema:
          type: integer
          description: 资源ID，和资源类型一起对应一个资源
        required: true
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permit'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permit'
                - type: object
                  properties:
                    object:
                      allOf:
                      - $ref: '#/components/schemas/Acceleration'
                      - $ref: '#/components/schemas/AccelerationReadOnly'
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/{id}/enable/:
    put:
      operationId: enable_account
      description: 启用用户
      tags:
      - accounts
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: boolean
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/{id}/disable/:
    put:
      operationId: disable_account
      description: 禁用用户
      tags:
      - accounts
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: boolean
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/{id}/unlock/:
    put:
      operationId: unlock_account
      description: 解锁用户(只有admin可以解锁用户)
      tags:
      - accounts
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: boolean
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/{id}/password/:
    put:
      operationId: update_account_password
      description: 修改用户登陆密码
      tags:
      - accounts
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                new_passwd:
                  type: string
                  description: 新密码
                old_passwd:
                  type: string
                  description: 旧密码
              required:
              - new_passwd
              - old_passwd
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: boolean
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/role_resource/role_ids/:
    post:
      operationId: batch_get_role_resource
      description: 批量获取角色索引搜索配置
      tags:
      - accounts
      parameters:
      - in: query
        name: role_ids
        schema:
          type: string
          description: 角色ID
          example: 1,2,3
          pattern: ^\d*(\,\d+)*$
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        create_time:
                          type: number
                          description: 创建时间
                        id:
                          type: number
                        update_time:
                          type: number
                          description: 更新时间
                        property:
                          type: string
                          description: 指定配置
                          example: '{"max_search":"max"}'
                        resource_id:
                          type: number
                          description: 资源 id
                        resource_type:
                          type: string
                          description: ' 资源类型'
                        role_id:
                          type: number
                          description: 角色 id
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/role_resource/update/:
    post:
      operationId: batch_update_role_resource
      description: 批量更新角色索引搜索配置
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: number
                  property:
                    type: string
                    description: 指定配置
                    example: '{"max_search":"max"}'
                  resource_id:
                    type: number
                    description: 资源 id
                  resource_type:
                    type: string
                    description: ' 资源类型'
                  role_id:
                    type: number
                    description: 角色 id
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  data:
                    type: boolean
                    description: 是否更新成功
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/accounts/role_resource/create/:
    post:
      operationId: batch_create_role_resource
      description: 批量创建角色索引搜索配置
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                    description: 指定配置
                    example: '{"max_search":"max"}'
                  resource_id:
                    type: number
                    description: 资源 id
                  resource_type:
                    type: string
                    description: ' 资源类型'
                  role_id:
                    type: number
                    description: 角色 id
        required: true
      responses:
        '200':
          content:
            application/json:
