  /api/v3/permissions/category/:
    get:
      operationId: get_role_permission_categories
      description: 获取角色授权分类目录，包含基础权限分类下的(功能权限、搜索权限、索引和主题权限、角色的一些配置)、各类资源权限、用户、用户分组、Agent分组权限
      tags:
      - permissions
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  objects:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: 分类名称
                          example: Function, ConfigItem, Alert, ...
                        resourceType:
                          type: string
                          description: 'Possess: 功能权限, ConfigItem: 配置, 其他: 资源类型,'
                          example: Possess, ConfigItem, Alert, ...
                        accessUrl:
                          type: string
                          description: 资源权限对应的页面访问地址
                          example: alerts/
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/permissions/translation/:
    get:
      operationId: get_func_permission_translations
      description: 获取功能权限的翻译
      tags:
      - permissions
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        '[action]':
                          type: string
                          description: '功能权限名称: 翻译'
                          example: 可查看搜索页
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/permissions/resources/:
    get:
      operationId: get_accessible_resources
      description: 获取用户可访问的资源
      tags:
      - permissions
      parameters:
      - in: query
        name: resource_type
        schema:
          type: string
          description: 资源类型
        required: true
      - in: query
        name: action
        schema:
          type: string
          description: 操作类型, Read, Update, Delete
          default: Read
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: array
                    description: 资源id列表
                    items:
                      type: number
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/permissions/:
    get:
      operationId: get_permissions_list
      description: 获取权限列表
      tags:
      - permissions
      parameters:
      - in: query
        name: resource_type
        schema:
          type: string
          description: 权限类型, 获取资源权限时为资源类型, Alert、DataSet 等等, 获取全部功能权限时为 Possess
          example: AgentGroup
        required: false
      - in: query
        name: action
        schema:
          type: string
          description: 操作类型, 获取资源权限时为操作类型, Read、Update、Delete 等等, 获取单个功能权限时为权限名称,
            CreateAlert、CreateDataSet 等等
          example: Read
        required: false
      - in: query
        name: resource_ids
        schema:
          type: string
          description: 资源id列表
          example: 1,2,3
          pattern: ^\d*(\,\d+)*$
        required: false
      - in: query
        name: resource_id
        schema:
          type: string
          format: number
          description: 资源id
          example: '1'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: number
                            description: 权限id
                          resource_type:
                            type: string
                            description: 资源类型, 为空时表示功能权限
                          action:
                            type: string
                            description: 操作类型
                          resource_id:
                            type: number
                            description: 资源id
                          meta_id:
                            type: number
                            description: 权限meta id
                          grant:
                            type: boolean
                            description: 是否可转授
                          is_grant:
                            type: boolean
                            description: 同grant, 是否可转授
                          app_id:
                            type: number
                            description: 应用id, 参数中带有 resource_id/resource_ids 时返回
                          export:
                            type: string
                            description: 资源范围, 参数中带有 resource_id/resource_ids 时返回
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
