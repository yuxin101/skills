  /api/v3/trends/{id}/:
    get:
      operationId: get_trends_detail
      description: 获取趋势图详情
      tags:
      - trends
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permit'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permit'
                - type: object
                  properties:
                    object:
                      allOf:
                      - $ref: '#/components/schemas/Trend'
                      - type: object
                        properties:
                          id:
                            readOnly: true
                            type: integer
                          uuid:
                            readOnly: true
                            type: string
                          domain_id:
                            readOnly: true
                            type: integer
                          creator_id:
                            readOnly: true
                            type: integer
                          create_time:
                            description: 创建时间
                            readOnly: true
                            type: string
                            format: date-time
                          update_time:
                            description: 更新时间
                            readOnly: true
                            type: number
                            format: date-time
                          rt_list:
                            type: array
                            description: 关联的资源标签
                            example:
                            - id: 1
                              name: 标签1
                            - id: 2
                              name: 标签2
                            items:
                              type: object
                          creator_enabled:
                            type: boolean
                            description: 用户是否可用
                          creator_name:
                            type: string
                            description: 用户名称
                            example: admin
                          creator_full_name:
                            type: string
                            description: 用户全名
                            example: admin
                          app_name:
                            type: string
                            description: 所属应用名称
                            example: 应用名称
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    put:
      operationId: update_trends_detail
      description: 更新趋势图
      tags:
      - trends
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  maxLength: 255
                  type: string
                  pattern: ^[\w\d\u4e00-\u9fa5\-_()（）]+$
                trend_id:
                  maxLength: 255
                  type: string
                category:
                  type: integer
                content:
                  type: string
                data_user:
                  description: 数据用户 viewer-浏览者,creator-创建者
                  enum:
                  - viewer
                  - creator
                  maxLength: 255
                  type: string
                query:
                  type: string
                datasets:
                  maxLength: 255
                  type: string
                trend_app:
                  type: integer
                only_sort_by_timestamp:
                  type: boolean
                timerange:
                  maxLength: 255
                  type: string
                app_id:
                  description: 所属应用
                  type: integer
                export:
                  description: 资源范围 local-本APP内可见,system-全局可见
                  enum:
                  - local
                  - system
                  maxLength: 255
                  type: string
                rt_names:
                  type: string
                  description: 关联的资源标签
                  example: 标签1,标签2
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          maxLength: 255
                          type: string
                        app_id:
                          description: 所属应用
                          type: integer
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    delete:
      operationId: delete_trends_detail
      tags:
      - trends
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          maxLength: 255
                          type: string
                        app_id:
                          description: 所属应用
                          type: integer
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
components:
  parameters:
    custom_collection:
      in: query
      name: custom_collection
      description: 是否仅返回收藏的资源
      schema:
        type: boolean
        default: false
    fields:
      in: query
      name: fields
      description: 指定返回的字段
      schema:
        type: string
        example: id,name
    id_list:
      in: query
      name: id_list
      description: 资源id，以`,`分割
      schema:
        type: string
        example: 1,2,3
    page:
      in: query
      name: page
      description: 所在页数
      schema:
        type: integer
        minimum: 0
        default: 0
    permit:
      in: query
      name: permit
      description: 是否获取资源相关权限集合
      schema:
        type: boolean
        default: true
    permits:
      in: query
      name: permits
      description: 是否获取资源相关权限集合
      schema:
        type: boolean
        default: true
    size:
      in: query
      name: size
      description: 每页条数
      schema:
        type: integer
        minimum: 1
        default: 10
  schemas:
    AgentGroup:
      type: object
      properties:
        domain_id:
          type: integer
        name:
          description: 名称
          maxLength: 255
          type: string
        memo:
          description: 描述
          maxLength: 255
          type: string
        creator_id:
          type: integer
        extra:
          description: 采集配置
          type: string
        from_app:
          description: 创建的时候关联的应用
          type: integer
    AgentGroupReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
        update_time:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
    AgentStatus:
      type: object
      properties:
        ip:
          description: Agent地址
          maxLength: 64
          type: string
        port:
          description: 端口
          type: integer
        status:
          description: 启动状态
          maxLength: 64
          type: string
        os:
          description: 操作系统
          maxLength: 32
          type: string
        platform:
          description: 平台
          maxLength: 64
          type: string
        cur_version:
          description: 版本
          maxLength: 64
          type: string
        expected_version:
          description: 预期版本
          maxLength: 64
          type: string
        is_server_heka:
          description: 类型 false-Agent,true-Server
          enum:
          - 'false'
          - 'true'
          type: boolean
        proxy_ip:
          description: 代理地址
          maxLength: 64
          type: string
        proxy_port:
          description: 代理端口
          type: integer
        domain_id:
          type: integer
        hostname:
          description: 主机名
          maxLength: 256
          type: string
        comment:
          description: 备注
          maxLength: 256
          type: string
        cmd:
          maxLength: 64
          type: string
        cmd_timestamp:
          type: string
          format: date-time
    AgentStatusReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        create_timestamp:
          description: agent 接入时间
          readOnly: true
          type: string
          format: date-time
        last_update_timestamp:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
    Alert:
      type: object
      properties:
        uuid:
          maxLength: 32
          type: string
        name:
          description: 告警名字
          maxLength: 255
          type: string
        domain_id:
          type: integer
        executor_id:
          type: integer
        creator_id:
          type: integer
        description:
          description: 描述
          type: string
        check_interval:
          description: 定时执行时间间隔
          type: integer
        interval_unit:
          description: 标记check_interval的单位，0表示分钟，1表示秒
          type: integer
        check_condition:
          description: 触发条件
          type: string
        enabled:
          description: 状态,0关闭,1开启
          type: boolean
        category:
          description: 报警类型
          type: integer
        crontab:
          maxLength: 255
          type: string
        restrain_interval:
          description: 告警抑制
          type: integer
        now_restrain_interval:
          type: integer
        max_restrain_interval:
          description: 告警抑制的最大时间
          type: integer
        continuous_trigger_value:
          type: integer
        group_suppress_field:
          maxLength: 255
          type: string
        alert_when_recover:
          description: 告警恢复时是否提示
          type: integer
        generate:
          type: boolean
        graph_enabled:
          type: boolean
        query:
          type: string
        extend_query:
          type: string
        run_results:
          type: string
        dataset_ids:
          type: string
        extend_dataset_ids:
          type: string
        extend_conf:
          type: string
        use_spark:
          type: boolean
        extend_use_spark:
          type: boolean
        segmentation_field:
          maxLength: 255
          type: string
        segmentation_result:
          description: 字段切分运行结果
          type: string
        statistics_field:
          maxLength: 255
          type: string
        market_day:
          description: 交易日id, -1表示默认交易日
          type: integer
        alert_line_send:
          type: boolean
        schedule_priority:
          description: 调度优先级 0-默认,1-更高,2-最高
          enum:
          - 0
          - 1
          - 2
          type: integer
        schedule_window:
          description: 调度窗口，单位 m/h/d
          maxLength: 15
          type: string
        window:
          description: 主时间窗口
          maxLength: 32
          type: string
        topic:
          description: topic名称
          maxLength: 32
          type: string
        check_condition_group:
          type: string
        group_trigger_flag:
          type: boolean
        hosted_flag:
          type: boolean
        composite_info:
          description: 联合监控配置
          type: string
        app_id:
          description: 所属应用
          type: integer
        export:
          description: 资源范围 local-本APP内可见,system-全局可见
          enum:
          - local
          - system
          maxLength: 255
          type: string
        timezone:
          description: 执行时区
          maxLength: 255
          type: string
        alert_condition:
          type: string
        recover_condition:
          type: string
        alert_state:
          maxLength: 30
          type: string
        alert_segmentation_result:
          type: string
    AlertReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        update_timestamp:
          description: alert修改时间
          readOnly: true
          type: integer
        last_trigger_timestamp:
          description: 上次触发告警时间
          readOnly: true
          type: integer
        last_run_timestamp:
          readOnly: true
          type: integer
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
    IndexInfo:
      type: object
      properties:
        name:
          type: string
        alias:
          type: string
        disabled:
          type: boolean
        expired_time:
          type: string
        rotation_period:
          type: string
        description:
          type: string
        domain_id:
          type: integer
        quota:
          maxLength: 255
          type: string
        phantom_time:
          maxLength: 255
          type: string
        creator_id:
          type: integer
    IndexInfoReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        last_modified_time:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
    ParserRule:
      type: object
      properties:
        name:
          description: 自定义规则
          maxLength: 255
          type: string
        conf:
          type: string
        logtype:
          type: string
        desc:
          type: string
        category_id:
          type: integer
        enable:
          type: boolean
        from_app:
          description: 创建的时候关联的应用
          type: integer
        notice_frequency:
          description: 未解析日志的消息通知频率
          maxLength: 20
          type: string
        sink_conf:
          description: 解析规则的指标索引配置
          type: string
    ParserRuleReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        uuid:
          readOnly: true
          type: string
        domain_id:
          readOnly: true
          type: integer
        creator_id:
          readOnly: true
          type: integer
        last_modified_time:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
    SavedSearch:
      type: object
      properties:
        name:
          maxLength: 255
          type: string
        query:
          description: 查询语句
          type: string
        time_range:
          description: 搜索时间范围
          maxLength: 255
          type: string
        market_day:
          description: 是否只搜索交易日数据
          maxLength: 255
          type: string
        highlight:
          description: 资源是否高亮，true或false
          maxLength: 255
          type: string
        only_sort_by_timestamp:
          maxLength: 255
          type: string
        source_groups:
          maxLength: 255
          type: string
        filters:
          type: string
        dataset_ids:
          description: 资源数据集列表，例如:[{"dataset_id":28},{"dataset_id":2,"node_id":5}]
          type: string
        parameters:
          description: 资源参数
          type: string
        event_list_properties:
          description: 已存搜索的展示模式配置
          type: string
        anonymous:
          description: 是否匿名
          type: boolean
        marked:
          description: 是否标记重要
          type: boolean
        old_es_id:
          description: 旧的ES_ID，要被废弃掉，但是导入的时候还需要
          maxLength: 255
          type: string
        source_group_ids:
          maxLength: 255
          type: string
        use_spark:
          type: boolean
        search_mode:
          description: 搜索模式
          maxLength: 255
          type: string
        data_user:
          description: 已存搜索数据用户
          maxLength: 255
          type: string
        is_published:
          description: 已存搜索是否发布
          type: boolean
        app_id:
          description: 所属应用
          type: integer
        export:
          description: 资源范围 local-本APP内可见,system-全局可见
          enum:
          - local
          - system
          maxLength: 255
          type: string
    SavedSearchReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        uuid:
          readOnly: true
          type: string
        domain_id:
          readOnly: true
          type: integer
        creator_id:
          readOnly: true
          type: integer
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
        update_time:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
    Trend:
      type: object
      properties:
        name:
          maxLength: 255
          type: string
        trend_id:
          maxLength: 255
          type: string
        category:
          type: integer
        content:
          type: string
        data_user:
          description: 数据用户 viewer-浏览者,creator-创建者
          enum:
          - viewer
          - creator
          maxLength: 255
          type: string
        query:
          type: string
        datasets:
          maxLength: 255
          type: string
        trend_app:
          type: integer
        only_sort_by_timestamp:
          type: boolean
        timerange:
          maxLength: 255
          type: string
        app_id:
          description: 所属应用
          type: integer
        export:
          description: 资源范围 local-本APP内可见,system-全局可见
          enum:
          - local
          - system
          maxLength: 255
          type: string
    TrendReadOnly:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        uuid:
          readOnly: true
          type: string
        domain_id:
          readOnly: true
          type: integer
        creator_id:
          readOnly: true
          type: integer
        create_time:
          description: 创建时间
          readOnly: true
          type: string
          format: date-time
        update_time:
          description: 更新时间
          readOnly: true
          type: string
          format: date-time
    response-base:
      type: object
      properties:
        result:
          type: boolean
          description: 请求是否成功
          example: true
        traceid:
          type: string
          description: 请求唯一标识
          example: d1e754e2b2354276a1fa22ce2a1a9b51
    response-meta:
      type: object
      properties:
        meta:
          type: object
          description: 资源集合元数据
          properties:
            total:
              type: integer
              description: 资源总数
              example: 10
            size:
              type: integer
              description: 每页资源数
              example: 10
            page:
              type: integer
              description: 当前请求页码
              example: 0
            count:
              type: integer
              description: 当前页返回资源数
              example: 5
            category:
              type: string
              description: 资源分类
              example: Macro
    response-permit:
      type: object
      properties:
        permit:
          type: object
          properties:
            id:
              type: integer
              description: 资源id
              example: 1
            read:
              type: boolean
              description: 是否具有读取权限
              example: true
            update:
              type: boolean
              description: 是否具有更新权限
              example: true
            delete:
              type: boolean
              description: 是否具有删除权限
              example: true
    response-permits:
      type: object
      properties:
        permits:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                description: 资源id
                example: 1
              read:
                type: boolean
                description: 是否具有读取权限
                example: true
              update:
                type: boolean
                description: 是否具有更新权限
                example: true
              delete:
                type: boolean
                description: 是否具有删除权限
                example: true
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: apikey
    BasicAuth:
      type: http
      scheme: basic
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
