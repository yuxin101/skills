  /api/v3/agentgroup/inputs/{id}/:
    get:
      operationId: get_group_extra_inputs
      description: 获取某个group的extra字段
      tags:
      - agentgroup
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: object
                    description: 采集配置(json解析出extra字段)
                    properties:
                      logstreamer_input:
                        type: object
                        example:
                          1c4a095b71313ccbaf967eccc8b17d69:
                            appname: test
                            tag: heka
                            log_directory: /mnt/www01/var/log
                            file_match: /mnt/www01/var/log
                            exclude: ''
                            splitter_regex: \n
                            charset: utf-8
                            oldest_duration: 720h
                            disabled: false
                            id: 1c4a095b71313ccbaf967eccc8b17d69
                            input_type: logstreamer_input
                            isSwitching: false
                            isUpdateable: true
                      syslog_input:
                        type: object
                        example:
                          a6d86d1de63338c29f264d3abe72ff63:
                            protocol: Udp
                            address: 192.168.1.31:514
                            mappings: 192.168.1.31:test:tag:utf-8
                            disabled: false
                      process_input:
                        type: object
                        example:
                          7d10e5e0fc25301386dc2937de11969e:
                            args: []
                            splitter_regex: \n
                            appname: '1'
                            tag: heka
                            charset: utf-8
                            ticker_interval: 60
                            bin: /bin/ls
                            disabled: false
                      top_input:
                        type: object
                        example:
                          top:
                            appname: top_info
                            tag: top_info
                            rescan_interval: 300s
                            disk: true
                            system: true
                            proc: false
                            procs: .*
                            per_cpu: false
                            per_net: false
                            disk_io: true
                            disabled: false
                      kafka_input:
                        type: object
                        example:
                          ad23a631c6ad315d9e0d07afab44bf43:
                            appname: kafa
                            tag: kafaa
                            hostname: ''
                            source: ''
                            worker: 1
                            ip: ''
                            payload: ''
                            context_id: ''
                            log_timestamp: ''
                            bootstrap_servers: 192.168.1.131:123
                            group_id: a
                            topics:
                            - aa
                            commit_interval_second: 5
                            report_metrics: false
                            report_interval_second: 60
                            router_chan_size: 30
                            properties: {}
                            charset: ''
                            debug: false
                            disabled: false
                      eventlog_input:
                        type: object
                        example:
                          Application:
                            appname: windowslog
                            tag: heka
                            ignore_older: 720h
                            event_ids:
                            - 1
                            levels:
                            - info
                            providers:
                            - testproviders
                            channel: Application
                            disabled: false
                          Security:
                            appname: windowslog
                            tag: heka
                            ignore_older: 720h
                            event_ids:
                            - 1
                            levels:
                            - info
                            providers:
                            - testproviders
                            channel: Security
                            disabled: false
                          ForwardedEvents:
                            appname: windowslog
                            tag: heka
                            ignore_older: 720h
                            event_ids:
                            - 1
                            levels:
                            - info
                            providers:
                            - testproviders
                            channel: ForwardedEvents
                            disabled: false
                          Setup:
                            appname: windowslog
                            tag: heka
                            ignore_older: 720h
                            event_ids:
                            - 1
                            levels:
                            - info
                            providers:
                            - testproviders
                            channel: Setup
                            disabled: false
                          System:
                            appname: windowslog
                            tag: heka
                            ignore_older: 720h
                            event_ids:
                            - 1
                            levels:
                            - info
                            providers:
                            - testproviders
                            channel: System
                            disabled: false
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    put:
      operationId: update_group_extra_inputs
      description: 更新某个group的extra字段
      tags:
      - agentgroup
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: 采集配置id(只传id表示删除)
                input:
                  type: object
                  description: 不同类型的采集输入(只传input表示新建, 同时传id跟input表示更新)
                  example:
                    appname: test123
                    tag: heka
                    log_directory: /var/log
                    file_match: .*\.log
                    exclude: ''
                    splitter_regex: \n
                    charset: utf-8
                    oldest_duration: 720h
                    disabled: false
                    id: 51850506ebbd3fccbedd6e932355fc28
                    input_type: logstreamer_input
                    isSwitching: false
                    isUpdateable: true
                type:
                  type: string
                  description: 采集配置类型
                  example: syslog_input
                  enum:
                  - <old_inputs>(一些历史旧的输入类型)
                  - eventlog_input
                  - kafka_input
                  - logstreamer_input
                  - process_input
                  - syslog_input
                  - top_input
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  object:
                    type: object
                    properties:
                      creator_id:
                        type: number
                        description: 创建用户id
                      domain_id:
                        type: number
                      extra:
                        type: string
                        description: 采集配置
                      id:
                        type: number
                      memo:
                        type: string
                        description: 描述
                      name:
                        type: string
                        description: 名称
                      from_app:
                        type: number
                        description: 创建的时候关联的应用
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
  /api/v3/agentgroup/:
    get:
      operationId: get_agentgroup_list
      description: 获取agent分组列表
      tags:
      - agentgroup
      parameters:
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/permits'
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/size'
      - $ref: '#/components/parameters/custom_collection'
      - in: query
        name: id
        schema:
          type: integer
        required: false
      - in: query
        name: domain_id
        schema:
          type: integer
        required: false
      - in: query
        name: name
        schema:
          type: string
          description: 名称
        required: false
      - in: query
        name: memo
        schema:
          type: string
          description: 描述
        required: false
      - in: query
        name: creator_id
        schema:
          type: integer
        required: false
      - in: query
        name: from_app
        schema:
          type: integer
          description: 创建的时候关联的应用
        required: false
      - in: query
        name: rt_ids
        schema:
          type: string
          description: 资源标签过滤，支持多标签过滤，多个标签id之间用`,`分割
          pattern: ^(-?\d+|all)(,-?\d+)*$|^$
        required: false
      - in: query
        name: sort
        schema:
          type: string
          description: 排序规则
          default:
          - -id
          enum:
          - creator_id
          - domain_id
          - from_app
          - id
          - memo
          - name
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - $ref: '#/components/schemas/response-permits'
                - $ref: '#/components/schemas/response-meta'
                - type: object
                  properties:
                    objects:
                      type: array
                      items:
                        allOf:
                        - $ref: '#/components/schemas/AgentGroup'
                        - $ref: '#/components/schemas/AgentGroupReadOnly'
                        - type: object
                          properties:
                            rt_list:
                              type: array
                              description: 关联的资源标签
                              example:
                              - id: 1
                                name: 标签1
                              - id: 2
                                name: 标签2
                              items:
                                type: object
                            creator_enabled:
                              type: boolean
                              description: 用户是否可用
                            creator_name:
                              type: string
                              description: 用户名称
                              example: admin
                            creator_full_name:
                              type: string
                              description: 用户全名
                              example: admin
                            is_collected:
                              type: boolean
                              description: 资源是否被收藏
                              example: true
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
    post:
      operationId: create_agentgroup
      description: 新建agent分组
      tags:
      - agentgroup
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 名称
                  pattern: .+
                memo:
                  type: string
                  description: 描述
                rt_names:
                  type: string
                  description: 资源标签
                  pattern: ^$|^org(\.[-A-Za-z_0-9\u4e00-\u9fa5]+){1,4}$
                roles:
                  type: array
                  description: 分配角色
                  items:
                    type: number
              required:
              - name
              - roles
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/response-base'
                - type: object
                  properties:
                    object:
                      type: object
                      properties:
                        id:
                          readOnly: true
                          type: integer
                        name:
                          description: 名称
                          maxLength: 255
                          type: string
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
