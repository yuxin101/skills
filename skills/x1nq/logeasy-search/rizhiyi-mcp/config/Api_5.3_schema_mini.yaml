  /api/v3/search/sheets/:
    get:
      operationId: search_sheets
      description: 获取 sheets 搜索结果，同步搜索
      tags:
      - search
      parameters:
      - in: query
        name: now
        schema:
          type: string
          description: 当前时间戳, 默认为机器的系统时间
        required: false
      - in: query
        name: time_range
        schema:
          type: string
          description: 时间范围, 格式为"开始时间,结束时间", 支持毫秒、now、earliest、yyyy-MM-hh:HH:mm:ss、yyyy-MM-hh:HH:mm:ss:SSS格式
        required: true
      - in: query
        name: onlySortByTimestamp
        schema:
          type: string
          format: boolean
          description: 是否只按时间戳排序, 当 enable_accelerate 为 true 时, 该参数无效
          default: 'true'
        required: false
      - in: query
        name: page
        schema:
          type: string
          format: number
          description: 页码
          default: '0'
        required: false
      - in: query
        name: size
        schema:
          type: string
          format: number
          description: 每页条数
          default: '20'
        required: false
      - in: query
        name: savedsearch_name
        schema:
          type: string
          description: 已存搜索名称，如果传入该参数，将会忽略 query 参数
        required: false
      - in: query
        name: queryfilters
        schema:
          type: string
          description: 查询过滤条件
        required: false
      - in: query
        name: executor_id
        schema:
          type: string
          description: 执行者id, 默认为当前用户id
        required: false
      - in: query
        name: filter_field
        schema:
          type: string
        required: false
      - in: query
        name: query
        schema:
          type: string
          description: 查询语句
        required: false
      - in: query
        name: use_spark
        schema:
          type: string
          format: boolean
          description: 是否使用高基模式
          default: 'false'
        required: false
      - in: query
        name: order
        schema:
          type: string
          description: 排序方式
          default: desc
        required: false
      - in: query
        name: category
        schema:
          type: string
          description: 查询类别
          default: other
        required: false
      - in: query
        name: task_name
        schema:
          type: string
          description: 任务名称, 用于区分不同类型的任务
          default: search_task
        required: false
      - in: query
        name: background
        schema:
          type: string
          format: boolean
          description: 是否后台执行
          default: 'false'
        required: false
      - in: query
        name: lang
        schema:
          type: string
          description: 语言
          default: zh_CN
        required: false
      - in: query
        name: timeline
        schema:
          type: string
          format: boolean
          description: 是否返回时间轴
          default: 'true'
        required: false
      - in: query
        name: statsevents
        schema:
          type: string
          format: boolean
          description: stats搜索时, 搜索结果是否需要保留记录
          default: 'false'
        required: false
      - in: query
        name: fields
        schema:
          type: string
          format: boolean
          description: 是否返回字段信息
          default: 'true'
        required: false
      - in: query
        name: highlight
        schema:
          type: string
          format: boolean
          description: 是否需要高亮
          default: 'true'
        required: false
      - in: query
        name: datasets
        schema:
          type: string
          description: 数据集
          default: '[]'
        required: false
      - in: query
        name: market_day
        schema:
          type: string
          format: number
          description: '交易日id, -1: 系统默认交易日, 0: 非交易日, 其他: 交易日id'
        required: false
      - in: query
        name: onlyTransactionDate
        schema:
          type: string
          format: boolean
          description: 是否只查询交易日, 默认为false, 有 market_day 时优先使用 market_day
          default: 'false'
        required: false
      - in: query
        name: terminated_after_size
        schema:
          type: string
          description: 分片取样数量, 每个shard获取条数, 负数表示不启动
        required: false
      - in: query
        name: test_mode
        schema:
          type: string
          format: boolean
          default: 'false'
        required: false
      - in: query
        name: timezone
        schema:
          type: string
          description: 时区
          default: Asia/Shanghai
        required: false
      - in: query
        name: app_id
        schema:
          type: string
          description: 应用id
        required: false
      - in: query
        name: app_name
        schema:
          type: string
          description: 应用名称, 有 app_id 时优先使用 app_id
        required: false
      - in: query
        name: enable_accelerate
        schema:
          type: string
          format: boolean
          description: 是否启用加速
          default: 'false'
        required: false
      - in: query
        name: accelerate_id
        schema:
          type: string
          format: number
          description: 加速id
        required: false
      - in: query
        name: session_id
        schema:
          type: string
          description: 会话id
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceid:
                    type: string
                    description: 请求唯一标识
                    example: d1e754e2b2354276a1fa22ce2a1a9b51
                  result:
                    type: boolean
                    description: 请求是否成功
                  rc:
                    type: number
                    description: SPL是否成功返回
                  results:
                    type: object
                    description: 结果
                    example:
                      starttime: 1566816000000
                      endtime: 1702346983770
                      fields:
                      - name: AutoTestAppIsApache
                        dc: '1'
                        topk:
                        - count: 2
                          value: true
                        total: 2
                        type: boolean
                      sheets: {}
                      timeline: {}
                      loseDataCommands: []
                      hit_message: ''
                      total_hits: 2
                      type: query
          description: 请求成功
      security:
      - BasicAuth: []
      - BearerAuth: []
      - ApiKeyAuth: []
