[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests (no API)
    integration: Integration tests (mocked LLM)
    smoke: Smoke tests (real LLM, subset only)
    slow: Performance/stress tests (slow)
    security: Security & accuracy tests
timeout = 300
