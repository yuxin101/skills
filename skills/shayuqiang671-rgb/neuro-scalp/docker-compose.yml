version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  neuroscalp:
    build: .
    environment:
      - OKX_API_KEY=your_key
      - OKX_SECRET=your_secret
    depends_on:
      - redis
    restart: always

  dashboard:
    build: .
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"