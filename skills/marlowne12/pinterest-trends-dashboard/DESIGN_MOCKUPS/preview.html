                  <button onClick={() => setMobileMenu(false)} className="text-white p-1">{Icons.close}</button>
                </div>
                {niches.map(n => (
                  <button key={n.id} onClick={() => setMobileMenu(false)} className="w-full flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-white/5 border-b border-white/5">
                    <span className="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[10px] font-bold">{n.rank}</span>
                    <span className="text-sm">{n.name}</span>
                    <span className={`ml-auto text-xs ${trendColor(n.trend)}`}>{trendIcon(n.trend)}</span>
                  </button>
                ))}
              </div>
            )}

            {/* Mobile KPIs */}
            <div className="p-3 grid grid-cols-2 gap-2">
              {[{l:'Avg Payout', v:'$118'}, {l:'Hidden Gems', v:'4'}].map((k,i) => (
                <div key={i} className="bg-white rounded-xl p-3 border border-gray-100 text-center">
                  <div className="text-lg font-bold text-gray-900">{k.v}</div>
                  <div className="text-[9px] text-gray-400 uppercase">{k.l}</div>
                </div>
              ))}
            </div>

            {/* Mobile Cards */}
            <div className="px-3 space-y-2 pb-20">
              {niches.slice(0,5).map(n => (
                <div key={n.id} className="bg-white rounded-xl p-3 border border-gray-100 shadow-sm">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="w-6 h-6 rounded-lg bg-pinterest/10 text-pinterest flex items-center justify-center text-[10px] font-bold">#{n.rank}</span>
                    <span className="text-xs font-semibold text-gray-900 flex-1">{n.name}</span>
                    <span className={`text-[10px] font-bold ${trendColor(n.trend)}`}>{trendIcon(n.trend)}</span>
                  </div>
                  <div className="flex gap-1.5 mb-2">
                    <span className="text-[9px] px-1.5 py-0.5 bg-gray-50 rounded text-gray-600">{formatRevenue(n.revenue)}</span>
                    <span className="text-[9px] px-1.5 py-0.5 bg-gray-50 rounded text-gray-600">${n.avgPayout} avg</span>
                    <span className="text-[9px] px-1.5 py-0.5 bg-gray-50 rounded text-gray-600">{formatVol(n.pinterestVol)}</span>
                  </div>
                  <div className="flex items-center justify-between">
                    <CompBadge score={n.competition} />
                    <span className={`text-xs font-bold ${scoreColor(n.score)}`}>Score: {n.score}</span>
                  </div>
                </div>
              ))}
            </div>

            {/* Bottom Nav */}
            <div className="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex items-center justify-around py-2">
              {[{i: Icons.chart, l:'Dashboard'}, {i: Icons.filter, l:'Filter'}, {i: Icons.search, l:'Search'}, {i: Icons.download, l:'Export'}].map((tab, idx) => (
                <button key={idx} className={`flex flex-col items-center gap-0.5 ${idx === 0 ? 'text-pinterest' : 'text-gray-400'}`}>
                  {tab.i}
                  <span className="text-[8px] font-medium">{tab.l}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ───────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState('dashboard');
  const [selectedNiche, setSelectedNiche] = useState('dietary-supplements');
  const [drillNiche, setDrillNiche] = useState(null);

  const screens = [
    { id: 'dashboard', label: 'Dashboard', icon: Icons.chart },
    { id: 'detail', label: 'Trend Detail', icon: Icons.fire },
    { id: 'filter', label: 'Filter Panel', icon: Icons.filter },
    { id: 'export', label: 'Export Modal', icon: Icons.download },
    { id: 'mobile', label: 'Mobile Preview', icon: <span className="text-sm">📱</span> },
  ];

  const handleDrillDown = (id) => {
    setDrillNiche(id);
    setScreen('detail');
  };

  const currentNiche = NICHES.find(n => n.id === (drillNiche || 'dietary-supplements'));

  return (
    <div className="min-h-screen bg-gradient-to-br from-gray-100 to-gray-200 p-6">
      {/* Header */}
      <div className="max-w-7xl mx-auto mb-6">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-2xl font-extrabold text-gray-900 flex items-center gap-3">
              <span className="p-2 bg-pinterest rounded-xl text-white">{Icons.pinterest}</span>
              Pinterest Trends Dashboard — Design Mockups
            </h1>
            <p className="text-sm text-gray-500 mt-1">Interactive preview · 5 screens · Tailwind-compatible components</p>
          </div>
          <div className="text-right text-xs text-gray-400">
            <div>Max-Co Products</div>
            <div>March 2026</div>
          </div>
        </div>
      </div>

      {/* Screen Tabs */}
      <div className="max-w-7xl mx-auto mb-6">
        <div className="flex gap-2 flex-wrap">
          {screens.map(s => (
            <ScreenTab key={s.id} label={s.label} icon={s.icon} active={screen === s.id} onClick={() => setScreen(s.id)} />
          ))}
        </div>
      </div>

      {/* Active Screen */}
      <div className="max-w-7xl mx-auto">
        {screen === 'dashboard' && (
          <DashboardScreen
            niches={NICHES}
            selectedNiche={selectedNiche}
            setSelectedNiche={setSelectedNiche}
            onDrillDown={handleDrillDown}
            onFilter={() => setScreen('filter')}
            onExport={() => setScreen('export')}
          />
        )}
        {screen === 'detail' && (
          <TrendDetailScreen niche={currentNiche} onBack={() => setScreen('dashboard')} />
        )}
        {screen === 'filter' && (
          <FilterPanelScreen onClose={() => setScreen('dashboard')} />
        )}
        {screen === 'export' && (
          <ExportModalScreen onClose={() => setScreen('dashboard')} />
        )}
        {screen === 'mobile' && (
          <MobilePreviewScreen niches={NICHES} />
        )}
      </div>

      {/* Footer */}
      <div className="max-w-7xl mx-auto mt-8 text-center text-xs text-gray-400">
        <p>Design mockup for review · Components map directly to Next.js + Tailwind implementation</p>
        <p className="mt-1">Colors, spacing, and typography are 1:1 with production Tailwind config</p>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
