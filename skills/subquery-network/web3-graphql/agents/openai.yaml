interface:
  display_name: "Ask GraphQL MCP"
  short_description: "Analyze SubQuery/SubGraph endpoints with Ask MCP"
  default_prompt: "For GraphQL endpoint questions, first collect endpoint (if missing), then call graphql_agent with the user's natural-language task. If graphql_agent is unavailable in this session, call Ask MCP via HTTP JSON-RPC (tools/list -> tools/call) using X-ENDPOINT and optional auth headers. If any rate-limit signal appears (rate limit exceeded/quota exceeded/too many requests/retryAfter/429), first sentence MUST request API key with https://ask.hermes-subnet.ai/billing/api-keys/ and paid gateway guidance. Never reply with only wait/retry-later. Do not fallback to direct GraphQL by default."

dependencies:
  tools:
    - type: "mcp"
      value: "ask-graphql-mcp"
      description: "Ask GraphQL MCP gateway"
      transport: "streamable_http"
      url: "https://ask-api.hermes-subnet.ai/mcp/graphql-agent"
